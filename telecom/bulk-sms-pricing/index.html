<body>
<afro-navbar active="telecom"></afro-navbar>

<div class="tool-hero">
  <span class="badge">Telecom & Mobile</span>
  <h1>Bulk SMS <em>Pricing</em> Calculator</h1>
  <p>Calculate bulk SMS costs with volume discounts across Africa. Compare providers and see per-SMS breakdowns.</p>
</div>

<div class="tool-main">
  <div class="form-row">
    <div class="input-group">
      <label for="country-select">Country</label>
      <select id="country-select"><option value="">-- Choose a country --</option></select>
    </div>
    <div class="input-group">
      <label for="sms-type">SMS Type</label>
      <select id="sms-type">
        <option value="domestic">Domestic SMS</option>
        <option value="international">International SMS (1.5x rate)</option>
      </select>
    </div>
  </div>

  <div class="slider-group">
    <label for="volume-slider">Monthly SMS Volume</label>
    <div class="slider-wrap">
      <input type="range" id="volume-slider" min="1000" max="1000000" value="10000" step="1000">
      <span class="slider-val" id="volume-display">10,000</span>
    </div>
  </div>

  <div id="results"></div>
  <div class="empty-state" id="empty-state">
    <p>Select a country and adjust the volume to see pricing</p>
  </div>
</div>

<afro-footer></afro-footer>
<script src="/data/telecom/country-telecom-index.js?v=61207340"></script>
<script>
(function(){
  'use strict';
  var select = document.getElementById('country-select');
  var slider = document.getElementById('volume-slider');
  var volDisplay = document.getElementById('volume-display');
  var smsType = document.getElementById('sms-type');
  var resultsEl = document.getElementById('results');
  var emptyEl = document.getElementById('empty-state');

  var TIERS = [
    {min: 0, max: 9999, discount: 0, label: 'Standard (1 - 9,999)'},
    {min: 10000, max: 49999, discount: 0.05, label: '10K+ (5% off)'},
    {min: 50000, max: 99999, discount: 0.10, label: '50K+ (10% off)'},
    {min: 100000, max: 499999, discount: 0.15, label: '100K+ (15% off)'},
    {min: 500000, max: Infinity, discount: 0.25, label: '500K+ (25% off)'}
  ];

  function init() {
    if (typeof TELECOM_DATA === 'undefined') return;
    var codes = Object.keys(TELECOM_DATA.countries).sort(function(a, b) {
      return TELECOM_DATA.countries[a].name.localeCompare(TELECOM_DATA.countries[b].name);
    });
    for (var i = 0; i < codes.length; i++) {
      var c = TELECOM_DATA.countries[codes[i]];
      var opt = document.createElement('option');
      opt.value = codes[i];
      opt.textContent = c.name;
      select.appendChild(opt);
    }
    slider.addEventListener('input', onSliderChange);
    select.addEventListener('change', calculate);
    smsType.addEventListener('change', calculate);
    slider.addEventListener('change', calculate);
  }

  function onSliderChange() {
    volDisplay.textContent = Number(slider.value).toLocaleString('en');
    calculate();
  }

  function fmt(num, sym) {
    if (!num && num !== 0) return 'N/A';
    return sym + Number(num).toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function fmtInt(num, sym) {
    return sym + Number(num).toLocaleString('en', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  }

  function getCurrentTier(volume) {
    for (var i = TIERS.length - 1; i >= 0; i--) {
      if (volume >= TIERS[i].min) return i;
    }
    return 0;
  }

  function calculate() {
    var code = select.value;
    if (!code) { resultsEl.innerHTML = ''; emptyEl.style.display = ''; return; }
    emptyEl.style.display = 'none';

    var country = TELECOM_DATA.countries[code];
    var sym = country.symbol || '';
    var smsData = country.bulkSMS || {};
    var baseCostPerSMS = smsData.costPerSMS || smsData.domesticRate || smsData.avgCostPerSMS || 0;
    var isIntl = smsType.value === 'international';
    if (isIntl) baseCostPerSMS = baseCostPerSMS * 1.5;
    var volume = parseInt(slider.value) || 10000;
    var tierIdx = getCurrentTier(volume);
    var discount = TIERS[tierIdx].discount;
    var effectiveCost = baseCostPerSMS * (1 - discount);
    var totalCost = effectiveCost * volume;
    var savings = baseCostPerSMS * volume * discount;

    if (baseCostPerSMS === 0) {
      resultsEl.innerHTML = '<p style="text-align:center;color:#94a3b8;margin:2rem 0;">No bulk SMS pricing data available for ' + country.name + ' yet.</p>';
      return;
    }

    var html = '<div class="result-cards">' +
      '<div class="r-card primary"><div class="r-label">Total Monthly Cost</div><div class="r-value">' + fmtInt(Math.round(totalCost), sym) + '</div><div class="r-sub">' + volume.toLocaleString('en') + ' messages</div></div>' +
      '<div class="r-card"><div class="r-label">Cost per SMS</div><div class="r-value">' + fmt(effectiveCost, sym) + '</div><div class="r-sub">' + (discount > 0 ? Math.round(discount * 100) + '% volume discount' : 'Standard rate') + '</div></div>' +
      '<div class="r-card"><div class="r-label">You Save</div><div class="r-value">' + fmtInt(Math.round(savings), sym) + '</div><div class="r-sub">' + (discount > 0 ? 'vs standard pricing' : 'No discount at this volume') + '</div></div></div>';

    html += buildTierTable(baseCostPerSMS, volume, sym, tierIdx);
    html += buildProviders(country, baseCostPerSMS, volume, sym);

    if (isIntl) {
      html += '<div class="intl-box"><h3>International SMS Note</h3>' +
        '<p>International SMS rates are approximately 1.5x the domestic rate. Actual rates vary by destination country and carrier.</p>' +
        '<div class="intl-cost">Domestic rate: ' + fmt(baseCostPerSMS / 1.5, sym) + ' &rarr; International: ' + fmt(baseCostPerSMS, sym) + ' per SMS</div></div>';
    }

    resultsEl.innerHTML = html;
  }

  function buildTierTable(baseCost, volume, sym, activeTier) {
    var html = '<h2 style="font-size:1.1rem;font-weight:700;margin:2rem 0 .75rem;color:#0f172a;">Volume Discount Tiers</h2>' +
      '<div style="overflow-x:auto"><table class="tier-table"><thead><tr><th>Tier</th><th>Base Rate</th><th>Discount</th><th>Effective Rate</th><th>Cost at This Volume</th></tr></thead><tbody>';
    for (var i = 0; i < TIERS.length; i++) {
      var t = TIERS[i];
      var eff = baseCost * (1 - t.discount);
      var cost = eff * volume;
      var cls = i === activeTier ? ' class="active"' : '';
      var discTxt = t.discount > 0 ? '<span class="discount">-' + Math.round(t.discount * 100) + '%</span>' : 'None';
      html += '<tr' + cls + '><td>' + t.label + '</td><td>' + fmt(baseCost, sym) + '</td><td>' + discTxt + '</td><td>' + fmt(eff, sym) + '</td><td>' + fmtInt(Math.round(cost), sym) + '</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function buildProviders(country, baseCost, volume, sym) {
    var smsData = country.bulkSMS || {};
    var providers = smsData.providers || [];
    if (providers.length === 0) {
      var ops = country.operators || [];
      for (var k = 0; k < ops.length && k < 3; k++) {
        var adjustment = k === 0 ? 0.96 : k === 1 ? 1.03 : 1.08;
        providers.push({name: ops[k].name, rate: baseCost * adjustment, features: ['Local delivery', 'API access']});
      }
      if (providers.length === 0) return '';
    }

    var html = '<div class="providers-section"><h2>Available Providers in ' + country.name + '</h2><div class="prov-grid">';
    for (var i = 0; i < providers.length; i++) {
      var p = providers[i];
      var rate = p.rate || baseCost;
      var tierIdx = getCurrentTier(volume);
      var effRate = rate * (1 - TIERS[tierIdx].discount);
      var total = effRate * volume;
      html += '<div class="prov-card"><h3>' + (p.name || 'Provider ' + (i + 1)) + '</h3>' +
        '<div class="prov-row"><span class="pl">Per SMS</span><span class="pv">' + fmt(effRate, sym) + '</span></div>' +
        '<div class="prov-row"><span class="pl">Monthly Total</span><span class="pv">' + fmtInt(Math.round(total), sym) + '</span></div>' +
        '<div class="prov-row"><span class="pl">Annual Total</span><span class="pv">' + fmtInt(Math.round(total * 12), sym) + '</span></div></div>';
    }
    html += '</div></div>';
    return html;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
