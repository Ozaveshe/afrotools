<body>
<afro-navbar active="telecom"></afro-navbar>

<div class="tool-hero">
  <h1>SIM Registration <span class="accent">Status Checker</span></h1>
  <p>Check SIM registration requirements, deadlines, and what you need to stay connected in any African country.</p>
</div>

<div class="tool-main">
  <div class="ctrl-bar">
    <div class="ctrl-group">
      <label for="country-sel">Country</label>
      <select id="country-sel"><option value="">Select country...</option></select>
    </div>
  </div>

  <div id="content">
    <div class="empty-state"><p>Select a country to check SIM registration requirements</p></div>
  </div>
</div>

<afro-footer></afro-footer>

<script src="/data/telecom/country-telecom-index.js?v=61207340"></script>
<script>
(function(){
  'use strict';

  var countrySel = document.getElementById('country-sel');
  var contentEl = document.getElementById('content');

  var REG_GUIDES = {
    'NIN-SIM linkage': {
      checklist: ['National Identification Number (NIN)', 'Active SIM card(s)', 'Phone used for registration', 'Visit NIMC centre if NIN not obtained'],
      steps: [
        { title: 'Obtain your NIN', desc: 'Visit a National Identity Management Commission (NIMC) enrolment centre with valid documents (birth certificate, passport, etc.).' },
        { title: 'Dial the USSD Code', desc: 'Dial *346# from the SIM you want to register and follow prompts to submit your NIN.' },
        { title: 'Biometric Verification', desc: 'If USSD fails, visit a provider-approved registration centre for biometric capture.' },
        { title: 'Confirmation', desc: 'You will receive an SMS confirming successful NIN-SIM linkage.' }
      ]
    },
    'RICA (Regulation of Interception of Communications Act)': {
      checklist: ['Valid South African ID / Passport / Asylum permit', 'Proof of residence (utility bill, bank statement)', 'The SIM card to be registered'],
      steps: [
        { title: 'Gather Documents', desc: 'You need a valid ID and proof of address (utility bill, bank statement, or lease agreement not older than 3 months).' },
        { title: 'Visit a RICA Point', desc: 'Go to any operator store, participating retailer, or register online via your provider app.' },
        { title: 'Submit Documents', desc: 'Present your ID and proof of address. The agent will capture your details.' },
        { title: 'Activation', desc: 'Your SIM is activated immediately after successful RICA registration.' }
      ]
    },
    'default': {
      checklist: ['National ID card or passport', 'Active SIM card', 'Proof of address (if required)', 'Visit operator service centre'],
      steps: [
        { title: 'Get Your National ID', desc: 'Ensure you have a valid national identification document as required by your country.' },
        { title: 'Visit a Service Centre', desc: 'Go to your mobile operator service centre or approved agent with your ID and SIM card.' },
        { title: 'Submit Registration', desc: 'Provide your ID for scanning/copying. Some countries require biometric data capture.' },
        { title: 'Receive Confirmation', desc: 'You will get an SMS or verbal confirmation that your SIM is registered.' }
      ]
    }
  };

  function init() {
    if (typeof TELECOM_DATA === 'undefined') return;
    var codes = Object.keys(TELECOM_DATA.countries);
    codes.sort(function(a, b) {
      return TELECOM_DATA.countries[a].name.localeCompare(TELECOM_DATA.countries[b].name);
    });
    for (var i = 0; i < codes.length; i++) {
      var opt = document.createElement('option');
      opt.value = codes[i];
      opt.textContent = TELECOM_DATA.countries[codes[i]].name;
      countrySel.appendChild(opt);
    }
    countrySel.addEventListener('change', render);
  }

  function formatSubs(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(0) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
    return n.toString();
  }

  function render() {
    var code = countrySel.value;
    if (!code) {
      contentEl.innerHTML = '<div class="empty-state"><p>Select a country to check SIM registration requirements</p></div>';
      return;
    }
    var country = TELECOM_DATA.countries[code];
    var sr = country.simRegistration || {};
    var method = sr.method || 'National ID';

    var html = '';

    /* Mandatory alert */
    if (sr.mandatory !== false) {
      html += '<div class="alert-banner mandatory">';
      html += '<div class="ab-icon">!</div>';
      html += '<div class="ab-body"><h3>SIM Registration is Mandatory</h3>';
      html += '<p>All SIM cards in ' + country.name + ' must be registered using ' + method + '. Unregistered lines risk disconnection.</p></div></div>';
    }

    /* Info cards */
    html += '<div class="info-grid">';
    html += '<div class="info-card"><div class="ic-label">Registration Method</div><div class="ic-val">' + method + '</div></div>';
    html += '<div class="info-card' + (sr.deadline ? ' warn' : '') + '"><div class="ic-label">Deadline</div><div class="ic-val">' + (sr.deadline || 'Ongoing') + '</div></div>';
    if (sr.checkCode) {
      html += '<div class="info-card code"><div class="ic-label">Check Status Code</div><div class="ic-val">' + sr.checkCode + '</div></div>';
    }
    html += '<div class="info-card"><div class="ic-label">Regulator</div><div class="ic-val">' + (country.regulator || 'N/A') + '</div></div>';
    html += '</div>';

    /* What you need checklist */
    var guide = REG_GUIDES[method] || REG_GUIDES['default'];
    html += '<div class="checklist-section"><h3>What You Need</h3><ul class="checklist">';
    for (var i = 0; i < guide.checklist.length; i++) {
      html += '<li><span class="ck-icon">&#10003;</span> ' + guide.checklist[i] + '</li>';
    }
    html += '</ul></div>';

    /* Steps */
    html += '<div class="steps-section"><h3>Registration Steps for ' + country.name + '</h3>';
    for (var i = 0; i < guide.steps.length; i++) {
      html += '<div class="step">';
      html += '<div class="step-num">' + (i + 1) + '</div>';
      html += '<div class="step-body"><h4>' + guide.steps[i].title + '</h4><p>' + guide.steps[i].desc + '</p></div>';
      html += '</div>';
    }
    html += '</div>';

    /* Penalty warning */
    if (sr.penalty) {
      html += '<div class="penalty-box">';
      html += '<h3>&#9888; Penalty for Non-Compliance</h3>';
      html += '<p>' + sr.penalty + '. Make sure to register all your SIM cards before the deadline to avoid losing your line and mobile money accounts.</p>';
      html += '</div>';
    }

    /* Operators list */
    if (country.operators && country.operators.length > 0) {
      html += '<div class="operators-section"><h3>Operators in ' + country.name + '</h3>';
      for (var i = 0; i < country.operators.length; i++) {
        var op = country.operators[i];
        html += '<div class="op-row">';
        html += '<span class="op-name">' + op.name + '</span>';
        html += '<span class="op-subs">' + formatSubs(op.subscribers) + ' subscribers</span>';
        html += '</div>';
      }
      html += '</div>';
    }

    contentEl.innerHTML = html;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
