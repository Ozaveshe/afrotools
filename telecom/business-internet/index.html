<body>
<afro-navbar active="telecom"></afro-navbar>

<div class="tool-hero">
  <span class="badge">Telecom & Mobile</span>
  <h1>Business Internet <em>Cost</em> Calculator</h1>
  <p>Find the right internet plan for your African business. Compare fiber, LTE, and mobile data by employee count, speed, and usage.</p>
</div>

<div class="tool-main">
  <div class="form-grid">
    <div class="input-group">
      <label for="country-select">Country</label>
      <select id="country-select"><option value="">-- Choose a country --</option></select>
    </div>
    <div class="input-group">
      <label for="employees">Number of Employees</label>
      <input type="number" id="employees" min="1" max="10000" value="10" placeholder="e.g. 10">
    </div>
    <div class="input-group">
      <label for="speed">Required Speed (Mbps)</label>
      <select id="speed">
        <option value="10">10 Mbps (Basic)</option>
        <option value="25">25 Mbps (Small Office)</option>
        <option value="50" selected>50 Mbps (Medium Office)</option>
        <option value="100">100 Mbps (Large Office)</option>
        <option value="200">200+ Mbps (Enterprise)</option>
      </select>
    </div>
    <div class="input-group">
      <label for="usage">Usage Type</label>
      <select id="usage">
        <option value="basic">Basic (Email, browsing)</option>
        <option value="moderate" selected>Moderate (Video calls, cloud apps)</option>
        <option value="heavy">Heavy (Streaming, large transfers)</option>
      </select>
    </div>
  </div>
  <button class="calc-btn" id="calc-btn">Calculate Internet Costs</button>

  <div id="results"></div>
  <div class="empty-state" id="empty-state">
    <p>Configure your business needs and click Calculate to see options</p>
  </div>
</div>

<afro-footer></afro-footer>
<script src="/data/telecom/country-telecom-index.js?v=61207340"></script>
<script>
(function(){
  'use strict';
  var select = document.getElementById('country-select');
  var resultsEl = document.getElementById('results');
  var emptyEl = document.getElementById('empty-state');
  var calcBtn = document.getElementById('calc-btn');

  var USAGE_MULTIPLIER = {basic: 0.5, moderate: 1, heavy: 2};
  var BW_PER_EMPLOYEE = {basic: 1, moderate: 3, heavy: 8};

  function init() {
    if (typeof TELECOM_DATA === 'undefined') return;
    var codes = Object.keys(TELECOM_DATA.countries).sort(function(a, b) {
      return TELECOM_DATA.countries[a].name.localeCompare(TELECOM_DATA.countries[b].name);
    });
    for (var i = 0; i < codes.length; i++) {
      var c = TELECOM_DATA.countries[codes[i]];
      var opt = document.createElement('option');
      opt.value = codes[i];
      opt.textContent = c.name;
      select.appendChild(opt);
    }
    calcBtn.addEventListener('click', calculate);
  }

  function fmt(num, sym) {
    if (!num && num !== 0) return 'N/A';
    return sym + Number(num).toLocaleString('en', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  }

  function calculate() {
    var code = select.value;
    if (!code) { alert('Please select a country.'); return; }
    emptyEl.style.display = 'none';

    var country = TELECOM_DATA.countries[code];
    var sym = country.symbol || '';
    var cur = country.currency || '';
    var isps = country.isp || [];
    var employees = parseInt(document.getElementById('employees').value) || 10;
    var speed = parseInt(document.getElementById('speed').value) || 50;
    var usage = document.getElementById('usage').value || 'moderate';

    var recBW = Math.max(speed, employees * BW_PER_EMPLOYEE[usage]);
    var monthlyDataGB = employees * 30 * USAGE_MULTIPLIER[usage] * 2;

    var html = '<div class="recommendation">' +
      '<h2>Recommended Bandwidth for Your Office</h2>' +
      '<div class="rec-value">' + recBW + ' Mbps</div>' +
      '<div class="rec-note">' + employees + ' employees with ' + usage + ' usage need ~' + Math.round(monthlyDataGB) + ' GB/month</div></div>';

    var options = buildOptions(isps, country, recBW, monthlyDataGB, speed, sym);

    if (options.length === 0) {
      html += '<p style="text-align:center;color:#94a3b8;margin:2rem 0;">No ISP data available for ' + country.name + ' yet. Try another country.</p>';
      resultsEl.innerHTML = html;
      return;
    }

    options.sort(function(a, b) { return a.monthly - b.monthly; });

    html += '<h2 style="font-size:1.1rem;font-weight:700;margin:2rem 0 1rem;color:#0f172a;">Available Options in ' + country.name + '</h2>';
    html += '<div class="options-grid">';
    for (var i = 0; i < options.length; i++) {
      var o = options[i];
      var isRec = i === 0;
      html += '<div class="option-card' + (isRec ? ' recommended' : '') + '">';
      if (isRec) html += '<span class="opt-badge best">Best Value</span> ';
      html += '<span class="opt-badge ' + o.typeClass + '">' + o.type + '</span>';
      html += '<h3>' + o.name + '</h3>';
      html += '<div class="opt-price">' + fmt(o.monthly, sym) + '<span class="opt-per">/month</span></div>';
      html += '<div class="opt-row"><span class="ol">Speed</span><span class="ov">' + o.speed + ' Mbps</span></div>';
      html += '<div class="opt-row"><span class="ol">Data Cap</span><span class="ov">' + o.dataCap + '</span></div>';
      html += '<div class="opt-row"><span class="ol">Setup Fee</span><span class="ov">' + fmt(o.setup, sym) + '</span></div>';
      html += '<div class="opt-row"><span class="ol">1-Year Cost</span><span class="ov">' + fmt(o.setup + o.monthly * 12, sym) + '</span></div>';
      html += '</div>';
    }
    html += '</div>';

    html += buildCompareTable(options, sym, cur);
    html += buildDedicatedVsShared(recBW, sym, options);
    html += buildTips(usage, employees);

    resultsEl.innerHTML = html;
  }

  function buildOptions(isps, country, recBW, dataGB, speed, sym) {
    var options = [];
    for (var i = 0; i < isps.length; i++) {
      var isp = isps[i];
      var ispSpeed = parseInt(isp.speed) || 0;
      var type = (isp.type || 'fiber').toLowerCase();
      var typeClass = type.indexOf('fiber') >= 0 ? 'fiber' : (type.indexOf('lte') >= 0 ? 'lte' : 'mobile');
      options.push({
        name: isp.name || 'ISP ' + (i + 1),
        type: isp.type || 'Fiber',
        typeClass: typeClass,
        speed: ispSpeed || speed,
        monthly: isp.monthly || 0,
        setup: isp.setup || 0,
        dataCap: isp.dataCap || 'Unlimited'
      });
    }

    var operators = country.operators || [];
    for (var j = 0; j < operators.length && j < 2; j++) {
      var op = operators[j];
      var bundles = op.dataBundles || [];
      if (bundles.length === 0) continue;
      var bestBundle = bundles[bundles.length - 1];
      var volMB = bestBundle.volumeMB || 0;
      var monthlyData = dataGB * 1024;
      var unitsNeeded = volMB > 0 ? Math.ceil(monthlyData / volMB) : 1;
      var totalCost = (bestBundle.price || 0) * unitsNeeded;
      options.push({
        name: op.name + ' Mobile Data',
        type: 'Mobile Data',
        typeClass: 'mobile',
        speed: 20,
        monthly: totalCost,
        setup: 0,
        dataCap: (volMB * unitsNeeded / 1024).toFixed(0) + ' GB'
      });
    }
    return options;
  }

  function buildCompareTable(options, sym, cur) {
    var html = '<div class="compare-section"><h2>Side-by-Side Comparison (' + cur + ')</h2>' +
      '<div style="overflow-x:auto"><table class="cmp-table"><thead><tr><th>Provider</th><th>Type</th><th>Speed</th><th>Monthly</th><th>Setup</th><th>Annual</th></tr></thead><tbody>';
    for (var i = 0; i < options.length; i++) {
      var o = options[i];
      var cls = i === 0 ? ' class="rec"' : '';
      html += '<tr' + cls + '><td>' + o.name + '</td><td>' + o.type + '</td><td>' + o.speed + ' Mbps</td>' +
        '<td>' + fmt(o.monthly, sym) + '</td><td>' + fmt(o.setup, sym) + '</td>' +
        '<td>' + fmt(o.setup + o.monthly * 12, sym) + '</td></tr>';
    }
    html += '</tbody></table></div></div>';
    return html;
  }

  function buildDedicatedVsShared(recBW, sym, options) {
    var cheapest = options.length > 0 ? options[0].monthly : 0;
    var dedicatedCost = Math.round(cheapest * 2.5);
    var sharedCost = cheapest;
    var html = '<div class="compare-section"><h2>Dedicated vs Shared Line</h2>' +
      '<div style="overflow-x:auto"><table class="cmp-table"><thead><tr><th>Feature</th><th>Dedicated Line</th><th>Shared Line</th></tr></thead><tbody>' +
      '<tr><td>Est. Monthly Cost</td><td>' + fmt(dedicatedCost, sym) + '</td><td>' + fmt(sharedCost, sym) + '</td></tr>' +
      '<tr><td>Guaranteed Speed</td><td>' + recBW + ' Mbps (guaranteed)</td><td>' + recBW + ' Mbps (up to)</td></tr>' +
      '<tr><td>Uptime SLA</td><td>99.9%</td><td>99% typical</td></tr>' +
      '<tr><td>Best For</td><td>VoIP, video, critical ops</td><td>Email, browsing, light cloud</td></tr>' +
      '</tbody></table></div></div>';
    return html;
  }

  function buildTips(usage, employees) {
    var tips = [
      'Get at least 2 different ISPs for redundancy if internet is business-critical.',
      'Negotiate SLA terms that include uptime guarantees and penalty clauses.',
      'Consider a mobile data backup (MiFi) for outage situations.',
      'Ask about business-specific packages with static IPs and priority support.'
    ];
    if (usage === 'heavy') {
      tips.push('For heavy usage, consider a dedicated leased line for guaranteed bandwidth.');
      tips.push('Monitor bandwidth usage monthly to right-size your plan.');
    }
    if (employees > 50) {
      tips.push('Large offices should consider enterprise-grade solutions with managed routers.');
    }
    var html = '<div class="tips-box"><h3>Business Internet Tips</h3><ul>';
    for (var i = 0; i < tips.length; i++) {
      html += '<li>' + tips[i] + '</li>';
    }
    html += '</ul></div>';
    return html;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
