<div class="tool-hero">
  <span class="badge">Telecom & Mobile</span>
  <h1>Starlink vs Local <em>ISP</em> Comparator</h1>
  <p>Compare Starlink satellite internet against local fiber and LTE providers across Africa. Full cost-of-ownership breakdown.</p>
</div>

<div class="tool-main">
  <div class="input-group">
    <label for="country-select">Select Country</label>
    <select id="country-select"><option value="">-- Choose a country --</option></select>
  </div>

  <div id="results"></div>

  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
    <p>Select a country to compare Starlink with local ISPs</p>
  </div>
</div>

<afro-footer></afro-footer>
<script src="/data/telecom/country-telecom-index.js?v=61207340"></script>
<script>
(function(){
  'use strict';
  var select = document.getElementById('country-select');
  var resultsEl = document.getElementById('results');
  var emptyEl = document.getElementById('empty-state');

  function init() {
    if (typeof TELECOM_DATA === 'undefined') return;
    var codes = Object.keys(TELECOM_DATA.countries).sort(function(a, b) {
      return TELECOM_DATA.countries[a].name.localeCompare(TELECOM_DATA.countries[b].name);
    });
    for (var i = 0; i < codes.length; i++) {
      var c = TELECOM_DATA.countries[codes[i]];
      var opt = document.createElement('option');
      opt.value = codes[i];
      opt.textContent = c.name;
      select.appendChild(opt);
    }
    select.addEventListener('change', onCountryChange);
  }

  function fmt(num, sym) {
    if (!num && num !== 0) return 'N/A';
    return sym + Number(num).toLocaleString('en', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  }

  function fmtUSD(num) {
    return '$' + Number(num).toLocaleString('en', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  }

  function onCountryChange() {
    var code = select.value;
    if (!code) { resultsEl.innerHTML = ''; emptyEl.style.display = ''; return; }
    emptyEl.style.display = 'none';
    var country = TELECOM_DATA.countries[code];
    var sym = country.symbol || '';
    var cur = country.currency || '';
    var isps = country.isp || [];
    var sl = country.starlinkAvailable;
    var slPrice = country.starlinkPrice || {};

    if (!sl) {
      resultsEl.innerHTML = '<div class="not-available">Starlink is not yet available in ' + country.name +
        '<span>Starlink has not launched commercial service here. Check back for updates as coverage expands across Africa.</span></div>' +
        buildLocalOnlySection(isps, sym, cur);
      return;
    }

    var slMonthly = slPrice.monthly || 0;
    var slHardware = slPrice.hardware || 0;
    var slSpeed = slPrice.speed || '50-200';
    var slLatency = slPrice.latency || '20-40ms';
    var slDataCap = slPrice.dataCap || 'Unlimited';

    var html = '<div class="compare-grid">';
    html += buildStarlinkCard(slMonthly, slHardware, slSpeed, slLatency, slDataCap, sym);

    if (isps.length > 0) {
      html += buildISPCard(isps[0], sym);
    }
    html += '</div>';

    html += buildCostPerGB(isps, slMonthly, sym, country.name);
    html += buildTCO(isps, slMonthly, slHardware, sym, cur);
    html += buildSummary(isps, slMonthly, slHardware, slSpeed);

    resultsEl.innerHTML = html;
  }

  function buildStarlinkCard(monthly, hardware, speed, latency, dataCap, sym) {
    return '<div class="isp-card starlink">' +
      '<div class="card-label">Satellite Internet</div>' +
      '<h3>Starlink</h3>' +
      '<div class="metric"><span class="metric-label">Monthly</span><span class="metric-value">' + fmt(monthly, sym) + '</span></div>' +
      '<div class="metric"><span class="metric-label">Hardware</span><span class="metric-value">' + fmt(hardware, sym) + '</span></div>' +
      '<div class="metric"><span class="metric-label">Speed</span><span class="metric-value">' + speed + ' Mbps</span></div>' +
      '<div class="metric"><span class="metric-label">Latency</span><span class="metric-value">' + latency + '</span></div>' +
      '<div class="metric"><span class="metric-label">Data Cap</span><span class="metric-value">' + dataCap + '</span></div>' +
      '</div>';
  }

  function buildISPCard(isp, sym) {
    var name = isp.name || 'Local ISP';
    var type = isp.type || 'Fiber';
    var monthly = isp.monthly || (isp.prices && isp.prices[0]) || 0;
    var setup = isp.setup || 0;
    var speed = isp.speed || (isp.speeds && isp.speeds[0]) || 'Varies';
    var dataCap = isp.dataCap || 'Varies';
    var speedLabel = /mbps/i.test(String(speed)) ? speed : speed + ' Mbps';
    return '<div class="isp-card">' +
      '<div class="card-label">' + type + '</div>' +
      '<h3>' + name + '</h3>' +
      '<div class="metric"><span class="metric-label">Monthly</span><span class="metric-value">' + fmt(monthly, sym) + '</span></div>' +
      '<div class="metric"><span class="metric-label">Setup/Install</span><span class="metric-value">' + fmt(setup, sym) + '</span></div>' +
      '<div class="metric"><span class="metric-label">Speed</span><span class="metric-value">' + speedLabel + '</span></div>' +
      '<div class="metric"><span class="metric-label">Data Cap</span><span class="metric-value">' + dataCap + '</span></div>' +
      '</div>';
  }

  function buildLocalOnlySection(isps, sym, cur) {
    if (isps.length === 0) return '<p style="text-align:center;color:#94a3b8;margin-top:1.5rem;">No local ISP data available for this country yet.</p>';
    var html = '<h2 style="font-size:1.1rem;font-weight:700;margin:2rem 0 1rem;color:#0f172a;">Available Local ISPs</h2><div class="compare-grid">';
    for (var i = 0; i < isps.length && i < 4; i++) {
      html += buildISPCard(isps[i], sym);
    }
    html += '</div>';
    return html;
  }

  function buildCostPerGB(isps, slMonthly, sym, countryName) {
    var slCostGB = slMonthly > 0 ? (slMonthly / 1024) : 0;
    var maxCost = slCostGB;
    var items = [{name: 'Starlink', cost: slCostGB, cls: 'cyan'}];

    for (var i = 0; i < isps.length && i < 5; i++) {
      var isp = isps[i];
      var ispMonthly = isp.monthly || (isp.prices && isp.prices[0]) || 0;
      var capNum = parseInt(isp.dataCap) || 0;
      var costGB = capNum > 0 ? (ispMonthly / capNum) : (ispMonthly / 500);
      items.push({name: isp.name || 'ISP', cost: costGB, cls: 'blue'});
      if (costGB > maxCost) maxCost = costGB;
    }

    if (maxCost === 0) maxCost = 1;
    var html = '<div class="cost-gb"><h3>Cost per GB Comparison</h3>';
    for (var j = 0; j < items.length; j++) {
      var pct = Math.max(5, Math.round((items[j].cost / maxCost) * 100));
      html += '<div class="bar-row">' +
        '<span class="bar-label">' + items[j].name + '</span>' +
        '<span class="bar-track"><span class="bar-fill ' + items[j].cls + '" style="width:' + pct + '%"></span></span>' +
        '<span class="bar-val">' + fmt(Math.round(items[j].cost * 100) / 100, sym) + '/GB</span></div>';
    }
    html += '</div>';
    return html;
  }

  function buildTCO(isps, slMonthly, slHardware, sym, cur) {
    var sl1y = slHardware + (slMonthly * 12);
    var sl3y = slHardware + (slMonthly * 36);

    var html = '<div class="tco-section"><h2>Total Cost of Ownership (' + cur + ')</h2>' +
      '<table class="tco-table"><thead><tr><th>Provider</th><th>1 Year</th><th>3 Years</th></tr></thead><tbody>';

    var allRows = [{name: 'Starlink', y1: sl1y, y3: sl3y}];
    for (var i = 0; i < isps.length && i < 5; i++) {
      var isp = isps[i];
      var setup = isp.setup || 0;
      var monthly = isp.monthly || (isp.prices && isp.prices[0]) || 0;
      allRows.push({name: isp.name || 'ISP', y1: setup + (monthly * 12), y3: setup + (monthly * 36)});
    }

    var minY3 = Infinity;
    for (var k = 0; k < allRows.length; k++) {
      if (allRows[k].y3 < minY3) minY3 = allRows[k].y3;
    }

    for (var j = 0; j < allRows.length; j++) {
      var cls = allRows[j].y3 === minY3 ? ' class="best"' : '';
      html += '<tr' + cls + '><td>' + allRows[j].name + '</td><td>' + fmt(allRows[j].y1, sym) + '</td><td>' + fmt(allRows[j].y3, sym) + '</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function buildSummary(isps, slMonthly, slHardware, slSpeed) {
    var slWins = ['Unlimited data (no caps)', 'Works in rural/remote areas', 'No infrastructure needed', 'Consistent speeds'];
    var localWins = ['Lower upfront cost', 'Lower latency for gaming/calls', 'Local customer support', 'No weather dependency'];

    if (isps.length > 0) {
      var cheapest = isps[0];
      for (var i = 1; i < isps.length; i++) {
        if ((isps[i].monthly || 0) < (cheapest.monthly || 0)) cheapest = isps[i];
      }
      if ((cheapest.monthly || 0) < slMonthly) {
        localWins.unshift('Cheaper monthly cost');
      } else {
        slWins.unshift('Cheaper monthly cost');
      }
    }

    var html = '<div class="summary-box">' +
      '<div class="summary-col starlink-wins"><h3>Starlink Wins On</h3><ul>';
    for (var a = 0; a < slWins.length; a++) html += '<li>' + slWins[a] + '</li>';
    html += '</ul></div><div class="summary-col local-wins"><h3>Local ISP Wins On</h3><ul>';
    for (var b = 0; b < localWins.length; b++) html += '<li>' + localWins[b] + '</li>';
    html += '</ul></div></div>';
    return html;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
