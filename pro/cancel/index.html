    .cancel-kicker{font-size:12px;font-weight:900;color:#b45309;text-transform:uppercase;letter-spacing:.08em}
    h1{font-size:clamp(28px,5vw,42px);line-height:1.08;margin:10px 0 12px;font-weight:900;letter-spacing:0}

    .cancel-btn{display:inline-flex;min-height:42px;align-items:center;justify-content:center;border:1px solid #cbd5e1;border-radius:6px;padding:10px 14px;text-decoration:none;font-weight:900;color:#0f172a;background:#fff}

<afro-navbar></afro-navbar>
<main class="cancel-shell">
  <section class="cancel-panel">
    <div class="cancel-kicker">Checkout not completed</div>

    <p>No Pro access was activated from this checkout. You can retry with the same AfroTools account, choose a different plan, or return to the free tools.</p>
    <div class="cancel-actions">
