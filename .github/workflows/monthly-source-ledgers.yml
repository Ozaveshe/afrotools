name: Monthly Source Ledgers

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-source-ledgers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Refresh government and transport source ledgers
        run: |
          npm run government:sources
          npm run transport:sources

      - name: Open manual-review PR when sources change
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/monthly-source-ledgers
          title: "chore: refresh government and transport source ledgers"
          commit-message: "chore: refresh government and transport source ledgers"
          body: |
            Monthly official-source ledger refresh.

            Review changed, blocked, or manual-review rows before updating public fees, eligibility, documents, timelines, or rates.
          labels: manual-review, source-ledger
