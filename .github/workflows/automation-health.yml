name: Automation Health

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: automation-health
  cancel-in-progress: false

jobs:
  check-live-automation-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check live automation health
        id: health
        continue-on-error: true
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          rm -f reports/live-automation-health-latest.json reports/live-automation-health-latest.md
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Repository secret SUPABASE_SERVICE_ROLE_KEY is not configured."
            exit 1
          fi
          npm run automation:live-health:strict

      - name: Upload automation health evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-health-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            reports/live-automation-health-latest.json
            reports/live-automation-health-latest.md

      - name: Prepare failure alert
        if: steps.health.outcome == 'failure'
        id: alert
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const reportPath = 'reports/live-automation-health-latest.json';
          const report = fs.existsSync(reportPath)
            ? JSON.parse(fs.readFileSync(reportPath, 'utf8'))
            : null;
          const counts = report && report.counts ? report.counts : {};
          const stale = Number(counts.stale || 0);
          const missing = Number(counts.missing || 0);
          const title = `Automation health: ${stale} stale, ${missing} missing`;
          const failedChecks = report && Array.isArray(report.checks)
            ? report.checks.filter((check) => check.status !== 'ok')
            : [];
          const lines = [
            'The scheduled automation health gate failed.',
            '',
            `- Generated: ${report ? report.generated_at : 'no fresh report; check workflow configuration'}`,
            `- Stale: ${stale}`,
            `- Missing: ${missing}`,
            `- Degraded: ${Number(counts.degraded || 0)}`,
            `- Unavailable: ${Number(counts.unavailable || 0)}`,
            `- Workflow run: ${process.env.RUN_URL}`,
          ];
          if (failedChecks.length) {
            lines.push('', '### Non-healthy checks', '');
            for (const check of failedChecks) {
              lines.push(
                `- **${check.id}**: ${check.status}; latest=${check.latest_at || 'never'}; ` +
                `SLA=${check.sla_hours || 'n/a'}h; next=${check.next_scheduled_at || 'n/a'}`
              );
            }
          } else if (!report) {
            lines.push('', 'No fresh report was produced. Verify the Actions secret and workflow logs.');
          }
          fs.writeFileSync('automation-health-issue.md', `${lines.join('\n')}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `title=${title}\n`);
          NODE
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Open or update automation health issue
        if: steps.health.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_TITLE: ${{ steps.alert.outputs.title }}
        run: |
          issue_number="$(gh issue list --state open --limit 100 --json number,title \
            --jq '[.[] | select(.title | startswith("Automation health:"))][0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --title "$ALERT_TITLE" --body-file automation-health-issue.md
          else
            gh issue create --title "$ALERT_TITLE" --body-file automation-health-issue.md
          fi

      - name: Close recovered automation health issue
        if: steps.health.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_number="$(gh issue list --state open --limit 100 --json number,title \
            --jq '[.[] | select(.title | startswith("Automation health:"))][0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue close "$issue_number" --comment "Automation health recovered in ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          fi

      - name: Fail workflow when health is not green
        if: steps.health.outcome == 'failure'
        run: exit 1
