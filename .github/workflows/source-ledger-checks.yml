name: Source Ledger Checks

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-source-ledgers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Check government source ledger
        run: npm run government:sources:check

      - name: Check transport source ledger
        run: npm run transport:sources:check

      - name: Upload source ledger evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-ledger-check-evidence
          if-no-files-found: ignore
          path: |
            data/government/source-status.json
            data/transport/source-status.json
            reports/government-source-ledger.md
            reports/transport-source-ledger.md
