name: Static Data Fallback Refresh PR

on:
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-static-data-fallbacks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh static data fallbacks
        run: npm run data:fallbacks:refresh
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Verify refreshed fallback freshness
        run: npm run data:fallbacks:check

      - name: Detect static fallback changes
        id: changes
        shell: bash
        run: |
          paths=(
            data/_meta.json
            data/forex/latest.json
            data/fuel/latest.json
            data/rates/latest.json
            data/commodities/latest.json
          )
          git status --short -- "${paths[@]}"
          if [ -n "$(git status --short -- "${paths[@]}")" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open static data fallback refresh PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/static-data-fallback-refresh
          delete-branch: true
          add-paths: |
            data/_meta.json
            data/forex/latest.json
            data/fuel/latest.json
            data/rates/latest.json
            data/commodities/latest.json
          title: "chore: refresh static data fallbacks"
          commit-message: "chore: refresh static data fallbacks"
          body: |
            Weekly refresh of the committed forex, fuel, rates, and commodities fallbacks from AfroTools live_data_store.

            The refresh validates every snapshot against the public freshness thresholds before replacing committed files, then reconciles data/_meta.json.
