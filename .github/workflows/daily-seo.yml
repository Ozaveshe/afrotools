name: Daily SEO Auto-fix

on:
  schedule:
    # Runs every day at 02:00 UTC (before Netlify's daily crawl window)
    - cron: '0 2 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

permissions:
  contents: write   # needed to commit & push fixes back

jobs:
  seo-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use the default token — write permission granted above
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git push works cleanly
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check pause switch
        run: |
          if [ "${{ vars.AFROTOOLS_DAILY_MAINTENANCE_PAUSED }}" = "1" ] || [ "${{ secrets.AFROTOOLS_DAILY_MAINTENANCE_PAUSED }}" = "1" ]; then
            echo "Daily maintenance paused by AFROTOOLS_DAILY_MAINTENANCE_PAUSED."
            exit 0
          fi

      - name: Run SEO daily fix
        id: seo
        # Preserve source-backed lastmod values. Broad daily restamps make the
        # committed sitemap index diverge from the deterministic site build.
        run: node scripts/seo-daily-fix.js
        # Never fail the workflow — fixes are best-effort
        continue-on-error: true

      - name: Commit any fixes back to main
        run: |
          git config user.name  "AfroTools SEO Bot"
          git config user.email "seo-bot@afrotools.com"

          git add \
            sitemap.xml \
            sitemap-i18n.xml \
            robots.txt \
            _redirects \
            $(git diff --name-only -- '*.html' 2>/dev/null || true)

          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No SEO changes today — site is clean."
          else
            git commit -m "chore(seo): daily auto-fix $(date -u +%Y-%m-%d) [skip ci]"
            git push origin main
            echo "SEO fixes committed and pushed. Netlify will redeploy automatically."
          fi
