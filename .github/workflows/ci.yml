name: CI - Verify AfroTools

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for browser-backed tests
        run: npx playwright install chromium --with-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Verify calculation formulas and jurisdictional data
        run: npm run calculation-quality:check

      - name: Verify static data fallback freshness
        run: npm run data:fallbacks:check

      - name: AI contract tests
        run: npm run test:ai

      - name: Unit and integration tests
        run: npm test

      - name: Verify Pro architecture
        run: npm run pro:verify

      - name: Validate i18n dictionaries
        run: npm run build:i18n:validate

      - name: Validate hreflang graph
        run: npm run validate:hreflang

  build:
    name: Build and audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deploy artifact
        run: npm run build:deploy

      - name: Audit deploy artifact
        run: npm run audit:dist

      - name: Security scan publish surfaces
        run: npm run security:scan

      - name: Verify generated outputs are committed
        run: |
          git diff --stat
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated files are out of date. Run 'npm run build:deploy' and commit source outputs."
            git diff --name-only
            exit 1
          fi

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run smoke specs
        run: npx playwright test tests/e2e/automation-smoke.spec.js tests/e2e/tool-discovery.spec.js --project=chromium --workers=1
