name: CI - Verify AfroTools

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: AI contract tests
        run: npm run test:ai

      - name: Unit and integration tests
        run: npm test

      - name: Security scan source
        run: npm run security:scan

      - name: Verify Pro architecture
        run: npm run pro:verify

      - name: Validate i18n dictionaries
        run: npm run build:i18n:validate

      - name: Validate hreflang graph
        run: npm run validate:hreflang

      - name: Build deploy artifact
        run: npm run build:deploy

      - name: Audit deploy artifact
        run: npm run audit:dist

      - name: Verify generated outputs are committed
        run: |
          git diff --stat
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated files are out of date. Run 'npm run build:deploy' and commit source outputs."
            git diff --name-only
            exit 1
          fi
