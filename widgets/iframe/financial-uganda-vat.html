      .aw-tabs {

        margin-bottom: 12px;
      }
      .aw-tab,

        border-radius: 10px;
        background: var(--soft);
        color: var(--text);
        font: inherit;
        font-weight: 800;
      }
      .aw-tab--active,

        padding: 10px;
        font: inherit;
        margin-bottom: 11px;
      }
      .aw-btn {
        width: 100%;
      }
      .aw-result {
        margin-top: 13px;
        background: var(--soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px;
      }
      .aw-result[hidden],
      .aw-error[hidden] {
        display: none;
      }
      .aw-result div {
        display: flex;
        justify-content: space-between;
        gap: 7px;
        padding: 6px 0;
      }
      .aw-result div + div {
        border-top: 1px solid var(--line);
      }
      .aw-note {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
      }
      .aw-error {
        margin: 10px 0 0;
        color: #a32532;
        font-size: 12px;
        font-weight: 800;
      }
      .dark .aw-error {
