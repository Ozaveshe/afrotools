<!doctype html>
<html data-chat-bundle="/assets/js/bundles/chat.88bd45ff.min.js" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Historical Crypto DCA Replay — AfroTools</title>
  <meta name="robots" content="noindex, follow">
  <style>
    *{box-sizing:border-box}
    :root{color-scheme:light dark;--bg:#fff;--card:#f5f8fc;--text:#132039;--muted:#526176;--border:#d7e0eb;--brand:#075fbd}
    body.dark{--bg:#0a1628;--card:#111f34;--text:#f5f8ff;--muted:#a9bad0;--border:#30415a;--brand:#78b8ff}
    body{margin:0;padding:18px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .dca-widget-card{max-width:470px;margin:auto;padding:22px;border:1px solid var(--border);border-radius:16px;background:var(--card)}
    .dca-widget-kicker{margin:0 0 8px;color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    h1{margin:0 0 10px;font-size:23px;line-height:1.15}
    p,li{font-size:14px;line-height:1.55}
    p{color:var(--muted)}
    ul{margin:14px 0 18px;padding-left:20px}
    li+li{margin-top:5px}
    .dca-widget-cta{display:flex;align-items:center;justify-content:center;min-height:48px;padding:10px 14px;border-radius:10px;background:var(--brand);color:#fff;font-weight:800;text-decoration:none;text-align:center}
    body.dark .dca-widget-cta{color:#07111f}
    .dca-widget-cta:focus-visible{outline:3px solid color-mix(in srgb,var(--brand) 50%,transparent);outline-offset:3px}
    .dca-widget-note{margin:12px 0 0;font-size:12px;text-align:center}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important;animation:none!important}}
  </style>
<link rel="canonical" href="https://afrotools.com/widgets/iframe/crypto-dca-calculator">
</head>
<body>
  <div id="widget-root"></div>
  <script src="/widgets/crypto/dca-calc.js?v=4e225376"></script>
  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    var preferred = params.get('theme');
    if (preferred === 'dark' || (!preferred && matchMedia('(prefers-color-scheme: dark)').matches)) document.body.classList.add('dark');
    AfroWidgets.DCACalc(document.getElementById('widget-root'));
    if ('ResizeObserver' in window) new ResizeObserver(function () {
      parent.postMessage({ type: 'afrotools:resize', height: document.body.scrollHeight }, '*');
    }).observe(document.body);
  })();
  </script>
</body>
</html>
