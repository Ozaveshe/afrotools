function _renderCats() {
  var g = document.getElementById('cg');
  if (!g) return;

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeHref(href) {
    return String(href || '').replace(/\/index\.html$/, '').replace(/\/$/, '').toLowerCase();
  }

  function isPublicTool(t) {
    return t && (t.status === 'live' || t.status === 'new');
  }

  function shortToolLabel(label) {
    var text = String(label || '').replace(/\s+[\u2013\u2014]\s+.*$/, '');
    text = text
      .replace(/\s+Calculator for Africa$/i, ' Calculator')
      .replace(/\s+Tool for Africa$/i, ' Tool')
      .replace(/\s+Africa$/i, '')
      .replace(/\s+All 54 African Countries$/i, '')
      .trim();
    if (text.length > 46) {
      text = text.slice(0, 43).replace(/\s+\S*$/, '').trim() + '...';
    }
    return text || label || 'Tool';
  }

  function formatCount(value) {
    return Number(value || 0).toLocaleString();
  }

  function countLabel(value) {
    return formatCount(value) + ' tool' + (value === 1 ? '' : 's');
  }

  // Use registry if available, otherwise fallback to the static navigation sample.
  var hasRegistry = typeof AFRO_TOOLS !== 'undefined' && AFRO_TOOLS.length > 0;

  // Get per-category live tool counts and top tools from the registry.
  var regCounts = {};
  var regTopTools = {};
  if (hasRegistry) {
    ALL_CATS.forEach(function(cm){
      if (typeof getTotalToolCount === 'function') {
        regCounts[cm.key] = getTotalToolCount(function(t) {
          return t.category === cm.key && isPublicTool(t);
        });
      } else {
        regCounts[cm.key] = AFRO_TOOLS.filter(function(t){
          return (!t.lang || t.lang === 'en') && t.category === cm.key && isPublicTool(t);
        }).reduce(function(sum, t){ return sum + (Number(t.toolCount) || 1); }, 0);
      }

      var seen = {};
      regTopTools[cm.key] = AFRO_TOOLS
        .filter(function(t){
          return (!t.lang || t.lang === 'en') && t.category === cm.key && isPublicTool(t);
        })
        .sort(function(a, b){
          return (b.priority || 0) - (a.priority || 0) || String(a.name || '').localeCompare(String(b.name || ''));
        })
        .filter(function(t){
          var key = normalizeHref(t.href || t.id);
          if (!key || seen[key]) return false;
          seen[key] = true;
          return true;
        })
        .slice(0, 4)
        .map(function(t){
          return {
            label: t.name || 'Tool',
            displayLabel: shortToolLabel(t.name || 'Tool'),
            href: t.href || '#',
            emoji: t.icon || ''
          };
        });
    });
  }

  // Calculate total tools
  var totalTools = 0;
  if (hasRegistry && typeof getPublicToolStats === 'function') {
    totalTools = getPublicToolStats('en').liveTools;
  } else if (hasRegistry) {
    totalTools = AFRO_TOOLS.filter(function(t){
      return isPublicTool(t);
    }).length;
  }
  // Fallback only when the registry did not load. Avoid mixing brochure lists
  // with registry-backed counts because that has historically inflated totals.
  if (!hasRegistry) {
    ALL_CATS.forEach(function(cm){
      if (_NAV_TOOLS[cm.key]) {
        regCounts[cm.key] = _NAV_TOOLS[cm.key].length;
        regTopTools[cm.key] = _NAV_TOOLS[cm.key].slice(0, 4).map(function(t){
          return {
            label: t.label,
            displayLabel: t.label,
            href: t.href,
            emoji: t.emoji || ''
          };
        });
      totalTools += _NAV_TOOLS[cm.key].length;
      }
    });
  }

  var h = document.getElementById('heroToolCount');
  if (h && totalTools > 0) h.textContent = formatCount(totalTools);
  var categoryHero = document.getElementById('heroCategoryCount');
  if (categoryHero) categoryHero.textContent = formatCount(ALL_CATS.length);
  var countEl = document.getElementById('catCount');
  if (countEl) countEl.textContent = ALL_CATS.length + ' categories';
  var intentEl = document.getElementById('catIntentFilters');
  if (intentEl) {
    intentEl.innerHTML = CATEGORY_INTENTS.map(function(intent) {
      var count = intent.key === 'all' ? ALL_CATS.length : ALL_CATS.filter(function(cm) {
        return CATEGORY_INTENT_BY_KEY[cm.key] === intent.key;
      }).length;
      return '<button class="intent-chip' + (ACTIVE_CATEGORY_INTENT === intent.key ? ' active' : '') + '" type="button" data-intent="' + escapeHtml(intent.key) + '">'
        + escapeHtml(intent.label) + ' <span>' + formatCount(count) + '</span></button>';
    }).join('');
  }

  var html = '';
  ALL_CATS.forEach(function(cm){
    // Prefer registry data, fallback to _NAV_TOOLS
    var toolCount = Number(regCounts[cm.key]) || 0;
    var topTools = (regTopTools[cm.key] && regTopTools[cm.key].length > 0)
      ? regTopTools[cm.key]
      : (!hasRegistry && _NAV_TOOLS[cm.key] ? _NAV_TOOLS[cm.key].slice(0, 4) : []);

    var toolPills = '';
    if (topTools.length > 0) {
      topTools.forEach(function(t){
        toolPills += '<span class="cc-tool" title="' + escapeHtml(t.label) + '">'
          + (t.emoji ? '<span class="cc-tool-emoji">' + escapeHtml(t.emoji) + '</span>' : '')
          + '<span class="cc-tool-text">' + escapeHtml(t.displayLabel || t.label) + '</span>'
          + '</span>';
      });
      if (toolCount > 4) {
        toolPills += '<span class="cc-more">+' + formatCount(toolCount - 4) + ' more</span>';
      }
    }
    var countText = toolCount > 0 ? countLabel(toolCount) : 'Category hub';
    var intentKey = CATEGORY_INTENT_BY_KEY[cm.key] || 'explore';
    var searchText = (cm.name + ' ' + cm.desc + ' ' + topTools.map(function(t){ return t.label; }).join(' ')).toLowerCase();

    html += '<a href="/' + escapeHtml(cm.slug) + '/" class="cc" data-search="' + escapeHtml(searchText) + '" data-intent="' + escapeHtml(intentKey) + '" style="--cc-accent:' + escapeHtml(cm.accent) + '">'
      + '<div class="cc-top">'
      + '<div class="cc-i" style="background:' + escapeHtml(cm.bg) + '">' + escapeHtml(cm.icon) + '</div>'
      + '<div class="cc-info"><div class="cc-n">' + escapeHtml(cm.name) + '</div>'
      + '<div class="cc-count">' + escapeHtml(countText) + '</div>'
      + '</div></div>'
      + '<div class="cc-d">' + escapeHtml(cm.desc) + '</div>'
      + (toolPills ? '<div class="cc-tools">' + toolPills + '</div>' : '')
      + '</a>';
  });
  g.innerHTML = html;

  var filter = document.getElementById('catFilter');
  var emptyEl = document.getElementById('catEmpty');
  function applyFilters() {
    var q = filter ? filter.value.toLowerCase().trim() : '';
    var cards = g.querySelectorAll('.cc');
    var vis = 0;
    cards.forEach(function(card){
      var haystack = card.getAttribute('data-search') || '';
      var intent = card.getAttribute('data-intent') || 'explore';
      var matchesSearch = !q || haystack.indexOf(q) !== -1;
      var matchesIntent = ACTIVE_CATEGORY_INTENT === 'all' || intent === ACTIVE_CATEGORY_INTENT;
      var match = matchesSearch && matchesIntent;
      card.style.display = match ? '' : 'none';
      if (match) vis++;
    });
    if (countEl) countEl.textContent = vis + ' categor' + (vis === 1 ? 'y' : 'ies');
    if (emptyEl) emptyEl.classList.toggle('show', vis === 0);
  }

  if (filter) {
    filter.oninput = applyFilters;
  }
  if (intentEl) {
    intentEl.querySelectorAll('[data-intent]').forEach(function(btn){
      btn.onclick = function() {
        ACTIVE_CATEGORY_INTENT = btn.getAttribute('data-intent') || 'all';
        intentEl.querySelectorAll('[data-intent]').forEach(function(other){
          other.classList.toggle('active', other === btn);
        });
        applyFilters();
      };
    });
  }
  applyFilters();
}
// Run when registry is ready, or immediately if no registry
if (typeof onRegistryReady === 'function') { onRegistryReady(_renderCats); }
else { document.addEventListener('DOMContentLoaded', function(){ if(typeof AFRO_TOOLS!=='undefined') _renderCats(); else document.addEventListener('afrotools:registry-ready', _renderCats); }); }
</script>
