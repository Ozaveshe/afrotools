<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All 12 Tool Categories | AfroTools</title>
<meta name="description" content="Browse all AfroTools categories: Salary & Tax, PDF, Image, Developer, Education, Health, VAT, Property, Business, Language, African, Engineering.">
<link rel="canonical" href="https://afrotools.com/categories">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<link rel="apple-touch-icon" href="/assets/img/logo-mark.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/global.min.css">
<script src="/assets/js/components/tool-registry.js"></script>
<script src="/assets/js/components/navbar.min.js" defer></script>

<style>
  body{font-family:'DM Sans',sans-serif;background:#fafaf8;color:#0f172a;margin:0;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1000px;margin:0 auto;padding:0 24px}
  .hero{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#334155 100%);padding:64px 0 48px;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(99,102,241,.08) 0%,transparent 50%),radial-gradient(circle at 70% 30%,rgba(168,85,247,.06) 0%,transparent 40%);animation:heroGlow 8s ease-in-out infinite alternate;pointer-events:none}
  .hero::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(2px 2px at 20% 30%,rgba(255,255,255,.08),transparent),radial-gradient(2px 2px at 60% 70%,rgba(255,255,255,.05),transparent),radial-gradient(1px 1px at 80% 20%,rgba(255,255,255,.06),transparent),radial-gradient(1px 1px at 40% 80%,rgba(255,255,255,.04),transparent);animation:heroDots 12s linear infinite;pointer-events:none}
  @keyframes heroGlow{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(2%,-2%) rotate(3deg)}}
  @keyframes heroDots{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}
  .hero-ey{display:inline-flex;align-items:center;gap:8px;font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#818cf8;margin-bottom:14px}
  .hero-ey::before{content:'';width:18px;height:2px;background:#818cf8;border-radius:2px}
  .hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;color:#fff;letter-spacing:-.025em;line-height:1.08;margin-bottom:14px}
  .hero h1 em{color:#c7d2fe;font-style:normal}
  .hero p{font-size:1rem;color:rgba(255,255,255,.55);max-width:520px;line-height:1.65}
  .sec{padding:48px 0}
  .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .cc{padding:24px;background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s,box-shadow .15s,transform .15s}
  .cc:hover{border-color:#008751;box-shadow:0 6px 20px rgba(0,135,81,.08);transform:translateY(-2px)}
  .cc-i{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
  .cc-n{font-size:1rem;font-weight:800;color:#111827}
  .cc-d{font-size:.82rem;color:#6b7280;line-height:1.6;flex:1}
  .cc-c{font-size:.65rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:4px}
  .cc-c.live{color:#008751}
  .cc-c.soon{color:#9ca3af}
</style>
</head>
<body>
<afro-navbar></afro-navbar>
<section class="hero"><div class="wrap">
  <div class="hero-ey">12 Categories</div>
  <h1>All Tool <em>Categories</em></h1>
  <p>Salary & Tax, PDF, Image, Developer, Education, Health, VAT, Property, Business, Language, African, Engineering — 258 tools across 12 categories.</p>
</div></section>
<section class="sec"><div class="wrap"><div class="cg" id="cg"></div></div></section>
<afro-footer></afro-footer>
<script>
var CATS_META = [
    { key:'financial', slug:'salary-tax', name:'Salary & Tax', icon:'💰', bg:'#eaf5ef' },
    { key:'document-pdf', slug:'document-pdf', name:'Document & PDF', icon:'📄', bg:'#eff6ff' },
    { key:'image-design', slug:'image-design', name:'Image & Design', icon:'🖼️', bg:'#fdf2f8' },
    { key:'developer', slug:'developer-tools', name:'Developer Tools', icon:'⌨️', bg:'#ede9fe' },
    { key:'education', slug:'education', name:'Education', icon:'🎓', bg:'#e8fef6' },
    { key:'health', slug:'health', name:'Health & Agriculture', icon:'🏥', bg:'#fce8e8' },
    { key:'ecommerce', slug:'vat-business-tax', name:'VAT & Business Tax', icon:'🧾', bg:'#fff7ed' },
    { key:'legal', slug:'legal', name:'Mortgage & Property', icon:'🏠', bg:'#e0f2fe' },
    { key:'data-productivity', slug:'data-productivity', name:'Business & ROI', icon:'📊', bg:'#eef2ff' },
    { key:'language', slug:'language', name:'Language & Translation', icon:'🗣️', bg:'#faf5ff' },
    { key:'african', slug:'african', name:'Uniquely African', icon:'🌍', bg:'#fef2f2' },
    { key:'engineering', slug:'engineering', name:'Engineering & CAD', icon:'🔧', bg:'#f5f5f4' }
];
document.addEventListener('DOMContentLoaded',function(){
  if(typeof AFRO_TOOLS==='undefined'||typeof AFRO_CATEGORIES==='undefined')return;
  var g=document.getElementById('cg');if(!g)return;
  var html='';
  CATS_META.forEach(function(cm){
    var c=AFRO_CATEGORIES[cm.key]||{};
    var tools=AFRO_TOOLS.filter(function(t){return t.category===cm.key;});
    var live=tools.filter(function(t){return t.status==='live'||t.status==='new';});
    var ct=live.length>0
      ? '<span class="cc-c live">● '+live.length+' tools available</span>'
      : '<span class="cc-c soon">'+tools.length+' tools planned</span>';
    html+='<a href="/'+cm.slug+'" class="cc"><div class="cc-i" style="background:'+cm.bg+'">'+cm.icon+'</div><div class="cc-n">'+cm.name+'</div><div class="cc-d">'+(c.desc||tools.length+' tools.')+'</div>'+ct+'</a>';
  });
  g.innerHTML=html;
});
</script>
</body>
</html>
