<body>

<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

<script>
function _initSearchFr(){
var input=document.getElementById('q');var container=document.getElementById('results');if(!input||!container)return;
if(typeof getPublicToolStats==='function'){input.placeholder='Rechercher parmi '+getPublicToolStats('fr').display.liveToolsPlus+' outils...';}
var CATEGORY_ALIASES={'financial':'finance argent salaire taxe paye impot taux prix carburant marche','document-pdf':'documents pdf fichiers bureau cv lettre','government':'gouvernement officiel civique passeport identite','energy':'energie electricite solaire carburant essence diesel','transport':'transport logistique vehicule trajet carburant','creative':'createur media streaming contenu musique film','trade':'commerce import export douane livraison','career':'emploi cv resume lettre carriere','ecommerce':'tva taxe entreprise facture','agriculture':'agriculture ferme recolte prix alimentaires betail','telecom':'mobile donnees internet ussd airtime','health':'sante medical clinique hopital'};
var COUNTRY_LABELS={'NG':'Nigeria','KE':'Kenya','GH':'Ghana','ZA':'Afrique du Sud South Africa','EG':'Egypte Egypt','TZ':'Tanzanie Tanzania','CI':"Cote d'Ivoire Ivory Coast",'CM':'Cameroun Cameroon','SN':'Senegal','MA':'Maroc Morocco','DZ':'Algerie Algeria','ALL':'Afrique pays africains pan africain'};
function norm(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();}
function genAliases(t){var raw=[t.id,t.name,t.desc,t.href,t.category,Array.isArray(t.tags)?t.tags.join(' '):(t.tags||'')].join(' ').toLowerCase();var terms=[];if(/\bfuel\b|petrol|diesel|gasoline|carburant/.test(raw))terms.push('fuel tracker prix carburant essence diesel gasoline');if(/\btax\b|paye|vat|wht|cit|cgt|duty/.test(raw))terms.push('taxe impot fiscal salaire tva');if(/stream|creator|content|media|music|video/.test(raw))terms.push('economie createur streaming contenu media');return terms.join(' ');}
function haystack(t){var countries=Array.isArray(t.countries)?t.countries:[];var tags=Array.isArray(t.tags)?t.tags.join(' '):(t.tags||'');var cat=(typeof AFRO_CATEGORIES!=='undefined'&&AFRO_CATEGORIES[t.category])?AFRO_CATEGORIES[t.category]:{};return norm([t.id,t.name,t.desc,t.category,t.href,t.status,t.phase,t.revenue,tags,countries.join(' '),countries.map(function(c){return COUNTRY_LABELS[c]||c;}).join(' '),cat.name,cat.desc,CATEGORY_ALIASES[t.category]||'',genAliases(t)].join(' '));}
function score(t,tokens){var name=norm(t.name);var id=norm((t.id||'')+' '+(t.href||''));var text=haystack(t);var s=0;var matched=0;tokens.forEach(function(tok){var ts=0;if(name.split(' ').indexOf(tok)!==-1)ts=40;else if(name.indexOf(tok)===0)ts=30;else if(name.indexOf(tok)!==-1)ts=20;else if(id.indexOf(tok)!==-1)ts=12;else if(text.indexOf(tok)!==-1)ts=5;if(ts>0){matched++;s+=ts;}});return matched===tokens.length?s:0;}
input.addEventListener('input',function(){var q=this.value.trim();var tokens=norm(q).split(/\s+/).filter(Boolean);if(!tokens.length){container.innerHTML='<div class="no-query">Tapez pour rechercher parmi tous les outils AfroTools.</div>';return;}
var matches=AFRO_TOOLS.map(function(t){return{tool:t,score:score(t,tokens)};}).filter(function(r){return r.score>0;}).sort(function(a,b){if(b.score!==a.score)return b.score-a.score;return(b.tool.priority||0)-(a.tool.priority||0);}).map(function(r){return r.tool;});
if(!matches.length){container.innerHTML='<div class="no-query">Aucun outil trouve pour <strong>"'+q+'"</strong>.</div>';return;}
var html='<p style="font-size:.85rem;color:#6b7280;margin-bottom:16px">'+matches.length+' resultat'+(matches.length!==1?'s':'')+' pour "'+q+'"</p>';
html+='<div style="display:flex;flex-direction:column;gap:8px">';
matches.forEach(function(t){var ok=t.status==='live'||t.status==='new';var tag=ok?'a':'div';var href=ok?' href="'+t.href+'"':'';html+='<'+tag+href+' style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;text-decoration:none;color:inherit;transition:border-color .15s'+(ok?'':';opacity:.5')+'">'+'<span style="font-size:1.2rem">'+t.icon+'</span><div><div style="font-size:.9rem;font-weight:700;color:#111">'+t.name+'</div><div style="font-size:.78rem;color:#6b7280">'+t.desc+'</div></div></'+tag+'>';});
html+='</div>';container.innerHTML=html;});
}
if(typeof onRegistryReady==='function'){onRegistryReady(_initSearchFr);}else{document.addEventListener('DOMContentLoaded',function(){if(typeof AFRO_TOOLS!=='undefined')_initSearchFr();else document.addEventListener('afrotools:registry-ready',_initSearchFr);});}
</script>
