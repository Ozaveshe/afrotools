<style>
body{font-family:'DM Sans',sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;-webkit-font-smoothing:antialiased}

<body>
<afro-navbar></afro-navbar>
<div class="wrap">
<div class="search-hero">
<h1>Rechercher un outil</h1>
<div class="search-input">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input aria-label="Rechercher parmi 2 594+ outils" type="text" id="q" placeholder="Rechercher parmi 2 594+ outils..." autocomplete="off" autofocus>
</div>
</div>
<div id="results"><div class="no-query">Tapez pour rechercher parmi tous les outils AfroTools.</div></div>
</div>
<afro-footer></afro-footer>
<script>
function _initSearchFr(){
var input=document.getElementById('q');var container=document.getElementById('results');if(!input||!container)return;
if(typeof getPublicToolStats==='function'){input.placeholder='Rechercher parmi '+getPublicToolStats('fr').display.liveToolsPlus+' outils...';}
input.addEventListener('input',function(){var q=this.value.trim().toLowerCase();if(!q){container.innerHTML='<div class="no-query">Tapez pour rechercher parmi tous les outils AfroTools.</div>';return;}
var matches=AFRO_TOOLS.filter(function(t){return(t.name||'').toLowerCase().includes(q)||(t.desc||'').toLowerCase().includes(q)||(t.id||'').toLowerCase().includes(q);});
if(!matches.length){container.innerHTML='<div class="no-query">Aucun outil trouve pour <strong>"'+q+'"</strong>.</div>';return;}
var html='<p style="font-size:.85rem;color:#6b7280;margin-bottom:16px">'+matches.length+' resultat'+(matches.length!==1?'s':'')+' pour "'+q+'"</p>';
html+='<div style="display:flex;flex-direction:column;gap:8px">';
matches.forEach(function(t){var ok=t.status==='live'||t.status==='new';var tag=ok?'a':'div';var href=ok?' href="'+t.href+'"':'';html+='<'+tag+href+' style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;text-decoration:none;color:inherit;transition:border-color .15s'+(ok?'':';opacity:.5')+'">'+'<span style="font-size:1.2rem">'+t.icon+'</span><div><div style="font-size:.9rem;font-weight:700;color:#111">'+t.name+'</div><div style="font-size:.78rem;color:#6b7280">'+t.desc+'</div></div></'+tag+'>';});
html+='</div>';container.innerHTML=html;});
}
if(typeof onRegistryReady==='function'){onRegistryReady(_initSearchFr);}else{document.addEventListener('DOMContentLoaded',function(){if(typeof AFRO_TOOLS!=='undefined')_initSearchFr();else document.addEventListener('afrotools:registry-ready',_initSearchFr);});}
</script>
</body>
