[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"
  command = "npm run build && node scripts/inject-internal-links.js && node scripts/generate-sitemaps.js && node scripts/indexnow.js --git || true"

[[edge_functions]]
  function = "og-image"
  path = "/og-image"

[[edge_functions]]
  function = "trailing-slash"
  path = "/*"

[functions]
  node_bundler = "esbuild"

# --- Staging & Preview Environments ---
# Branch deploys: push to any branch → auto-deploys at branch-name--afrotools.netlify.app
# Deploy previews: every PR gets a unique preview URL

[context.deploy-preview]
  command = "echo 'Deploy preview build'"

[context.deploy-preview.environment]
  CONTEXT = "deploy-preview"

[context.branch-deploy]
  command = "echo 'Branch deploy build'"

[context.branch-deploy.environment]
  CONTEXT = "branch-deploy"

# Staging branch gets same build as production
[context.staging]
  command = "node scripts/indexnow.js --git || true"

[context.staging.environment]
  CONTEXT = "staging"

# --- Live Monitoring Scheduled Functions ---

[functions."scheduled-fetch-forex-rates"]
  schedule = "*/15 * * * *"

[functions."scheduled-fetch-fuel-prices"]
