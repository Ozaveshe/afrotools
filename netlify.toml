[functions."scheduled-fetch-bank-rates"]
  schedule = "17 3 * * 2"

[functions."scheduled-fetch-agri-inputs"]
  schedule = "19 3 * * 4"

# Crypto spot prices are persisted by scheduled-fetch-crypto. P2P rates stay
# request-scoped in crypto-p2p.js because that handler only warms in-memory
# cache and does not write a durable live-data key for scheduled refreshes.
[functions."scheduled-fetch-crypto"]
  schedule = "27 * * * *"

[functions."scheduled-refresh-market-data"]
  schedule = "39 */6 * * *"

[functions."scheduled-source-health-watchdog"]
  schedule = "57 */2 * * *"

