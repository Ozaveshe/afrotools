[build]
  publish = "."
  functions = "netlify/functions"

# --- Security Headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[functions]
  node_bundler = "esbuild"

# --- Live Monitoring Scheduled Functions ---

[functions."scheduled-fetch-forex-rates"]
  schedule = "*/15 * * * *"

[functions."scheduled-fetch-fuel-prices"]
  schedule = "0 */6 * * *"

[functions."scheduled-fetch-central-bank-rates"]
  schedule = "0 */12 * * *"

[functions."scheduled-fetch-crypto-p2p"]
  schedule = "*/5 * * * *"

[functions."scrape-fx-rates"]
  schedule = "0 6 * * *"

[functions."send-monthly-digest"]
  schedule = "0 8 1 * *"

# --- Live Monitoring API Redirects ---

[[redirects]]
  from = "/api/forex"
  to = "/.netlify/functions/api-forex"
  status = 200

[[redirects]]
  from = "/api/fuel"
