[functions."scheduled-fetch-telecom-plans"]
  schedule = "47 */12 * * *"

[functions."scheduled-detect-changes"]
  schedule = "26 */6 * * *"

[functions."scheduled-fetch-insurance"]
  schedule = "41 3 * * 1"

[functions."scheduled-fetch-property"]
  schedule = "44 3 * * 3"

[functions."scheduled-fetch-salaries"]
