[build]
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"
  command = "node scripts/verify-deploy-channel.js && npm run build:deploy && (node scripts/indexnow.js --git || true)"

[[edge_functions]]
  function = "og-image"
  path = "/og-image"

[[edge_functions]]
  function = "trailing-slash"
  path = "/*"

[functions]
  node_bundler = "esbuild"

# --- Staging & Preview Environments ---
# Branch deploys: push to any branch -> auto-deploys at branch-name--afrotools.netlify.app
# Deploy previews: every PR gets a unique preview URL

[context.deploy-preview]
  command = "node scripts/verify-deploy-channel.js && npm run build:deploy"

[context.deploy-preview.environment]
  CONTEXT = "deploy-preview"

[context.branch-deploy]
  command = "node scripts/verify-deploy-channel.js && npm run build:deploy"

[context.branch-deploy.environment]
  CONTEXT = "branch-deploy"

# Staging branch gets same build as production
[context.staging]
  command = "node scripts/verify-deploy-channel.js && npm run build:deploy"

[context.staging.environment]
  CONTEXT = "staging"

# --- Live Monitoring Scheduled Functions ---

[functions."scheduled-fetch-forex-rates"]
  schedule = "7,22,37,52 * * * *"

[functions."scheduled-fetch-fuel-prices"]
