# --- Audit Fix Redirects (2026-03-21) ---

# Fix: Homepage links to /nigeria/ng-paye which doesn't exist
[[redirects]]
  from = "/nigeria/ng-paye"
  to = "/nigeria/ng-salary-tax"
  status = 301

# Fix: Every PAYE tool links to /tools/paye-calculator/ which doesn't exist
[[redirects]]
  from = "/tools/paye-calculator/"
  to = "/salary-tax/"
  status = 301

[[redirects]]
  from = "/tools/paye-calculator/*"
  to = "/salary-tax/"
  status = 301

# Fix: French Côte d'Ivoire hub doesn't exist
[[redirects]]
  from = "/fr/cote-divoire/"
  to = "/cote-divoire/"
  status = 302

# Fix: /categories/financial/ doesn't exist
[[redirects]]
  from = "/categories/financial/"
  to = "/salary-tax/"
  status = 301

[[redirects]]
  from = "/categories/financial/*"
  to = "/salary-tax/"
  status = 301

# Fix: favicon.ico 404
[[redirects]]
  from = "/favicon.ico"
  to = "/assets/img/logo-mark.svg"
  status = 200

[[redirects]]
  from = "/assets/img/favicon.ico"
  to = "/assets/img/logo-mark.svg"
  status = 200

# Fix: Duplicate privacy/terms pages — canonical is /privacy/ and /terms/
[[redirects]]
  from = "/privacy-policy"
  to = "/privacy/"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy/"
  status = 301

[[redirects]]
  from = "/terms-of-use"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/terms-of-use.html"
  to = "/terms/"
  status = 301

# Fix: /developer/ doesn't exist, category page is at /developer-tools/
[[redirects]]
  from = "/developer/"
  to = "/developer-tools/"
  status = 301

[[redirects]]
  from = "/developer/*"
  to = "/developer-tools/"
  status = 301

# --- Caching Headers ---

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Static Data File Caching ---

[[headers]]
  for = "/data/forex/*"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=900"

[[headers]]
  for = "/data/fuel/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=10800"

[[headers]]
  for = "/data/rates/*"
  [headers.values]
    Cache-Control = "public, max-age=21600, stale-while-revalidate=32400"

# --- Content Security Policy (allow Twemoji CDN) ---

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://cdn.jsdelivr.net https://js.stripe.com https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://cdn.jsdelivr.net https://*.googleapis.com https://*.supabase.co https://*.googletagmanager.com blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://*.googleapis.com https://api.anthropic.com https://*.netlify.app wss://*.supabase.co; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self';"

# --- i18n Language-Based Redirects ---
# Netlify reads Accept-Language header at CDN edge (302 = temporary, user may change preference)

[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302
  conditions = {Language = ["fr"]}

[[redirects]]
  from = "/"
  to = "/sw/"
  status = 302
  conditions = {Language = ["sw"]}

[[redirects]]
  from = "/"
  to = "/yo/"
  status = 302
  conditions = {Language = ["yo"]}

[[redirects]]
  from = "/"
  to = "/ha/"
  status = 302
  conditions = {Language = ["ha"]}

# --- i18n Content-Language Headers ---

[[headers]]
  for = "/fr/*"
  [headers.values]
    Content-Language = "fr"

[[headers]]
  for = "/sw/*"
  [headers.values]
    Content-Language = "sw"

[[headers]]
  for = "/yo/*"
  [headers.values]
    Content-Language = "yo"

[[headers]]
  for = "/ha/*"
  [headers.values]
    Content-Language = "ha"
