# --- Caching Headers ---

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Tool-specific CSS/JS (cache-busted via ?v=hash query strings)
[[headers]]
  for = "/tools/*/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/tools/*/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/engines/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Static Data File Caching ---

[[headers]]
  for = "/data/forex/*"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=900"

[[headers]]
  for = "/data/fuel/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=10800"

[[headers]]
  for = "/data/rates/*"
  [headers.values]
    Cache-Control = "public, max-age=21600, stale-while-revalidate=32400"

# --- Security headers managed in _headers file (single source of truth) ---
# Do NOT add security headers here Ã¢â‚¬â€ they conflict with _headers.
# See _headers for CSP, X-Frame-Options, HSTS, etc.

# --- i18n Language-Based Redirects ---
# Netlify reads Accept-Language header at CDN edge (302 = temporary, user may change preference)

[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302
  conditions = {Language = ["fr"]}

[[redirects]]
  from = "/"
  to = "/sw/"
  status = 302
  conditions = {Language = ["sw"]}

[[redirects]]
  from = "/"
  to = "/yo/"
  status = 302
  conditions = {Language = ["yo"]}

[[redirects]]
  from = "/"
  to = "/ha/"
  status = 302
  conditions = {Language = ["ha"]}

# --- i18n Content-Language Headers ---

[[headers]]
  for = "/fr/*"
  [headers.values]
    Content-Language = "fr"

[[headers]]
  for = "/sw/*"
  [headers.values]
    Content-Language = "sw"

[[headers]]
  for = "/yo/*"
  [headers.values]
    Content-Language = "yo"

[[headers]]
  for = "/ha/*"
  [headers.values]
    Content-Language = "ha"
