  <style>
    :root {
      --green: var(--color-primary);
      --green-lt: var(--color-primary);
      --green-dim: rgba(0,122,255,0.12);
      --dark: var(--color-bg-dark);
      --ink: var(--color-text);
      --muted: #6B7280;
      --border: #E5E7EB;
      --bg: var(--color-bg);
      --card-bg: #fff;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; }

    /* ── SEARCH HEADER ── */
    .search-header {
      background: var(--dark);
      background-image:
        linear-gradient(rgba(0,122,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,122,255,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      padding: 32px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .search-header-inner {
      max-width: 860px;
      margin: 0 auto;
    }
    .search-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-brand a {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--green-lt);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .search-brand a::before {
      content: '←';
      font-size: 0.85rem;
    }

    /* ── BIG SEARCH BAR ── */
    .search-bar-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-bar:focus-within {
      border-color: var(--green);
      background: rgba(255,255,255,0.11);
    }
    .search-bar-icon {
      padding: 0 14px 0 18px;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    #search-input {
      flex: 1;
      min-width: 0;
      padding: 18px 8px;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: #fff;
      caret-color: var(--green-lt);
    }
    #search-input::placeholder { color: rgba(255,255,255,0.3); }
    .search-clear {
      padding: 0 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      font-size: 1.3rem;
      line-height: 1;
      display: none;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .search-clear:hover { color: rgba(255,255,255,0.7); }
    .search-clear.visible { display: flex; align-items: center; }

    /* ── SHORTCUT HINT ── */
    .search-hint {
      position: absolute;
      right: 56px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }
    .kbd {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 2px 5px;
    }
    @media(max-width:640px) { .search-hint { display: none; } }

    /* ── FILTER CHIPS ── */
    .filter-toolbar {
      padding-bottom: 16px;
    }
    .filter-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }
    .filter-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chip:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.85); }
    .chip.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .chip[aria-pressed="true"] {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .chip-count {
      font-size: 0.65rem;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 1px 5px;
      font-weight: 700;
    }
    .chip.active .chip-count { background: rgba(255,255,255,0.25); }
    .more-filters {
      position: relative;
      flex-shrink: 0;
    }
    .more-filters summary {
      list-style: none;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.62);
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }
    .more-filters summary::-webkit-details-marker { display: none; }
    .more-filter-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      z-index: 120;
      display: grid;
      gap: 8px;
      min-width: 230px;
      padding: 10px;
      background: var(--color-surface, #fff);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-lg, 0 18px 44px rgba(15,23,42,0.16));
    }
    .more-filter-menu .chip {
      width: 100%;
      justify-content: flex-start;
      color: var(--ink);
      background: var(--card-bg);
      border-color: var(--border);
    }
    .more-filter-menu .chip:hover {
      color: var(--green);
      border-color: rgba(0,122,255,0.32);
    }
    .more-filter-menu .chip.active,
    .more-filter-menu .chip[aria-pressed="true"] {
      color: #fff;
      border-color: var(--green);
      background: var(--green);
    }

    /* ── MAIN CONTENT ── */
    .search-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 120px;
    }

    /* ── RESULTS META ── */
    .results-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .results-count {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }
    .results-count strong { color: var(--ink); font-weight: 700; }
    .sort-select {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
    }
    .sort-select:disabled {
      opacity: 0.58;
      cursor: wait;
    }

    /* ── RESULT CARDS ── */
    .results-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .skeleton-list {
      pointer-events: none;
    }
    .skeleton-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 16px;
      align-items: start;
    }
    .skeleton-icon,
    .skeleton-line {
      border-radius: 999px;
      background: linear-gradient(90deg, #eef2f7 0%, #f8fafc 45%, #eef2f7 100%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.3s ease-in-out infinite;
    }
    .skeleton-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }
    .skeleton-copy {
      display: grid;
      gap: 9px;
      padding-top: 2px;
    }
    .skeleton-line {
      height: 11px;
    }
    .skeleton-line.short { width: 42%; }
    .skeleton-line.medium { width: 68%; }
    .skeleton-line.long { width: 92%; }
    @keyframes skeletonPulse {
      0% { background-position: 100% 50%; }
      100% { background-position: -100% 50%; }
    }
    .result-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.25s ease both;
    }
    .result-card:hover {
      border-color: var(--green);
      box-shadow: 0 4px 20px rgba(0,122,255,0.12);
      transform: translateX(3px);
    }
    .result-card.coming {
      opacity: 0.72;
    }
    .result-card.coming:hover {
      border-color: #d1d5db;
      box-shadow: none;
      transform: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stagger delays */
    .result-card:nth-child(1) { animation-delay: 0ms; }
    .result-card:nth-child(2) { animation-delay: 30ms; }
    .result-card:nth-child(3) { animation-delay: 60ms; }
    .result-card:nth-child(4) { animation-delay: 90ms; }
    .result-card:nth-child(5) { animation-delay: 120ms; }
    .result-card:nth-child(6) { animation-delay: 150ms; }
    .result-card:nth-child(7) { animation-delay: 180ms; }
    .result-card:nth-child(n+8) { animation-delay: 210ms; }

    .rc-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      transition: transform 0.18s;
    }
    .result-card:hover .rc-icon { transform: scale(1.08); }

    .rc-body { flex: 1; min-width: 0; }
    .rc-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .rc-name {
      font-size: 0.97rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.25;
    }
    .rc-name mark {
      background: rgba(0,122,255,0.15);
      color: var(--green);
      border-radius: 2px;
      padding: 0 1px;
      font-weight: 800;
    }
    .rc-badges {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .badge {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-live    { background: #DBEAFE; color: #1E3A5F; border: 1px solid #BFDBFE; }
    .badge-new     { background: #FEF9C3; color: #854D0E; border: 1px solid #FDE68A; }
    .badge-soon    { background: #F3F4F6; color: #9CA3AF; border: 1px solid #E5E7EB; }
    .badge-ai      { background: #FFF8E8; color: #8a5c00; border: 1px solid #F0D990; }
    .badge-t1      { background: #EEF2FF; color: #4338CA; border: 1px solid #C7D2FE; }

    .rc-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .rc-desc mark {
      background: rgba(0,122,255,0.1);
      color: #1E40AF;
      border-radius: 2px;
      padding: 0 1px;
      font-style: normal;
    }

    .rc-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rc-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .rc-cat {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9CA3AF;
    }
    .rc-country {
      font-size: 0.68rem;
      font-weight: 600;
      color: #9CA3AF;
    }
    .rc-cta {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: gap 0.15s;
    }
    .result-card:hover .rc-cta { gap: 8px; }
    .rc-cta-coming {
      font-size: 0.76rem;
      font-weight: 600;
      color: #9CA3AF;
    }

    /* ── LIVE INDICATOR LINE ── */
    .result-card.live-card::before,
    .result-card.new-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--green);
      border-radius: 3px 0 0 3px;
    }
    .result-card.new-card::before {
      background: linear-gradient(180deg, #f59e0b, #ef4444);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 64px 20px;
    }
    .empty-emoji { font-size: 3rem; margin-bottom: 16px; }
    .empty-title { font-size: 1.2rem; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
    .empty-sub { font-size: 0.87rem; color: var(--muted); line-height: 1.65; max-width: 380px; margin: 0 auto 24px; }
    .empty-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 18px;
    }
    .sug-chip {
      padding: 8px 16px;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sug-chip:hover { border-color: var(--green); color: var(--green); }
    .empty-cta {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    /* ── DEFAULT STATE (no query) ── */
    .default-state { padding: 4px 0; }
    .default-section { margin-bottom: 36px; }
    .default-heading {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .default-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .trending-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
    }
    @media(min-width:600px) { .trending-grid { grid-template-columns: repeat(3, 1fr); } }
    .trend-card {
      width: 100%;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
    }
    .trend-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,122,255,0.1); }
    .trend-icon { font-size: 1.4rem; flex-shrink: 0; }
    .trend-name { font-size: 0.82rem; font-weight: 700; color: var(--ink); line-height: 1.3; }
    .trend-badge { font-size: 0.6rem; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    .category-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cat-pill {
      padding: 8px 14px;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.79rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .cat-pill:hover { border-color: var(--green); color: var(--green); }

    /* ── LOAD MORE ── */
    .load-more-wrap {
      text-align: center;
      margin-top: 24px;
    }
    .load-more-btn {
      padding: 12px 28px;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }
    .load-more-btn:hover { border-color: var(--green); color: var(--green); }

    .chip:focus-visible,
    .more-filters summary:focus-visible,
    .filter-toggle:focus-visible,
    .sort-select:focus-visible,
    .result-card:focus-visible,
    .trend-card:focus-visible,
    .cat-pill:focus-visible,
    .sug-chip:focus-visible,
    .load-more-btn:focus-visible,
    .search-clear:focus-visible {
      outline: none;
      border-color: var(--green);
      box-shadow: var(--shadow-focus, 0 0 0 3px rgba(0,122,255,0.22));
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── RESPONSIVE ── */
    @media(max-width:640px) {
      .search-header { padding: 12px 16px 0; }
      .search-brand { margin-bottom: 12px; }
      #search-input { font-size: 1rem; padding: 14px 8px; }
      .result-card { padding: 14px 14px; gap: 12px; }
      .rc-icon { width: 40px; height: 40px; font-size: 1.25rem; border-radius: 10px; }
      .rc-name { font-size: 0.88rem; }
      .search-hint { display: none; }
      .search-body { padding: 20px 16px 48px; }
      .filter-toolbar {
        display: flex;
        justify-content: flex-start;
        padding-bottom: 14px;
      }
      .filter-toggle {
        display: inline-flex;
      }
      .filter-panel {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 300;
        max-height: min(72vh, 540px);
        overflow-y: auto;
        padding: 16px;
        background: var(--color-surface, #fff);
        border: 1.5px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow-lg, 0 24px 60px rgba(15,23,42,0.22));
        transform: translateY(calc(100% + 24px));
        opacity: 0;
        pointer-events: none;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }
      .filter-panel.is-open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      .filter-scroll {
        gap: 8px;

<script>
// ════════════════════════════════════════════════════════════
// AFROTOOLS SEARCH ENGINE
// Client-side full-text search over AFRO_TOOLS registry
// Features: instant results, fuzzy match, highlights, filters
// ════════════════════════════════════════════════════════════

var CATEGORY_NAMES = {
  'financial':         'Salary & Tax',
  'document-pdf':      'PDF & Documents',
  'image-design':      'Image & Design',
  'developer':         'Developer Tools',
  'education':         'Education',
  'health':            'Health',
  'agriculture':       'Agriculture',
  'african':           'Uniquely African',
  'data-productivity': 'Data & Productivity',
  'small-business':    'Small Business',
  'fintech':           'Fintech & Banking',
  'trade':             'Trade',
  'energy':            'Energy',
  'language':          'Language & Translation',
  'engineering':       'Engineering & CAD',
  'ecommerce':         'VAT & Business',
  'legal':             'Legal & Compliance',
};

var COUNTRY_NAMES = {
  'NG':'Nigeria','KE':'Kenya','GH':'Ghana','ZA':'South Africa','EG':'Egypt',
  'TZ':'Tanzania','ET':'Ethiopia','RW':'Rwanda','UG':'Uganda','SN':'Senegal',
  'CI':"Côte d'Ivoire",'CM':'Cameroon','MA':'Morocco','DZ':'Algeria','TN':'Tunisia',
  'ALL':'All Countries',
};

// Trending / popular searches shown on empty state
var TRENDING = [
  { id:'ng-paye',         query:'Nigeria PAYE' },
  { id:'ke-paye',         query:'Kenya PAYE' },
  { id:'pdf-workspace',   query:'PDF Workspace' },
  { id:'japa-calculator', query:'Japa Calculator' },
  { id:'za-paye',         query:'South Africa Tax' },
  { id:'gh-paye',         query:'Ghana PAYE' },
];

var SUGGESTIONS = [
  'Nigeria PAYE','Kenya PAYE','VAT','Invoice','PDF','Currency',
];

// State
var state = {
  query: '',
  filter: 'all',
  sort: 'relevance',
  page: 1,
  PAGE_SIZE: 15,
};

// ── DOM refs ──
var searchInput   = document.getElementById('search-input');
var searchClear   = document.getElementById('search-clear');
var resultsEl     = document.getElementById('results-container');
var resultsMeta   = document.getElementById('results-meta');
var resultsCount  = document.getElementById('results-count');
var sortSelect    = document.getElementById('sort-select');
var loadMoreWrap  = document.getElementById('load-more-wrap');
var loadMoreBtn   = document.getElementById('load-more-btn');
var filterChips   = document.getElementById('filter-chips');
var filterPanel   = document.getElementById('filter-panel');
var filterToggle  = document.getElementById('filter-toggle');
var moreFilters   = document.getElementById('more-filters');
var isSearchReady = false;
var requestSearchIndexLoad = function() {};

// ════════════════════════════════════════════════════════════
// SEARCH LOGIC
// ════════════════════════════════════════════════════════════

function normalizeSearchText(value) {
  return String(value || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/&/g, ' and ')
    .replace(/['']/g, '')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}

function normalizeSearchHref(value) {
  return String(value || '')
    .split('#')[0]
    .split('?')[0]
    .replace(/\/+$/, '')
    .toLowerCase();
}

function tokenise(str) {
  return normalizeSearchText(str)
    .split(/\s+/)
    .filter(Boolean);
}

function scoreMatch(tool, tokens) {
  if (!tokens.length) return 1; // no query = show all

  var text = [
    tool.name,
    tool.desc,
    tool.category,
    tool.id,
    tool.href,
    (tool.countries || []).join(' '),
    (tool.countries || []).map(function(c) { return COUNTRY_NAMES[c] || c; }).join(' '),
    CATEGORY_NAMES[tool.category] || '',
  ].join(' ');
  text = normalizeSearchText(text);

  var score = 0;
  var nameText = normalizeSearchText(tool.name);

  tokens.forEach(function(tok) {
    // Exact name word match — highest value
    if (nameText.split(' ').some(function(w) { return w === tok; })) score += 40;
    // Name starts with token
    else if (nameText.startsWith(tok)) score += 30;
    // Name contains token
    else if (nameText.includes(tok)) score += 20;
    // Description/meta contains
    else if (text.includes(tok)) score += 5;
    // Partial token match (fuzzy) — token length >= 3
    else if (tok.length >= 3) {
      for (var i = 0; i <= text.length - tok.length; i++) {
        var dist = 0;
        for (var j = 0; j < tok.length; j++) {
          if (text[i+j] !== tok[j]) dist++;
        }
        if (dist <= 1) { score += 2; break; }
      }
    }
  });

  return score;
}

function highlight(text, tokens) {
  if (!tokens.length || !text) return escHtml(text);
  var escaped = escHtml(text);
  tokens.forEach(function(tok) {
    if (tok.length < 2) return;
    var re = new RegExp('(' + escRe(tok) + ')', 'gi');
    escaped = escaped.replace(re, '<mark>$1</mark>');
  });
  return escaped;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getCountryLabel(countries) {
  if (!countries || !countries.length) return '';
  if (countries.indexOf('ALL') !== -1) return 'All Countries';
  if (countries.length === 1) return COUNTRY_NAMES[countries[0]] || countries[0];
  return countries.length + ' Countries';
}

function search(query, filter, sort) {
  if (!Array.isArray(window.AFRO_TOOLS) || !AFRO_TOOLS.length) return [];

  var tokens = tokenise(query);

  var results = AFRO_TOOLS
    .map(function(tool) {
      return { tool: tool, score: scoreMatch(tool, tokens) };
    })
    .filter(function(r) {
      if (r.score === 0 && tokens.length > 0) return false;
      if (filter === 'live') return r.tool.status === 'live' || r.tool.status === 'new';
      if (filter !== 'all') return r.tool.category === filter;
      return true;
    });

  if (sort === 'live-first') {
    results.sort(function(a, b) {
      var aLive = (a.tool.status === 'live' || a.tool.status === 'new') ? 1 : 0;
      var bLive = (b.tool.status === 'live' || b.tool.status === 'new') ? 1 : 0;
      if (bLive !== aLive) return bLive - aLive;
      return b.score - a.score;
    });
  } else if (sort === 'az') {
    results.sort(function(a, b) { return a.tool.name.localeCompare(b.tool.name); });
  } else {
    // relevance: score desc, then live tools first, then priority
    results.sort(function(a, b) {
      if (b.score !== a.score) return b.score - a.score;
      var aLive = (a.tool.status === 'live' || a.tool.status === 'new') ? 1 : 0;
      var bLive = (b.tool.status === 'live' || b.tool.status === 'new') ? 1 : 0;
      if (bLive !== aLive) return bLive - aLive;
      return (b.tool.priority || 0) - (a.tool.priority || 0);
    });
  }

  var seenHrefs = Object.create(null);
  return results.filter(function(result) {
    var key = normalizeSearchHref(result.tool.href) || normalizeSearchText(result.tool.id || result.tool.name);
    if (!key) return true;
    if (seenHrefs[key]) return false;
    seenHrefs[key] = true;
    return true;
  });
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════

function renderCard(tool, tokens) {
  var isLive = tool.status === 'live';
  var isNew  = tool.status === 'new';
  var isAvail = isLive || isNew;

  var cardClass = 'result-card' + (isLive ? ' live-card' : '') + (isNew ? ' new-card' : '') + (!isAvail ? ' coming' : '');

  // Badges
  var badges = '';
  if (isLive)  badges += '<span class="badge badge-live">Live</span>';
  if (isNew)   badges += '<span class="badge badge-new">New</span>';
  if (!isAvail) badges += '<span class="badge badge-soon">Coming Soon</span>';

  // Category bg colour
  var catBg = {
    'financial': '#EFF6FF', 'document-pdf': '#EFF6FF', 'image-design': '#FDF4FF',
    'african': '#FFF7ED', 'developer': '#EFF6FF', 'education': '#FEFCE8',
    'health': '#EFF6FF', 'ecommerce': '#FFF1F2', 'legal': '#F0F9FF',
    'data-productivity': '#EEF2FF', 'language': '#FAF5FF', 'engineering': '#F5F5F4',
  }[tool.category] || '#F3F4F6';

  var countryLabel = getCountryLabel(tool.countries || []);
  var catLabel = CATEGORY_NAMES[tool.category] || tool.category;

  var cta = isAvail
    ? '<span class="rc-cta">Open tool →</span>'
    : '<span class="rc-cta-coming">Notify me when live</span>';

  var href = isAvail ? tool.href : '#notify-' + tool.id;
  var tag  = isAvail ? 'a' : 'div';

  return '<'+tag+(isAvail?' href="'+tool.href+'"':' data-notify-name="'+escHtml(tool.name)+'" tabindex="0"')+' class="'+cardClass+'" role="'+(isAvail?'link':'button')+'" aria-label="'+escHtml(tool.name)+'">'
    + '<div class="rc-icon" style="background:'+catBg+'">'+escHtml(tool.icon || '🔧')+'</div>'
    + '<div class="rc-body">'
      + '<div class="rc-top">'
        + '<div class="rc-name">'+highlight(tool.name, tokens)+'</div>'
        + '<div class="rc-badges">'+badges+'</div>'
      + '</div>'
      + '<div class="rc-desc">'+highlight(tool.desc, tokens)+'</div>'
      + '<div class="rc-foot">'
        + '<div class="rc-meta">'
          + '<span class="rc-cat">'+escHtml(catLabel)+'</span>'
          + (countryLabel ? '<span class="rc-country">'+escHtml(countryLabel)+'</span>' : '')
        + '</div>'
        + cta
      + '</div>'
    + '</div>'
  + '</'+tag+'>';
}

function renderLoadingState() {
  resultsEl.setAttribute('aria-busy', 'true');
  resultsMeta.style.display = 'flex';
  resultsCount.textContent = 'Loading tools...';
  sortSelect.disabled = true;
  loadMoreWrap.style.display = 'none';

  var skeleton = '<div class="results-list skeleton-list" aria-hidden="true">';
  for (var i = 0; i < 6; i++) {
    skeleton += '<div class="skeleton-card">'
      + '<div class="skeleton-icon"></div>'
      + '<div class="skeleton-copy">'
        + '<div class="skeleton-line medium"></div>'
        + '<div class="skeleton-line long"></div>'
        + '<div class="skeleton-line short"></div>'
      + '</div>'
    + '</div>';
  }
  skeleton += '</div>';
  resultsEl.innerHTML = skeleton;
}

function renderRegistryUnavailable() {
  if (isSearchReady) return;
  if (!state.query.trim() && state.filter === 'all') return;
  resultsEl.setAttribute('aria-busy', 'false');
  resultsMeta.style.display = 'none';
  sortSelect.disabled = true;
  loadMoreWrap.style.display = 'none';
  resultsEl.innerHTML = '<div class="empty-state" role="status">'
    + '<div class="empty-title">Tools are temporarily unavailable</div>'
    + '<div class="empty-sub">Refresh the page or try again in a moment.</div>'
  + '</div>';
}

function renderDefaultState() {
  // Trending tools
  var trendHtml = '<div class="default-state">';
  trendHtml += '<div class="default-section"><div class="default-heading">Popular Tools</div><div class="trending-grid">';
  TRENDING.forEach(function(t) {
    var tool = isSearchReady && Array.isArray(window.AFRO_TOOLS)
      ? AFRO_TOOLS.find(function(x) { return x.id === t.id; })
      : null;
    var isAvail = tool && (tool.status === 'live' || tool.status === 'new');
    trendHtml += '<button class="trend-card" type="button" data-query="'+escHtml(t.query)+'">'
      + '<div class="trend-icon">'+escHtml((tool && tool.icon) || '')+'</div>'
      + '<div>'
        + '<div class="trend-name">'+escHtml((tool && tool.name) || t.query)+'</div>'
        + '<div class="trend-badge">'+(tool ? (isAvail ? 'Live' : 'Coming Soon') : 'Popular')+'</div>'
      + '</div>'
    + '</button>';
  });
  trendHtml += '</div></div>';

  // Category pills
  trendHtml += '<div class="default-section"><div class="default-heading">Browse by Category</div><div class="category-pills">';
  Object.keys(CATEGORY_NAMES).forEach(function(key) {
    trendHtml += '<button class="cat-pill" type="button" data-filter-option="'+key+'">'+escHtml(CATEGORY_NAMES[key])+'</button>';
  });
  trendHtml += '</div></div>';

  // Try searching
  trendHtml += '<div class="default-section"><div class="default-heading">Try Searching</div><div class="empty-suggestions">';
  SUGGESTIONS.forEach(function(s) {
    trendHtml += '<button class="sug-chip" type="button" data-query="'+escHtml(s)+'">'+escHtml(s)+'</button>';
  });
  trendHtml += '</div></div></div>';

  resultsEl.innerHTML = trendHtml;
  resultsEl.setAttribute('aria-busy', 'false');
  sortSelect.disabled = !isSearchReady;
  resultsMeta.style.display = 'none';
  loadMoreWrap.style.display = 'none';
}

function renderResults(results, tokens, page) {
  resultsEl.setAttribute('aria-busy', 'false');
  sortSelect.disabled = false;
  var total = results.length;
  var shown = Math.min(total, page * state.PAGE_SIZE);
  var slice = results.slice(0, shown);

  if (!total) {
    resultsEl.innerHTML = '<div class="empty-state" role="status">'
      + '<div class="empty-title">No tools found</div>'
      + '<div class="empty-sub">Try a country, currency, tax, PDF, invoice, or business keyword.</div>'
      + '<div class="empty-suggestions">'
      + SUGGESTIONS.slice(0,6).map(function(s) {
          return '<button class="sug-chip" type="button" data-query="'+escHtml(s)+'">'+escHtml(s)+'</button>';
        }).join('')
      + '</div>'
      + '<a class="btn btn-primary empty-cta" href="/contact/">Request a tool</a>'
      + '</div>';
    resultsCount.textContent = 'No tools found';
    resultsMeta.style.display = 'flex';
    loadMoreWrap.style.display = 'none';
    return;
  }

  var html = '<div class="results-list">';
  slice.forEach(function(r) { html += renderCard(r.tool, tokens); });
  html += '</div>';
  resultsEl.innerHTML = html;

  // Meta
  var liveCount = results.filter(function(r) { return r.tool.status === 'live' || r.tool.status === 'new'; }).length;
  var metaText = '<strong>' + total + '</strong> result' + (total === 1 ? '' : 's');
  if (state.query) metaText += ' for "' + escHtml(state.query) + '"';
  if (liveCount > 0) metaText += ' · <strong style="color:var(--green)">' + liveCount + ' available now</strong>';
  resultsCount.innerHTML = metaText;
  resultsMeta.style.display = 'flex';

  // Load more
  if (shown < total) {
    loadMoreWrap.style.display = 'block';
    loadMoreBtn.textContent = 'Show ' + Math.min(state.PAGE_SIZE, total - shown) + ' more (' + (total - shown) + ' remaining)';
  } else {
    loadMoreWrap.style.display = 'none';
  }
}

function doRender() {
  if (!isSearchReady) {
    if (!state.query.trim() && state.filter === 'all') {
      renderDefaultState();
      return;
    }
    renderLoadingState();
    return;
  }

  var query = state.query.trim();
  var tokens = tokenise(query);

  if (!query && state.filter === 'all') {
    renderDefaultState();
    return;
  }

  var results = search(query, state.filter, state.sort);
  renderResults(results, tokens, state.page);
}

// ════════════════════════════════════════════════════════════
// CHIP COUNTS
// ════════════════════════════════════════════════════════════
function formatCount(num) {
  return Number(num || 0).toLocaleString('en-US');
}

function setChipCount(id, count) {
  var el = document.getElementById(id);
  var numeric = Number(count);
  if (!el) return;
  if (!Number.isFinite(numeric) || numeric <= 0) {
    el.hidden = true;
    el.textContent = '';
    return;
  }
  el.textContent = formatCount(numeric);
  el.hidden = false;
}

function getSearchStats() {
  if (typeof getPublicToolStats === 'function') return getPublicToolStats('en');
  if (Array.isArray(window.AFRO_TOOLS) && AFRO_TOOLS.length) {
    var liveRows = AFRO_TOOLS.filter(function(tool) {
      return tool.status === 'live' || tool.status === 'new';
    }).length;
    return { totalTools: AFRO_TOOLS.length, liveTools: liveRows };
  }
  return null;
}

function updateChipCounts() {
  var stats = getSearchStats();
  if (!stats) return;
  setChipCount('chip-count-all', stats.totalTools);
  setChipCount('chip-count-live', stats.liveTools);
}

function syncFilterUI() {
  document.querySelectorAll('.chip[data-filter]').forEach(function(c) {
    var active = c.dataset.filter === state.filter;
    c.classList.toggle('active', active);
    c.setAttribute('aria-pressed', active ? 'true' : 'false');
  });

  if (moreFilters) {
    var activeInMore = moreFilters.querySelector('.chip.active');
    if (activeInMore) moreFilters.open = true;
  }
}

// ════════════════════════════════════════════════════════════
// URL STATE
// ════════════════════════════════════════════════════════════
function readURL() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q') || '';
  var f = params.get('f') || 'all';
  state.query = q;
  state.filter = f;
  state.page = 1;
  searchInput.value = q;
  updateClearBtns(q);
  syncFilterUI();
}

function pushURL() {
  var params = new URLSearchParams();
  if (state.query) params.set('q', state.query);
  if (state.filter !== 'all') params.set('f', state.filter);
  var url = '/search' + (params.toString() ? '?' + params.toString() : '');
  history.replaceState(null, '', url);
}

// ════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════
function setQuery(q) {
  if (!isSearchReady) requestSearchIndexLoad();
  state.query = q;
  state.page = 1;
  searchInput.value = q;
  updateClearBtns(q);
  pushURL();
  doRender();
  searchInput.focus();
}

function setFilter(f) {
  if (!f) return;
  if (!isSearchReady) requestSearchIndexLoad();
  state.filter = f;
  state.page = 1;
  syncFilterUI();

  // Scroll chip into view
  var activeChip = document.querySelector('.chip.active');
  if (activeChip) activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  if (filterPanel) filterPanel.classList.remove('is-open');
  if (filterToggle) filterToggle.setAttribute('aria-expanded', 'false');

  pushURL();
  doRender();
}

function updateClearBtns(val) {
  searchClear.classList.toggle('visible', val.length > 0);
}

function handleComingSoon(name) {
  window.location.href = '/#newsletter';
}

// ════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════════════════════════

var debounceTimer;
searchInput.addEventListener('input', function() {
  var val = this.value;
  if (!isSearchReady) requestSearchIndexLoad();
  updateClearBtns(val);
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function() {
    state.query = val;
    state.page = 1;
    pushURL();
    doRender();
  }, 120);
});

// Clear button
searchClear.addEventListener('click', function() { setQuery(''); });

// Filter chips
filterChips.addEventListener('click', function(e) {
  var chip = e.target.closest('.chip');
  if (chip && chip.dataset.filter) setFilter(chip.dataset.filter);
});

if (filterToggle && filterPanel) {
  filterToggle.addEventListener('click', function() {
    var open = !filterPanel.classList.contains('is-open');
    filterPanel.classList.toggle('is-open', open);
    filterToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
}

resultsEl.addEventListener('click', function(e) {
  var notifyCard = e.target.closest('[data-notify-name]');
  if (notifyCard) {
    handleComingSoon(notifyCard.dataset.notifyName || '');
    return;
  }
  var queryBtn = e.target.closest('[data-query]');
  if (queryBtn) {
    setQuery(queryBtn.dataset.query || '');
    return;
  }
  var filterBtn = e.target.closest('[data-filter-option]');
  if (filterBtn) setFilter(filterBtn.dataset.filterOption);
});

resultsEl.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  var notifyCard = e.target.closest('[data-notify-name]');
  if (!notifyCard) return;
  e.preventDefault();
  handleComingSoon(notifyCard.dataset.notifyName || '');
});

// Sort
sortSelect.addEventListener('change', function() {
  state.sort = this.value;
  state.page = 1;
  doRender();
});

// Load more
loadMoreBtn.addEventListener('click', function() {
  state.page++;
  var tokens = tokenise(state.query);
  var results = search(state.query, state.filter, state.sort);
  renderResults(results, tokens, state.page);
  // Animate new cards
  var cards = resultsEl.querySelectorAll('.result-card');
  var startIdx = (state.page - 1) * state.PAGE_SIZE;
  for (var i = startIdx; i < cards.length; i++) {
    cards[i].style.animationDelay = ((i - startIdx) * 30) + 'ms';
  }
});

// Keyboard shortcut ⌘K / Ctrl+K
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape' && filterPanel && filterPanel.classList.contains('is-open')) {
    filterPanel.classList.remove('is-open');
    if (filterToggle) filterToggle.setAttribute('aria-expanded', 'false');
    filterToggle && filterToggle.focus();
    return;
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    setQuery('');
  }
});

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
(function init() {
  readURL();
  doRender();
  var registryUnavailableTimer = setTimeout(renderRegistryUnavailable, 8000);

  function startSearch() {
    if (isSearchReady) return true;
    if (!Array.isArray(window.AFRO_TOOLS) || !AFRO_TOOLS.length) return false;
    isSearchReady = true;
    clearTimeout(registryUnavailableTimer);
    resultsEl.setAttribute('aria-busy', 'false');
    sortSelect.disabled = false;
    updateChipCounts();
    readURL();
    doRender();
    return true;
  }

  function normalizeSearchTool(tool) {
    if (Array.isArray(tool)) {
      return {
        id: tool[0],
        name: tool[1] || tool[0],
        desc: tool[2] || '',
        category: tool[3] || 'uncategorized',
        countries: Array.isArray(tool[4]) ? tool[4] : [],
        status: String(tool[5] || '').toLowerCase(),
        href: tool[6] || '#',
        icon: tool[7] || '',
        priority: Number(tool[8] || 0)
      };
    }

    return {
      id: tool.id,
      name: tool.name || tool.id,
      desc: tool.desc || tool.description || '',
      category: tool.category || tool.category_key || 'uncategorized',
      countries: Array.isArray(tool.countries) ? tool.countries : [],
      status: String(tool.status || '').toLowerCase(),
      href: tool.href || tool.url || '#',
      icon: tool.icon || '',
      priority: Number(tool.priority || 0)
    };
  }

  function loadSearchIndex() {
    if (startSearch()) return Promise.resolve();
    if (window.__afroSearchIndexPromise) return window.__afroSearchIndexPromise;

    window.__afroSearchIndexPromise = fetch('/data/search-index.json', { credentials: 'same-origin' })
      .then(function(response) {
        if (!response.ok) throw new Error('Search index failed to load');
        return response.json();
      })
      .then(function(records) {
        window.AFRO_TOOLS = Array.isArray(records) ? records.map(normalizeSearchTool) : [];
        document.dispatchEvent(new CustomEvent('afrotools:registry-ready', {
          detail: { tools: window.AFRO_TOOLS, categories: {} }
        }));
        return window.AFRO_TOOLS;
      });

    return window.__afroSearchIndexPromise;
  }

  requestSearchIndexLoad = function() {
    loadSearchIndex()
      .then(startSearch)
      .catch(function() {
        renderRegistryUnavailable();
      });
  };

  function scheduleSearchIndexLoad() {
    var shouldLoadNow = state.query.trim() || state.filter !== 'all';
    if (shouldLoadNow) {
      if (window.requestAnimationFrame) {
        window.requestAnimationFrame(function() {
          setTimeout(requestSearchIndexLoad, 0);
        });
      } else {
        setTimeout(requestSearchIndexLoad, 0);
      }
      return;
    }

    var idle = window.requestIdleCallback || function(callback) {
      setTimeout(callback, 2000);
    };
    window.addEventListener('load', function() {
      idle(requestSearchIndexLoad);
    }, { once: true });
  }

  scheduleSearchIndexLoad();
})();
</script>
