<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#131D2E"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#94A3B8" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent bar -->
  <rect y="0" width="1200" height="5" fill="#0062CC"/>

  <!-- Glow circles -->
  <circle cx="1060" cy="130" r="200" fill="#0062CC" opacity="0.05"/>
  <circle cx="1100" cy="500" r="130" fill="#0062CC" opacity="0.04"/>
  <circle cx="200" cy="550" r="150" fill="#0062CC" opacity="0.03"/>

  <!-- Emoji watermark -->
  <text x="980" y="400" font-size="160" text-anchor="middle" opacity="0.08">🧾</text>

  <!-- Logo -->
  <text x="80" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="900" letter-spacing="3" fill="#64748B">AFRO<tspan fill="#0062CC">TOOLS</tspan> BLOG</text>

  <!-- Title -->
  <text x="80" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#E2E8F0" letter-spacing="-1">How to Create a</text>
  <text x="80" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#E2E8F0" letter-spacing="-1">Professional Invoice</text>

  <!-- Subtitle -->
  <text x="80" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#94A3B8">Complete invoicing guide for Nigerian businesses 2026</text>

  <!-- Accent line -->
  <rect x="80" y="360" width="80" height="4" rx="2" fill="#0062CC"/>

  <!-- Tags -->
  <rect x="80" y="400" width="100" height="32" rx="16" fill="#0062CC" opacity="0.15"/>
  <text x="130" y="421" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#4DA3FF" text-anchor="middle">Invoice</text>
  <rect x="195" y="400" width="100" height="32" rx="16" fill="#0062CC" opacity="0.15"/>
  <text x="245" y="421" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#4DA3FF" text-anchor="middle">Nigeria</text>
  <rect x="310" y="400" width="100" height="32" rx="16" fill="#0062CC" opacity="0.15"/>
  <text x="360" y="421" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#4DA3FF" text-anchor="middle">Finance</text>

  <!-- Footer -->
  <rect y="590" width="1200" height="40" fill="#0A1628" opacity="0.6"/>
  <text x="80" y="617" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94A3B8">afrotools.com</text>
  <text x="1120" y="617" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94A3B8" text-anchor="end">AfroTools Blog</text>
</svg>