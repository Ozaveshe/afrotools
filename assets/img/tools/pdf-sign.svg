<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d3561"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="15%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="16" ry="16" fill="url(#bg)"/>
  <!-- Decorative glow -->
  <rect width="600" height="400" rx="16" ry="16" fill="url(#glow)"/>
  <!-- Icon -->
  <text x="40" y="90" font-size="60" font-family="'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif">✍️</text>
  <!-- Tool name -->
    <text x="40" y="230" fill="white" font-family="'DM Sans', 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700">PDF eSignature Tool</text>
  <!-- Category badge -->
  <rect x="40" y="332" rx="12" ry="12" width="164" height="28" fill="white" fill-opacity="0.12"/>
  <text x="52" y="351" fill="white" fill-opacity="0.8" font-family="'DM Sans', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="500">Document &amp; PDF</text>
  <!-- Branding -->
  <text x="560" y="380" fill="white" fill-opacity="0.25" font-family="'DM Sans', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="end">AfroTools</text>
</svg>