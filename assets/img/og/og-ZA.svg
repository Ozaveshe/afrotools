<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#131D2E"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#007749"/>
      <stop offset="100%" stop-color="#007AFF"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#94A3B8" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent bar -->
  <rect y="0" width="1200" height="5" fill="url(#bar)"/>

  <!-- Glow circles -->
  <circle cx="1060" cy="130" r="200" fill="#007749" opacity="0.05"/>
  <circle cx="1100" cy="500" r="130" fill="#007AFF" opacity="0.04"/>

  <!-- Emoji watermark -->
  <text x="980" y="400" font-size="160" text-anchor="middle" opacity="0.08">🇿🇦</text>

  <!-- Logo -->
  <text x="80" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="900" letter-spacing="3" fill="#E2E8F0">AFRO<tspan fill="#007AFF">TOOLS</tspan></text>

  <!-- Title -->
  <text x="80" y="265" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="800" fill="#E2E8F0" letter-spacing="-1">South Africa Tools</text>

  <!-- Subtitle -->
  <text x="80" y="317" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#94A3B8">SARS tax, UIF &amp; medical credit calculators</text>

  <!-- Accent line -->
  <rect x="80" y="335" width="80" height="4" rx="2" fill="#007749"/>

  <!-- Footer -->
  <rect y="590" width="1200" height="40" fill="#0A1628" opacity="0.6"/>
  <text x="80" y="617" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94A3B8">afrotools.com</text>
  <text x="1120" y="617" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94A3B8" text-anchor="end">Free &amp; Open Tools for Africa</text>
</svg>