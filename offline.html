<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — AfroTools</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#0c1a10;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .wrap{max-width:420px}
  .icon{font-size:4rem;margin-bottom:1.5rem;opacity:.8}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem;color:#5ddb9e}
  p{font-size:1rem;line-height:1.6;color:#9ca3af;margin-bottom:1.5rem}
  .btn{display:inline-block;padding:.75rem 2rem;background:#5ddb9e;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:.9rem;transition:background .2s}
  .btn:hover{background:#0062c4}
  .note{margin-top:2rem;font-size:.8rem;color:#6b7280}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Most AfroTools calculators work offline once loaded — try revisiting a tool you've used before.</p>
  <a href="/" class="btn" onclick="location.reload();return false;">Try Again</a>
  <p class="note">AfroTools — Africa's Everything Platform</p>
</div>
</body>
</html>
