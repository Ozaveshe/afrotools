    <script>
        const rates = { ngn: 1500, ken: 150, zar: 18.5, ghs: 13.5, tzs: 2500, ugx: 3800, etb: 55, usd: 1, eur: 0.92, gbp: 0.79 };
        let history = JSON.parse(localStorage.getItem('converterHistory')) || [];

        function convertLength() { convert('length', { mm: 0.001, cm: 0.01, m: 1, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144, mi: 1609.34 }); }
        function convertWeight() { convert('weight', { mg: 0.001, g: 1, kg: 1000, oz: 28.3495, lb: 453.592, stone: 6350.29, tonne: 1000000 }); }
        function convertArea() { convert('area', { mm2: 0.000001, cm2: 0.0001, m2: 1, km2: 1000000, ha: 10000, acre: 4046.86, sqft: 0.092903, sqmi: 2589988 }); }
        function convertVolume() { convert('volume', { ml: 0.001, l: 1, galus: 3.785, galuk: 4.54609, cup: 0.236588, tbsp: 0.0147868, tsp: 0.00492892, bbl: 158.987 }); }
        function convertSpeed() { convert('speed', { ms: 1, kmh: 0.277778, mph: 0.44704, knot: 0.51444 }); }
        function convertData() { convert('data', { b: 1, kb: 1024, mb: 1048576, gb: 1073741824, tb: 1099511627776, pb: 1125899906842624 }); }

        function convertTemp() {
            const from = parseFloat(document.getElementById('tempFrom').value) || 0;
            const fromUnit = document.getElementById('tempFromUnit').value;
            const toUnit = document.getElementById('tempToUnit').value;
            let result = from;
            if (fromUnit === 'c' && toUnit === 'f') result = from * 9/5 + 32;
            else if (fromUnit === 'c' && toUnit === 'k') result = from + 273.15;
            else if (fromUnit === 'f' && toUnit === 'c') result = (from - 32) * 5/9;
            else if (fromUnit === 'f' && toUnit === 'k') result = (from - 32) * 5/9 + 273.15;
            else if (fromUnit === 'k' && toUnit === 'c') result = from - 273.15;
            else if (fromUnit === 'k' && toUnit === 'f') result = (from - 273.15) * 9/5 + 32;
            document.getElementById('tempTo').value = result.toFixed(4);
        }

        function convertCurrency() {
            const from = parseFloat(document.getElementById('currFrom').value) || 0;
            const fromUnit = document.getElementById('currFromUnit').value;
            const toUnit = document.getElementById('currToUnit').value;
            const fromRate = rates[fromUnit];
            const toRate = rates[toUnit];
            const result = (from / fromRate) * toRate;
            document.getElementById('currTo').value = result.toFixed(2);
        }

        function convert(type, factors) {
            const fromInput = document.getElementById(type + 'From');
            const toInput = document.getElementById(type + 'To');
            const fromUnit = document.getElementById(type + 'FromUnit').value;
            const toUnit = document.getElementById(type + 'ToUnit').value;
            const from = parseFloat(fromInput.value) || 0;
            const result = (from * factors[fromUnit]) / factors[toUnit];
            toInput.value = result.toFixed(6);
            if (document.getElementById(type + 'Formula')) {
                document.getElementById(type + 'Formula').textContent = `1 ${fromUnit} = ${(factors[toUnit] / factors[fromUnit]).toFixed(6)} ${toUnit}`;
            }
        }

        function swap(type) {
            [document.getElementById(type + 'From'), document.getElementById(type + 'To')].forEach(el => el.value = '');
            [document.getElementById(type + 'FromUnit'), document.getElementById(type + 'ToUnit')].forEach((_, i) => {
                const tmp = document.getElementById(type + 'FromUnit').value;
                document.getElementById(type + 'FromUnit').value = document.getElementById(type + 'ToUnit').value;
                document.getElementById(type + 'ToUnit').value = tmp;
            });
        }

        function swapLength() { swap('length'); convertLength(); }
        function swapWeight() { swap('weight'); convertWeight(); }
        function swapTemp() { swap('temp'); convertTemp(); }
        function swapArea() { swap('area'); convertArea(); }
        function swapVolume() { swap('vol'); convertVolume(); }
        function swapSpeed() { swap('speed'); convertSpeed(); }
        function swapData() { swap('data'); convertData(); }
        function swapCurrency() { swap('curr'); convertCurrency(); }

        document.querySelectorAll('.uc-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.uc-tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.uc-tab').forEach(el => el.classList.remove('active'));
                document.getElementById(this.dataset.tab).classList.add('active');
                this.classList.add('active');
            });
        });
    </script>
<afro-footer></afro-footer>
</body>
</html>
