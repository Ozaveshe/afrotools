<style>
/* ── Compliance Calendar App — ccal- prefix, orange accent ── */
:root{
  --ccal:#EA580C;--ccal-dk:#9A3412;--ccal-lt:#F97316;
  --ccal-pale:#FFF7ED;--ccal-border:#FED7AA;
  --t:#0f172a;--m:#64748b;--bd:#e2e8f0;--bg:#f8fafc;
  --paye:#EA580C;--pension:#2563EB;--ss:#059669;
  --levy:#7C3AED;--annual:#DC2626;--vat:#D97706;--cit:#0891B2
}

/* ── App Shell ── */
body{margin:0}
.ccal-app{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}

/* ── Slim Hero ── */
.ccal-app-hero{background:linear-gradient(135deg,#431407 0%,#9A3412 60%,#EA580C 100%);padding:20px 0 0}
.ccal-app-hero-inner{max-width:1400px;margin:0 auto;padding:0 20px}
.ccal-app-bc{font-size:.68rem;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.ccal-app-bc a{color:rgba(255,255,255,.35);text-decoration:none}.ccal-app-bc span{color:#fed7aa}
.ccal-app-title{font-size:1.15rem;font-weight:800;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ccal-app-title span{font-size:.7rem;font-weight:600;padding:3px 8px;background:rgba(254,215,170,.2);border:1px solid rgba(254,215,170,.35);border-radius:4px;color:#fed7aa;letter-spacing:.05em}

/* ── Control Bar ── */
.ccal-controls{background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.08);padding:12px 0}
.ccal-controls-inner{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ccal-ctrl-group{display:flex;gap:6px;align-items:center}
.ccal-ctrl-label{font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.ccal-select{padding:7px 11px;border:1.5px solid rgba(255,255,255,.2);border-radius:7px;background:rgba(255,255,255,.1);color:#fff;font-size:.8rem;font-family:inherit;cursor:pointer;min-width:120px}
.ccal-select:focus{outline:none;border-color:#fed7aa}
.ccal-select option{background:#431407;color:#fff}
.ccal-month-nav{display:flex;align-items:center;gap:8px}
.ccal-month-btn{width:30px;height:30px;border-radius:6px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.ccal-month-btn:hover{background:rgba(255,255,255,.2)}
.ccal-month-display{font-size:.86rem;font-weight:700;color:#fff;min-width:120px;text-align:center}
.ccal-ctrl-spacer{flex:1}
.ccal-view-toggle{display:flex;border:1.5px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden}
.ccal-view-btn{padding:6px 14px;background:none;border:none;color:rgba(255,255,255,.5);font-size:.76rem;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.03em;transition:background .12s,color .12s}
.ccal-view-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.ccal-view-btn.active{background:rgba(255,255,255,.15);color:#fff}
.ccal-view-btn+.ccal-view-btn{border-left:1px solid rgba(255,255,255,.15)}

/* ── Filter Pills ── */
.ccal-filters{background:#fff;border-bottom:2px solid var(--bd);padding:0 20px;overflow-x:auto;scrollbar-width:none}
.ccal-filters::-webkit-scrollbar{display:none}
.ccal-filters-inner{max-width:1400px;margin:0 auto;display:flex;gap:0;align-items:center;padding:8px 0}
.ccal-filter-pill{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1.5px solid var(--bd);background:none;font-size:.74rem;font-weight:600;color:var(--m);cursor:pointer;font-family:inherit;margin-right:6px;transition:all .12s;white-space:nowrap}
.ccal-filter-pill:hover{border-color:var(--ccal);color:var(--ccal)}
.ccal-filter-pill.active{background:var(--ccal);border-color:var(--ccal);color:#fff}
.ccal-filter-pill[data-type="paye"].active{background:var(--paye);border-color:var(--paye)}
.ccal-filter-pill[data-type="pension"].active{background:var(--pension);border-color:var(--pension)}
.ccal-filter-pill[data-type="social-security"].active{background:var(--ss);border-color:var(--ss)}
.ccal-filter-pill[data-type="levy"].active{background:var(--levy);border-color:var(--levy)}
.ccal-filter-pill[data-type="annual-return"].active{background:var(--annual);border-color:var(--annual)}

/* ── Main content ── */
.ccal-content{flex:1;max-width:1400px;margin:0 auto;width:100%;padding:20px}
.ccal-view{display:none}.ccal-view.active{display:block}

/* ─────────────────────────────────────────────────────────────────────────
   CALENDAR VIEW
───────────────────────────────────────────────────────────────────────── */
.ccal-grid-wrap{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.ccal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);background:#f1f5f9;border-bottom:1px solid var(--bd)}
.ccal-grid-head-cell{padding:8px 4px;text-align:center;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--m)}
.ccal-grid-body{display:grid;grid-template-columns:repeat(7,1fr)}
.ccal-grid-cell{min-height:90px;padding:6px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;position:relative}
@media(max-width:640px){.ccal-grid-cell{min-height:60px;padding:4px}}
.ccal-grid-cell:nth-child(7n){border-right:none}
.ccal-grid-cell:hover{background:#fffbf5}
.ccal-grid-cell.empty{background:#fafafa;cursor:default}
.ccal-grid-cell.today{background:#fff7ed}
.ccal-grid-cell.today .ccal-day-num{background:var(--ccal);color:#fff;border-radius:50%}
.ccal-grid-cell.has-events{background:#fffbf5}
.ccal-day-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;color:var(--t);margin-bottom:4px}
.ccal-day-dots{display:flex;flex-wrap:wrap;gap:3px}
.ccal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ccal-dot-label{font-size:.6rem;font-weight:600;color:var(--m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.3}
@media(max-width:480px){.ccal-dot-label{display:none}}
.ccal-day-events{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.ccal-day-event-chip{font-size:.6rem;font-weight:600;padding:1px 4px;border-radius:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.ccal-heavy-week{position:absolute;inset:0;border:2px dashed #fed7aa;border-radius:0;pointer-events:none;opacity:.5}

/* ─────────────────────────────────────────────────────────────────────────
   TIMELINE VIEW
───────────────────────────────────────────────────────────────────────── */
.ccal-timeline{display:flex;flex-direction:column;gap:12px}
.ccal-tl-month-header{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--m);padding:8px 0 4px;border-bottom:2px solid var(--bd);margin-top:8px}
.ccal-tl-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:16px;display:flex;gap:14px;align-items:flex-start;transition:box-shadow .12s}
.ccal-tl-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.ccal-tl-card.overdue{border-left:4px solid #DC2626;background:#fff5f5}
.ccal-tl-card.critical{border-left:4px solid #EA580C}
.ccal-tl-card.urgent{border-left:4px solid #F97316}
.ccal-tl-date-box{flex-shrink:0;width:56px;text-align:center;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 4px}
.ccal-tl-date-day{font-size:1.4rem;font-weight:800;color:var(--t);line-height:1}
.ccal-tl-date-mon{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--m)}
.ccal-tl-body{flex:1;min-width:0}
.ccal-tl-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ccal-tl-flag{font-size:1rem}
.ccal-tl-type-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:3px;color:#fff;letter-spacing:.04em;text-transform:uppercase}
.ccal-tl-authority{font-size:.66rem;font-weight:600;color:var(--m)}
.ccal-tl-name{font-size:.88rem;font-weight:700;color:var(--t);margin-bottom:4px}
.ccal-tl-penalty{font-size:.74rem;color:#9A3412;font-weight:600;display:flex;align-items:center;gap:4px}
.ccal-tl-actions{display:flex;gap:6px;margin-top:10px}
.ccal-tl-urgency{flex-shrink:0;text-align:right}
.ccal-urgency-pill{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:700}
.ccal-urgency-pill.overdue{background:#fee2e2;color:#dc2626}
.ccal-urgency-pill.critical{background:#fff7ed;color:#ea580c}
.ccal-urgency-pill.urgent{background:#fefce8;color:#ca8a04}
.ccal-urgency-pill.soon{background:#f0fdf4;color:#16a34a}
.ccal-urgency-pill.ok{background:#f1f5f9;color:var(--m)}
.ccal-tl-empty{padding:48px;text-align:center;color:var(--m);font-size:.86rem}

/* ─────────────────────────────────────────────────────────────────────────
   TABLE VIEW
───────────────────────────────────────────────────────────────────────── */
.ccal-table-wrap{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:auto}
.ccal-table-toolbar{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ccal-table-toolbar-title{font-size:.78rem;font-weight:700;color:var(--t);flex:1}
table.ccal-table{width:100%;border-collapse:collapse;font-size:.78rem}
table.ccal-table th{padding:10px 14px;text-align:left;font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--m);border-bottom:2px solid var(--bd);white-space:nowrap;cursor:pointer;user-select:none;background:#f8fafc}
table.ccal-table th:hover{color:var(--ccal)}
table.ccal-table th.sort-asc::after{content:' ↑'}
table.ccal-table th.sort-desc::after{content:' ↓'}
table.ccal-table td{padding:11px 14px;border-bottom:1px solid #f1f5f9;color:var(--t);vertical-align:middle}
table.ccal-table tr:hover td{background:#fffbf5}
table.ccal-table tr:last-child td{border-bottom:none}
.ccal-table-flag{font-size:.9rem}
.ccal-table-type{display:inline-flex;padding:2px 7px;border-radius:3px;color:#fff;font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.ccal-table-penalty{color:#9A3412;font-weight:600}
.ccal-table-portal{color:var(--ccal);text-decoration:none;font-size:.72rem}
.ccal-table-portal:hover{text-decoration:underline}
.ccal-tbl-empty{padding:48px;text-align:center;color:var(--m);font-size:.84rem}

/* ── Shared buttons ── */
.ccal-btn-sm{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--bd);border-radius:6px;background:#fff;font-size:.72rem;font-weight:600;color:var(--m);cursor:pointer;font-family:inherit;transition:border-color .12s,color .12s}
.ccal-btn-sm:hover{border-color:var(--ccal);color:var(--ccal)}
.ccal-btn-orange{background:var(--ccal);border-color:var(--ccal);color:#fff}
.ccal-btn-orange:hover{background:var(--ccal-dk);border-color:var(--ccal-dk);color:#fff}
.ccal-btn-sm a{color:inherit;text-decoration:none}

/* ── Event Detail Drawer ── */
.ccal-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .2s}
.ccal-drawer-overlay.open{opacity:1;pointer-events:all}
.ccal-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:401;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,16px)}
@media(min-width:768px){
  .ccal-drawer{left:auto;right:0;top:0;bottom:0;border-radius:0;max-height:100vh;width:380px;transform:translateX(100%)}
  .ccal-drawer.open{transform:translateX(0)}
}
.ccal-drawer.open{transform:translateY(0)}
.ccal-drawer-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:12px auto 0}
.ccal-drawer-head{padding:16px 20px;border-bottom:1px solid var(--bd)}
.ccal-drawer-type{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:4px;color:#fff;letter-spacing:.05em;text-transform:uppercase;display:inline-block;margin-bottom:8px}
.ccal-drawer-name{font-size:1.05rem;font-weight:800;color:var(--t);margin-bottom:4px;line-height:1.2}
.ccal-drawer-meta{display:flex;align-items:center;gap:8px;font-size:.74rem;color:var(--m)}
.ccal-drawer-body{padding:16px 20px}
.ccal-drawer-row{margin-bottom:14px}
.ccal-drawer-row-label{font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--m);margin-bottom:4px}
.ccal-drawer-row-val{font-size:.83rem;color:var(--t);line-height:1.55}
.ccal-drawer-penalty-box{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:8px;padding:12px;margin-bottom:14px}
.ccal-drawer-penalty-label{font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#9A3412;margin-bottom:4px}
.ccal-drawer-penalty-val{font-size:.88rem;font-weight:700;color:#9A3412}
.ccal-drawer-actions{padding:0 20px 16px;display:flex;gap:8px;flex-wrap:wrap}

/* ── Alert Modal ── */
.ccal-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
@media(min-width:480px){.ccal-modal-overlay{align-items:center}}
.ccal-modal-overlay.open{display:flex}
.ccal-modal{background:#fff;border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
@media(min-width:480px){.ccal-modal{border-radius:16px}}
.ccal-modal-head{font-size:1rem;font-weight:800;color:var(--t);margin-bottom:6px}
.ccal-modal-sub{font-size:.78rem;color:var(--m);margin-bottom:20px;line-height:1.5}
.ccal-modal-step-label{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--m);margin-bottom:8px}
.ccal-chip-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.ccal-choice-chip{padding:7px 14px;border:1.5px solid var(--bd);border-radius:6px;font-size:.78rem;font-weight:600;color:var(--t);cursor:pointer;background:#fff;font-family:inherit;transition:all .12s}
.ccal-choice-chip.selected{background:var(--ccal);border-color:var(--ccal);color:#fff}
.ccal-modal-input{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:7px;font-size:.84rem;font-family:inherit;box-sizing:border-box;margin-bottom:14px}
.ccal-modal-input:focus{outline:none;border-color:var(--ccal);box-shadow:0 0 0 3px rgba(234,88,12,.1)}
.ccal-modal-actions{display:flex;gap:8px;margin-top:4px}
.ccal-modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.4rem;color:var(--m);cursor:pointer;line-height:1}
.ccal-modal{position:relative}
.ccal-success-box{text-align:center;padding:16px 0}
.ccal-success-icon{font-size:2.5rem;margin-bottom:10px}
.ccal-success-msg{font-size:.9rem;font-weight:700;color:var(--t);margin-bottom:6px}
.ccal-success-sub{font-size:.78rem;color:var(--m);line-height:1.5}

/* ── No events ── */
.ccal-no-events{padding:48px 24px;text-align:center}
.ccal-no-events-icon{font-size:2.5rem;margin-bottom:12px}
.ccal-no-events-title{font-size:.96rem;font-weight:700;color:var(--t);margin-bottom:6px}
.ccal-no-events-desc{font-size:.8rem;color:var(--m);line-height:1.55}
</style>

  <!-- Main Content Area -->

<!-- Engine + App Script -->
<script src="/engines/compliance-calendar-engine.js?v=f5dc93a1"></script>
<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────
  var E = window.ComplianceCalendarEngine;
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var state = {
    countries: ['NG'],
    month: today.getMonth() + 1,
    year: today.getFullYear(),
    view: 'calendar',
    filter: 'all',
    events: [],
    sortCol: 'due',
    sortDir: 'asc',
    activeEvent: null
  };

  // ── Read URL params ────────────────────────────────────────────────────
  (function () {
    var params = new URLSearchParams(window.location.search);
    var c = params.get('country');
    if (c) {
      state.countries = c.split(',').map(function (x) { return x.trim().toUpperCase(); });
      var sel = document.getElementById('ccal-country-select');
      if (sel) sel.value = c.toUpperCase();
    }
    var hash = window.location.hash.replace('#', '');
    if (hash === 'timeline' || hash === 'table' || hash === 'calendar') {
      state.view = hash;
    }
  })();

  // ── DOM refs ───────────────────────────────────────────────────────────
  var monthDisplay  = document.getElementById('ccal-month-display');
  var gridBody      = document.getElementById('ccal-grid-body');
  var timelineBody  = document.getElementById('ccal-timeline-body');
  var tableBody     = document.getElementById('ccal-table-body');
  var tableTitle    = document.getElementById('ccal-table-title');
  var drawer        = document.getElementById('ccal-drawer');
  var drawerOverlay = document.getElementById('ccal-drawer-overlay');
  var alertModal    = document.getElementById('ccal-alert-modal');

  // ── Country select ─────────────────────────────────────────────────────
  document.getElementById('ccal-country-select').addEventListener('change', function () {
    state.countries = this.value.split(',').map(function (x) { return x.trim(); });
    refresh();
  });

  // ── Month navigation ───────────────────────────────────────────────────
  document.getElementById('ccal-prev-month').addEventListener('click', function () {
    state.month--;
    if (state.month < 1) { state.month = 12; state.year--; }
    refresh();
  });
  document.getElementById('ccal-next-month').addEventListener('click', function () {
    state.month++;
    if (state.month > 12) { state.month = 1; state.year++; }
    refresh();
  });

  // ── View toggle ────────────────────────────────────────────────────────
  document.querySelectorAll('.ccal-view-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      state.view = this.dataset.view;
      document.querySelectorAll('.ccal-view-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.view === state.view);
        b.setAttribute('aria-pressed', b.dataset.view === state.view ? 'true' : 'false');
      });
      document.querySelectorAll('.ccal-view').forEach(function (v) {
        v.classList.toggle('active', v.id === 'view-' + state.view);
      });
      renderCurrentView();
    });
  });

  // ── Filter pills ───────────────────────────────────────────────────────
  document.querySelectorAll('.ccal-filter-pill').forEach(function (pill) {
    pill.addEventListener('click', function () {
      state.filter = this.dataset.type;
      document.querySelectorAll('.ccal-filter-pill').forEach(function (p) {
        p.classList.toggle('active', p.dataset.type === state.filter);
      });
      renderCurrentView();
    });
  });

  // ── Export buttons ─────────────────────────────────────────────────────
  document.getElementById('ccal-export-csv').addEventListener('click', function () {
    E.downloadCSV(filteredEvents(), 'compliance-' + state.countries.join('-') + '-' + E.MONTH_NAMES[state.month - 1] + '-' + state.year + '.csv');
  });
  document.getElementById('ccal-export-ical').addEventListener('click', function () {
    E.downloadIcal(state.countries, state.year);
  });
  document.getElementById('ccal-tbl-csv').addEventListener('click', function () {
    E.downloadCSV(filteredEvents(), 'compliance-' + state.countries.join('-') + '-' + state.year + '.csv');
  });
  document.getElementById('ccal-tbl-print').addEventListener('click', function () { window.print(); });

  // ── Table sort ─────────────────────────────────────────────────────────
  document.querySelectorAll('table.ccal-table th[data-col]').forEach(function (th) {
    th.addEventListener('click', function () {
      var col = this.dataset.col;
      if (state.sortCol === col) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortCol = col;
        state.sortDir = 'asc';
      }
      document.querySelectorAll('table.ccal-table th').forEach(function (h) {
        h.classList.remove('sort-asc', 'sort-desc');
      });
      this.classList.add('sort-' + state.sortDir);
      renderTable();
    });
  });

  // ── Drawer close ───────────────────────────────────────────────────────
  drawerOverlay.addEventListener('click', closeDrawer);
  document.getElementById('ccal-drawer-close').addEventListener('click', closeDrawer);

  // ── Alert modal ────────────────────────────────────────────────────────
  document.getElementById('ccal-add-reminder').addEventListener('click', function () {
    openAlertModal(state.activeEvent);
  });
  document.getElementById('ccal-modal-close').addEventListener('click', function () {
    alertModal.classList.remove('open');
  });
  alertModal.addEventListener('click', function (e) {
    if (e.target === alertModal) alertModal.classList.remove('open');
  });

  // ── Helpers ────────────────────────────────────────────────────────────
  function filteredEvents() {
    if (state.filter === 'all') return state.events;
    return state.events.filter(function (ev) { return ev.type === state.filter; });
  }

  function typeColor(type) {
    return E.TYPE_COLORS[type] || '#64748b';
  }

  function countryMeta(code) {
    return E.COUNTRIES[code] || { name: code, flag: '🌍', symbol: '' };
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Main refresh ────────────────────────────────────────────────────────
  function refresh() {
    monthDisplay.textContent = E.MONTH_NAMES[state.month - 1] + ' ' + state.year;
    state.events = E.getEventsForMonth(state.countries, state.month, state.year);
    renderCurrentView();
  }

  function renderCurrentView() {
    if (state.view === 'calendar') renderCalendar();
    else if (state.view === 'timeline') renderTimeline();
    else if (state.view === 'table') renderTable();
  }

  // ─────────────────────────────────────────────────────────────────────
  // CALENDAR VIEW
  // ─────────────────────────────────────────────────────────────────────
  function renderCalendar() {
    var evs = filteredEvents();
    var byDay = E.indexByDay(evs);
    var weeks = E.buildCalendarGrid(state.month, state.year);
    var html = '';

    // Find "heaviest week" (week with most events)
    var weekCounts = weeks.map(function (week) {
      return week.reduce(function (sum, day) {
        return sum + (day && byDay[day] ? byDay[day].length : 0);
      }, 0);
    });
    var maxCount = Math.max.apply(null, weekCounts);
    var heaviestWeekIdx = maxCount > 0 ? weekCounts.indexOf(maxCount) : -1;

    weeks.forEach(function (week, weekIdx) {
      week.forEach(function (day, dayIdx) {
        if (!day) {
          html += '<div class="ccal-grid-cell empty"></div>';
          return;
        }
        var cellDate = new Date(state.year, state.month - 1, day);
        var isToday = cellDate.getTime() === today.getTime();
        var dayEvs = byDay[day] || [];
        var cls = 'ccal-grid-cell';
        if (isToday) cls += ' today';
        if (dayEvs.length) cls += ' has-events';

        html += '<div class="' + cls + '" data-day="' + day + '">';
        html += '<div class="ccal-day-num">' + day + '</div>';

        if (dayEvs.length) {
          html += '<div class="ccal-day-dots">';
          dayEvs.forEach(function (ev) {
            html += '<span class="ccal-dot" style="background:' + typeColor(ev.type) + '" title="' + esc(ev.name) + '"></span>';
          });
          html += '</div>';
          html += '<div class="ccal-day-events">';
          dayEvs.slice(0, 3).forEach(function (ev) {
            var c = countryMeta(ev.country);
            html += '<div class="ccal-day-event-chip" style="background:' + typeColor(ev.type) + '" data-event-id="' + esc(ev.id) + '">';
            html += (state.countries.length > 1 ? c.flag + ' ' : '') + esc(ev.name);
            html += '</div>';
          });
          if (dayEvs.length > 3) {
            html += '<div class="ccal-dot-label">+' + (dayEvs.length - 3) + ' more</div>';
          }
          html += '</div>';
        }

        // Heaviest week indicator (last cell of that week)
        if (weekIdx === heaviestWeekIdx && dayIdx === 6 && maxCount > 1) {
          html += '<div class="ccal-heavy-week" title="Busiest week this month"></div>';
        }

        html += '</div>';
      });
    });

    gridBody.innerHTML = html;

    // Click handlers on cells and chips
    gridBody.querySelectorAll('.ccal-grid-cell[data-day]').forEach(function (cell) {
      cell.addEventListener('click', function (e) {
        var day = parseInt(this.dataset.day, 10);
        var dayEvs = byDay[day] || [];
        if (dayEvs.length === 0) return;
        // If chip clicked, show that event; else show first
        var chipTarget = e.target.closest('.ccal-day-event-chip');
        var ev = dayEvs[0];
        if (chipTarget) {
          var id = chipTarget.dataset.eventId;
          ev = dayEvs.find(function (e2) { return e2.id === id; }) || dayEvs[0];
        }
        openDrawer(ev);
      });
    });
  }

  // ─────────────────────────────────────────────────────────────────────
  // TIMELINE VIEW
  // ─────────────────────────────────────────────────────────────────────
  function renderTimeline() {
    // Show upcoming 90 days
    var upcoming = E.getUpcoming(state.countries, 90);
    if (state.filter !== 'all') {
      upcoming = upcoming.filter(function (ev) { return ev.type === state.filter; });
    }

    if (!upcoming.length) {
      timelineBody.innerHTML = '<div class="ccal-tl-empty">No upcoming deadlines found for the selected filter and countries.</div>';
      return;
    }

    var html = '';
    var lastMonth = -1;

    upcoming.forEach(function (ev) {
      var d = ev.dueDate;
      var mo = d.getMonth();
      if (mo !== lastMonth) {
        html += '<div class="ccal-tl-month-header">' + esc(E.MONTH_NAMES[mo]) + ' ' + d.getFullYear() + '</div>';
        lastMonth = mo;
      }

      var days = E.daysUntil(d);
      var urgCls = E.urgencyClass(days);
      var urgLbl = E.urgencyLabel(days);
      var c = countryMeta(ev.country);
      var color = typeColor(ev.type);

      html += '<div class="ccal-tl-card ' + urgCls + '" data-event-id="' + esc(ev.id) + '">';
      html += '  <div class="ccal-tl-date-box">';
      html += '    <div class="ccal-tl-date-day">' + d.getDate() + '</div>';
      html += '    <div class="ccal-tl-date-mon">' + E.MONTH_SHORT[d.getMonth()] + '</div>';
      html += '  </div>';
      html += '  <div class="ccal-tl-body">';
      html += '    <div class="ccal-tl-meta">';
      html += '      <span class="ccal-tl-flag">' + c.flag + '</span>';
      html += '      <span class="ccal-tl-type-badge" style="background:' + color + '">' + esc(E.TYPE_LABELS[ev.type] || ev.type) + '</span>';
      html += '      <span class="ccal-tl-authority">' + esc(ev.authority) + '</span>';
      html += '    </div>';
      html += '    <div class="ccal-tl-name">' + esc(ev.name) + '</div>';
      html += '    <div class="ccal-tl-penalty">⚠ ' + esc(ev.penalty) + '</div>';
      html += '    <div class="ccal-tl-actions">';
      html += '      <button type="button" class="ccal-btn-sm ccal-btn-orange" data-action="remind" data-event-id="' + esc(ev.id) + '">🔔 Remind me</button>';
      html += '      <a class="ccal-btn-sm" href="' + esc(ev.authority_url) + '" target="_blank" rel="noopener">🌐 Portal ↗</a>';
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="ccal-tl-urgency"><span class="ccal-urgency-pill ' + urgCls + '">' + esc(urgLbl) + '</span></div>';
      html += '</div>';
    });

    timelineBody.innerHTML = html;

    // Attach click handlers
    timelineBody.querySelectorAll('.ccal-tl-card').forEach(function (card) {
      card.addEventListener('click', function (e) {
        if (e.target.tagName === 'A' || e.target.closest('a')) return;
        var id = this.dataset.eventId;
        var ev = findEventById(id);
        if (ev) {
          if (e.target.dataset.action === 'remind' || e.target.closest('[data-action="remind"]')) {
            openAlertModal(ev);
          } else {
            openDrawer(ev);
          }
        }
      });
    });
  }

  // ─────────────────────────────────────────────────────────────────────
  // TABLE VIEW
  // ─────────────────────────────────────────────────────────────────────
  function renderTable() {
    var evs = filteredEvents().slice();
    tableTitle.textContent = 'Events for ' + E.MONTH_NAMES[state.month - 1] + ' ' + state.year + ' (' + evs.length + ' deadlines)';

    // Sort
    evs.sort(function (a, b) {
      var va, vb;
      if (state.sortCol === 'country') { va = a.country; vb = b.country; }
      else if (state.sortCol === 'name') { va = a.name; vb = b.name; }
      else if (state.sortCol === 'type') { va = a.type; vb = b.type; }
      else if (state.sortCol === 'frequency') { va = a.frequency; vb = b.frequency; }
      else if (state.sortCol === 'authority') { va = a.authority; vb = b.authority; }
      else if (state.sortCol === 'penalty') { va = a.penalty; vb = b.penalty; }
      else { va = a.dueDate; vb = b.dueDate; } // due
      if (va < vb) return state.sortDir === 'asc' ? -1 : 1;
      if (va > vb) return state.sortDir === 'asc' ? 1 : -1;
      return 0;
    });

    if (!evs.length) {
      tableBody.innerHTML = '<tr><td colspan="8" class="ccal-tbl-empty">No events match the current filter.</td></tr>';
      return;
    }

    var html = '';
    evs.forEach(function (ev) {
      var c = countryMeta(ev.country);
      var color = typeColor(ev.type);
      html += '<tr data-event-id="' + esc(ev.id) + '" style="cursor:pointer">';
      html += '  <td><span class="ccal-table-flag">' + c.flag + '</span> ' + esc(c.name) + '</td>';
      html += '  <td style="font-weight:600">' + esc(ev.name) + '</td>';
      html += '  <td><span class="ccal-table-type" style="background:' + color + '">' + esc(E.TYPE_LABELS[ev.type] || ev.type) + '</span></td>';
      html += '  <td style="text-transform:capitalize">' + esc(ev.frequency) + '</td>';
      html += '  <td style="font-weight:700">' + esc(E.formatDate(ev.dueDate)) + '</td>';
      html += '  <td>' + esc(ev.authority) + '</td>';
      html += '  <td class="ccal-table-penalty">' + esc(ev.penalty) + '</td>';
      html += '  <td><a class="ccal-table-portal" href="' + esc(ev.authority_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Portal ↗</a></td>';
      html += '</tr>';
    });
    tableBody.innerHTML = html;

    tableBody.querySelectorAll('tr[data-event-id]').forEach(function (row) {
      row.addEventListener('click', function () {
        var ev = findEventById(this.dataset.eventId);
        if (ev) openDrawer(ev);
      });
    });
  }

  // ─────────────────────────────────────────────────────────────────────
  // EVENT DRAWER
  // ─────────────────────────────────────────────────────────────────────
  function openDrawer(ev) {
    state.activeEvent = ev;
    var c = countryMeta(ev.country);
    var color = typeColor(ev.type);

    var badge = document.getElementById('ccal-drawer-type-badge');
    badge.textContent = E.TYPE_LABELS[ev.type] || ev.type;
    badge.style.background = color;

    document.getElementById('ccal-drawer-name').textContent = ev.name;
    document.getElementById('ccal-drawer-meta').innerHTML =
      '<span>' + c.flag + ' ' + esc(c.name) + '</span>' +
      '<span>·</span>' +
      '<span>Due <strong>' + esc(E.formatDate(ev.dueDate)) + '</strong></span>' +
      '<span>·</span>' +
      '<span style="text-transform:capitalize">' + esc(ev.frequency) + '</span>';
    document.getElementById('ccal-drawer-penalty').textContent = ev.penalty;
    document.getElementById('ccal-drawer-desc').textContent = ev.desc;
    document.getElementById('ccal-drawer-notes').textContent = ev.notes || '—';
    document.getElementById('ccal-drawer-verified').textContent = ev.last_verified ? 'Verified ' + ev.last_verified : 'AfroTools team';

    var portalLink = document.getElementById('ccal-portal-link');
    portalLink.href = ev.authority_url;
    portalLink.textContent = '🌐 ' + ev.authority + ' Portal ↗';

    drawer.classList.add('open');
    drawerOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    drawerOverlay.classList.remove('open');
    document.body.style.overflow = '';
    state.activeEvent = null;
  }

  // ─────────────────────────────────────────────────────────────────────
  // ALERT MODAL
  // ─────────────────────────────────────────────────────────────────────
  function openAlertModal(ev) {
    if (!ev) return;
    closeDrawer();

    var mc = document.getElementById('ccal-modal-content');
    mc.innerHTML = [
      '<div class="ccal-modal-head" id="ccal-modal-head">Reminder Preview: ' + esc(ev.name) + '</div>',
      '<div class="ccal-modal-sub">Use the iCal export to place reminders in your own calendar. Email and WhatsApp delivery are not active in this public tool.</div>',

      '<div class="ccal-modal-step-label">1. Suggested timing</div>',
      '<div class="ccal-chip-group" id="ccal-timing-chips">',
        '<button type="button" class="ccal-choice-chip selected" data-val="7">1 week before</button>',
        '<button type="button" class="ccal-choice-chip selected" data-val="3">3 days before</button>',
        '<button type="button" class="ccal-choice-chip selected" data-val="1">Day of</button>',
      '</div>',

      '<div class="ccal-modal-step-label">2. Delivery status</div>',
      '<div class="ccal-chip-group" id="ccal-channel-chips">',
        '<button type="button" class="ccal-choice-chip selected" data-val="calendar">Calendar export supported</button>',
        '<button type="button" class="ccal-choice-chip" data-val="pending">Notification delivery pending</button>',
      '</div>',

      '<div class="ccal-modal-actions">',
        '<button type="button" class="ccal-btn-sm ccal-btn-orange" id="ccal-alert-submit">Close Preview</button>',
      '</div>'
    ].join('');

    // Multi-select chips
    mc.querySelectorAll('.ccal-choice-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        this.classList.toggle('selected');
      });
    });
    mc.querySelector('#ccal-alert-submit').addEventListener('click', function () {
      alertModal.classList.remove('open');
    });

    alertModal.classList.add('open');
  }

  // ── Utility: find event by id from state.events ────────────────────────
  function findEventById(id) {
    // Check current month events first
    var ev = state.events.find(function (e) { return e.id === id; });
    if (ev) return ev;
    // Also check all events for full 90-day timeline
    var upcoming = E.getUpcoming(state.countries, 90);
    return upcoming.find(function (e) { return e.id === id; }) || null;
  }

  // ── Initial render ─────────────────────────────────────────────────────
  // Set initial view from state (URL hash)
  if (state.view !== 'calendar') {
    document.querySelectorAll('.ccal-view-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.view === state.view);
    });
    document.querySelectorAll('.ccal-view').forEach(function (v) {
      v.classList.toggle('active', v.id === 'view-' + state.view);
    });
  }

  refresh();

  // ── Keyboard: Escape closes drawer/modal ──────────────────────────────
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      if (alertModal.classList.contains('open')) alertModal.classList.remove('open');
      else if (drawer.classList.contains('open')) closeDrawer();
    }
  });

})();
</script>
</body>
</html>
