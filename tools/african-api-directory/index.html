  {name:"MTN MoMo API",org:"MTN Group",cat:"payments",countries:["pan-africa"],pricing:"freemium",desc:"MTN Mobile Money API covering 20+ African markets. Collection, disbursement, remittance and subscription APIs available.",doc:"https://momodeveloper.mtn.com",uptime:"high",stars:4,icon:"📱"},
  {name:"Africa's Talking",org:"Africa's Talking",cat:"telecom",countries:["pan-africa"],pricing:"freemium",desc:"SMS, USSD, voice, airtime and payments APIs for 18+ African countries. Popular for USSD applications and bulk SMS.",doc:"https://africastalking.com/docs",uptime:"high",stars:5,icon:"📨"},
  {name:"Termii",org:"Termii",cat:"telecom",countries:["pan-africa"],pricing:"freemium",desc:"Nigeria-founded messaging API: SMS, voice, email, WhatsApp. Used by 200+ businesses across Africa for OTP and notifications.",doc:"https://developers.termii.com",uptime:"high",stars:4,icon:"💬"},
  {name:"Interswitch API",org:"Interswitch",cat:"payments",countries:["nigeria"],pricing:"paid",desc:"Nigeria's largest payment infrastructure. QuickTeller API, Webpay, Passport identity verification. Powers ATM switching.",doc:"https://developer.interswitchgroup.com",uptime:"high",stars:4,icon:"🏦"},
  {name:"VerifyMe Nigeria",org:"VerifyMe",cat:"identity",countries:["nigeria"],pricing:"freemium",desc:"BVN, NIN, driver's license, CAC, TIN verification APIs for Nigeria. Used for KYC compliance across fintech and banking.",doc:"https://verifyme.ng/docs",uptime:"high",stars:4,icon:"🪪"},
  {name:"NIMC API",org:"NIMC (Nigeria)",cat:"government",countries:["nigeria"],pricing:"paid",desc:"Nigeria Identity Management Commission API for NIN verification. Sandbox available. Required for regulated financial services.",doc:"https://developers.nimc.gov.ng",uptime:"medium",stars:3,icon:"🏛️"},
  {name:"GhIPSS API",org:"GhIPSS",cat:"payments",countries:["ghana"],pricing:"paid",desc:"Ghana Interbank Payment and Settlement Systems. GhQR, instant pay, GHIPSS wallet APIs for Ghanaian market.",doc:"https://ghipss.net/developers",uptime:"high",stars:3,icon:"🏦"},
  {name:"NIBSS API",org:"NIBSS",cat:"payments",countries:["nigeria"],pricing:"paid",desc:"Nigeria Inter-Bank Settlement System. NIP instant payments, NIBSS Instant Payment (NIP) API for bank-to-bank transfers.",doc:"https://nibss-plc.com.ng/developers",uptime:"high",stars:4,icon:"🏦"},
  {name:"Smile Identity",org:"Smile Identity",cat:"identity",countries:["pan-africa"],pricing:"freemium",desc:"AI-powered identity verification for Africa. ID document + selfie matching for KYC across Ghana, Nigeria, Kenya, SA, Uganda.",doc:"https://docs.usesmileid.com",uptime:"high",stars:5,icon:"😊"},
  {name:"Youverify",org:"Youverify",cat:"identity",countries:["nigeria","ghana","kenya"],pricing:"freemium",desc:"Digital identity verification, AML screening, KYB/KYC compliance. Supports BVN, NIN, RC number, CAC verification.",doc:"https://docs.youverify.co",uptime:"high",stars:4,icon:"✅"},
  {name:"Mono",org:"Mono",cat:"data",countries:["nigeria","ghana","kenya","south-africa"],pricing:"freemium",desc:"Open banking infrastructure. Connect to 30+ African banks, access account data, income verification, direct debit.",doc:"https://docs.mono.co",uptime:"high",stars:5,icon:"🔗"},
  {name:"Okra",org:"Okra",cat:"data",countries:["nigeria"],pricing:"freemium",desc:"Financial data API for Nigeria. Account info, transactions, income, balance, identity data from 20+ Nigerian banks.",doc:"https://docs.okra.ng",uptime:"high",stars:4,icon:"📊"},
  {name:"Sendbox",org:"Sendbox",cat:"logistics",countries:["nigeria"],pricing:"freemium",desc:"Logistics and shipping API for Nigeria. Rate quotes, shipment booking, tracking, COD for local e-commerce businesses.",doc:"https://developers.sendbox.co",uptime:"medium",stars:3,icon:"📦"},
  {name:"Kobo360 API",org:"Kobo360",cat:"logistics",countries:["pan-africa"],pricing:"paid",desc:"Trucking and freight API for Sub-Saharan Africa. Load matching, GPS tracking, driver management for logistics companies.",doc:"https://kobo360.com/api",uptime:"medium",stars:3,icon:"🚛"},
  {name:"Apollo Agriculture API",org:"Apollo Agriculture",cat:"agriculture",countries:["kenya"],pricing:"paid",desc:"Smallholder farmer scoring and loan API for Kenya. Uses satellite, soil data and repayment history for credit decisions.",doc:"https://apolloagriculture.com",uptime:"medium",stars:3,icon:"🌾"},
  {name:"Watu Credit API",org:"Watu Credit",cat:"payments",countries:["kenya","uganda"],pricing:"paid",desc:"Asset financing API for motorcycles and smartphones in East Africa. BNPL scoring for underserved borrowers.",doc:"https://watu.africa",uptime:"medium",stars:3,icon:"🏍️"},
  {name:"Pesapal API",org:"Pesapal",cat:"payments",countries:["kenya","uganda","tanzania","zambia"],pricing:"freemium",desc:"East African payment gateway. M-Pesa, Airtel Money, card payments across Kenya, Uganda, Tanzania, Zambia.",doc:"https://developer.pesapal.com",uptime:"high",stars:4,icon:"💳"},
  {name:"Hubtel API",org:"Hubtel",cat:"payments",countries:["ghana"],pricing:"freemium",desc:"Ghana's leading payment API. Mobile money (MTN, Vodafone, AirtelTigo), card, WhatsApp commerce integration.",doc:"https://developers.hubtel.com",uptime:"high",stars:4,icon:"💳"},
  {name:"SnapScan API",org:"SnapScan (Standard Bank)",cat:"payments",countries:["south-africa"],pricing:"freemium",desc:"QR code payments for South Africa. Popular with small merchants. Integrates with Standard Bank merchant accounts.",doc:"https://developer.snapscan.io",uptime:"high",stars:3,icon:"📷"},
  {name:"Peach Payments API",org:"Peach Payments",cat:"payments",countries:["south-africa","kenya","mauritius"],pricing:"freemium",desc:"PCI-DSS compliant payment gateway for Southern and East Africa. Cards, EFT, Apple Pay, PayPal, instant EFT.",doc:"https://developer.peachpayments.com",uptime:"high",stars:4,icon:"🍑"},
  {name:"Dojah",org:"Dojah",cat:"identity",countries:["nigeria","ghana","kenya"],pricing:"freemium",desc:"No-code KYC and fraud prevention APIs. BVN, NIN, Ghana Card, phone/email verification, PEP/AML screening.",doc:"https://docs.dojah.io",uptime:"high",stars:4,icon:"🔍"},
  {name:"Prembly (IdentityPass)",org:"Prembly",cat:"identity",countries:["pan-africa"],pricing:"freemium",desc:"Identity verification APIs across Africa. 15+ African countries, 50+ ID types. Business and individual KYC.",doc:"https://docs.prembly.com",uptime:"high",stars:4,icon:"🪪"},
  {name:"mHealth Nigeria API",org:"Ministry of Health",cat:"health",countries:["nigeria"],pricing:"free",desc:"Nigeria's national health facility registry API. 40,000+ health facilities with location, services and ownership data.",doc:"https://hmisng.gov.ng",uptime:"medium",stars:2,icon:"🏥"},
  {name:"Open Street Map Africa",org:"OpenStreetMap",cat:"data",countries:["pan-africa"],pricing:"free",desc:"Free map data API for Africa. Nominatim geocoding, routing, tiles. Best coverage for major African cities.",doc:"https://wiki.openstreetmap.org/wiki/API",uptime:"high",stars:4,icon:"🗺️"},
  {name:"iHub Nairobi API Registry",org:"iHub",cat:"data",countries:["kenya"],pricing:"free",desc:"Aggregator of Kenyan open government datasets. Population census, economic indicators, health statistics.",doc:"https://ihub.co.ke",uptime:"medium",stars:2,icon:"📈"},
];

function renderAPIs(list){
  var g=document.getElementById('api-grid');
  var c=document.getElementById('results-count');
  c.textContent=list.length+' API'+(list.length!==1?'s':'')+' found';
  if(!list.length){g.innerHTML='<div class="no-results">No APIs found for your filters.<br>Try adjusting your search or filters.</div>';return;}
  g.innerHTML=list.map(function(a){
    var priceBadge=a.pricing==='free'?'<span class="api-badge badge-free">Free</span>':a.pricing==='freemium'?'<span class="api-badge badge-freemium">Freemium</span>':'<span class="api-badge badge-paid">Paid</span>';
    var countries=a.countries.map(function(c){return '<span class="api-badge badge-country">'+c.replace('-',' ')+'</span>';}).join('');
    var stars='★'.repeat(a.stars)+'☆'.repeat(5-a.stars);
    return '<div class="api-card">'+
      '<div class="api-card-top"><div class="api-icon">'+a.icon+'</div><div><div class="api-name">'+a.name+'</div><div class="api-org">'+a.org+'</div></div></div>'+
      '<div class="api-badges"><span class="api-badge badge-cat">'+a.cat+'</span>'+priceBadge+countries+'</div>'+
      '<div class="api-desc">'+a.desc+'</div>'+
      '<div class="api-meta"><span class="api-uptime"><span class="uptime-dot '+(a.uptime==='high'?'high':'medium')+'"></span>'+(a.uptime==='high'?'High uptime':'Medium uptime')+'</span><span class="api-stars">'+stars+'</span><a class="api-doc-link" href="'+a.doc+'" target="_blank" rel="noopener">Docs →</a></div>'+
    '</div>';
  }).join('');
}

renderAPIs(APIS);

function filter(){
  var q=(document.getElementById('api-search').value||'').toLowerCase();
  var cat=document.getElementById('filter-cat').value;
  var country=document.getElementById('filter-country').value;
  var pricing=document.getElementById('filter-pricing').value;
  var list=APIS.filter(function(a){
    if(q&&!(a.name+' '+a.desc+' '+a.org+' '+a.cat).toLowerCase().includes(q))return false;
    if(cat&&a.cat!==cat)return false;
    if(country&&!a.countries.includes(country))return false;
    if(pricing&&a.pricing!==pricing)return false;
    return true;
  });
  renderAPIs(list);
}

['api-search','filter-cat','filter-country','filter-pricing'].forEach(function(id){
  document.getElementById(id).addEventListener('input',filter);
  document.getElementById(id).addEventListener('change',filter);
});
</script>
