<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder Decoder — Text & File Encoding | AfroTools</title>
<meta name="description" content="Free Base64 encoder/decoder. Convert text to Base64 and back. File upload support. Instant conversion.">
<link rel="canonical" href="https://afrotools.com/tools/base64">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Base64 Encoder Decoder | AfroTools">
<meta property="og:description" content="Encode and decode Base64 text. File support for up to 5MB.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/base64">
<meta property="og:site_name" content="AfroTools">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.min.css">
<link rel="stylesheet" href="/assets/css/global.min.css">
<script src="/assets/js/components/navbar.min.js" defer></script>
<script src="/assets/js/components/footer.min.js" defer></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '🔐'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .card { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .card-head { padding: 15px 22px; border-bottom: 1px solid #eaf5ec; background: #f7fdf8; }
  .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0a4018; }
  .card-body { padding: 22px; }
  .converter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .f-label { display: block; font-size: 0.75rem; font-weight: 700; color: #0d2813; margin-bottom: 8px; }
  .f-textarea { width: 100%; height: 280px; padding: 12px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; font-size: 0.85rem; color: #0d2813; outline: none; resize: vertical; font-family: 'Courier New', monospace; }
  .f-textarea:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .convert-btn { width: 100%; padding: 14px; background: var(--afro-green); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; margin-top: 18px; }
  .convert-btn:hover { background: #006d42; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 135, 81, 0.3); }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .act-btn { padding: 10px; font-size: 0.72rem; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'DM Sans', sans-serif; background: rgba(0, 135, 81, 0.1); border: 1.5px solid rgba(0, 135, 81, 0.35); color: #1a5c3a; }
  .act-btn:hover { background: rgba(0, 135, 81, 0.2); }
  @media (max-width: 768px) { .converter-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Base64 Encoder <em>Decoder</em></h1>
    <p class="hero-sub">Encode text to Base64 and decode Base64 back to text. Fast, client-side processing.</p>
    <div class="hero-badges">
      <span class="badge b-green">Bidirectional</span>
      <span class="badge b-green">Instant</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="card">
      <div class="card-head"><span class="card-title">Base64 Converter</span></div>
      <div class="card-body">
        <div class="converter-grid">
          <div>
            <label class="f-label">Plain Text</label>
            <textarea id="plainText" class="f-textarea" placeholder="Enter or paste text here..."></textarea>
          </div>

          <div>
            <label class="f-label">Base64 Encoded</label>
            <textarea id="base64Text" class="f-textarea" readonly placeholder="Base64 output will appear here..."></textarea>
            <div class="action-row">
              <button class="act-btn" id="copyBase64">📋 Copy</button>
              <button class="act-btn" id="downloadBase64">📥 Download</button>
            </div>
          </div>
        </div>

        <button class="convert-btn" id="encodeBtn">Encode to Base64</button>

        <div style="border-top: 1px solid #eaf5ec; margin-top: 22px; padding-top: 22px;">
          <button class="convert-btn" id="decodeBtn" style="background: rgba(0, 135, 81, 0.1); color: #0a4018; border: 1.5px solid rgba(0, 135, 81, 0.35);">Decode from Base64</button>
        </div>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const plainText = document.getElementById('plainText');
  const base64Text = document.getElementById('base64Text');
  const encodeBtn = document.getElementById('encodeBtn');
  const decodeBtn = document.getElementById('decodeBtn');
  const copyBase64 = document.getElementById('copyBase64');
  const downloadBase64 = document.getElementById('downloadBase64');

  encodeBtn.addEventListener('click', () => {
    try {
      base64Text.value = btoa(unescape(encodeURIComponent(plainText.value)));
    } catch (e) {
      base64Text.value = 'Error encoding: ' + e.message;
    }
  });

  decodeBtn.addEventListener('click', () => {
    try {
      plainText.value = decodeURIComponent(escape(atob(base64Text.value)));
    } catch (e) {
      plainText.value = 'Error decoding: ' + e.message;
    }
  });

  plainText.addEventListener('input', encodeBtn.click);

  copyBase64.addEventListener('click', () => {
    base64Text.select();
    document.execCommand('copy');
  });

  downloadBase64.addEventListener('click', () => {
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([base64Text.value], { type: 'text/plain' }));
    link.download = 'encoded.txt';
    link.click();
  });
</script>
</body>
</html>
