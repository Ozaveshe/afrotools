<!DOCTYPE html>
<html data-chat-bundle="/assets/js/bundles/chat.e57fe38a.min.js" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Generation History — CreatorMind | AfroTools</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tokens.min.css?v=6977389f">
  <link rel="stylesheet" href="/assets/css/global.min.css?v=c94dde91">
  <link rel="stylesheet" href="style.css?v=e093f11c">
<link rel="canonical" href="https://afrotools.com/tools/creator-mind/history">
<meta property="og:url" content="https://afrotools.com/tools/creator-mind/history">
</head>
<body class="cmn-app">

  <!-- TOPBAR -->
  <div class="cmn-topbar">
    <a href="app.html" class="cmn-topbar-back">&larr; Back</a>
    <a href="index.html" class="cmn-topbar-brand">&#128214; History</a>
    <div class="cmn-topbar-title"></div>
  </div>

  <div class="cmn-history-page">
    <div class="cmn-history-header">
      <input class="cmn-history-search" id="searchInput" placeholder="Search generations...">
    </div>

    <div class="cmn-history-filters" id="filterBar"></div>

    <div id="historyList"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="cmn-bottom-nav">
    <a href="app.html"><span class="cmn-bnav-icon">&#10024;</span>Create</a>
    <a href="voice.html"><span class="cmn-bnav-icon">&#127908;</span>Voice</a>
    <a href="history.html" class="active"><span class="cmn-bnav-icon">&#128214;</span>History</a>
  </nav>

  <!-- Detail Modal -->
  <div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;overflow-y:auto;padding:20px;">
    <div style="max-width:600px;margin:40px auto;background:#1a1a2e;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <span id="detailType" style="font-size:12px;font-weight:700;text-transform:uppercase;color:#D946EF;letter-spacing:.5px;"></span>
        <button onclick="document.getElementById('detailModal').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;">&times;</button>
      </div>
      <div id="detailContent" class="cmn-output-text" style="margin-bottom:16px;"></div>
      <div style="display:flex;gap:8px;">
        <button class="cmn-output-btn" onclick="window._histCopy()">&#128203; Copy</button>
        <button class="cmn-output-btn" onclick="window._histWhatsApp()">&#128172; WhatsApp</button>
        <button class="cmn-output-btn" id="detailFavBtn" onclick="window._histToggleFav()">&#11088; Favorite</button>
        <button class="cmn-output-btn" style="margin-left:auto;color:#ef4444;" onclick="window._histDelete()">&#128465; Delete</button>
      </div>
    </div>
  </div>

  <div class="cmn-toast" id="toast"></div>

<script src="/engines/creator-mind-engine.js?v=55430705"></script>
<script>
!function() {
  "use strict";

  var E = window.AfroTools && window.AfroTools.CreatorMindEngine;
  var currentFilter = 'all';
  var searchQuery = '';
  var selectedId = null;

  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('cmn-history') || '[]'); } catch(e) { return []; }
  }

  function saveHistory(h) {
    localStorage.setItem('cmn-history', JSON.stringify(h));
  }

  // ── FILTERS ──
  function renderFilters() {
    var bar = document.getElementById('filterBar');
    var types = ['all'];
    if (E) Object.keys(E.GENERATION_TYPES).forEach(function(k) { types.push(k); });

    bar.innerHTML = types.map(function(t) {
      var label = t === 'all' ? 'All' : (E && E.GENERATION_TYPES[t] ? E.GENERATION_TYPES[t].label : t);
      return '<span class="cmn-pill' + (currentFilter === t ? ' active' : '') + '" data-filter="' + t + '">' + label + '</span>';
    }).join('');

    bar.querySelectorAll('.cmn-pill').forEach(function(pill) {
      pill.onclick = function() {
        currentFilter = pill.getAttribute('data-filter');
        renderFilters();
        renderList();
      };
    });
  }

  // ── LIST ──
  function renderList() {
    var history = getHistory();
    var list = document.getElementById('historyList');

    // Filter
    var filtered = history.filter(function(item) {
      if (currentFilter !== 'all' && item.type !== currentFilter) return false;
      if (searchQuery) {
        var text = (item.outputs && item.outputs[0] ? (item.outputs[0].text || item.outputs[0]) : '').toLowerCase();
        var inputText = JSON.stringify(item.input || {}).toLowerCase();
        if (text.indexOf(searchQuery) === -1 && inputText.indexOf(searchQuery) === -1) return false;
      }
      return true;
    });

    if (!filtered.length) {
      list.innerHTML = '<div class="cmn-empty"><div class="cmn-empty-icon">&#128214;</div><div class="cmn-empty-title">No generations yet</div><div class="cmn-empty-desc">Your AI-generated content will appear here. Start creating to build your library.</div></div>';
      return;
    }

    list.innerHTML = filtered.map(function(item) {
      var typeInfo = E && E.GENERATION_TYPES[item.type] ? E.GENERATION_TYPES[item.type] : { icon: '&#10024;', label: item.type };
      var preview = '';
      if (item.outputs && item.outputs.length) {
        preview = (item.outputs[0].text || item.outputs[0] || '').substring(0, 80);
      }
      var timeStr = E ? E.formatTimestamp(item.createdAt) : new Date(item.createdAt).toLocaleDateString();

      return '<div class="cmn-history-card" data-id="' + item.id + '">' +
        '<div class="cmn-history-type-icon">' + typeInfo.icon + '</div>' +
        '<div class="cmn-history-card-body">' +
          '<div class="cmn-history-card-type">' + typeInfo.label + (item.platform ? ' &middot; ' + item.platform : '') + '</div>' +
          '<div class="cmn-history-card-text">' + escapeHtml(preview) + '</div>' +
          '<div class="cmn-history-card-meta"><span>' + timeStr + '</span></div>' +
        '</div>' +
        '<div class="cmn-history-card-actions">' +
          '<button class="cmn-history-star' + (item.isFavorite ? ' active' : '') + '" data-id="' + item.id + '">&#11088;</button>' +
        '</div>' +
      '</div>';
    }).join('');

    // Card clicks
    list.querySelectorAll('.cmn-history-card').forEach(function(card) {
      card.onclick = function(e) {
        if (e.target.closest('.cmn-history-star')) return;
        openDetail(card.getAttribute('data-id'));
      };
    });

    // Star clicks
    list.querySelectorAll('.cmn-history-star').forEach(function(star) {
      star.onclick = function(e) {
        e.stopPropagation();
        toggleFavorite(star.getAttribute('data-id'));
      };
    });
  }

  function escapeHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── DETAIL ──
  function openDetail(id) {
    var history = getHistory();
    var item = history.find(function(h) { return h.id === id; });
    if (!item) return;
    selectedId = id;

    var typeInfo = E && E.GENERATION_TYPES[item.type] ? E.GENERATION_TYPES[item.type] : { label: item.type };
    document.getElementById('detailType').textContent = typeInfo.label + (item.platform ? ' · ' + item.platform : '');

    var text = item.outputs && item.outputs.length ? (item.outputs[0].text || item.outputs[0]) : 'No output';
    document.getElementById('detailContent').innerHTML = escapeHtml(text).replace(/\n/g, '<br>');

    document.getElementById('detailFavBtn').innerHTML = (item.isFavorite ? '&#11088; Unfavorite' : '&#9734; Favorite');
    document.getElementById('detailModal').style.display = '';
  }

  function toggleFavorite(id) {
    var history = getHistory();
    var item = history.find(function(h) { return h.id === id; });
    if (item) {
      item.isFavorite = !item.isFavorite;
      saveHistory(history);
      renderList();
    }
  }

  window._histCopy = function() {
    var text = document.getElementById('detailContent').innerText;
    navigator.clipboard.writeText(text).then(function() { toast('Copied!'); });
  };

  window._histWhatsApp = function() {
    var text = document.getElementById('detailContent').innerText;
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  };

  window._histToggleFav = function() {
    if (selectedId) toggleFavorite(selectedId);
    var history = getHistory();
    var item = history.find(function(h) { return h.id === selectedId; });
    if (item) document.getElementById('detailFavBtn').innerHTML = (item.isFavorite ? '&#11088; Unfavorite' : '&#9734; Favorite');
  };

  window._histDelete = function() {
    if (!selectedId || !confirm('Delete this generation?')) return;
    var history = getHistory().filter(function(h) { return h.id !== selectedId; });
    saveHistory(history);
    document.getElementById('detailModal').style.display = 'none';
    renderList();
    toast('Deleted');
  };

  // ── SEARCH ──
  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    renderList();
  });

  // ── INIT ──
  renderFilters();
  renderList();
}();
</script>
</body>
</html>
