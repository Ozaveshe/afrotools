<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Fuel Calculator — Africa | AfroTools</title>
<meta name="description" content="Generator fuel consumption calculator for Africa. Calculate diesel/petrol consumption, total liters, and cost based on kVA and usage hours.">
<link rel="canonical" href="https://afrotools.com/tools/generator-fuel">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Generator Fuel Calculator | AfroTools">
<meta property="og:description" content="Calculate generator fuel consumption. Plan your fuel costs for Africa. Diesel and petrol calculators.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/generator-fuel">
<meta property="og:site_name" content="AfroTools">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.min.css">
<link rel="stylesheet" href="/assets/css/global.min.css">
<script src="/assets/js/components/navbar.min.js" defer></script>
<script src="/assets/js/components/footer.min.js" defer></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '⚡'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .card { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .card + .card { margin-top: 18px; }
  .card-head { padding: 15px 22px; border-bottom: 1px solid #eaf5ec; background: #f7fdf8; }
  .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0a4018; }
  .card-body { padding: 22px; }
  .field { margin-bottom: 18px; }
  .f-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .f-label-text { font-size: 0.75rem; font-weight: 700; color: #0d2813; }
  .f-input { width: 100%; padding: 11px 13px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; font-size: 1rem; font-weight: 600; color: #0d2813; outline: none; font-family: 'DM Sans', sans-serif; }
  .f-input:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .preset-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .preset-btn { padding: 8px; font-size: 0.65rem; font-weight: 700; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 6px; cursor: pointer; color: #244d2c; transition: all 0.15s; }
  .preset-btn:hover { border-color: var(--afro-green); background: #edfaf0; }
  .preset-btn.on { background: var(--afro-green); color: #fff; border-color: var(--afro-green); }
  .calc-btn { width: 100%; padding: 14px; background: var(--afro-green); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .calc-btn:hover { background: #006d42; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 135, 81, 0.3); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  .result-box { background: #f7fdf8; border: 1px solid #c5deca; border-radius: 8px; padding: 14px; text-align: center; }
  .result-label { font-size: 0.65rem; font-weight: 700; color: #0a4018; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .result-value { font-size: 1.6rem; font-weight: 800; color: var(--afro-green); }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Generator Fuel <em>Calculator</em></h1>
    <p class="hero-sub">Calculate fuel consumption for generators in Africa. Plan diesel costs based on kVA and hours of operation.</p>
    <div class="hero-badges">
      <span class="badge b-green">Africa-Specific</span>
      <span class="badge b-green">Instant</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="card">
      <div class="card-head"><span class="card-title">Generator Specifications</span></div>
      <div class="card-body">
        <div class="field">
          <label class="f-label"><span class="f-label-text">Generator Size (kVA)</span></label>
          <div class="preset-btns">
            <button class="preset-btn" data-kva="2.5">2.5 kVA</button>
            <button class="preset-btn" data-kva="5">5 kVA</button>
            <button class="preset-btn" data-kva="10">10 kVA</button>
            <button class="preset-btn" data-kva="15">15 kVA</button>
            <button class="preset-btn" data-kva="25">25 kVA</button>
            <button class="preset-btn" data-kva="100">100 kVA</button>
          </div>
          <input type="number" id="kvaSizeInput" class="f-input" value="10" min="1" step="0.5">
        </div>

        <div class="field">
          <label class="f-label"><span class="f-label-text">Fuel Type</span></label>
          <select id="fuelType" class="f-input">
            <option value="diesel">Diesel</option>
            <option value="petrol">Petrol</option>
          </select>
        </div>

        <div class="field">
          <label class="f-label"><span class="f-label-text">Hours Per Day</span></label>
          <input type="number" id="hoursPerDay" class="f-input" value="8" min="1" max="24" step="0.5">
        </div>

        <div class="field">
          <label class="f-label"><span class="f-label-text">Days of Operation</span></label>
          <input type="number" id="days" class="f-input" value="30" min="1" step="1">
        </div>

        <div class="field">
          <label class="f-label"><span class="f-label-text">Fuel Price per Liter</span></label>
          <input type="number" id="fuelPrice" class="f-input" value="1200" min="0" step="10">
        </div>

        <button class="calc-btn" id="calcBtn">Calculate Fuel Consumption</button>

        <div class="result-grid" id="results" style="display:none;margin-top:18px;">
          <div class="result-box">
            <div class="result-label">Daily Consumption</div>
            <div class="result-value" id="dailyFuel">0 L</div>
          </div>
          <div class="result-box">
            <div class="result-label">Total Fuel Needed</div>
            <div class="result-value" id="totalFuel">0 L</div>
          </div>
          <div class="result-box" style="grid-column:1/-1;">
            <div class="result-label">Total Cost</div>
            <div class="result-value" id="totalCost">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const presetBtns = document.querySelectorAll('.preset-btn');
  const kvaSizeInput = document.getElementById('kvaSizeInput');
  const calcBtn = document.getElementById('calcBtn');
  const fuelType = document.getElementById('fuelType');

  presetBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const kva = btn.dataset.kva;
      kvaSizeInput.value = kva;
      presetBtns.forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
    });
  });

  kvaSizeInput.addEventListener('change', () => {
    presetBtns.forEach(b => {
      b.classList.toggle('on', b.dataset.kva === kvaSizeInput.value);
    });
  });

  calcBtn.addEventListener('click', () => {
    const kva = parseFloat(kvaSizeInput.value) || 10;
    const hours = parseFloat(document.getElementById('hoursPerDay').value) || 8;
    const days = parseFloat(document.getElementById('days').value) || 30;
    const price = parseFloat(document.getElementById('fuelPrice').value) || 1200;
    const fuel = fuelType.value;

    const consumption = fuel === 'diesel' ? kva * 0.205 : kva * 0.25;
    const dailyFuel = consumption * hours;
    const totalFuel = dailyFuel * days;
    const totalCost = totalFuel * price;

    document.getElementById('dailyFuel').textContent = dailyFuel.toFixed(2) + ' L';
    document.getElementById('totalFuel').textContent = totalFuel.toFixed(2) + ' L';
    document.getElementById('totalCost').textContent = totalCost.toFixed(0);
    document.getElementById('results').style.display = 'grid';
  });

  calcBtn.click();
</script>
</body>
</html>
