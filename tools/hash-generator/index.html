<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — MD5, SHA-256, SHA-512 | AfroTools</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-512 hashes. Text and file input. Hash comparison. Client-side processing.">
<link rel="canonical" href="https://afrotools.com/tools/hash-generator">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Hash Generator | AfroTools">
<meta property="og:description" content="Generate cryptographic hashes. MD5, SHA-1, SHA-256, SHA-512 support. File hashing included.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/hash-generator">
<meta property="og:site_name" content="AfroTools">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.min.css">
<link rel="stylesheet" href="/assets/css/global.min.css">
<script src="/assets/js/components/navbar.min.js" defer></script>
<script src="/assets/js/components/footer.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '#'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .card { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .card + .card { margin-top: 18px; }
  .card-head { padding: 15px 22px; border-bottom: 1px solid #eaf5ec; background: #f7fdf8; }
  .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0a4018; }
  .card-body { padding: 22px; }
  .field { margin-bottom: 18px; }
  .f-label { display: block; font-size: 0.75rem; font-weight: 700; color: #0d2813; margin-bottom: 8px; }
  .f-textarea { width: 100%; height: 140px; padding: 12px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; font-size: 0.85rem; color: #0d2813; outline: none; resize: vertical; font-family: 'Courier New', monospace; }
  .f-textarea:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .hash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hash-type { background: #f7fdf8; border: 1px solid #c5deca; border-radius: 8px; padding: 12px; }
  .hash-label { font-size: 0.65rem; font-weight: 700; color: #0a4018; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .hash-value { font-size: 0.75rem; color: #0d2813; font-family: 'Courier New', monospace; word-break: break-all; font-weight: 600; }
  .copy-hash { font-size: 0.65rem; color: var(--afro-green); cursor: pointer; margin-top: 6px; font-weight: 700; }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Hash <em>Generator</em></h1>
    <p class="hero-sub">Generate MD5, SHA-1, SHA-256, SHA-512 hashes instantly. Text or file input. Compare hashes.</p>
    <div class="hero-badges">
      <span class="badge b-green">Multiple Algorithms</span>
      <span class="badge b-green">Secure</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="card">
      <div class="card-head"><span class="card-title">Hash Input</span></div>
      <div class="card-body">
        <div class="field">
          <label class="f-label">Text Input</label>
          <textarea id="textInput" class="f-textarea" placeholder="Enter text to hash..."></textarea>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Hash Results</span></div>
      <div class="card-body">
        <div class="hash-grid">
          <div class="hash-type">
            <div class="hash-label">MD5</div>
            <div class="hash-value" id="md5Hash">-</div>
            <div class="copy-hash" onclick="copyHash('md5Hash')">Copy</div>
          </div>
          <div class="hash-type">
            <div class="hash-label">SHA-1</div>
            <div class="hash-value" id="sha1Hash">-</div>
            <div class="copy-hash" onclick="copyHash('sha1Hash')">Copy</div>
          </div>
          <div class="hash-type">
            <div class="hash-label">SHA-256</div>
            <div class="hash-value" id="sha256Hash">-</div>
            <div class="copy-hash" onclick="copyHash('sha256Hash')">Copy</div>
          </div>
          <div class="hash-type">
            <div class="hash-label">SHA-512</div>
            <div class="hash-value" id="sha512Hash">-</div>
            <div class="copy-hash" onclick="copyHash('sha512Hash')">Copy</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const textInput = document.getElementById('textInput');

  function generateHashes() {
    const text = textInput.value;
    document.getElementById('md5Hash').textContent = CryptoJS.MD5(text).toString();
    document.getElementById('sha1Hash').textContent = CryptoJS.SHA1(text).toString();
    document.getElementById('sha256Hash').textContent = CryptoJS.SHA256(text).toString();
    document.getElementById('sha512Hash').textContent = CryptoJS.SHA512(text).toString();
  }

  function copyHash(id) {
    const el = document.getElementById(id);
    const text = el.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const orig = el.parentElement.lastElementChild.textContent;
      el.parentElement.lastElementChild.textContent = 'Copied!';
      setTimeout(() => {
        el.parentElement.lastElementChild.textContent = orig;
      }, 2000);
    });
  }

  textInput.addEventListener('input', generateHashes);
  generateHashes();
</script>
</body>
</html>
