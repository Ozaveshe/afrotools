<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor — Live Preview | AfroTools</title>
<meta name="description" content="Free markdown editor with live preview. Write markdown on the left, see rendered HTML on the right. Formatting toolbar included. Export to HTML.">
<link rel="canonical" href="https://afrotools.com/tools/markdown-editor">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Markdown Editor | AfroTools">
<meta property="og:description" content="Edit markdown with live preview. Export to HTML instantly.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/markdown-editor">
<meta property="og:image" content="https://afrotools.com/assets/img/og-image.png">
<meta property="og:site_name" content="AfroTools">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Markdown Editor | AfroTools">
<meta name="twitter:description" content="Free markdown editor with live preview.">
<meta name="robots" content="index, follow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/global.css">
<script src="/assets/js/components/navbar.js" defer></script>
<script src="/assets/js/components/footer.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --afro-green: #008751;
    --afro-dark: #0f1419;
    --afro-light: #f5f7fa;
  }

  .tool-hero {
    background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%);
    padding: 44px 0 36px;
    position: relative;
    overflow: hidden;
  }

  .tool-hero::after {
    content: '📝';
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8rem;
    opacity: 0.06;
    pointer-events: none;
  }

  .tool-hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
  }

  .breadcrumb {
    font-size: 0.72rem;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .breadcrumb a {
    color: rgba(255, 255, 255, 0.3);
    text-decoration: none;
  }

  .breadcrumb span {
    color: var(--afro-green);
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  h1 em {
    color: var(--afro-green);
    font-style: normal;
  }

  .hero-sub {
    font-size: 0.88rem;
    color: rgba(255, 255, 255, 0.45);
    line-height: 1.6;
    max-width: 560px;
    margin-bottom: 14px;
  }

  .hero-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 6px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .b-green {
    background: rgba(0, 135, 81, 0.18);
    color: #5ddb9e;
    border: 1px solid rgba(0, 135, 81, 0.38);
  }

  .tool-main {
    padding: 28px 0 72px;
  }

  .tool-main-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .editor-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 18px;
  }

  .editor-panel {
    background: #fff;
    border: 1px solid #dceee0;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05);
  }

  .panel-head {
    padding: 15px 22px;
    border-bottom: 1px solid #eaf5ec;
    background: #f7fdf8;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #0a4018;
  }

  .panel-toolbar {
    padding: 10px 12px;
    border-bottom: 1px solid #eaf5ec;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .toolbar-btn {
    padding: 6px 10px;
    background: #f4fbf5;
    border: 1.5px solid #c5deca;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    font-weight: 700;
    color: #244d2c;
    font-family: monospace;
    transition: all 0.15s;
  }

  .toolbar-btn:hover {
    border-color: var(--afro-green);
    background: rgba(0, 135, 81, 0.05);
  }

  .editor-area {
    flex: 1;
    padding: 16px;
    overflow: hidden;
    display: flex;
  }

  #editor {
    width: 100%;
    height: 100%;
    background: #f4fbf5;
    border: 1.5px solid #c5deca;
    border-radius: 6px;
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    color: #0d2813;
    outline: none;
    font-family: monospace;
    resize: none;
  }

  #editor:focus {
    border-color: var(--afro-green);
    box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
  }

  #preview {
    width: 100%;
    padding: 12px;
    overflow-y: auto;
    font-size: 1rem;
    color: #244d2c;
    line-height: 1.6;
  }

  #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
    color: #0a4018;
    font-weight: 700;
    margin-top: 16px;
    margin-bottom: 8px;
  }

  #preview h1 { font-size: 1.8rem; }
  #preview h2 { font-size: 1.5rem; }
  #preview h3 { font-size: 1.3rem; }

  #preview p {
    margin-bottom: 12px;
  }

  #preview code {
    background: rgba(0, 135, 81, 0.05);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 0.9rem;
    color: #005c3d;
  }

  #preview pre {
    background: #f4fbf5;
    border: 1px solid #c5deca;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 12px 0;
  }

  #preview pre code {
    background: none;
    padding: 0;
  }

  #preview ul, #preview ol {
    margin-left: 20px;
    margin-bottom: 12px;
  }

  #preview li {
    margin-bottom: 4px;
  }

  #preview a {
    color: var(--afro-green);
    text-decoration: underline;
    cursor: pointer;
  }

  #preview blockquote {
    border-left: 3px solid var(--afro-green);
    margin: 12px 0;
    padding-left: 12px;
    color: #7dab87;
  }

  .export-section {
    display: flex;
    gap: 12px;
  }

  .export-btn {
    flex: 1;
    padding: 12px;
    background: var(--afro-green);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'DM Sans', sans-serif;
  }

  .export-btn:hover {
    background: #006d42;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0, 135, 81, 0.3);
  }

  @media (max-width: 1024px) {
    .editor-container {
      grid-template-columns: 1fr;
      min-height: 400px;
    }

    #editor {
      height: 400px;
    }

    #preview {
      height: 400px;
    }
  }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb">
      <a href="/">AfroTools</a> / <span>Tools</span>
    </div>
    <h1>Markdown <em>Editor</em></h1>
    <p class="hero-sub">Write markdown with live preview. Formatting toolbar included. Export to HTML with a single click.</p>
    <div class="hero-badges">
      <span class="badge b-green">Live Preview</span>
      <span class="badge b-green">Export HTML</span>
      <span class="badge b-green">Instant</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="editor-container">
      <!-- Editor Panel -->
      <div class="editor-panel">
        <div class="panel-head">Editor</div>
        <div class="panel-toolbar">
          <button class="toolbar-btn" data-insert="# ">H1</button>
          <button class="toolbar-btn" data-insert="## ">H2</button>
          <button class="toolbar-btn" data-insert="### ">H3</button>
          <button class="toolbar-btn" data-insert="**bold**">Bold</button>
          <button class="toolbar-btn" data-insert="*italic*">Italic</button>
          <button class="toolbar-btn" data-insert="`code`">Code</button>
          <button class="toolbar-btn" data-insert="- ">List</button>
          <button class="toolbar-btn" data-insert="[link](url)">Link</button>
          <button class="toolbar-btn" data-insert="> ">Quote</button>
          <button class="toolbar-btn" data-insert="|  |  |\n|--|--|\n|  |  |">Table</button>
        </div>
        <div class="editor-area">
          <textarea id="editor" placeholder="# Write markdown here...&#10;&#10;This is a **markdown** editor with live preview.&#10;&#10;- Bullet points&#10;- And lists&#10;&#10;[Links](https://example.com) work too!"></textarea>
        </div>
      </div>

      <!-- Preview Panel -->
      <div class="editor-panel">
        <div class="panel-head">Preview</div>
        <div id="preview"></div>
      </div>
    </div>

    <!-- Export Section -->
    <div class="export-section">
      <button class="export-btn" id="exportHTMLBtn">📥 Export as HTML</button>
      <button class="export-btn" id="copyHTMLBtn">📋 Copy HTML</button>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const exportHTMLBtn = document.getElementById('exportHTMLBtn');
  const copyHTMLBtn = document.getElementById('copyHTMLBtn');
  const toolbarBtns = document.querySelectorAll('.toolbar-btn');

  function updatePreview() {
    const markdown = editor.value;
    const html = marked.parse(markdown);
    preview.innerHTML = html;
  }

  editor.addEventListener('input', updatePreview);

  toolbarBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.insert;
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const selectedText = editor.value.substring(start, end);
      const newText = editor.value.substring(0, start) + text + selectedText + editor.value.substring(end);
      editor.value = newText;
      editor.focus();
      editor.selectionStart = start + text.length;
      updatePreview();
    });
  });

  exportHTMLBtn.addEventListener('click', () => {
    const html = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    h1, h2, h3 { color: #008751; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
    pre { background: #f0f0f0; padding: 12px; border-radius: 6px; overflow-x: auto; }
    blockquote { border-left: 3px solid #008751; margin: 12px 0; padding-left: 12px; }
  </style>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'document.html';
    a.click();
    URL.revokeObjectURL(url);
  });

  copyHTMLBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(preview.innerHTML);
    copyHTMLBtn.textContent = '✓ Copied!';
    setTimeout(() => copyHTMLBtn.textContent = '📋 Copy HTML', 2000);
  });

  // Initial preview
  updatePreview();
</script>
</body>
</html>
