<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta http-equiv="refresh" content="0;url=/engineering/floor-planner/">
<title>Redirecting to AfroPlan Floor Planner</title>
<link rel="canonical" href="/engineering/floor-planner/">
<script src="/assets/js/lib/toast.js" defer></script>
<script src="/assets/js/afro-history.js" defer></script>
<script src="/assets/js/components/save-result-button.js" defer></script>
<script src="/assets/js/components/share-card-generator.js" defer></script>
<script src="/assets/js/components/share-button.js" defer></script>
</head>
<body>
<p>This tool has moved to <a href="/engineering/floor-planner/">AfroPlan Floor Planner</a>.</p>

<script>
// Save/Share buttons — manual placement needed
(function(){
  var containers = document.querySelectorAll('.card, .tool-card, .calculator-card, [class*="result"]');
  var target = containers.length > 0 ? containers[containers.length - 1] : document.querySelector('main') || document.body;
  var div = document.createElement('div');
  div.className = 'result-actions';
  div.style.cssText = 'display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;padding:0 22px 16px';
  div.innerHTML = '<save-result-button tool-slug="floor-plan" tool-name="Floor Plan"></save-result-button><share-result-button tool-name="Floor Plan" tool-slug="floor-plan"></share-result-button>';
  target.appendChild(div);
})();
</script>
</body>
</html>
