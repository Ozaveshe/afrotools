<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — Characters, Words, Sentences, Reading Time | AfroTools</title>
<meta name="description" content="Free word counter tool. Count words, characters, sentences, paragraphs, and reading time. Real-time analysis.">
<link rel="canonical" href="https://afrotools.com/tools/word-counter">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Word Counter | AfroTools">

<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/word-counter">
<meta property="og:site_name" content="AfroTools">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/global.min.css">

<script src="/assets/js/components/footer.min.js" defer></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '📝'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
  .card { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .card + .card { margin-top: 18px; }
  .card-head { padding: 15px 22px; border-bottom: 1px solid #eaf5ec; background: #f7fdf8; }
  .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0a4018; }
  .card-body { padding: 22px; }
  .f-textarea { width: 100%; min-height: 220px; padding: 13px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; font-size: 0.95rem; font-weight: 500; color: #0d2813; outline: none; resize: vertical; font-family: 'DM Sans', sans-serif; }
  .f-textarea:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 18px; }
  .stat-box { background: #f7fdf8; border: 1px solid #c5deca; border-radius: 8px; padding: 14px; text-align: center; }
  .stat-label { font-size: 0.68rem; font-weight: 700; color: #0a4018; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--afro-green); }
  .clear-btn { width: 100%; padding: 11px; background: rgba(192, 57, 43, 0.1); border: 1.5px solid rgba(192, 57, 43, 0.35); color: #8b2e1f; border-radius: 7px; cursor: pointer; font-size: 0.72rem; font-weight: 700; transition: all 0.15s; margin-top: 12px; }
  .clear-btn:hover { background: rgba(192, 57, 43, 0.2); }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Word <em>Counter</em></h1>
    <p class="hero-sub">Count words, characters, sentences, and paragraphs. Real-time analysis and reading time estimation.</p>
    <div class="hero-badges">
      <span class="badge b-green">Real-time</span>
      <span class="badge b-green">Live Stats</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="card">
      <div class="card-head"><span class="card-title">Text Input</span></div>
      <div class="card-body">
        <textarea id="textInput" class="f-textarea" placeholder="Paste or type your text here..."></textarea>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Words</div>
            <div class="stat-value" id="wordCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Characters</div>
            <div class="stat-value" id="charCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Sentences</div>
            <div class="stat-value" id="sentenceCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Paragraphs</div>
            <div class="stat-value" id="paraCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Reading Time</div>
            <div class="stat-value" id="readTime">0 min</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Avg. Word Length</div>
            <div class="stat-value" id="avgLength">0</div>
          </div>
        </div>

        <button class="clear-btn" id="clearBtn">Clear Text</button>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const textarea = document.getElementById('textInput');
  const wordCount = document.getElementById('wordCount');
  const charCount = document.getElementById('charCount');
  const sentenceCount = document.getElementById('sentenceCount');
  const paraCount = document.getElementById('paraCount');
  const readTime = document.getElementById('readTime');
  const avgLength = document.getElementById('avgLength');
  const clearBtn = document.getElementById('clearBtn');

  function updateStats() {
    const text = textarea.value;

    const chars = text.length;
    const charsNoSpace = text.replace(/\s/g, '').length;
    
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    
    const sentences = text.match(/[.!?]+/g)?.length || 0;
    
    const paras = text.trim().split(/\n\n+/).filter(p => p.trim()).length;
    
    const avgWL = words > 0 ? (charsNoSpace / words).toFixed(1) : 0;
    
    const readMinutes = Math.ceil(words / 200) || 0;

    wordCount.textContent = words;
    charCount.textContent = chars;
    sentenceCount.textContent = sentences;
    paraCount.textContent = paras;
    readTime.textContent = readMinutes + ' min';
    avgLength.textContent = avgWL;
  }

  textarea.addEventListener('input', updateStats);
  clearBtn.addEventListener('click', () => {
    textarea.value = '';
    updateStats();
  });

  updateStats();
</script>
</body>
</html>
