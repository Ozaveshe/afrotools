<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#0f1419;line-height:1.6;margin:0}
.hero{background:linear-gradient(135deg,#1a1000 0%,#1e293b 40%,#1e3a5f 100%);padding:48px 0 40px;color:#fff}
.container{max-width:900px;margin:0 auto;padding:0 24px}
.bc{font-size:.72rem;color:rgba(255,255,255,.6);padding-bottom:16px}
.bc a{color:rgba(255,255,255,.6);text-decoration:none}.bc a:hover{color:#fff}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{padding:4px 12px;border-radius:6px;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-multi{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.badge-free{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.hero h1{font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:800;margin:0 0 10px;line-height:1.1;color:#fff}
.hero h1 em{color:#fbbf24;font-style:normal}
.hero-sub{font-size:.93rem;color:rgba(255,255,255,.85);max-width:520px;margin:0}
.card{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card h2{font-size:1.1rem;font-weight:700;margin:0 0 1rem;color:#111}
label{display:block;font-weight:600;font-size:.88rem;margin-bottom:.3rem;color:#374151}
select,input[type=number]{width:100%;padding:.6rem .85rem;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:.93rem;transition:border .2s;background:#fff}
select:focus,input:focus{outline:none;border-color:var(--color-primary)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.5rem;border:none;border-radius:10px;font-family:inherit;font-size:.93rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--color-primary);color:#fff}
.btn:hover{background:#0063D1;transform:translateY(-1px)}
.result-box{display:none;margin-top:1rem}
.result-box.show{display:block}
.result-hero{background:linear-gradient(135deg,#1e293b,#1e3a5f);color:#fff;border-radius:14px;padding:1.5rem;text-align:center;margin-bottom:1rem}
.result-hero .score{font-size:3.5rem;font-weight:800;color:#fbbf24;line-height:1}
.result-hero .score-lbl{font-size:.85rem;color:rgba(255,255,255,.75);margin-top:.25rem}
.result-hero .verdict{margin-top:.75rem;padding:.6rem 1rem;background:rgba(255,255,255,.1);border-radius:8px;font-size:.88rem}
.prog-list{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem}
.prog-item{padding:.75rem 1rem;border-radius:10px;font-size:.85rem}
.prog-item.eligible{background:#f0fdf4;border:1.5px solid #86efac;color:#166534}
.prog-item.borderline{background:#fffbeb;border:1.5px solid #fcd34d;color:#92400e}
.prog-item.ineligible{background:#f9fafb;border:1.5px solid #e5e7eb;color:#9ca3af}
.prog-name{font-weight:700;margin-bottom:.2rem}
.prog-req{font-size:.75rem}
.system-panel{display:none}
.system-panel.active{display:block}
.sec-body{padding:40px 0}
@media(max-width:600px){.row{grid-template-columns:1fr}.prog-list{grid-template-columns:1fr}}
</style>

<body>
<afro-navbar theme="dark" active="education"></afro-navbar>
<div class="hero">
  <div class="container">
    <nav class="bc"><a href="/">AfroTools</a> / <a href="/education/">Education</a> / University Admission Points</nav>
    <div class="badges">
      <span class="badge badge-multi">Multi-Country</span>
      <span class="badge badge-free">Free Tool</span>
    </div>
    <h1>University Admission <em>Points Calculator</em></h1>
    <p class="hero-sub">Calculate your university admission points for Nigeria (JAMB+WAEC), Kenya (KCSE), South Africa (APS), Ghana (WASSCE) and Zimbabwe (A-Levels).</p>
  </div>
</div>

<div class="sec-body">
<div class="container">

<div class="card">
  <h2>Select Country &amp; Exam System</h2>
  <div class="row">
    <div>
      <label for="ua-country">Country</label>
      <select id="ua-country" onchange="switchSystem()">
        <option value="nigeria">Nigeria — JAMB + WAEC/NECO</option>
        <option value="kenya">Kenya — KCSE Mean Grade</option>
        <option value="southafrica">South Africa — NSC / Matric APS</option>
        <option value="ghana">Ghana — WASSCE</option>
        <option value="zimbabwe">Zimbabwe — A-Level / ZIMSEC</option>
      </select>
    </div>
    <div>
      <label for="ua-program">Target Programme</label>
      <select id="ua-program">
        <option value="medicine">Medicine / Dentistry</option>
        <option value="engineering">Engineering / Technology</option>
        <option value="law">Law</option>
        <option value="business">Business / Accounting</option>
        <option value="sciences">Natural Sciences</option>
        <option value="arts">Arts / Humanities / Education</option>
        <option value="pharmacy">Pharmacy / Medical Sciences</option>
      </select>
    </div>
  </div>

  <!-- Nigeria panel -->
  <div class="system-panel active" id="panel-nigeria">
    <div class="row">
      <div>
        <label for="ng-jamb">JAMB Score (max 400)</label>
        <input type="number" id="ng-jamb" placeholder="e.g. 280" min="0" max="400">
      </div>
      <div>
        <label for="ng-waec">WAEC/NECO Aggregate (best 5, 5–45)</label>
        <input type="number" id="ng-waec" placeholder="e.g. 15" min="5" max="45">
      </div>
    </div>
  </div>

  <!-- Kenya panel -->
  <div class="system-panel" id="panel-kenya">
    <div class="row">
      <div>
        <label for="ke-grade">KCSE Mean Grade</label>
        <select id="ke-grade">
          <option value="12">A (12 points)</option>
          <option value="11">A- (11 points)</option>
          <option value="10">B+ (10 points)</option>
          <option value="9">B (9 points)</option>
          <option value="8">B- (8 points)</option>
          <option value="7">C+ (7 points)</option>
          <option value="6">C (6 points)</option>
          <option value="5">C- (5 points)</option>
          <option value="4">D+ (4 points)</option>
        </select>
      </div>
      <div></div>
    </div>
  </div>

  <!-- South Africa panel -->
  <div class="system-panel" id="panel-southafrica">
    <div class="row">
      <div>
        <label for="sa-aps">APS Score (6–42)</label>
        <input type="number" id="sa-aps" placeholder="e.g. 32" min="6" max="42">
      </div>
      <div>
        <label for="sa-maths">Maths Level (1–7)</label>
        <input type="number" id="sa-maths" placeholder="e.g. 6" min="1" max="7">
      </div>
    </div>
  </div>

  <!-- Ghana panel -->
  <div class="system-panel" id="panel-ghana">
    <div class="row">
      <div>
        <label for="gh-agg">WASSCE Aggregate (best 6, 6–54)</label>
        <input type="number" id="gh-agg" placeholder="e.g. 12" min="6" max="54">
      </div>
      <div></div>
    </div>
  </div>

  <!-- Zimbabwe panel -->
  <div class="system-panel" id="panel-zimbabwe">
    <div class="row">
      <div>
        <label for="zw-points">A-Level Points (3 subjects max)</label>
        <input type="number" id="zw-points" placeholder="e.g. 10" min="0" max="15">
      </div>
      <div>
        <label for="zw-olevel">O-Level Credits (5+)</label>
        <input type="number" id="zw-olevel" placeholder="e.g. 8" min="0" max="10">
      </div>
    </div>
  </div>

  <button class="btn" onclick="calcAdmission()">Check Eligibility</button>

  <div class="result-box" id="ua-result">
    <div class="result-hero" id="ua-hero"></div>
    <div class="prog-list" id="ua-programs"></div>
  </div>
</div>

</div>
</div>

<afro-footer></afro-footer>
<script>
var PROGRAMS={
  nigeria:{medicine:{jamb:320,waec:8,name:'Medicine'},engineering:{jamb:240,waec:14,name:'Engineering'},law:{jamb:250,waec:10,name:'Law'},business:{jamb:200,waec:16,name:'Business/Accounting'},sciences:{jamb:220,waec:14,name:'Natural Sciences'},arts:{jamb:180,waec:18,name:'Arts/Education'},pharmacy:{jamb:280,waec:10,name:'Pharmacy'}},
  kenya:{medicine:{grade:10,name:'Medicine'},engineering:{grade:9,name:'Engineering'},law:{grade:9,name:'Law'},business:{grade:8,name:'Business'},sciences:{grade:9,name:'Sciences'},arts:{grade:7,name:'Arts/Education'},pharmacy:{grade:9,name:'Pharmacy'}},
  southafrica:{medicine:{aps:38,maths:6,name:'Medicine'},engineering:{aps:35,maths:6,name:'Engineering'},law:{aps:32,maths:4,name:'Law'},business:{aps:28,maths:5,name:'Business'},sciences:{aps:32,maths:6,name:'Sciences'},arts:{aps:24,maths:3,name:'Arts/Education'},pharmacy:{aps:34,maths:5,name:'Pharmacy'}},
  ghana:{medicine:{agg:6,name:'Medicine'},engineering:{agg:12,name:'Engineering'},law:{agg:10,name:'Law'},business:{agg:18,name:'Business'},sciences:{agg:12,name:'Sciences'},arts:{agg:24,name:'Arts/Education'},pharmacy:{agg:9,name:'Pharmacy'}},
  zimbabwe:{medicine:{points:10,name:'Medicine'},engineering:{points:8,name:'Engineering'},law:{points:8,name:'Law'},business:{points:6,name:'Business'},sciences:{points:8,name:'Sciences'},arts:{points:5,name:'Arts/Education'},pharmacy:{points:9,name:'Pharmacy'}}
};
function switchSystem(){
  var country=document.getElementById('ua-country').value;
  document.querySelectorAll('.system-panel').forEach(function(p){p.classList.remove('active');});
  var panel=document.getElementById('panel-'+country);
  if(panel)panel.classList.add('active');
}
function calcAdmission(){
  var country=document.getElementById('ua-country').value;
  var targetProg=document.getElementById('ua-program').value;
  var score,scoreLabel,maxScore,verdict,heroText;
  var eligible={};
  if(country==='nigeria'){
    var jamb=parseInt(document.getElementById('ng-jamb').value)||0;
    var waec=parseInt(document.getElementById('ng-waec').value)||99;
    score=jamb;scoreLabel='JAMB Score';maxScore=400;
    var progs=PROGRAMS.nigeria;
    Object.keys(progs).forEach(function(p){
      eligible[p]=(jamb>=progs[p].jamb&&waec<=progs[p].waec)?'eligible':(jamb>=progs[p].jamb*0.9&&waec<=progs[p].waec+3)?'borderline':'ineligible';
    });
    verdict=jamb>=progs[targetProg].jamb&&waec<=progs[targetProg].waec?'Eligible for '+progs[targetProg].name+' (JAMB '+jamb+' ≥ '+progs[targetProg].jamb+', Aggregate '+waec+' ≤ '+progs[targetProg].waec+')':'Not yet eligible. Need JAMB '+progs[targetProg].jamb+'+ and WAEC aggregate ≤'+progs[targetProg].waec+'.';
  } else if(country==='kenya'){
    score=parseInt(document.getElementById('ke-grade').value)||0;scoreLabel='KCSE Points';maxScore=12;
    var progs=PROGRAMS.kenya;
    Object.keys(progs).forEach(function(p){eligible[p]=score>=progs[p].grade?'eligible':score===progs[p].grade-1?'borderline':'ineligible';});
    var gradeNames={12:'A',11:'A-',10:'B+',9:'B',8:'B-',7:'C+',6:'C',5:'C-',4:'D+'};
    verdict=score>=progs[targetProg].grade?'Eligible for '+progs[targetProg].name+' (Grade '+gradeNames[score]+' ≥ required '+gradeNames[progs[targetProg].grade]+')':'Not yet eligible. Need grade '+gradeNames[progs[targetProg].grade]+' or above for '+progs[targetProg].name+'.';
  } else if(country==='southafrica'){
    score=parseInt(document.getElementById('sa-aps').value)||0;var maths=parseInt(document.getElementById('sa-maths').value)||0;
    scoreLabel='APS Score';maxScore=42;
    var progs=PROGRAMS.southafrica;
    Object.keys(progs).forEach(function(p){eligible[p]=(score>=progs[p].aps&&maths>=progs[p].maths)?'eligible':(score>=progs[p].aps-3)?'borderline':'ineligible';});
    verdict=score>=progs[targetProg].aps&&maths>=progs[targetProg].maths?'Eligible for '+progs[targetProg].name+' (APS '+score+' ≥ '+progs[targetProg].aps+', Maths '+maths+' ≥ '+progs[targetProg].maths+')':'Not yet eligible. Need APS '+progs[targetProg].aps+'+ and Maths level '+progs[targetProg].maths+'+.';
  } else if(country==='ghana'){
    score=parseInt(document.getElementById('gh-agg').value)||99;scoreLabel='WASSCE Aggregate';maxScore=6;
    var progs=PROGRAMS.ghana;
    Object.keys(progs).forEach(function(p){eligible[p]=score<=progs[p].agg?'eligible':score<=progs[p].agg+3?'borderline':'ineligible';});
    verdict=score<=progs[targetProg].agg?'Eligible for '+progs[targetProg].name+' (Aggregate '+score+' ≤ cutoff '+progs[targetProg].agg+')':'Not yet eligible. Need aggregate of '+progs[targetProg].agg+' or better (lower is better).';
  } else {
    score=parseInt(document.getElementById('zw-points').value)||0;scoreLabel='A-Level Points';maxScore=15;
    var progs=PROGRAMS.zimbabwe;
    Object.keys(progs).forEach(function(p){eligible[p]=score>=progs[p].points?'eligible':score===progs[p].points-1?'borderline':'ineligible';});
    verdict=score>=progs[targetProg].points?'Eligible for '+progs[targetProg].name+' ('+score+' points ≥ '+progs[targetProg].points+' required)':'Not yet eligible. Need '+progs[targetProg].points+' A-Level points for '+progs[targetProg].name+'.';
  }
  document.getElementById('ua-hero').innerHTML='<div class="score">'+score+'</div><div class="score-lbl">'+scoreLabel+' (max '+maxScore+')</div><div class="verdict">'+verdict+'</div>';
  var progNames={medicine:'Medicine / Dentistry',engineering:'Engineering / Technology',law:'Law',business:'Business / Accounting',sciences:'Natural Sciences',arts:'Arts / Humanities / Education',pharmacy:'Pharmacy / Medical Sciences'};
  var html='';
  Object.keys(eligible).forEach(function(p){
    var status=eligible[p];
    var statusTxt=status==='eligible'?'✓ Likely Eligible':status==='borderline'?'⚡ Borderline':'✗ Not Eligible';
    html+='<div class="prog-item '+status+'"><div class="prog-name">'+progNames[p]+'</div><div class="prog-req">'+statusTxt+'</div></div>';
  });
  document.getElementById('ua-programs').innerHTML=html;
  document.getElementById('ua-result').classList.add('show');
}
</script>
</body>
</html>
