<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/global.min.css">

<script src="/assets/js/components/footer.min.js" defer></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '🔄'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .card { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .card-head { padding: 15px 22px; border-bottom: 1px solid #eaf5ec; background: #f7fdf8; }
  .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0a4018; }
  .card-body { padding: 22px; }
  .converter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .f-label { display: block; font-size: 0.75rem; font-weight: 700; color: #0d2813; margin-bottom: 8px; }
  .f-select { width: 100%; padding: 8px 12px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 6px; font-size: 0.85rem; font-weight: 600; color: #0d2813; outline: none; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; }
  .f-select:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .f-textarea { width: 100%; height: 300px; padding: 12px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; font-size: 0.85rem; color: #0d2813; outline: none; resize: vertical; font-family: 'Courier New', monospace; }
  .f-textarea:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .convert-btn { width: 100%; padding: 14px; background: var(--afro-green); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; margin-top: 20px; }
  .convert-btn:hover { background: #006d42; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 135, 81, 0.3); }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .act-btn { padding: 10px; font-size: 0.72rem; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'DM Sans', sans-serif; background: rgba(0, 135, 81, 0.1); border: 1.5px solid rgba(0, 135, 81, 0.35); color: #1a5c3a; }
  .act-btn:hover { background: rgba(0, 135, 81, 0.2); }
  @media (max-width: 768px) { .converter-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Data Format <em>Converter</em></h1>
    <p class="hero-sub">Convert between JSON, CSV, and XML formats. Paste data, convert, and download instantly.</p>
    <div class="hero-badges">
      <span class="badge b-green">3 Formats</span>
      <span class="badge b-green">Instant</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="card">
      <div class="card-head"><span class="card-title">Data Converter</span></div>
      <div class="card-body">
        <div class="converter-grid">
          <div>
            <label class="f-label">From Format</label>
            <select id="fromFormat" class="f-select">
              <option value="json">JSON</option>
              <option value="csv">CSV</option>
              <option value="xml">XML</option>
            </select>
            <textarea id="inputData" class="f-textarea" placeholder="Paste your data here..."></textarea>
          </div>

          <div>
            <label class="f-label">To Format</label>
            <select id="toFormat" class="f-select">
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
              <option value="xml">XML</option>
            </select>
            <textarea id="outputData" class="f-textarea" readonly placeholder="Converted output will appear here..."></textarea>
            <div class="action-row">
              <button class="act-btn" id="copyBtn">📋 Copy</button>
              <button class="act-btn" id="downloadBtn">📥 Download</button>
            </div>
          </div>
        </div>

        <button class="convert-btn" id="convertBtn">Convert</button>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const inputData = document.getElementById('inputData');
  const outputData = document.getElementById('outputData');
  const fromFormat = document.getElementById('fromFormat');
  const toFormat = document.getElementById('toFormat');
  const convertBtn = document.getElementById('convertBtn');
  const copyBtn = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');

  function jsonToCsv(obj) {
    const arr = Array.isArray(obj) ? obj : [obj];
    if (arr.length === 0) return '';
    const keys = Object.keys(arr[0]);
    const csv = [keys.join(','), ...arr.map(o => keys.map(k => `"${(o[k] || '').toString().replace(/"/g, '""')}"`).join(','))].join('\n');
    return csv;
  }

  function csvToJson(csv) {
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    const json = lines.slice(1).map(line => {
      const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
      const obj = {};
      headers.forEach((h, i) => obj[h] = values[i] || '');
      return obj;
    });
    return JSON.stringify(json, null, 2);
  }

  function jsonToXml(obj, rootName = 'root') {
    const escapeXml = str => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<${rootName}>`;
    const buildXml = (o, indent = '  ') => {
      if (Array.isArray(o)) {
        return o.map(item => buildXml(item, indent)).join('');
      }
      if (typeof o === 'object') {
        let result = '';
        for (const key in o) {
          const val = o[key];
          result += `\n${indent}<${key}>`;
          if (typeof val === 'object') result += buildXml(val, indent + '  ');
          else result += escapeXml(val);
          result += `</${key}>`;
        }
        return result;
      }
      return escapeXml(o);
    };
    xml += buildXml(obj);
    xml += `\n</${rootName}>`;
    return xml;
  }

  function xmlToJson(xmlStr) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlStr, 'text/xml');
    const toJson = (node) => {
      const obj = {};
      if (node.children.length === 0) return node.textContent.trim() || null;
      for (const child of node.children) {
        const name = child.nodeName;
        const value = toJson(child);
        obj[name] = obj[name] ? (Array.isArray(obj[name]) ? [...obj[name], value] : [obj[name], value]) : value;
      }
      return obj;
    };
    return JSON.stringify(toJson(xml.documentElement), null, 2);
  }

  function convert() {
    try {
      const input = inputData.value.trim();
      let output = '';
      const from = fromFormat.value;
      const to = toFormat.value;

      if (from === 'json') {
        const json = JSON.parse(input);
        if (to === 'csv') output = jsonToCsv(json);
        else if (to === 'xml') output = jsonToXml(json);
      } else if (from === 'csv') {
        if (to === 'json') output = csvToJson(input);
      } else if (from === 'xml') {
        if (to === 'json') output = xmlToJson(input);
      }

      outputData.value = output;
    } catch (e) {
      outputData.value = 'Error: ' + e.message;
    }
  }

  convertBtn.addEventListener('click', convert);
  copyBtn.addEventListener('click', () => {
    outputData.select();
    document.execCommand('copy');
  });
  downloadBtn.addEventListener('click', () => {
    const ext = toFormat.value;
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([outputData.value], { type: 'text/plain' }));
    link.download = `data.${ext}`;
    link.click();
  });
</script>
</body>
</html>
