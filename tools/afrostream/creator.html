<script>
/* ===== NO DEMO DATA — API only ===== */
var DEMO_CREATORS = [
];

/* ===== COUNTRY META (name → code + flag) ===== */
var COUNTRY_META = {
  'Nigeria':      {code:'NG', flag:'\u{1F1F3}\u{1F1EC}'},
  'Kenya':        {code:'KE', flag:'\u{1F1F0}\u{1F1EA}'},
  'South Africa': {code:'ZA', flag:'\u{1F1FF}\u{1F1E6}'},
  'Ghana':        {code:'GH', flag:'\u{1F1EC}\u{1F1ED}'},
  'Egypt':        {code:'EG', flag:'\u{1F1EA}\u{1F1EC}'},
  'Tanzania':     {code:'TZ', flag:'\u{1F1F9}\u{1F1FF}'},
  'Uganda':       {code:'UG', flag:'\u{1F1FA}\u{1F1EC}'},
  'Senegal':      {code:'SN', flag:'\u{1F1F8}\u{1F1F3}'},
  'Cameroon':     {code:'CM', flag:'\u{1F1E8}\u{1F1F2}'},
  'Ethiopia':     {code:'ET', flag:'\u{1F1EA}\u{1F1F9}'},
  'Rwanda':       {code:'RW', flag:'\u{1F1F7}\u{1F1FC}'},
  'Morocco':      {code:'MA', flag:'\u{1F1F2}\u{1F1E6}'},
  'Algeria':      {code:'DZ', flag:'\u{1F1E9}\u{1F1FF}'}
};

/* ===== NORMALIZE API DATA to local shape ===== */
function normalizeCreator(d) {
  /* Resolve country: Supabase returns full name (e.g. "Nigeria"), demo uses code ("NG") */
  var countryCode = d.country || '';
  var countryName = d.countryName || d.country_name || '';
  var flag = d.flag || '';

  /* If country is a full name (from Supabase), look up code + flag */
  if (countryCode && COUNTRY_META[countryCode]) {
    countryName = countryCode;
    flag = COUNTRY_META[countryCode].flag;
    countryCode = COUNTRY_META[countryCode].code;
  } else if (!countryName && countryCode.length === 2) {
    /* Already a code — find name and flag from COUNTRY_META */
    for (var cName in COUNTRY_META) {
      if (COUNTRY_META[cName].code === countryCode) {
        countryName = cName;
        flag = flag || COUNTRY_META[cName].flag;
        break;
      }
    }
  }

  /* Resolve platforms: derive from URL fields, fallback to primary_platform or demo array */
  var platforms = d.platforms;
  if (!platforms || !platforms.length) {
    platforms = [];
    if (d.youtube_url) platforms.push('youtube');
    if (d.twitch_url) platforms.push('twitch');
    if (d.tiktok_url) platforms.push('tiktok');
    if (d.instagram_url) platforms.push('instagram');
    if (d.kick_url) platforms.push('kick');
    if (!platforms.length && d.primary_platform) platforms.push(d.primary_platform.toLowerCase());
    if (!platforms.length) platforms = ['youtube'];
  }

  /* Resolve category: Supabase returns "categories" as "Gaming,Tech", demo uses single lowercase */
  var category = d.category || '';
  if (!category && d.categories) {
    category = d.categories.split(',')[0].trim().toLowerCase();
  }

  return {
    id:        d.id,
    slug:      d.slug || '',
    name:      d.name || '',
    avatarUrl: (d.avatar && d.avatar.startsWith('http')) ? d.avatar : ((d.avatar_url && d.avatar_url.startsWith('http')) ? d.avatar_url : ''),
    avatar:    (d.avatar && !d.avatar.startsWith('http')) ? d.avatar : (d.name ? d.name.replace(/[a-z ]/g,'').slice(0,2) || d.name.slice(0,2).toUpperCase() : '??'),
    country:   countryCode,
    flag:      flag,
    countryName: countryName,
    category:  category,
    platforms: platforms,
    followers: d.followers || d.subscribers || 0,
    gifts:     d.gifts || d.gift_revenue || 0,
    peak:      d.peak || d.total_views || d.peak_viewers || 0,
    growth:    d.growth || d.growth_rate || 0,
    avgDuration: d.avgDuration || d.avg_duration || 0,
    frequency: d.frequency || d.stream_frequency || 0,
    bio:       d.bio || '',
    netWorth:  d.netWorth || d.net_worth || null,
    streamingSince: d.streaming_since || d.streamingSince || null,
    isPublished: d.is_published != null ? d.is_published : true,
    score:     d.score || 0,
    rank:      d.rank || 0,
    _raw:      d
  };
}

/* ===== API FETCHERS ===== */
async function fetchCreator(idOrSlug) {
  try {
    /* Try new public API endpoint first — returns creator + streams + similar */
    var res = await fetch('/api/afrostream/creator?slug=' + encodeURIComponent(idOrSlug));
    var json = await res.json();
    if (json.success && json.data && json.data.creator) {
      var c = normalizeCreator(json.data.creator);
      c._apiStreams = json.data.streams || [];
      c._apiSimilar = json.data.similar || [];
      return c;
    }
  } catch(e) {}

  try {
    /* Fallback: slug-based endpoint */
    var res2 = await fetch('/api/admin/afrostream/public/creators/' + encodeURIComponent(idOrSlug));
    var json2 = await res2.json();
    if (json2.success && json2.data) return normalizeCreator(json2.data);
  } catch(e2) {}

  /* Fallback to demo */
  var demo = DEMO_CREATORS.find(function(c) { return c.slug === idOrSlug || String(c.id) === idOrSlug || c.name.toLowerCase() === idOrSlug.toLowerCase(); });
  return demo || null;
}

async function fetchAllCreators() {
  try {
    var res = await fetch('/api/afrostream/creators?limit=100');
    var json = await res.json();
    if (json.success && json.data && json.data.length) {
      return json.data.map(normalizeCreator).filter(function(c) { return c.isPublished !== false; });
    }
  } catch(e) {}
  /* Fallback to demo */
  return DEMO_CREATORS.slice();
}

/* Compute scores and ranks for a creator list */
function computeRanks(list) {
  list.forEach(function(c){
    if (!c.score) {
      c.score = Math.round(
        (c.followers / 50000) * 10 +
        (c.gifts / 1000) * 5 +
        (c.peak / 10000) * 8 +
        c.growth * 2
      );
    }
  });
  list.sort(function(a,b){ return b.score - a.score; });
  list.forEach(function(c,i){ c.rank = i + 1; });
}

/* ===== UTILS ===== */
function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n.toString();
}
function fmtUSD(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return '$' + n;
}
function fmtUSDFull(n) {
  return '$' + n.toLocaleString('en-US');
}
function avatarGradient(name) {
  var h = 0;
  for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  var hue = Math.abs(h) % 360;
  return 'linear-gradient(135deg, hsl(' + hue + ',80%,60%), hsl(' + ((hue + 60) % 360) + ',70%,50%))';
}

var PLATFORM_META = {
  youtube: {name:'YouTube',color:'#FF0000',icon:'\u25B6'},
  twitch: {name:'Twitch',color:'#9146FF',icon:'\u25C6'},
  tiktok: {name:'TikTok',color:'#00F2EA',icon:'\u266B'},
  instagram: {name:'Instagram',color:'#E1306C',icon:'\u25C9'},
  kick: {name:'Kick',color:'#53FC18',icon:'K'}
};

/* ===== GENERATE STREAM DATA ===== */
var STREAM_TITLES = {
  gaming: ['Late Night Ranked Grind','Tournament Finals LIVE','New Game First Look','Viewer 1v1 Challenge','Pro Scrims','Speedrun Attempt','Community Game Night','Reacting to Patch Notes','Competitive Ranked Push','Chill Gaming + Chat'],
  music: ['Live DJ Set','Beat Making Session','Album Listening Party','Remix Challenge','Acoustic Live Performance','Producer Showdown','Fan Request Hour','New Track Preview','Collab Session','Freestyle Friday'],
  comedy: ['Stand-Up Practice','Roast Session','Skit Marathon','Improv Night','Fan Reactions','Comedy Writing LIVE','Meme Review','Prank Calls','Q&A + Stories','Try Not to Laugh'],
  tech: ['Coding Live','Tech News Roundup','Build Along','Gadget Unboxing','Code Review Session','Startup Pitch Review','Linux Setup Stream','AI Tools Deep Dive','Hackathon LIVE','Debug This With Me'],
  food: ['Cook With Me LIVE','Street Food Tour','Recipe Challenge','Kitchen Hacks','Taste Test','Meal Prep Sunday','Baking LIVE','Food Market Tour','Chef vs Chef','National Dish Deep Dive'],
  fashion: ['Outfit of the Day','Haul Unboxing','Style Challenge','Fashion Week Recap','Thrift Flip LIVE','Designer Review','Street Style Tour','Closet Cleanout','Fashion History','Trend Alert'],
  education: ['Lecture LIVE','Q&A Session','Study With Me','Topic Deep Dive','Book Review','Exam Prep Stream','Workshop LIVE','Career Advice','Research Breakdown','AMA Session'],
  lifestyle: ['Morning Routine LIVE','Day in My Life','Travel Vlog LIVE','Room Makeover','Wellness Wednesday','Q&A + Chill','Fitness Challenge','Market Tour','City Exploration','Life Update']
};

function generateStreams(c) {
  var titles = STREAM_TITLES[c.category] || STREAM_TITLES.lifestyle;
  var streams = [];
  var now = Date.now();
  for (var i = 0; i < 10; i++) {
    var daysAgo = i * 2 + Math.floor(Math.random() * 3);
    var date = new Date(now - daysAgo * 86400000);
    var plat = c.platforms[Math.floor(Math.random() * c.platforms.length)];
    var dur = c.avgDuration + Math.floor(Math.random() * 60 - 30);
    if (dur < 15) dur = 15;
    var pv = Math.floor(c.peak * (0.3 + Math.random() * 0.7));
    var gft = Math.floor(c.gifts / 20 * (0.2 + Math.random() * 1.5));
    streams.push({
      date: date,
      title: titles[i % titles.length],
      platform: plat,
      duration: dur,
      peakViewers: pv,
      gifts: gft
    });
  }
  return streams;
}

function generateUpcoming(c) {
  var titles = STREAM_TITLES[c.category] || STREAM_TITLES.lifestyle;
  var upcoming = [];
  var now = Date.now();
  for (var i = 0; i < 3; i++) {
    var daysAhead = (i + 1) * 2 + Math.floor(Math.random() * 2);
    var date = new Date(now + daysAhead * 86400000);
    date.setHours(14 + Math.floor(Math.random() * 8), 0, 0, 0);
    var plat = c.platforms[Math.floor(Math.random() * c.platforms.length)];
    upcoming.push({
      date: date,
      title: titles[(i + 5) % titles.length],
      platform: plat
    });
  }
  return upcoming;
}

function generateGifters(c) {
  var names = ['anon_fan_','super_supporter_','gift_king_','loyal_viewer_','big_tipper_','mega_fan_','stream_lover_','top_g_','vip_watcher_','daily_gifter_'];
  var gifters = [];
  var total = c.gifts;
  for (var i = 0; i < 10; i++) {
    var share = (10 - i) / 55;
    var amt = Math.floor(total * share * (0.6 + Math.random() * 0.8));
    gifters.push({
      rank: i + 1,
      name: names[i] + Math.floor(Math.random() * 999),
      amount: amt
    });
  }
  return gifters;
}

function generateNews(c) {
  var headlines = [
    c.name + ' hits ' + fmtNum(c.followers) + ' followers milestone',
    c.name + ' featured in Forbes Africa 30 Under 30',
    c.name + ' announces brand partnership with Samsung Africa',
    c.name + ' breaks ' + c.countryName + ' streaming record with ' + fmtNum(c.peak) + ' concurrent viewers',
    c.name + ' launches creator academy for African youth'
  ];
  var sources = ['Forbes Africa','TechCabal','CNN Africa','BBC Africa','Pulse.ng'];
  var news = [];
  var now = Date.now();
  for (var i = 0; i < 3; i++) {
    var daysAgo = (i + 1) * 7 + Math.floor(Math.random() * 14);
    news.push({
      headline: headlines[i],
      source: sources[i],
      date: new Date(now - daysAgo * 86400000)
    });
  }
  return news;
}

/* ===== MAIN INIT (async) ===== */
(async function init() {
  /* Read ?id= param — supports numeric ids and slugs */
  var params = new URLSearchParams(window.location.search);
  var creatorParam = params.get('id') || '1';

  /* Fetch creator + all creators in parallel */
  var results = await Promise.all([
    fetchCreator(creatorParam),
    fetchAllCreators()
  ]);

  var creator = results[0];
  var CREATORS = results[1];

  /* If API returned a creator not in the list, ensure it has score/rank */
  computeRanks(CREATORS);

  /* If single-creator fetch failed, fall back to first in list */
  if (!creator) {
    creator = CREATORS[0];
  }

  /* Make sure creator has rank from the full list */
  var ranked = CREATORS.find(function(c){ return c.id === creator.id || c.slug === creator.slug; });
  if (ranked) {
    creator.rank = ranked.rank;
    creator.score = ranked.score;
  } else {
    /* Creator not in list — compute standalone */
    if (!creator.score) {
      creator.score = Math.round(
        (creator.followers / 50000) * 10 +
        (creator.gifts / 1000) * 5 +
        (creator.peak / 10000) * 8 +
        creator.growth * 2
      );
    }
    if (!creator.rank) creator.rank = CREATORS.length + 1;
  }

  /* Country rank */
  var countryCreators = CREATORS.filter(function(c){ return c.country === creator.country; });
  countryCreators.sort(function(a,b){ return b.score - a.score; });
  var countryRank = countryCreators.findIndex(function(c){ return c.id === creator.id || c.slug === creator.slug; }) + 1;
  if (countryRank < 1) countryRank = 1;

  var streams = generateStreams(creator);
  var upcoming = generateUpcoming(creator);
  var gifters = generateGifters(creator);
  var news = generateNews(creator);

  /* ===== RENDER PROFILE HERO ===== */
  (function renderHero() {
    var hue = 0;
    for (var i = 0; i < creator.name.length; i++) hue = creator.name.charCodeAt(i) + ((hue << 5) - hue);
    hue = Math.abs(hue) % 360;

    document.getElementById('profileCover').style.background = 'linear-gradient(135deg, hsl(' + hue + ',60%,20%) 0%, hsl(' + ((hue+40)%360) + ',80%,15%) 50%, #0d0d0d 100%)';

    var primaryPlatform = creator.platforms[0];
    var borderColor = PLATFORM_META[primaryPlatform] ? PLATFORM_META[primaryPlatform].color : '#007AFF';
    var avEl = document.getElementById('profileAvatar');
    avEl.style.borderColor = borderColor;
    if (creator.avatarUrl) {
      avEl.style.background = avatarGradient(creator.name);
      var avImg = new Image();
      avImg.onload = function() {
        avEl.style.backgroundImage = 'url(' + creator.avatarUrl + ')';
        avEl.style.backgroundSize = 'cover';
        avEl.style.backgroundPosition = 'center';
        avEl.innerHTML = '';
      };
      avImg.src = creator.avatarUrl;
      avEl.innerHTML = '<span>' + creator.avatar + '</span>';
    } else {
      avEl.style.background = avatarGradient(creator.name);
      avEl.innerHTML = '<span>' + creator.avatar + '</span>';
    }

    document.getElementById('profileName').textContent = creator.name;
    document.getElementById('profileBio').textContent = creator.bio;
    document.getElementById('profileCountry').innerHTML = creator.flag + ' ' + creator.countryName;
    document.getElementById('profileCategory').textContent = creator.category.charAt(0).toUpperCase() + creator.category.slice(1);

    var badgesHTML = '<span class="as-profile-rank-badge">#' + creator.rank + ' Overall</span>' +
      '<span class="as-profile-rank-badge as-profile-rank-country">#' + countryRank + ' in ' + creator.countryName + '</span>';
    document.getElementById('profileBadges').innerHTML = badgesHTML;

    /* Platform badges with follower distribution + real URLs */
    var totalF = creator.followers;
    var raw = creator._raw || {};
    var platURLs = {
      youtube: raw.platform_youtube || raw.youtube_url || '',
      twitch: raw.platform_twitch || raw.twitch_url || '',
      tiktok: raw.platform_tiktok || raw.tiktok_url || '',
      instagram: raw.platform_instagram || raw.instagram_url || '',
      kick: raw.platform_kick || raw.kick_url || ''
    };
    var platHTML = '';
    creator.platforms.forEach(function(p, idx) {
      var pm = PLATFORM_META[p];
      if (!pm) return;
      var share = idx === 0 ? 0.5 : (idx === 1 ? 0.3 : 0.2);
      var pFollowers = Math.floor(totalF * share);
      var href = platURLs[p] || '#';
      var target = href !== '#' ? ' target="_blank" rel="noopener"' : '';
      platHTML += '<a href="' + href + '"' + target + ' class="as-platform-badge" style="border-color:' + pm.color + '">' +
        '<span class="as-platform-badge-icon" style="color:' + pm.color + '">' + pm.icon + '</span>' +
        '<span class="as-platform-badge-name">' + pm.name + '</span>' +
        '<span class="as-platform-badge-count">' + fmtNum(pFollowers) + '</span>' +
      '</a>';
    });
    document.getElementById('profilePlatforms').innerHTML = platHTML;

    /* Follow button state */
    var followed = JSON.parse(localStorage.getItem('as_following') || '[]');
    if (followed.indexOf(creator.id) !== -1) {
      document.getElementById('followBtn').textContent = 'Following';
      document.getElementById('followBtn').classList.add('as-btn-following');
    }

    document.title = creator.name + ' — AfroStream | AfroTools';

    /* Dynamic meta tags */
    var metaDesc = creator.name + ' — ' + fmtNum(creator.followers) + ' followers across ' + creator.platforms.map(function(p){ return (PLATFORM_META[p]||{}).name||p; }).join(', ') + '. ' + (creator.bio || 'African creator on AfroStream.');
    var metaTag = document.querySelector('meta[name="description"]');
    if (metaTag) metaTag.setAttribute('content', metaDesc);
    var ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle) ogTitle.setAttribute('content', creator.name + ' — AfroStream | AfroTools');
    var ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogDesc) ogDesc.setAttribute('content', metaDesc);
    var ogImg = document.querySelector('meta[property="og:image"]');
    if (ogImg) ogImg.setAttribute('content', 'https://afrotools.com/api/afrostream/og?name=' + encodeURIComponent(creator.name) + '&subs=' + fmtNum(creator.followers) + '&country=' + encodeURIComponent(creator.countryName) + '&category=' + encodeURIComponent(creator.category));

    /* Person + ProfilePage JSON-LD */
    var jsonLd = {
      '@context': 'https://schema.org',
      '@type': 'ProfilePage',
      'mainEntity': {
        '@type': 'Person',
        'name': creator.name,
        'description': creator.bio,
        'nationality': { '@type': 'Country', 'name': creator.countryName },
        'knowsAbout': creator.category,
        'url': 'https://afrotools.com/tools/afrostream/creator.html?id=' + (creator.slug || creator.id),
        'interactionStatistic': {
          '@type': 'InteractionCounter',
          'interactionType': 'https://schema.org/FollowAction',
          'userInteractionCount': creator.followers
        }
      },
      'isPartOf': { '@type': 'WebApplication', 'name': 'AfroStream', 'url': 'https://afrotools.com/tools/afrostream/' }
    };
    var ldScript = document.createElement('script');
    ldScript.type = 'application/ld+json';
    ldScript.textContent = JSON.stringify(jsonLd);
    document.head.appendChild(ldScript);
  })();

  /* ===== RENDER STATS ===== */
  (function renderStats() {
    var stats = [
      {label:'Total Followers', value: fmtNum(creator.followers), icon:'\uD83D\uDC65'},
      {label:'Gift Revenue', value: fmtUSD(creator.gifts), icon:'\uD83C\uDF81'},
      {label:'Peak Viewers', value: fmtNum(creator.peak), icon:'\uD83D\uDCC8'},
      {label:'Avg Duration', value: creator.avgDuration + ' min', icon:'\u23F1'},
      {label:'Stream Freq.', value: creator.frequency + 'x/week', icon:'\uD83D\uDCC5'},
      {label:'Growth Rate', value: '+' + creator.growth + '%', icon:'\uD83D\uDE80'}
    ];
    var html = '';
    stats.forEach(function(s) {
      html += '<div class="as-stat-card">' +
        '<div class="as-stat-card-icon">' + s.icon + '</div>' +
        '<div class="as-stat-card-val">' + s.value + '</div>' +
        '<div class="as-stat-card-lbl">' + s.label + '</div>' +
      '</div>';
    });
    document.getElementById('statsGrid').innerHTML = html;
  })();

  /* ===== RENDER LIVE COUNTERS ===== */
  (function renderLiveCounters() {
    var PLAT_CONFIG = {
      youtube:   { name:'YouTube',   color:'#FF0000', icon:'\u25B6\uFE0F' },
      twitch:    { name:'Twitch',    color:'#9146FF', icon:'\uD83D\uDD2E' },
      tiktok:    { name:'TikTok',    color:'#00F2EA', icon:'\uD83C\uDFB5' },
      instagram: { name:'Instagram', color:'#E1306C', icon:'\uD83D\uDCF7' },
      kick:      { name:'Kick',      color:'#53FC18', icon:'\u26A1' },
      rumble:    { name:'Rumble',    color:'#85C742', icon:'\uD83C\uDFA5' }
    };

    var totalFollowers = creator.followers;
    var growthPct = creator.growth || 25;

    /* Distribute followers across platforms (weighted to primary) */
    var platData = [];
    creator.platforms.forEach(function(p, idx) {
      var conf = PLAT_CONFIG[p];
      if (!conf) return;
      var share = idx === 0 ? 0.55 : (idx === 1 ? 0.28 : 0.17);
      if (creator.platforms.length === 1) share = 1;
      var count = Math.floor(totalFollowers * share);
      var dailyGain = Math.floor(count * (growthPct / 100) / 365);

      /* Generate mini sparkline data (last 12 data points) */
      var spark = [];
      for (var s = 0; s < 12; s++) {
        spark.push(50 + Math.floor(Math.random() * 50));
      }

      platData.push({
        platform: p,
        name: conf.name,
        color: conf.color,
        icon: conf.icon,
        count: count,
        dailyGain: dailyGain,
        ratePerMin: Math.max(1, Math.floor(dailyGain / 1440)),
        spark: spark
      });
    });

    /* Render total counter */
    var totalEl = document.getElementById('lcTotalNum');
    var deltaEl = document.getElementById('lcTotalDelta');
    var totalDailyGain = platData.reduce(function(s, p) { return s + p.dailyGain; }, 0);
    deltaEl.textContent = '+' + totalDailyGain.toLocaleString() + ' today (est.)';

    /* Render platform cards */
    var grid = document.getElementById('lcGrid');
    var html = '';
    platData.forEach(function(pd) {
      var sparkHTML = '<div class="as-lc-card-spark">';
      pd.spark.forEach(function(h) {
        sparkHTML += '<span style="height:' + h + '%;background:' + pd.color + '"></span>';
      });
      sparkHTML += '</div>';

      html += '<div class="as-lc-card" style="--plat-color:' + pd.color + '" data-platform="' + pd.platform + '" data-count="' + pd.count + '" data-rate="' + pd.ratePerMin + '">' +
        '<div class="as-lc-card-icon">' + pd.icon + '</div>' +
        '<div class="as-lc-card-platform" style="color:' + pd.color + '">' + pd.name + '</div>' +
        '<div class="as-lc-card-count" id="lc-' + pd.platform + '">' + pd.count.toLocaleString() + '</div>' +
        '<div class="as-lc-card-delta">+' + pd.dailyGain.toLocaleString() + '/day</div>' +
        '<div class="as-lc-card-rate">\u2248 ' + pd.ratePerMin + ' new follower' + (pd.ratePerMin > 1 ? 's' : '') + '/min</div>' +
        sparkHTML +
        '<div class="as-lc-card-bar"></div>' +
      '</div>';
    });
    grid.innerHTML = html;

    /* ── ANIMATE: Odometer-style counting ─────────────── */
    /* Animate total from 0 to actual */
    var totalTarget = totalFollowers;
    var totalCurrent = 0;
    var totalStep = Math.max(1, Math.floor(totalTarget / 80));
    function animateTotal() {
      totalCurrent += totalStep;
      if (totalCurrent >= totalTarget) { totalCurrent = totalTarget; totalEl.textContent = totalTarget.toLocaleString(); return; }
      totalEl.textContent = totalCurrent.toLocaleString();
      requestAnimationFrame(animateTotal);
    }
    /* Start animation when section scrolls into view */
    var lcSection = document.getElementById('liveCounters');
    var lcAnimated = false;
    var lcObs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting && !lcAnimated) {
        lcAnimated = true;
        animateTotal();
        lcObs.disconnect();
      }
    }, { threshold: 0.2 });
    lcObs.observe(lcSection);

    /* ── LIVE TICK: Increment counters every few seconds ── */
    var tickAccum = {};
    platData.forEach(function(pd) { tickAccum[pd.platform] = pd.count; });
    var totalAccum = totalFollowers;

    setInterval(function() {
      platData.forEach(function(pd) {
        /* Random chance to tick (based on rate) */
        if (Math.random() < 0.4 + pd.ratePerMin * 0.05) {
          var bump = Math.ceil(Math.random() * Math.max(1, pd.ratePerMin));
          tickAccum[pd.platform] += bump;
          totalAccum += bump;

          var el = document.getElementById('lc-' + pd.platform);
          if (el) {
            el.textContent = tickAccum[pd.platform].toLocaleString();
            el.style.transition = 'transform .15s,color .15s';
            el.style.transform = 'scale(1.04)';
            el.style.color = pd.color;
            setTimeout(function() { el.style.transform = ''; el.style.color = ''; }, 300);
          }
        }
      });
      if (lcAnimated) {
        totalEl.textContent = totalAccum.toLocaleString();
      }
    }, 2000 + Math.floor(Math.random() * 1500));

    /* Update sparkline bars randomly */
    setInterval(function() {
      document.querySelectorAll('.as-lc-card-spark').forEach(function(spark) {
        var bars = spark.querySelectorAll('span');
        var idx = Math.floor(Math.random() * bars.length);
        bars[idx].style.height = (40 + Math.floor(Math.random() * 60)) + '%';
      });
    }, 3000);
  })();

  /* ===== RENDER NET WORTH ===== */
  (function renderNetWorth() {
    var streamRev = creator.gifts;
    var sponsorships = Math.floor(streamRev * 1.8);
    var merch = Math.floor(streamRev * 0.6);
    var brandDeals = Math.floor(streamRev * 2.2);
    var total = streamRev + sponsorships + merch + brandDeals;
    var maxBar = Math.max(streamRev, sponsorships, merch, brandDeals);

    var breakdown = [
      {label:'Streaming Revenue', amount: streamRev, color:'#007AFF'},
      {label:'Sponsorships (est.)', amount: sponsorships, color:'#06B6D4'},
      {label:'Merchandise (est.)', amount: merch, color:'#F59E0B'},
      {label:'Brand Deals (est.)', amount: brandDeals, color:'#10B981'}
    ];

    var html = '<div class="as-nw-header">' +
      '<div class="as-nw-label">Estimated Annual Earnings</div>' +
      '<div class="as-nw-total">' + fmtUSDFull(total) + '</div>' +
    '</div>' +
    '<div class="as-nw-breakdown">';

    breakdown.forEach(function(b) {
      var pct = Math.round(b.amount / maxBar * 100);
      html += '<div class="as-nw-row">' +
        '<div class="as-nw-row-label">' + b.label + '</div>' +
        '<div class="as-nw-row-bar"><div class="as-nw-bar-fill" style="width:' + pct + '%;background:' + b.color + '"></div></div>' +
        '<div class="as-nw-row-val">' + fmtUSDFull(b.amount) + '</div>' +
      '</div>';
    });

    html += '</div>' +
      '<div class="as-nw-disclaimer">Estimated based on public data and community reports. Actual figures may vary.</div>';

    document.getElementById('networthCard').innerHTML = html;
  })();

  /* ===== RENDER STREAM HISTORY ===== */
  (function renderStreams() {
    var html = '<div class="as-stream-table"><div class="as-stream-header">' +
      '<span>Date</span><span>Title</span><span>Platform</span><span>Duration</span><span>Peak</span><span>Gifts</span>' +
    '</div>';
    streams.forEach(function(s) {
      var pm = PLATFORM_META[s.platform];
      html += '<div class="as-stream-row">' +
        '<span class="as-stream-date">' + s.date.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + '</span>' +
        '<span class="as-stream-title">' + s.title + '</span>' +
        '<span class="as-stream-plat" style="color:' + pm.color + '">' + pm.icon + ' ' + pm.name + '</span>' +
        '<span>' + s.duration + ' min</span>' +
        '<span>' + fmtNum(s.peakViewers) + '</span>' +
        '<span class="as-stream-gifts">' + fmtUSD(s.gifts) + '</span>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('streamHistory').innerHTML = html;
  })();

  /* ===== RENDER UPCOMING ===== */
  (function renderUpcoming() {
    var html = '';
    upcoming.forEach(function(u) {
      var pm = PLATFORM_META[u.platform];
      html += '<div class="as-upcoming-card">' +
        '<div class="as-upcoming-date">' +
          '<div class="as-upcoming-day">' + u.date.toLocaleDateString('en-US',{weekday:'short'}) + '</div>' +
          '<div class="as-upcoming-num">' + u.date.getDate() + '</div>' +
          '<div class="as-upcoming-month">' + u.date.toLocaleDateString('en-US',{month:'short'}) + '</div>' +
        '</div>' +
        '<div class="as-upcoming-info">' +
          '<div class="as-upcoming-title">' + u.title + '</div>' +
          '<div class="as-upcoming-meta">' +
            '<span style="color:' + pm.color + '">' + pm.icon + ' ' + pm.name + '</span>' +
            '<span>' + u.date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="as-upcoming-actions">' +
          '<button class="as-btn as-btn-sm as-btn-outline" onclick="setReminder(this)">Set Reminder</button>' +
          '<a href="#" class="as-btn as-btn-sm as-btn-primary">Watch &rarr;</a>' +
        '</div>' +
      '</div>';
    });
    document.getElementById('upcomingStreams').innerHTML = html;
  })();

  /* ===== RENDER GIFTERS ===== */
  (function renderGifters() {
    var html = '';
    gifters.forEach(function(g) {
      var badge = g.rank === 1 ? '<span class="as-gifter-crown">\uD83D\uDC51 Top Supporter</span>' : '';
      html += '<div class="as-gifter-row' + (g.rank === 1 ? ' as-gifter-top' : '') + '">' +
        '<span class="as-gifter-rank">#' + g.rank + '</span>' +
        '<span class="as-gifter-name">' + g.name + badge + '</span>' +
        '<span class="as-gifter-amount">' + fmtUSD(g.amount) + '</span>' +
      '</div>';
    });
    document.getElementById('giftersList').innerHTML = html;
  })();

  /* ===== RENDER RELATED ===== */
  (function renderRelated() {
    var related = CREATORS.filter(function(c) {
      return c.id !== creator.id && c.slug !== creator.slug && (c.category === creator.category || c.country === creator.country);
    }).slice(0, 4);

    var html = '';
    related.forEach(function(c) {
      var linkParam = c.slug || c.id;
      html += '<a href="creator.html?id=' + linkParam + '" class="as-related-card">' +
        '<div class="as-related-avatar" style="background:' + avatarGradient(c.name) + '">' + c.avatar + '</div>' +
        '<div class="as-related-name">' + c.name + '</div>' +
        '<div class="as-related-meta">' + c.flag + ' ' + c.category + '</div>' +
        '<div class="as-related-followers">' + fmtNum(c.followers) + ' followers</div>' +
      '</a>';
    });
    document.getElementById('relatedGrid').innerHTML = html;
  })();

  /* ===== RENDER NEWS ===== */
  (function renderNews() {
    var html = '';
    news.forEach(function(n) {
      html += '<div class="as-news-card">' +
        '<div class="as-news-source">' + n.source + '</div>' +
        '<div class="as-news-headline">' + n.headline + '</div>' +
        '<div class="as-news-date">' + n.date.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + '</div>' +
      '</div>';
    });
    document.getElementById('newsList').innerHTML = html;
  })();

  /* Expose creator for action functions */
  window._asCreator = creator;
})();

/* ===== ACTIONS ===== */
function toggleFollow() {
  var creator = window._asCreator;
  if (!creator) return;
  var followed = JSON.parse(localStorage.getItem('as_following') || '[]');
  var idx = followed.indexOf(creator.id);
  var btn = document.getElementById('followBtn');
  if (idx === -1) {
    followed.push(creator.id);
    btn.textContent = 'Following';
    btn.classList.add('as-btn-following');
  } else {
    followed.splice(idx, 1);
    btn.textContent = 'Follow';
    btn.classList.remove('as-btn-following');
  }
  localStorage.setItem('as_following', JSON.stringify(followed));
}

function shareProfile() {
  var creator = window._asCreator;
  var url = window.location.href;
  if (navigator.share) {
    navigator.share({title: (creator ? creator.name : 'Creator') + ' on AfroStream', url: url});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url);
    alert('Profile link copied!');
  }
}

function setReminder(btn) {
  btn.textContent = 'Reminder Set';
  btn.disabled = true;
  btn.style.opacity = '0.6';
}

/* Scroll reveal */
(function () {
  var els = document.querySelectorAll('.rv');
  if (!els.length) return;
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.1 });
  els.forEach(function (el) { obs.observe(el); });
})();
