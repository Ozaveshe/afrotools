<script>
/* ===== NO DEMO DATA — API only ===== */
var DEMO_CREATORS = [
];

/* ===== COUNTRY META (name → code + flag) ===== */
var COUNTRY_META = {
  'Nigeria':      {code:'NG', flag:'\u{1F1F3}\u{1F1EC}'},
  'Kenya':        {code:'KE', flag:'\u{1F1F0}\u{1F1EA}'},
  'South Africa': {code:'ZA', flag:'\u{1F1FF}\u{1F1E6}'},
  'Ghana':        {code:'GH', flag:'\u{1F1EC}\u{1F1ED}'},
  'Egypt':        {code:'EG', flag:'\u{1F1EA}\u{1F1EC}'},
  'Tanzania':     {code:'TZ', flag:'\u{1F1F9}\u{1F1FF}'},
  'Uganda':       {code:'UG', flag:'\u{1F1FA}\u{1F1EC}'},
  'Senegal':      {code:'SN', flag:'\u{1F1F8}\u{1F1F3}'},
  'Cameroon':     {code:'CM', flag:'\u{1F1E8}\u{1F1F2}'},
  'Ethiopia':     {code:'ET', flag:'\u{1F1EA}\u{1F1F9}'},
  'Rwanda':       {code:'RW', flag:'\u{1F1F7}\u{1F1FC}'},
  'Morocco':      {code:'MA', flag:'\u{1F1F2}\u{1F1E6}'},
  'Algeria':      {code:'DZ', flag:'\u{1F1E9}\u{1F1FF}'}
};

/* ===== NORMALIZE API DATA to local shape ===== */
function asNumber(value) {
  if (value == null || value === '') return 0;
  if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
  var raw = String(value).trim().toLowerCase();
  var multiplier = raw.endsWith('b') ? 1000000000 : (raw.endsWith('m') ? 1000000 : (raw.endsWith('k') ? 1000 : 1));
  var cleaned = raw.replace(/[$,\s]/g, '').replace(/[bmk]$/, '');
  var parsed = Number(cleaned) * multiplier;
  return Number.isFinite(parsed) ? parsed : 0;
}

function isImageUrl(value) {
  return typeof value === 'string' && (value.indexOf('http') === 0 || value.charAt(0) === '/');
}

function normalizeCreator(d) {
  /* Resolve country: Supabase returns full name (e.g. "Nigeria"), demo uses code ("NG") */
  var countryCode = d.country || '';
  var countryName = d.countryName || d.country_name || '';
  var flag = d.flag || '';

  /* If country is a full name (from Supabase), look up code + flag */
  if (countryCode && COUNTRY_META[countryCode]) {
    countryName = countryCode;
    flag = COUNTRY_META[countryCode].flag;
    countryCode = COUNTRY_META[countryCode].code;
  } else if (!countryName && countryCode.length === 2) {
    /* Already a code — find name and flag from COUNTRY_META */
    for (var cName in COUNTRY_META) {
      if (COUNTRY_META[cName].code === countryCode) {
        countryName = cName;
        flag = flag || COUNTRY_META[cName].flag;
        break;
      }
    }
  }

  /* Resolve platforms: derive from URL fields, fallback to primary_platform or demo array */
  var platforms = Array.isArray(d.platforms) ? d.platforms.slice() : [];
  if (!platforms.length && typeof d.platforms === 'string') {
    platforms = d.platforms.split(',').map(function(p) { return p.trim().toLowerCase(); }).filter(Boolean);
  }
  if (!platforms.length) {
    platforms = [];
    if (d.youtube_url) platforms.push('youtube');
    if (d.twitch_url) platforms.push('twitch');
    if (d.tiktok_url) platforms.push('tiktok');
    if (d.instagram_url) platforms.push('instagram');
    if (d.kick_url) platforms.push('kick');
    if (!platforms.length && d.primary_platform) platforms.push(d.primary_platform.toLowerCase());
    if (!platforms.length) platforms = ['youtube'];
  }
  platforms = platforms.map(function(p) { return String(p).toLowerCase(); });

  /* Resolve category: Supabase returns "categories" as "Gaming,Tech", demo uses single lowercase */
  var category = d.category || '';
  if (!category && d.categories) {
    category = d.categories.split(',')[0].trim().toLowerCase();
  }

  var platformCounts = {
    youtube: asNumber(d.yt_subscribers || d.youtube_followers || d.youtube_subscribers),
    twitch: asNumber(d.twitch_followers),
    tiktok: asNumber(d.tiktok_followers),
    instagram: asNumber(d.ig_followers || d.instagram_followers),
    kick: asNumber(d.kick_followers),
    facebook: asNumber(d.fb_followers || d.facebook_followers)
  };
  if (!platformCounts.youtube && platforms.indexOf('youtube') !== -1 && d.subscribers) {
    platformCounts.youtube = asNumber(d.subscribers);
  }
  var followerTotal = asNumber(d.followers || d.total_followers || d.subscribers);
  if (!followerTotal) {
    followerTotal = Object.keys(platformCounts).reduce(function(sum, key) { return sum + platformCounts[key]; }, 0);
  }

  return {
    id:        d.id,
    slug:      d.slug || '',
    name:      d.name || '',
    avatarUrl: isImageUrl(d.avatar) ? d.avatar : (isImageUrl(d.avatar_url) ? d.avatar_url : ''),
    avatar:    (d.avatar && !isImageUrl(d.avatar)) ? d.avatar : (d.name ? d.name.replace(/[a-z ]/g,'').slice(0,2) || d.name.slice(0,2).toUpperCase() : '??'),
    country:   countryCode,
    flag:      flag,
    countryName: countryName,
    category:  category,
    platforms: platforms,
    followers: followerTotal,
    platformCounts: platformCounts,
    views:     asNumber(d.views || d.total_views || d.yt_views),
    gifts:     asNumber(d.gifts || d.gift_revenue),
    peak:      asNumber(d.peak_viewers || d.peak),
    growth:    asNumber(d.growth || d.growth_pct || d.growth_rate),
    avgDuration: asNumber(d.avgDuration || d.avg_duration),
    frequency: d.frequency || d.stream_frequency || '',
    bio:       d.bio || '',
    netWorth:  asNumber(d.netWorth || d.net_worth),
    streamingSince: d.streaming_since || d.streamingSince || null,
    isPublished: d.is_published != null ? d.is_published : true,
    score:     asNumber(d.score || d.afro_score),
    tier:      d.tier || d.afro_tier || '',
    rank:      d.rank || 0,
    _raw:      d
  };
}

function normalizeSnapshot(row) {
  return {
    date: row.snapshot_date || (row.created_at ? String(row.created_at).slice(0, 10) : ''),
    followers: asNumber(row.total_followers),
    views: asNumber(row.total_views),
    score: asNumber(row.afro_score),
    netWorth: asNumber(row.net_worth_value),
    streamCount30d: asNumber(row.stream_count_30d),
    cadence: row.stream_cadence || '',
    sourceStatus: row.source_status || '',
    sourceQuality: asNumber(row.source_quality),
    platformCounts: {
      youtube: asNumber(row.yt_subscribers),
      twitch: asNumber(row.twitch_followers),
      kick: asNumber(row.kick_followers),
      tiktok: asNumber(row.tiktok_followers),
      instagram: asNumber(row.ig_followers)
    }
  };
}

function countRecentStreams(rows) {
  var cutoff = Date.now() - 30 * 86400000;
  return (rows || []).filter(function(row) {
    var rawDate = row.stream_date || row.date || row.created_at;
    var time = rawDate ? new Date(rawDate).getTime() : 0;
    return time && time >= cutoff;
  }).length;
}

function normalizeSupporter(row, index) {
  return {
    rank: index + 1,
    name: row.supporter_name || row.name || 'Verified supporter',
    platform: row.platform || '',
    amount: asNumber(row.amount),
    currency: row.currency || 'USD',
    source: row.source_label || '',
    sourceUrl: row.source_url || '',
    date: row.event_date ? new Date(row.event_date) : null,
    verified: row.is_verified === true
  };
}

function normalizeNews(row) {
  return {
    source: row.source_name || row.author || row.source || 'AfroStream',
    headline: row.title || row.headline || '',
    excerpt: row.excerpt || '',
    url: row.source_url || (row.slug && window.AfroStreamNewsUtils ? window.AfroStreamNewsUtils.articleHref(row.slug) : (row.slug ? '/tools/afrostream/article.html?slug=' + encodeURIComponent(row.slug) : '')),
    date: row.published_at ? new Date(row.published_at) : new Date(row.created_at || Date.now())
  };
}

function trendForValue(currentValue, previousValue, fallbackPct, options) {
  options = options || {};
  var current = asNumber(currentValue);
  var previous = asNumber(previousValue);
  if (previous > 0) {
    var delta = current - previous;
    if (!delta) {
      return {
        dir: 'flat',
        delta: 0,
        pct: 0,
        estimated: false,
        label: options.flatLabel || 'No change'
      };
    }
    return {
      dir: delta > 0 ? 'up' : 'down',
      delta: delta,
      pct: previous ? (delta / previous * 100) : 0,
      estimated: false
    };
  }
  var pct = asNumber(fallbackPct);
  if (pct) {
    return {
      dir: pct > 0 ? 'up' : 'down',
      delta: Math.round(current * (pct / 100) / 365),
      pct: pct,
      estimated: true
    };
  }
  return {
    dir: 'flat',
    delta: 0,
    pct: 0,
    estimated: false,
    label: options.noHistoryLabel || 'Tracking daily'
  };
}

function attachTrends(c) {
  var snapshots = (c._apiSnapshots || []).slice().sort(function(a, b) {
    return String(b.date || '').localeCompare(String(a.date || ''));
  });
  var latest = snapshots[0] || null;
  var previous = snapshots.find(function(s) { return latest && s.date && s.date !== latest.date; }) || null;
  var noHistory = snapshots.length ? 'Next daily read' : 'Tracking daily';
  var currentStreamCount = latest && latest.streamCount30d ? latest.streamCount30d : countRecentStreams(c._apiStreams);
  var previousStreamCount = previous ? previous.streamCount30d : 0;
  c.trends = {
    followers: trendForValue(c.followers, previous ? previous.followers : 0, c.growth, { noHistoryLabel: noHistory, flatLabel: 'Followers steady' }),
    views: trendForValue(c.views, previous ? previous.views : 0, c.growth, { noHistoryLabel: noHistory, flatLabel: 'Views steady' }),
    score: trendForValue(c.score, previous ? previous.score : 0, 0, { noHistoryLabel: 'Score watch', flatLabel: 'Score steady' }),
    netWorth: trendForValue(c.netWorth, previous ? previous.netWorth : 0, 0, { noHistoryLabel: c.netWorth ? 'Estimate live' : 'Estimate pending', flatLabel: 'Estimate steady' }),
    cadence: trendForValue(currentStreamCount, previousStreamCount, 0, { noHistoryLabel: c.frequency ? 'Cadence set' : 'Cadence pending', flatLabel: 'Cadence steady' }),
    growth: c.growth ? { dir: c.growth > 0 ? 'up' : 'down', pct: c.growth, delta: 0, estimated: false } : { dir: 'flat', delta: 0, pct: 0, estimated: false, label: 'Growth pending' },
    platformCounts: {}
  };
  Object.keys(c.platformCounts || {}).forEach(function(key) {
    c.trends.platformCounts[key] = trendForValue(
      c.platformCounts[key],
      previous && previous.platformCounts ? previous.platformCounts[key] : 0,
      c.growth,
      { noHistoryLabel: noHistory, flatLabel: 'No change' }
    );
  });
  return c;
}

function trendLabel(trend, kind) {
  if (!trend) return 'Tracking daily';
  if (trend.label) return trend.label;
  if (trend.dir === 'flat') return 'No change tracked yet';
  if (kind === 'pct') {
    return (trend.dir === 'up' ? '+' : '') + (Math.round(trend.pct * 10) / 10) + '%';
  }
  var delta = Math.abs(Math.round(trend.delta || 0));
  if (delta <= 0 && trend.pct) return (trend.dir === 'up' ? '+' : '-') + (Math.round(Math.abs(trend.pct) * 10) / 10) + '%';
  return (trend.dir === 'up' ? '+' : '-') + delta.toLocaleString() + (trend.estimated ? '/day est.' : '');
}

function trendMarkup(trend, kind) {
  trend = trend || { dir: 'flat', label: 'Tracking daily' };
  var arrow = trend.dir === 'up' ? '&uarr;' : (trend.dir === 'down' ? '&darr;' : '&rarr;');
  return '<div class="as-stat-trend as-trend-' + trend.dir + '"><span>' + arrow + '</span>' + trendLabel(trend, kind) + '</div>';
}

async function hydrateCreatorExtras(c) {
  var tasks = [];
  if (!c._apiSnapshots || !c._apiSnapshots.length) {
    tasks.push(fetch('/api/afrostream/snapshots?period=all&limit=1000').then(function(res) { return res.json(); }).then(function(json) {
      var rows = json.success && Array.isArray(json.data) ? json.data : [];
      c._apiSnapshots = rows.filter(function(row) { return String(row.creator_id) === String(c.id); }).map(normalizeSnapshot);
    }).catch(function() {}));
  }
  if (!c._apiNews || !c._apiNews.length) {
    tasks.push(fetch('/api/afrostream/news?limit=100').then(function(res) { return res.json(); }).then(function(json) {
      var rows = json.success && Array.isArray(json.data) ? json.data : [];
      var name = String(c.name || '').toLowerCase();
      c._apiNews = rows.filter(function(row) {
        return name && ((row.title || '') + ' ' + (row.excerpt || '') + ' ' + (row.body || '')).toLowerCase().indexOf(name) !== -1;
      }).slice(0, 8).map(normalizeNews);
    }).catch(function() {}));
  }
  await Promise.all(tasks);
  attachTrends(c);
  return c;
}

/* ===== API FETCHERS ===== */
async function fetchCreator(idOrSlug) {
  try {
    /* Try new public API endpoint first — returns creator + streams + similar */
    var res = await fetch('/api/afrostream/creator?slug=' + encodeURIComponent(idOrSlug));
    var json = await res.json();
    if (json.success && json.data && json.data.creator) {
      var c = normalizeCreator(json.data.creator);
      c._apiStreams = json.data.streams || [];
      c._apiSimilar = json.data.similar || [];
      c._apiSnapshots = (json.data.snapshots || []).map(normalizeSnapshot);
      c._apiSupporters = (json.data.supporters || []).map(normalizeSupporter);
      c._apiNews = (json.data.news || []).map(normalizeNews);
      await hydrateCreatorExtras(c);
      return c;
    }
  } catch(e) {}

  try {
    /* Fallback: search within the public creator list */
    var res2 = await fetch('/api/afrostream/creators?limit=100');
    var json2 = await res2.json();
    if (json2.success && json2.data && json2.data.length) {
      var match = json2.data.find(function(row) {
        var rowSlug = row.slug || '';
        return String(row.id) === String(idOrSlug) ||
          rowSlug === idOrSlug ||
          String(row.name || '').toLowerCase() === String(idOrSlug).toLowerCase();
      });
      if (match) return hydrateCreatorExtras(normalizeCreator(match));
    }
  } catch(e2) {}

  /* Fallback to demo */
  var demo = DEMO_CREATORS.find(function(c) { return c.slug === idOrSlug || String(c.id) === idOrSlug || c.name.toLowerCase() === idOrSlug.toLowerCase(); });
  return demo || null;
}

async function fetchAllCreators() {
  try {
    var res = await fetch('/api/afrostream/creators?limit=100');
    var json = await res.json();
    if (json.success && json.data && json.data.length) {
      return json.data.map(normalizeCreator).filter(function(c) { return c.isPublished !== false; });
    }
  } catch(e) {}
  /* Fallback to demo */
  return DEMO_CREATORS.slice();
}

/* Compute scores and ranks for a creator list */
function logScore(value, max) {
  if (!value || value <= 0 || !max || max <= 1) return 0;
  return Math.min(100, Math.round(Math.log10(value) / Math.log10(max) * 100));
}

function getTier(score) {
  if (score >= 80) return 'legend';
  if (score >= 60) return 'elite';
  if (score >= 40) return 'established';
  if (score >= 20) return 'trending';
  return 'rising';
}

function consistencyScore(frequency) {
  var freq = String(frequency || '').toLowerCase();
  if (!freq) return 0;
  if (freq.indexOf('daily') !== -1) return 100;
  if (freq.indexOf('weekly') !== -1 && freq.indexOf('x') === -1) return 40;
  var match = freq.match(/(\d+)\s*x\s*\/?\s*week/);
  if (match) return Math.min(100, parseInt(match[1], 10) * 20);
  return 30;
}

function computeFallbackAfroScore(c) {
  var totalViews = asNumber(c.views);
  var recentStreamCount = countRecentStreams(c._apiStreams);
  var consistency = recentStreamCount ? Math.min(100, recentStreamCount * 10) : consistencyScore(c.frequency);
  var followerScore = logScore(c.followers, 200000000);
  var viewScore = logScore(totalViews, 10000000000);
  var growthScore = Math.max(0, Math.min(100, Number(c.growth || 0) * 5));
  var engagementScore = logScore(c.followers > 0 ? totalViews / c.followers : 0, 100);
  var multiPlatformScore = Math.min(100, Math.round(((c.platforms || []).length || 1) / 4 * 100));
  return Math.max(0, Math.min(100, Math.round(
    followerScore * 0.25 +
    viewScore * 0.20 +
    growthScore * 0.20 +
    consistency * 0.15 +
    engagementScore * 0.10 +
    multiPlatformScore * 0.10
  )));
}

function computeRanks(list) {
  list.forEach(function(c){
    if (!c.score) {
      c.score = computeFallbackAfroScore(c);
    }
    if (!c.tier) c.tier = getTier(c.score);
  });
  list.sort(function(a,b){ return b.score - a.score; });
  list.forEach(function(c,i){ c.rank = i + 1; });
}

/* ===== UTILS ===== */
function fmtNum(n) {
  n = asNumber(n);
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n.toString();
}
function fmtUSD(n) {
  n = asNumber(n);
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return '$' + n.toLocaleString('en-US');
}
function fmtUSDFull(n) {
  n = asNumber(n);
  return '$' + n.toLocaleString('en-US');
}
function fmtDuration(n) {
  n = asNumber(n);
  return n > 0 ? n + ' min' : 'No stream data';
}
function fmtFrequency(value) {
  if (value == null || value === '') return 'Not listed';
  if (typeof value === 'number') return value > 0 ? value + 'x/week' : 'Not listed';
  return String(value).trim();
}
function fmtGrowth(value) {
  value = asNumber(value);
  if (!value) return 'Baseline';
  return (value > 0 ? '+' : '') + value + '%';
}
function avatarGradient(name) {
  var h = 0;
  for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  var hue = Math.abs(h) % 360;
  return 'linear-gradient(135deg, hsl(' + hue + ',80%,60%), hsl(' + ((hue + 60) % 360) + ',70%,50%))';
}

function generateStreams(c) {
  var titles = STREAM_TITLES[c.category] || STREAM_TITLES.lifestyle;
  var streams = [];
  var now = Date.now();
  for (var i = 0; i < 10; i++) {
    var daysAgo = i * 2 + Math.floor(Math.random() * 3);
    var date = new Date(now - daysAgo * 86400000);
    var plat = c.platforms[Math.floor(Math.random() * c.platforms.length)];
    var dur = c.avgDuration + Math.floor(Math.random() * 60 - 30);
    if (dur < 15) dur = 15;
    var pv = Math.floor(c.peak * (0.3 + Math.random() * 0.7));
    var gft = Math.floor(c.gifts / 20 * (0.2 + Math.random() * 1.5));
    streams.push({
      date: date,
      title: titles[i % titles.length],
      platform: plat,
      duration: dur,
      peakViewers: pv,
      gifts: gft
    });
  }
  return streams;
}

  var titles = STREAM_TITLES[c.category] || STREAM_TITLES.lifestyle;
  var upcoming = [];
  var now = Date.now();
  for (var i = 0; i < 3; i++) {
    var daysAhead = (i + 1) * 2 + Math.floor(Math.random() * 2);
    var date = new Date(now + daysAhead * 86400000);
    date.setHours(14 + Math.floor(Math.random() * 8), 0, 0, 0);
    var plat = c.platforms[Math.floor(Math.random() * c.platforms.length)];
    upcoming.push({
      date: date,
      title: titles[(i + 5) % titles.length],
      platform: plat
    });
  }
  return upcoming;
}

  var results = await Promise.all([
    fetchCreator(creatorParam),

    var stats = [
      {label:'Total Followers', value: fmtNum(creator.followers), icon:'\uD83D\uDC65', trend: creator.trends && creator.trends.followers},
      {label:'Total Views', value: creator.views ? fmtNum(creator.views) : 'Not listed', icon:'\u25B6', trend: creator.trends && creator.trends.views},
      {label:'AfroScore', value: creator.score ? creator.score : 'Baseline', icon:'\u2605', trend: creator.trends && creator.trends.score},
      {label:'Net Worth Est.', value: creator.netWorth ? fmtUSD(creator.netWorth) : 'Not listed', icon:'\uD83D\uDCB0', trend: creator.trends && creator.trends.netWorth},
      {label:'Cadence', value: fmtFrequency(creator.frequency), icon:'\uD83D\uDCC5', trend: creator.trends && creator.trends.cadence},
      {label:'Growth Rate', value: fmtGrowth(creator.growth), icon:'\uD83D\uDE80', trend: creator.trends && creator.trends.growth, trendKind: 'pct'}
    ];
    var html = '';
    stats.forEach(function(s) {
      html += '<div class="as-stat-card">' +
        '<div class="as-stat-card-icon">' + s.icon + '</div>' +
        '<div class="as-stat-card-val">' + s.value + '</div>' +
        '<div class="as-stat-card-lbl">' + s.label + '</div>' +
        trendMarkup(s.trend, s.trendKind) +
      '</div>';
    });
    document.getElementById('statsGrid').innerHTML = html;
  })();

  /* ===== RENDER LIVE COUNTERS ===== */
  (function renderLiveCounters() {
    var PLAT_CONFIG = {
      youtube:   { name:'YouTube',   color:'#FF0000', icon:'\u25B6\uFE0F' },
      twitch:    { name:'Twitch',    color:'#9146FF', icon:'\uD83D\uDD2E' },
      tiktok:    { name:'TikTok',    color:'#00F2EA', icon:'\uD83C\uDFB5' },
      instagram: { name:'Instagram', color:'#E1306C', icon:'\uD83D\uDCF7' },
      kick:      { name:'Kick',      color:'#53FC18', icon:'\u26A1' },
      rumble:    { name:'Rumble',    color:'#85C742', icon:'\uD83C\uDFA5' }
    };

    var totalFollowers = creator.followers;
    var growthPct = creator.growth || 25;

    var exactCounts = creator.platformCounts || {};
    var hasExactCounts = Object.keys(exactCounts).some(function(key) { return exactCounts[key] > 0; });

    var platData = [];
    creator.platforms.forEach(function(p, idx) {
      var conf = PLAT_CONFIG[p];
      if (!conf) return;
      var count = exactCounts[p] || 0;
      if (hasExactCounts && !count) return;
      if (!count) {
        var share = idx === 0 ? 0.55 : (idx === 1 ? 0.28 : 0.17);
        if (creator.platforms.length === 1) share = 1;
        count = Math.floor(totalFollowers * share);
      }
      var dailyGain = Math.floor(count * (growthPct / 100) / 365);

      /* Generate mini sparkline data (last 12 data points) */
      var spark = [];
      for (var s = 0; s < 12; s++) {
        spark.push(50 + Math.floor(Math.random() * 50));
      }

      platData.push({
        platform: p,
        name: conf.name,
        color: conf.color,
        icon: conf.icon,
        count: count,
        dailyGain: dailyGain,
        ratePerMin: Math.max(1, Math.floor(dailyGain / 1440)),
        spark: spark
      });
    });

    /* Render total counter */
    var totalEl = document.getElementById('lcTotalNum');
    var deltaEl = document.getElementById('lcTotalDelta');
    var totalTrend = creator.trends && creator.trends.followers;
    var totalDailyGain = totalTrend && totalTrend.delta ? Math.round(totalTrend.delta) : platData.reduce(function(s, p) { return s + p.dailyGain; }, 0);
    totalEl.textContent = totalFollowers.toLocaleString();
    deltaEl.className = 'as-lc-total-delta as-trend-' + ((totalTrend && totalTrend.dir) || (totalDailyGain > 0 ? 'up' : 'flat'));
    deltaEl.innerHTML = totalDailyGain ? ((totalDailyGain > 0 ? '&uarr; +' : '&darr; ') + Math.abs(totalDailyGain).toLocaleString() + ' today' + ((totalTrend && totalTrend.estimated) ? ' (est.)' : '')) : 'Growth estimate unavailable';

    /* Render platform cards */
    var grid = document.getElementById('lcGrid');
    grid.setAttribute('data-count', String(platData.length));
    if (!platData.length) {
      totalEl.textContent = totalFollowers ? totalFollowers.toLocaleString() : 'Not available';
      grid.innerHTML = emptyCard('Platform-level follower counts are not available for this creator yet.');
      return;
    }
    var html = '';
    platData.forEach(function(pd) {
      var sparkHTML = '<div class="as-lc-card-spark">';
      pd.spark.forEach(function(h) {
        sparkHTML += '<span style="height:' + h + '%;background:' + pd.color + '"></span>';
      });
      sparkHTML += '</div>';

      var cardTrend = creator.trends && creator.trends.platformCounts ? creator.trends.platformCounts[pd.platform] : null;
      var cardDelta = cardTrend && cardTrend.delta ? Math.round(cardTrend.delta) : pd.dailyGain;
      var cardDir = (cardTrend && cardTrend.dir) || (cardDelta > 0 ? 'up' : 'flat');
      html += '<div class="as-lc-card" style="--plat-color:' + pd.color + '" data-platform="' + pd.platform + '" data-count="' + pd.count + '" data-rate="' + pd.ratePerMin + '">' +
        '<div class="as-lc-card-icon">' + pd.icon + '</div>' +
        '<div class="as-lc-card-platform" style="color:' + pd.color + '">' + pd.name + '</div>' +
        '<div class="as-lc-card-count" id="lc-' + pd.platform + '">' + pd.count.toLocaleString() + '</div>' +
        '<div class="as-lc-card-delta as-trend-' + cardDir + '">' + (cardDelta ? ((cardDelta > 0 ? '&uarr; +' : '&darr; ') + Math.abs(cardDelta).toLocaleString() + '/day') : '&rarr; No change') + '</div>' +
        '<div class="as-lc-card-rate">\u2248 ' + pd.ratePerMin + ' new follower' + (pd.ratePerMin > 1 ? 's' : '') + '/min</div>' +
        sparkHTML +
        '<div class="as-lc-card-bar"></div>' +
      '</div>';
    });
    grid.innerHTML = html;

    /* ── ANIMATE: Odometer-style counting ─────────────── */
    /* ── LIVE TICK: Increment counters every few seconds ── */
    /* Update sparkline bars randomly */
    /* Static source-data snapshot: do not invent live movement between syncs. */
  })();

  /* ===== RENDER NET WORTH ===== */
  (function renderNetWorth() {
    var snapshots = (creator._apiSnapshots || []).slice().sort(function(a, b) {
      return (b.date || '').localeCompare(a.date || '');
    });
    var latestSnapshot = snapshots[0] || null;
    var previousSnapshot = snapshots.find(function(row) {
      return latestSnapshot && row.date && row.date !== latestSnapshot.date;
    }) || null;
    var total = latestSnapshot && latestSnapshot.netWorth ? latestSnapshot.netWorth : creator.netWorth;
    var valuationLabel = total ? 'Tracked creator valuation' : 'Valuation tracking';
    var netWorthMode = latestSnapshot && latestSnapshot.netWorth ? 'Snapshot-backed estimate' : (creator.netWorth ? 'Profile-backed estimate' : 'Not tracked yet');
    var evidenceStatus = latestSnapshot && latestSnapshot.date
      ? 'Latest snapshot ' + latestSnapshot.date
      : 'Waiting for a verified valuation source';
    var html = '<div class="as-nw-hero">' +
      '<div class="as-nw-kicker">' + valuationLabel + '</div>' +
      '<strong class="as-nw-total">' + (total ? fmtUSDFull(total) : 'Not tracked yet') + '</strong>' +
      '<p class="as-nw-subcopy">Built only from tracked AfroStream profile values and dated snapshot reads. No synthetic sponsorship, merch, or payout split is shown here.</p>' +
      '<div class="as-nw-facts" aria-label="Estimate context">' +
        '<span><b>Mode</b>' + netWorthMode + '</span>' +
        '<span><b>Basis</b>Profile plus snapshot history</span>' +
        '<span><b>Status</b>' + evidenceStatus + '</span>' +
      '</div>' +
    '</div>';

    if (latestSnapshot && latestSnapshot.date) {
      html += '<div class="as-nw-breakdown">';
      html += '<div class="as-nw-row">' +
        '<div class="as-nw-row-label">Latest tracked read</div>' +
        '<div class="as-nw-row-bar"><div class="as-nw-bar-fill" style="width:100%;background:#007AFF"></div></div>' +
        '<div class="as-nw-row-val">' + latestSnapshot.date + '</div>' +
      '</div>';
      if (previousSnapshot && previousSnapshot.netWorth && latestSnapshot.netWorth) {
        var delta = latestSnapshot.netWorth - previousSnapshot.netWorth;
        var deltaLabel = delta === 0 ? 'No change' : (delta > 0 ? '+' : '') + fmtUSDFull(delta);
        html += '<div class="as-nw-row">' +
          '<div class="as-nw-row-label">Change vs previous read</div>' +
          '<div class="as-nw-row-bar"><div class="as-nw-bar-fill" style="width:100%;background:' + (delta >= 0 ? '#10B981' : '#F59E0B') + '"></div></div>' +
          '<div class="as-nw-row-val">' + deltaLabel + '</div>' +
        '</div>';
      }
      html += '</div>';
    } else {
      html += '<div class="as-nw-empty">' +
        '<strong>No tracked valuation yet</strong>' +
        '<span>AfroStream will show a value here after a verified profile estimate or dated snapshot read is attached.</span>' +
      '</div>';
    }

    html += '<div class="as-nw-disclaimer">Valuation rows should be source-backed. AfroStream does not infer private earnings, sponsorship totals, or gifter payouts from thin public signals.</div>';

    document.getElementById('networthCard').innerHTML = html;
  })();

  /* ===== RENDER STREAM HISTORY ===== */
  (function renderStreams() {
    if (!streams.length) {
      document.getElementById('streamHistory').innerHTML = emptyCard('No recent stream records are published for this creator yet.');
      return;
    }
    var html = '<div class="as-stream-table"><div class="as-stream-header">' +
      '<span>Date</span><span>Title</span><span>Platform</span><span>Duration</span><span>Peak</span><span>Gifts</span>' +
    '</div>';
    streams.forEach(function(s) {
      var pm = PLATFORM_META[s.platform] || { color: '#007AFF', icon: '\u25B6', name: s.platform || 'Stream' };
      var streamTitle = String(s.title || '').trim();
      if (!streamTitle || streamTitle.length < 3) streamTitle = creator.name + ' stream';
      html += '<div class="as-stream-row">' +
        '<span class="as-stream-date">' + s.date.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + '</span>' +
        '<span class="as-stream-title">' + (s.isLive ? '<span class="as-live-dot"></span>' : '') + streamTitle + '</span>' +
        '<span class="as-stream-plat" style="color:' + pm.color + '">' + pm.icon + ' ' + pm.name + '</span>' +
        '<span>' + (s.duration ? s.duration + ' min' : '-') + '</span>' +
        '<span>' + fmtNum(s.peakViewers) + '</span>' +
        '<span class="as-stream-gifts">' + fmtUSD(s.gifts) + '</span>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('streamHistory').innerHTML = html;
  })();

  /* ===== RENDER UPCOMING ===== */
  (function renderUpcoming() {
    if (!upcoming.length) {
      document.getElementById('upcomingStreams').innerHTML = emptyCard('No upcoming streams are scheduled in AfroStream yet. Live tracking checks YouTube, Twitch, and Kick throughout the day.');
      return;
    }
    var html = '';
    upcoming.forEach(function(u) {
      var pm = PLATFORM_META[u.platform] || { color: '#007AFF', icon: '\u25B6', name: u.platform || 'Stream' };
      html += '<div class="as-upcoming-card">' +
        '<div class="as-upcoming-date">' +
          '<div class="as-upcoming-day">' + u.date.toLocaleDateString('en-US',{weekday:'short'}) + '</div>' +
          '<div class="as-upcoming-num">' + u.date.getDate() + '</div>' +
          '<div class="as-upcoming-month">' + u.date.toLocaleDateString('en-US',{month:'short'}) + '</div>' +
        '</div>' +
        '<div class="as-upcoming-info">' +
          '<div class="as-upcoming-title">' + u.title + '</div>' +
          '<div class="as-upcoming-meta">' +
            '<span style="color:' + pm.color + '">' + pm.icon + ' ' + pm.name + '</span>' +
            '<span>' + u.date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="as-upcoming-actions">' +
          '<button class="as-btn as-btn-sm as-btn-outline" onclick="setReminder(this)">Set Reminder</button>' +
          '<a href="' + (u.url || '#') + '" class="as-btn as-btn-sm as-btn-primary"' + (u.url ? ' target="_blank" rel="noopener"' : '') + '>Watch &rarr;</a>' +
        '</div>' +
      '</div>';
    });
    document.getElementById('upcomingStreams').innerHTML = html;
  })();

  /* ===== RENDER GIFTERS ===== */
  (function renderGifters() {
    if (!gifters.length) {
      document.getElementById('giftersList').innerHTML = emptyCard('Verified gifter tracking is active, but no public supporter rows are available for this creator yet.');
      return;
    }
    var html = '';
    gifters.forEach(function(g) {
      var badge = g.rank === 1 ? '<span class="as-gifter-crown">\uD83D\uDC51 Top Supporter</span>' : '';
      html += '<div class="as-gifter-row' + (g.rank === 1 ? ' as-gifter-top' : '') + '">' +
        '<span class="as-gifter-rank">#' + g.rank + '</span>' +
        '<span class="as-gifter-name">' + g.name + badge + (g.source ? '<span class="as-gifter-source">' + g.source + '</span>' : '') + '</span>' +
        '<span class="as-gifter-amount">' + fmtUSD(g.amount) + '</span>' +
      '</div>';
    });
    document.getElementById('giftersList').innerHTML = html;
  })();

  /* ===== RENDER RELATED ===== */
  (function renderRelated() {
    var related = relatedFromApi.length ? relatedFromApi : CREATORS.filter(function(c) {
      return c.id !== creator.id && c.slug !== creator.slug && (c.category === creator.category || c.country === creator.country);
    }).slice(0, 4);

    if (!related.length) {
      document.getElementById('relatedGrid').innerHTML = emptyCard('Related creators will appear here after the next ranking sync.');
      return;
    }

    var html = '';
    related.forEach(function(c) {
      var linkParam = c.slug || c.id;
      html += '<a href="creator.html?id=' + linkParam + '" class="as-related-card">' +
        '<div class="as-related-avatar" style="background:' + avatarGradient(c.name) + '">' + c.avatar + '</div>' +
        '<div class="as-related-name">' + c.name + '</div>' +
        '<div class="as-related-meta">' + c.flag + ' ' + c.category + '</div>' +
        '<div class="as-related-followers">' + fmtNum(c.followers) + ' followers</div>' +
      '</a>';
    });
    document.getElementById('relatedGrid').innerHTML = html;
  })();

  /* ===== RENDER NEWS ===== */
  (function renderNews() {
    if (!news.length) {
      document.getElementById('newsList').innerHTML = emptyCard('No verified news mentions are attached to this creator profile yet. RSS mention monitoring is ready for configured sources.');
      return;
    }
    var html = '';
    news.forEach(function(n) {
      html += '<a class="as-news-card" href="' + (n.url || '#') + '"' + (n.url && n.url.indexOf('http') === 0 ? ' target="_blank" rel="noopener"' : '') + '>' +
        '<div class="as-news-source">' + n.source + '</div>' +
        '<div class="as-news-headline">' + n.headline + '</div>' +
        (n.excerpt ? '<div class="as-news-excerpt">' + n.excerpt + '</div>' : '') +
        '<div class="as-news-date">' + n.date.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) + '</div>' +
      '</a>';
    });
    document.getElementById('newsList').innerHTML = html;
  })();

  /* Expose creator for action functions */
  creator.url = creatorUrl;
  window._asCreator = creator;
})();

/* ===== ACTIONS ===== */
function toggleFollow() {
  var creator = window._asCreator;
  if (!creator) return;
  var followed = JSON.parse(localStorage.getItem('as_following') || '[]');
  var idx = followed.indexOf(creator.id);
  var btn = document.getElementById('followBtn');
  if (idx === -1) {
    followed.push(creator.id);
    btn.textContent = 'Following';
    btn.classList.add('as-btn-following');
  } else {
    followed.splice(idx, 1);
    btn.textContent = 'Follow';
    btn.classList.remove('as-btn-following');
  }
  localStorage.setItem('as_following', JSON.stringify(followed));
}

function shareProfile() {
  var creator = window._asCreator;
  var url = (creator && creator.url) || window.location.href;
  if (navigator.share) {
    navigator.share({title: (creator ? creator.name : 'Creator') + ' on AfroStream', url: url});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url);
    alert('Profile link copied!');
  }
}

function setReminder(btn) {
  btn.textContent = 'Reminder Set';
  btn.disabled = true;
  btn.style.opacity = '0.6';
}

/* Scroll reveal */
(function () {
  var els = document.querySelectorAll('.rv');
  if (!els.length) return;
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.1 });
  els.forEach(function (el) { obs.observe(el); });
})();
