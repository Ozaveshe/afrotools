/* ================================================================
   AfroStream News — Clean White Redesign
   Sharp, minimal, magazine-quality light theme
   ================================================================ */

/* -- FOUNDATIONS ------------------------------------------------- */
.as-news-page {
  --news-bg: #FAFAF8;
  --news-surface: #ffffff;
  --news-surface-2: #f5f5f7;
  --news-border: #e5e7eb;
  --news-border-hover: rgba(0, 98, 204, .3);
  --news-text: #111827;
  --news-text-muted: #6b7280;
  --news-accent: #0062CC;
  --news-accent-light: #4DA3FF;
  --news-radius: 12px;
  --news-radius-sm: 8px;
  --serif: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  background: var(--news-bg);
  color: var(--news-text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* -- SUBNAV ----------------------------------------------------- */
.as-subnav { background: #fff; border-bottom: 1px solid var(--news-border); position: sticky; top: 60px; z-index: 90; }
.as-subnav-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 48px; }
.as-subnav-logo { display: flex; align-items: center; gap: 6px; font-family: var(--sans); font-size: 1.1rem; font-weight: 500; color: var(--news-text); text-decoration: none; white-space: nowrap; }
.as-logo-icon { color: var(--news-accent); font-size: .9rem; }
.as-subnav-links { display: flex; gap: 2px; margin-left: auto; }
.as-subnav-links a { padding: 6px 12px; border-radius: 6px; color: var(--news-text-muted); text-decoration: none; font-size: .82rem; font-weight: 500; transition: all .2s; }
.as-subnav-links a:hover { color: var(--news-text); background: var(--news-surface-2); }
.as-subnav-links a.active { color: #fff; background: var(--news-accent); }
.as-subnav-actions { display: flex; align-items: center; gap: 10px; margin-left: 12px; }
.as-search-wrap { position: relative; }
.as-search-input { background: var(--news-surface-2); border: 1px solid var(--news-border); border-radius: 6px; padding: 6px 12px 6px 32px; color: var(--news-text); font-size: .82rem; width: 180px; outline: none; transition: border-color .2s, width .3s; font-family: var(--sans); }
.as-search-input:focus { border-color: var(--news-accent); width: 240px; }
.as-search-wrap::before { content: '\1F50D'; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: .75rem; opacity: .45; pointer-events: none; }
.as-btn-outline { border: 1px solid var(--news-border); background: #fff; color: var(--news-text-muted); padding: 5px 14px; border-radius: 6px; font-size: .78rem; font-weight: 600; text-decoration: none; transition: all .2s; cursor: pointer; font-family: var(--sans); }
.as-btn-outline:hover { border-color: var(--news-accent); color: var(--news-accent); }

/* -- HERO SECTION ----------------------------------------------- */
.as-news-hero-section { max-width: 1280px; margin: 0 auto; padding: 36px 24px 0; }
.as-news-hero-label { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.as-news-hero-label span { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--news-accent); }
.as-news-hero-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--news-accent-light), transparent); }
.as-news-hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; border-radius: var(--news-radius); overflow: hidden; min-height: 440px; }

.as-hero-featured { position: relative; cursor: pointer; overflow: hidden; }
.as-hero-featured, .as-hero-side-card, .as-news-card, .as-related-card { display: block; color: inherit; text-decoration: none; }
.as-hero-featured-img { position: absolute; inset: 0; transition: transform .6s ease; }
.as-hero-featured:hover .as-hero-featured-img { transform: scale(1.03); }
.as-hero-featured-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,.82) 0%, rgba(0,0,0,.3) 50%, rgba(0,0,0,.1) 100%); z-index: 1; }
.as-hero-featured-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 32px; z-index: 2; }
.as-hero-featured-content .as-cat-badge { margin-bottom: 12px; }
.as-hero-featured-content h2 { font-family: var(--sans); font-size: clamp(1.6rem, 2.8vw, 2.25rem); font-weight: 800; line-height: 1.15; color: #fff; margin: 0 0 10px; }
.as-hero-featured-content p { color: rgba(255,255,255,.75); font-size: .88rem; line-height: 1.55; max-width: 520px; margin: 0 0 12px; }
.as-hero-featured-meta { display: flex; align-items: center; gap: 12px; font-size: .75rem; color: rgba(255,255,255,.5); }
.as-hero-featured-meta span { display: flex; align-items: center; gap: 4px; }

.as-hero-side { display: flex; flex-direction: column; gap: 2px; }
.as-hero-side-card { flex: 1; position: relative; cursor: pointer; overflow: hidden; min-height: 0; }
.as-hero-side-card-img { position: absolute; inset: 0; transition: transform .5s ease; }
.as-hero-side-card:hover .as-hero-side-card-img { transform: scale(1.05); }
.as-hero-side-card-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,.85) 0%, rgba(0,0,0,.2) 100%); z-index: 1; }
.as-hero-side-card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; z-index: 2; }
.as-hero-side-card-content .as-cat-badge { margin-bottom: 8px; font-size: .62rem; }
.as-hero-side-card-content h3 { font-family: var(--sans); font-size: 1.05rem; font-weight: 800; line-height: 1.25; color: #fff; margin: 0 0 6px; }
.as-hero-side-card-content .as-hero-card-meta { font-size: .72rem; color: rgba(255,255,255,.45); }

/* -- CATEGORY BADGES -------------------------------------------- */
.as-cat-badge {
  display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 16px;
  font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: #fff;
}
.as-cat-badge[data-cat="milestones"] { background: linear-gradient(135deg, #0062CC, #0063CC); }
.as-cat-badge[data-cat="platform"]   { background: linear-gradient(135deg, #06B6D4, #0891B2); }
.as-cat-badge[data-cat="collabs"]    { background: linear-gradient(135deg, #EC4899, #DB2777); }
.as-cat-badge[data-cat="drama"]      { background: linear-gradient(135deg, #F97316, #EA580C); }
.as-cat-badge[data-cat="business"]   { background: linear-gradient(135deg, #22C55E, #16A34A); }
.as-cat-badge[data-cat="rising"]     { background: linear-gradient(135deg, #14B8A6, #0D9488); }

/* -- FILTER BAR ------------------------------------------------- */
.as-filter-section { max-width: 1280px; margin: 0 auto; padding: 32px 24px 0; }
.as-filter-bar { display: flex; flex-wrap: wrap; gap: 6px; }
.as-filter-pill {
  padding: 6px 18px; border-radius: 100px; border: 1px solid var(--news-border);
  background: #fff; color: var(--news-text-muted); font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .2s; font-family: var(--sans); white-space: nowrap;
}
.as-filter-pill:hover { border-color: var(--news-accent); color: var(--news-accent); }
.as-filter-pill.active { background: var(--news-accent); border-color: var(--news-accent); color: #fff; }

/* -- MAIN LAYOUT ------------------------------------------------ */
.as-news-layout { max-width: 1280px; margin: 0 auto; padding: 28px 24px 56px; display: grid; grid-template-columns: 1fr 320px; gap: 32px; }

/* -- NEWS GRID -------------------------------------------------- */
.as-news-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

.as-news-card {
  background: var(--news-surface); border: 1px solid var(--news-border);
  border-radius: var(--news-radius); overflow: hidden; cursor: pointer;
  transition: all .3s cubic-bezier(.4,0,.2,1); position: relative;
}
.as-news-card:hover {
  border-color: var(--news-border-hover); transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.08);
}
.as-news-card-img { height: 180px; position: relative; overflow: hidden; }
.as-news-card-img-inner { position: absolute; inset: 0; transition: transform .5s ease; }
.as-news-card:hover .as-news-card-img-inner { transform: scale(1.05); }
.as-news-card-img .as-cat-badge { position: absolute; top: 12px; left: 12px; z-index: 2; }
.as-news-card-img::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(0deg, rgba(0,0,0,.3) 0%, transparent 100%); z-index: 1;
}
.as-news-card-body { padding: 16px 18px 18px; }
.as-news-card-title {
  font-family: var(--sans); font-size: 1.05rem; font-weight: 800; line-height: 1.3; color: var(--news-text);
  margin: 0 0 8px; transition: color .2s;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.as-news-card:hover .as-news-card-title { color: var(--news-accent); }
.as-news-card-excerpt {
  font-size: .82rem; line-height: 1.5; color: var(--news-text-muted); margin: 0 0 12px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.as-news-card-meta { display: flex; align-items: center; gap: 10px; font-size: .72rem; color: var(--news-text-muted); }
.as-news-card-meta span { opacity: .8; }
.as-news-card-meta .as-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--news-text-muted); opacity: .4; }

/* -- LOAD MORE -------------------------------------------------- */
.as-load-more-wrap { text-align: center; padding: 32px 0 0; }
.as-btn-load {
  padding: 12px 40px; border-radius: 100px; border: 1px solid var(--news-border);
  background: #fff; color: var(--news-text); font-size: .85rem; font-weight: 600;
  cursor: pointer; transition: all .25s; font-family: var(--sans); letter-spacing: .02em;
}
.as-btn-load:hover { background: var(--news-accent); border-color: var(--news-accent); color: #fff; }

/* -- SIDEBAR ---------------------------------------------------- */
.as-news-sidebar { display: flex; flex-direction: column; gap: 20px; }
.as-sidebar-card {
  background: var(--news-surface); border: 1px solid var(--news-border);
  border-radius: var(--news-radius); padding: 20px; position: relative;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.as-sidebar-title {
  font-family: var(--sans); font-size: 1.05rem; font-weight: 800; color: var(--news-text);
  margin: 0 0 14px; padding-bottom: 12px; border-bottom: 1px solid var(--news-border);
}

/* Trending pills */
.as-trending-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.as-trending-pill {
  padding: 5px 12px; border-radius: 100px; background: var(--news-surface-2);
  border: 1px solid var(--news-border); color: var(--news-accent); font-size: .75rem;
  font-weight: 600; cursor: default; transition: all .2s;
}
.as-trending-pill:hover { border-color: var(--news-accent); background: #E8F2FF; }

/* Mini leaderboard */
.as-mini-leaderboard { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
.as-lb-item {
  display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--news-radius-sm); transition: background .2s;
}
.as-lb-item:hover { background: var(--news-surface-2); }
.as-lb-rank { font-size: .82rem; font-weight: 800; color: var(--news-accent); text-align: center; }
.as-lb-item:first-child .as-lb-rank { color: #f59e0b; }
.as-lb-item:nth-child(2) .as-lb-rank { color: #94a3b8; }
.as-lb-item:nth-child(3) .as-lb-rank { color: #b45309; }
.as-lb-name { font-size: .82rem; font-weight: 600; color: var(--news-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.as-lb-score { font-size: .7rem; color: var(--news-text-muted); white-space: nowrap; }
.as-lb-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }

/* CTA card */
.as-sidebar-cta { text-align: center; background: linear-gradient(135deg, #fff 0%, #E8F2FF 100%); }
.as-sidebar-cta p { font-size: .82rem; color: var(--news-text-muted); line-height: 1.5; margin: 0 0 14px; }
.as-btn-cta {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border-radius: 100px;
  background: var(--news-accent); color: #fff; font-size: .82rem; font-weight: 700;
  text-decoration: none; transition: all .25s; border: none; cursor: pointer; font-family: var(--sans);
}
.as-btn-cta:hover { background: #0063CC; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,98,204,.25); }

/* -- ARTICLE PAGE ----------------------------------------------- */
.as-article-page { max-width: 1280px; margin: 0 auto; padding: 28px 24px 56px; }
.as-article-back {
  display: inline-flex; align-items: center; gap: 6px; color: var(--news-accent);
  font-size: .85rem; font-weight: 600; text-decoration: none; margin-bottom: 24px;
  transition: opacity .2s;
}
.as-article-back:hover { opacity: .7; }
.as-article-header { max-width: 700px; margin: 0 auto 28px; }
.as-article-header .as-cat-badge { margin-bottom: 14px; }
.as-article-title { font-family: var(--sans); font-size: clamp(1.75rem, 3.6vw, 2.6rem); font-weight: 800; line-height: 1.15; color: var(--news-text); margin: 0 0 14px; }
.as-article-meta { display: flex; align-items: center; gap: 10px; font-size: .82rem; color: var(--news-text-muted); flex-wrap: wrap; }
.as-article-banner {
  width: 100%; height: 300px; border-radius: var(--news-radius); margin-bottom: 32px;
  overflow: hidden;
}
.as-article-banner-inner { width: 100%; height: 100%; }
.as-article-body {
  max-width: 700px; margin: 0 auto; font-size: .95rem; line-height: 1.85;
  color: #374151;
}
.as-article-body p { margin: 0 0 18px; }
.as-article-body p:last-child { margin-bottom: 0; }

/* Share buttons */
.as-article-share { max-width: 700px; margin: 36px auto 0; padding-top: 24px; border-top: 1px solid var(--news-border); }
.as-article-share-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--news-text-muted); margin-bottom: 12px; }
.as-share-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.as-share-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 100px;
  border: 1px solid var(--news-border); background: #fff; color: var(--news-text);
  font-size: .78rem; font-weight: 600; cursor: pointer; transition: all .2s; font-family: var(--sans);
  text-decoration: none;
}
.as-share-btn:hover { border-color: var(--news-accent); color: var(--news-accent); }
.as-share-btn.copied { background: var(--news-accent); color: #fff; border-color: var(--news-accent); }

/* Related articles */
.as-related-section { max-width: 700px; margin: 48px auto 0; }
.as-related-title { font-family: var(--sans); font-size: 1.25rem; font-weight: 800; color: var(--news-text); margin: 0 0 20px; }
.as-related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.as-related-card {
  background: var(--news-surface); border: 1px solid var(--news-border);
  border-radius: var(--news-radius); overflow: hidden; cursor: pointer; transition: all .25s;
}
.as-related-card:hover { border-color: var(--news-border-hover); box-shadow: 0 4px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
.as-related-card-img { height: 120px; position: relative; }
.as-related-card-img .as-cat-badge { position: absolute; top: 8px; left: 8px; z-index: 2; font-size: .6rem; }
.as-related-card-body { padding: 12px 14px 14px; }
.as-related-card-body h4 {
  font-family: var(--sans); font-size: .92rem; font-weight: 800; line-height: 1.3; color: var(--news-text); margin: 0 0 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.as-related-card-body .as-related-meta { font-size: .7rem; color: var(--news-text-muted); }

/* -- EMPTY STATE ------------------------------------------------ */
.as-empty-state { text-align: center; padding: 60px 24px; color: var(--news-text-muted); }
.as-empty-state p { font-size: 1rem; }

/* -- SCROLL REVEAL ---------------------------------------------- */
.rv { opacity: 0; transform: translateY(20px); transition: opacity .5s ease, transform .5s ease; }
.rv.visible { opacity: 1; transform: translateY(0); }

/* -- RESPONSIVE ------------------------------------------------- */
@media (max-width: 1024px) {
  .as-news-layout { grid-template-columns: 1fr; }
  .as-news-sidebar { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .as-related-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .as-news-hero-inner { grid-template-columns: 1fr; min-height: auto; }
  .as-hero-featured { min-height: 340px; }
  .as-hero-side { flex-direction: row; gap: 2px; }
  .as-hero-side-card { min-height: 180px; }
  .as-news-grid { grid-template-columns: 1fr; }
  .as-subnav { overflow: visible !important; }
  .as-subnav-inner { flex-wrap: nowrap !important; height: 48px !important; padding: 0 12px; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .as-subnav-inner::-webkit-scrollbar { display: none; }
  .as-subnav-links { order: 0; width: auto; flex-shrink: 0; }
  .as-subnav-links a { padding: 6px 10px; font-size: .75rem; }
  .as-subnav-actions { display: none !important; }
  .as-subnav-logo { font-size: 1rem; }
  .as-hero-featured-content { padding: 20px; }
  .as-hero-featured-content h2 { font-size: 1.4rem; }
  .as-article-banner { height: 220px; }
  .as-related-grid { grid-template-columns: 1fr; }
  .as-filter-bar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scrollbar-width: none; }
  .as-filter-bar::-webkit-scrollbar { display: none; }
}
@media (max-width: 480px) {
  .as-hero-side { flex-direction: column; }
  .as-hero-side-card { min-height: 160px; }
  .as-filter-pill { padding: 5px 12px; font-size: .72rem; }
  .as-news-hero-section { padding-top: 24px; }
  .as-article-title { font-size: 1.5rem; }
}

<script src="/tools/afrostream/news-utils.js?v=3a1a65c4"></script>
<script>
/* ================================================================
   AfroStream — Creator News Feed (Rebuilt)
   Fetches live data from the AfroStream news API.
   Article pages via ?article=slug instead of modal.
   ================================================================ */
(function() {
  'use strict';
  var AS_UTIL = window.AfroStreamNewsUtils || {};

  /* -- FETCH LIVE NEWS ------------------------------------------ */
  var NEWS = [];

  async function fetchNews() {
    try {
      var res = await fetch('/api/afrostream/news?limit=50');
      var json = await res.json();
      if (json.success && json.data && json.data.length) {
        return json.data.map(function(row) {
          return {
            id:        row.id,
            slug:      row.slug || ('news-' + row.id),
            cat:       (row.category || row.cat || 'milestones').toLowerCase(),
            catLabel:  row.category_label || row.catLabel || capitalize(row.category || row.cat || 'Milestones'),
            headline:  row.headline || row.title || '',
            excerpt:   row.excerpt || row.summary || '',
            date:      new Date(row.published_at || row.date || row.created_at || Date.now()),
            readTime:  row.read_time || row.readTime || 3,
            author:    row.author || 'AfroStream Team',
            gradient:  row.gradient || CAT_GRADIENTS[((row.category || row.cat || 'milestones')).toLowerCase()] || 'linear-gradient(135deg, #0062CC 0%, #0063CC 100%)',
            imageUrl:  row.image_url || row.imageUrl || '',
            featured:  row.is_featured || row.featured || false,
            body:      row.body || row.content || ''
          };
        });
      }
    } catch(e) { /* leave feed empty until the API returns */ }
    return [];
  }

  /* -- FETCH CREATORS FOR SIDEBAR ------------------------------- */
  async function fetchCreators() {
    try {
      var res = await fetch('/api/afrostream/creators?sort=afro_score&limit=5');
      var json = await res.json();
      if (json.success && json.data && json.data.length) {
        return json.data.map(function(c) {
          return {
            name: c.name || c.channel_name || '',
            country: c.country_code || c.country || '',
            score: c.afro_score ? ('AfroScore ' + c.afro_score) : (c.subscribers ? formatSubs(c.subscribers) : (c.score || '')),
            avatar: c.avatar || c.avatar_url || c.image_url || ''
          };
        });
      }
    } catch(e) { /* live sidebar stays empty until the API returns */ }
    return [];
  }

  function formatSubs(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(2).replace(/\.?0+$/, '') + 'M subs';
    if (n >= 1000) return Math.round(n / 1000) + 'K subs';
    return n + ' subs';
  }

  function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  var TRENDING = [
    '#AfricanCreators', '#AfroStreamLive', '#CreatorEconomy',
    '#AfricanStreaming', '#AfroTech', '#LiveCreators'
  ];

  var FLAG = { NG: '\uD83C\uDDF3\uD83C\uDDEC', KE: '\uD83C\uDDF0\uD83C\uDDEA', GH: '\uD83C\uDDEC\uD83C\uDDED', ET: '\uD83C\uDDEA\uD83C\uDDF9', SA: '\uD83C\uDDFF\uD83C\uDDE6', EG: '\uD83C\uDDEA\uD83C\uDDEC', TZ: '\uD83C\uDDF9\uD83C\uDDFF', CM: '\uD83C\uDDE8\uD83C\uDDF2' };

  var CAT_GRADIENTS = {
    milestones: 'linear-gradient(135deg, #0062CC, #0063CC)',
    platform:   'linear-gradient(135deg, #06B6D4, #0891B2)',
    collabs:    'linear-gradient(135deg, #EC4899, #DB2777)',
    drama:      'linear-gradient(135deg, #F97316, #EA580C)',
    business:   'linear-gradient(135deg, #22C55E, #16A34A)',
    rising:     'linear-gradient(135deg, #14B8A6, #0D9488)'
  };

  var visibleCount = 8;

  /* -- HELPERS --------------------------------------------------- */
  function relativeDate(d) {
    var diff = Date.now() - d.getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + ' min' + (mins !== 1 ? 's' : '') + ' ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + ' hour' + (hrs !== 1 ? 's' : '') + ' ago';
    var days = Math.floor(hrs / 24);
    if (days === 1) return 'Yesterday';
    if (days < 30) return days + ' days ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function imgStyle(n) {
    if (AS_UTIL.imageStyle) return AS_UTIL.imageStyle(n);
    if (n.imageUrl) return 'background-image:url(' + n.imageUrl + ');background-size:cover;background-position:center;background-repeat:no-repeat';
    return 'background:' + (n.gradient || CAT_GRADIENTS[n.cat] || CAT_GRADIENTS.milestones);
  }

  function navigateToArticle(slug) {
    window.location.href = AS_UTIL.articleHref ? AS_UTIL.articleHref(slug) : ('/tools/afrostream/article.html?slug=' + encodeURIComponent(slug));
  }

  function articleHref(slug) {
    return AS_UTIL.articleHref ? AS_UTIL.articleHref(slug) : ('/tools/afrostream/article.html?slug=' + encodeURIComponent(slug));
  }

  /* -- HERO RENDER ---------------------------------------------- */
  function renderHero(items) {
    var heroGrid = document.getElementById('heroGrid');
    if (!items.length) {
      heroGrid.innerHTML = '<div class="as-empty-state"><p>No stories yet.</p></div>';
      return;
    }

    var feat = items[0];
    var side1 = items[1] || null;
    var side2 = items[2] || null;

    var html = '<a href="' + articleHref(feat.slug) + '" class="as-hero-featured" data-slug="' + feat.slug + '">' +
      '<div class="as-hero-featured-img" style="' + imgStyle(feat) + '"></div>' +
      '<div class="as-hero-featured-overlay"></div>' +
      '<div class="as-hero-featured-content">' +
        '<span class="as-cat-badge" data-cat="' + feat.cat + '">' + feat.catLabel + '</span>' +
        '<h2>' + feat.headline + '</h2>' +
        '<p>' + feat.excerpt + '</p>' +
        '<div class="as-hero-featured-meta">' +
          '<span>' + feat.author + '</span>' +
          '<span>\u00B7</span>' +
          '<span>' + relativeDate(feat.date) + '</span>' +
          '<span>\u00B7</span>' +
          '<span>' + feat.readTime + ' min read</span>' +
        '</div>' +
      '</div>' +
    '</a>';

    html += '<div class="as-hero-side">';
    [side1, side2].forEach(function(card) {
      if (!card) return;
      html += '<a href="' + articleHref(card.slug) + '" class="as-hero-side-card" data-slug="' + card.slug + '">' +
        '<div class="as-hero-side-card-img" style="' + imgStyle(card) + '"></div>' +
        '<div class="as-hero-side-card-overlay"></div>' +
        '<div class="as-hero-side-card-content">' +
          '<span class="as-cat-badge" data-cat="' + card.cat + '">' + card.catLabel + '</span>' +
          '<h3>' + card.headline + '</h3>' +
          '<div class="as-hero-card-meta">' + relativeDate(card.date) + ' \u00B7 ' + card.readTime + ' min read</div>' +
        '</div>' +
      '</a>';
    });
    html += '</div>';

    heroGrid.innerHTML = html;
  }

  /* -- CARD RENDER ---------------------------------------------- */
  function newsCard(n) {
    return '<a href="' + articleHref(n.slug) + '" class="as-news-card rv" data-cat="' + n.cat + '" data-slug="' + n.slug + '">' +
      '<div class="as-news-card-img">' +
        '<div class="as-news-card-img-inner" style="' + imgStyle(n) + '"></div>' +
        '<span class="as-cat-badge" data-cat="' + n.cat + '">' + n.catLabel + '</span>' +
      '</div>' +
      '<div class="as-news-card-body">' +
        '<h3 class="as-news-card-title">' + n.headline + '</h3>' +
        '<p class="as-news-card-excerpt">' + n.excerpt + '</p>' +
        '<div class="as-news-card-meta">' +
          '<span>' + relativeDate(n.date) + '</span>' +
          '<span class="as-meta-dot"></span>' +
          '<span>' + n.readTime + ' min read</span>' +
          '<span class="as-meta-dot"></span>' +
          '<span>' + n.author + '</span>' +
        '</div>' +
      '</div>' +
    '</a>';
  }

  /* -- RENDER --------------------------------------------------- */
  function render(filter, search) {
    var filtered = NEWS.filter(function(n) {
      if (filter && filter !== 'all' && n.cat !== filter) return false;
      if (search) {
        var q = search.toLowerCase();
        if (n.headline.toLowerCase().indexOf(q) === -1 && n.excerpt.toLowerCase().indexOf(q) === -1) return false;
      }
      return true;
    });

    renderHero(filtered);

    var grid = document.getElementById('newsGrid');
    var loadWrap = document.getElementById('loadMoreWrap');

    var rest = filtered.slice(3);
    if (rest.length === 0) {
      grid.innerHTML = '';
      loadWrap.style.display = 'none';
      return;
    }

    var showing = rest.slice(0, visibleCount);
    grid.innerHTML = showing.map(newsCard).join('');
    loadWrap.style.display = rest.length > visibleCount ? '' : 'none';

    requestAnimationFrame(function() { observeReveal(); });
  }

  /* -- SIDEBAR -------------------------------------------------- */
  function renderSidebar(creators) {
    document.getElementById('trendingPills').innerHTML = TRENDING.map(function(t) {
      return '<span class="as-trending-pill">' + t + '</span>';
    }).join('');

    document.getElementById('miniLeaderboard').innerHTML = creators.map(function(c, i) {
      var avatar = c.avatar
        ? '<img class="as-lb-avatar" src="' + c.avatar + '" alt="' + c.name + '" loading="lazy">'
        : '';
      return '<li class="as-lb-item">' +
        '<span class="as-lb-rank">' + (i + 1) + '</span>' +
        avatar +
        '<span class="as-lb-name">' + (FLAG[c.country] || '') + ' ' + c.name + '</span>' +
        '<span class="as-lb-score">' + c.score + '</span>' +
      '</li>';
    }).join('');
  }

  /* -- ARTICLE PAGE --------------------------------------------- */
  function parseMarkdown(text) {
    if (AS_UTIL.renderMarkdown) return AS_UTIL.renderMarkdown(text);
    if (!text) return '';
    return text
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(?!<)/, '<p>')
      .replace(/(?!>)$/, '</p>');
  }

  function renderArticlePage(slug) {
    var article = NEWS.find(function(n) { return n.slug === slug; });
    if (!article) {
      // Show loading state while we try fetching directly from API
      document.getElementById('articlePage').innerHTML =
        '<a href="news.html" class="as-article-back">&larr; Back to News</a>' +
        '<div class="as-empty-state"><p style="color:#64748b" role="status" aria-live="polite">Loading article…</p></div>';
      document.getElementById('articlePage').style.display = '';
      document.getElementById('newsFeed').style.display = 'none';
      // Attempt direct API fetch as fallback
      fetch('/api/afrostream/news?slug=' + encodeURIComponent(slug))
        .then(function(r){ return r.json(); })
        .then(function(json){
          if (json.success && json.data) {
            var row = json.data;
            var mapped = {
              id:       row.id,
              slug:     row.slug || slug,
              cat:      (row.category || 'milestones').toLowerCase(),
              catLabel: row.category_label || capitalize(row.category || 'News'),
              headline: row.headline || row.title || '',
              excerpt:  row.excerpt || '',
              date:     new Date(row.published_at || row.created_at || Date.now()),
              readTime: row.read_time || 3,
              author:   row.author || 'AfroStream Team',
              gradient: row.gradient || CAT_GRADIENTS[(row.category||'milestones').toLowerCase()] || 'linear-gradient(135deg,#0062CC,#0063CC)',
              imageUrl: row.image_url || '',
              body:     row.body || row.content || row.excerpt || ''
            };
            if (!NEWS.length) NEWS.push(mapped);
            renderArticleHTML(mapped, []);
          } else {
            document.getElementById('articlePage').innerHTML =
              '<a href="news.html" class="as-article-back">&larr; Back to News</a>' +
              '<div class="as-empty-state"><p>Article not found.</p></div>';
          }
        })
        .catch(function(){
          document.getElementById('articlePage').innerHTML =
            '<a href="news.html" class="as-article-back">&larr; Back to News</a>' +
            '<div class="as-empty-state"><p>Could not load article. Please try again.</p></div>';
        });
      return;
    }

    // Related articles: same category, exclude current, max 3
    var related = NEWS.filter(function(n) { return n.cat === article.cat && n.slug !== article.slug; }).slice(0, 3);
    renderArticleHTML(article, related);
  }

  function renderArticleHTML(article, related) {
    var relatedHtml = '';
    if (related && related.length) {
      relatedHtml = '<div class="as-related-section">' +
        '<h3 class="as-related-title">Related Articles</h3>' +
        '<div class="as-related-grid">' +
        related.map(function(r) {
          return '<a href="' + articleHref(r.slug) + '" class="as-related-card" data-slug="' + r.slug + '">' +
            '<div class="as-related-card-img" style="' + imgStyle(r) + '">' +
              '<span class="as-cat-badge" data-cat="' + r.cat + '">' + r.catLabel + '</span>' +
            '</div>' +
            '<div class="as-related-card-body">' +
              '<h4>' + r.headline + '</h4>' +
              '<div class="as-related-meta">' + relativeDate(r.date) + ' \u00B7 ' + r.readTime + ' min read</div>' +
            '</div>' +
          '</a>';
        }).join('') +
        '</div></div>';
    }

    var shareUrl = AS_UTIL.canonicalUrl ? AS_UTIL.canonicalUrl(article.slug) : (window.location.origin + '/tools/afrostream/news/' + encodeURIComponent(article.slug));
    var shareText = encodeURIComponent(article.headline + ' - AfroStream');

    var html = '<a href="news.html" class="as-article-back">&larr; Back to News</a>' +
      '<div class="as-article-header">' +
        '<span class="as-cat-badge" data-cat="' + article.cat + '">' + article.catLabel + '</span>' +
        '<h1 class="as-article-title">' + article.headline + '</h1>' +
        '<div class="as-article-meta">' +
          '<span>' + article.author + '</span>' +
          '<span>\u00B7</span>' +
          '<span>' + formatDate(article.date) + '</span>' +
          '<span>\u00B7</span>' +
          '<span>' + article.readTime + ' min read</span>' +
        '</div>' +
      '</div>' +
      '<div class="as-article-banner"><div class="as-article-banner-inner" style="' + imgStyle(article) + '"></div></div>' +
      '<div class="as-article-body">' + parseMarkdown(article.body) + '</div>' +
      '<div class="as-article-share">' +
        '<div class="as-article-share-label">Share this article</div>' +
        '<div class="as-share-btns">' +
          '<button type="button" class="as-share-btn" id="copyLinkBtn" data-url="' + shareUrl + '">Copy Link</button>' +
          '<a class="as-share-btn" href="https://twitter.com/intent/tweet?url=' + encodeURIComponent(shareUrl) + '&text=' + shareText + '" target="_blank" rel="noopener">Twitter / X</a>' +
          '<a class="as-share-btn" href="https://wa.me/?text=' + shareText + '%20' + encodeURIComponent(shareUrl) + '" target="_blank" rel="noopener">WhatsApp</a>' +
        '</div>' +
      '</div>' +
      relatedHtml;

    document.getElementById('articlePage').innerHTML = html;
    document.getElementById('articlePage').style.display = '';
    document.getElementById('newsFeed').style.display = 'none';

    // Copy link handler
    var copyBtn = document.getElementById('copyLinkBtn');
    if (copyBtn) {
      copyBtn.addEventListener('click', function() {
        var url = this.getAttribute('data-url');
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function() {
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(function() {
              copyBtn.textContent = 'Copy Link';
              copyBtn.classList.remove('copied');
            }, 2000);
          });
        }
      });
    }

    window.scrollTo(0, 0);
  }

  /* -- SCROLL REVEAL -------------------------------------------- */
  function observeReveal() {
    var els = document.querySelectorAll('.rv:not(.visible)');
    if (!('IntersectionObserver' in window)) {
      els.forEach(function(el) { el.classList.add('visible'); });
      return;
    }
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    els.forEach(function(el) { obs.observe(el); });
  }

  /* -- EVENTS --------------------------------------------------- */
  var currentFilter = 'all';
  var currentSearch = '';

  document.getElementById('categoryFilter').addEventListener('click', function(e) {
    var btn = e.target.closest('.as-filter-pill');
    if (!btn) return;
    this.querySelectorAll('.as-filter-pill').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.cat;
    visibleCount = 8;
    render(currentFilter, currentSearch);
  });

  document.getElementById('newsSearch').addEventListener('input', function() {
    currentSearch = this.value.trim();
    visibleCount = 8;
    render(currentFilter, currentSearch);
  });

  document.getElementById('loadMoreBtn').addEventListener('click', function() {
    visibleCount += 8;
    render(currentFilter, currentSearch);
  });

  /* Card clicks navigate to article page */
  document.addEventListener('click', function(e) {
    var card = e.target.closest('.as-news-card, .as-hero-featured, .as-hero-side-card, .as-related-card');
    if (card && card.dataset.slug) {
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      e.preventDefault();
      navigateToArticle(card.dataset.slug);
    }
  });

  /* -- INIT ----------------------------------------------------- */
  (async function init() {
    NEWS = await fetchNews();
    var creators = await fetchCreators();

    // Check for article slug in URL
    var params = new URLSearchParams(window.location.search);
    var articleSlug = params.get('article');

    if (articleSlug) {
      renderArticlePage(articleSlug);
    } else {
      render(currentFilter, currentSearch);
      renderSidebar(creators);
      observeReveal();
    }
  })();

})();
</script>
