<script src="/tools/afrostream/news-utils.js?v=3a1a65c4"></script>
<script>
(async function() {
  var U = window.AfroStreamNewsUtils || {};
  var escapeHTML = U.escapeHTML || function(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
    });
  };
  var slug = U.slugFromLocation ? U.slugFromLocation(window.location) : new URLSearchParams(window.location.search).get('slug');
  var main = document.getElementById('articleMain');

  if (!slug) {
    main.innerHTML = '<div class="as-article-404"><h1>Article Not Found</h1><p>No article slug provided.</p><a href="news.html" class="as-share-btn">&larr; Back to News</a></div>';
    return;
  }

  var article = null;

  try {
    var r1 = await fetch('/api/afrostream/news?slug=' + encodeURIComponent(slug));
    var j1 = await r1.json();
    if (j1.success && j1.data) article = j1.data;
  } catch(e) {}

  if (!article) {
    main.innerHTML = '<div class="as-article-404"><h1>Article Not Found</h1><p>We couldn\'t find that article.</p><a href="news.html" class="as-share-btn">&larr; Back to News</a></div>';
    return;
  }

  var articleSlug = article.slug || slug;
  var articlePath = U.prettyPath ? U.prettyPath(articleSlug) : ('/tools/afrostream/news/' + encodeURIComponent(articleSlug));
  var articleUrl = U.canonicalUrl ? U.canonicalUrl(articleSlug) : ('https://afrotools.com' + articlePath);
  var previewPath = U.previewPath ? U.previewPath(articleSlug) : ('/tools/afrostream/article.html?slug=' + encodeURIComponent(articleSlug));
  var title = article.title || 'AfroStream News';
  var excerpt = article.excerpt || '';
  var category = article.category || 'News';
  var categoryLabel = category.charAt(0).toUpperCase() + category.slice(1);
  var author = article.author || 'AfroStream Team';

  /* Update meta */
  document.title = title + ' - AfroStream | AfroTools';
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', excerpt || title);
  var ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.setAttribute('content', title);
  var ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc) ogDesc.setAttribute('content', excerpt || '');
  var canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.setAttribute('href', articleUrl);
  var ogUrl = document.querySelector('meta[property="og:url"]');
  if (ogUrl) ogUrl.setAttribute('content', articleUrl);
  var robots = document.querySelector('meta[name="robots"]');
  if (robots) robots.setAttribute('content', 'index, follow');
  var ogImage = document.querySelector('meta[property="og:image"]');
  var twitterImage = document.querySelector('meta[name="twitter:image"]');
  var safeImage = U.safeHttpUrl ? U.safeHttpUrl(article.image_url || '') : (article.image_url || '');
  var hasStoryImage = safeImage && !(U.isPlaceholderImage && U.isPlaceholderImage(safeImage));
  if (hasStoryImage && ogImage) ogImage.setAttribute('content', safeImage);
  if (hasStoryImage && twitterImage) twitterImage.setAttribute('content', safeImage);

  if (U.isLocal && U.isLocal(window.location)) {
    if (window.location.pathname !== '/tools/afrostream/article.html' || window.location.search !== ('?slug=' + encodeURIComponent(articleSlug))) {
      window.history.replaceState({}, '', previewPath);
    }
  } else if (window.location.pathname !== articlePath) {
    window.history.replaceState({}, '', articlePath);
  }

  /* JSON-LD */
  var ld = document.createElement('script');
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'NewsArticle',
    'headline': title,
    'description': excerpt,
    'datePublished': article.published_at,
    'dateModified': article.created_at,
    'author': { '@type': 'Organization', 'name': 'AfroStream', 'url': 'https://afrotools.com/tools/afrostream/' },
    'publisher': { '@type': 'Organization', 'name': 'AfroTools', 'url': 'https://afrotools.com' },
    'mainEntityOfPage': articleUrl
  });
  document.head.appendChild(ld);

  /* Format date */
  var pubDate = new Date(article.published_at);
  var dateStr = pubDate.toLocaleDateString('en-US', {month: 'long', day: 'numeric', year: 'numeric'});

  /* Estimate read time */
  var bodyText = article.body || excerpt || '';
  var wordCount = bodyText.split(/\s+/).length;
  var readTime = Math.max(1, Math.ceil(wordCount / 200));

  /* Render body with block-safe markdown formatting. */
  var bodyHTML = U.renderMarkdown ? U.renderMarkdown(bodyText) : '<p>' + escapeHTML(bodyText).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
  var gradient = U.categoryGradient ? U.categoryGradient(category) : 'linear-gradient(135deg,#2563eb,#0f766e)';
  var visualHTML = hasStoryImage
    ? '<figure class="as-article-visual"><img src="' + escapeHTML(safeImage) + '" alt="' + escapeHTML(title) + '"></figure>'
    : '<figure class="as-article-visual as-article-visual--fallback" style="--article-gradient:' + gradient + '"><div class="as-article-visual-art"><span>AfroStream</span><strong>' + escapeHTML(categoryLabel) + '</strong><small>' + escapeHTML(title) + '</small></div></figure>';
  var sourceUrl = U.safeHttpUrl ? U.safeHttpUrl(article.source_url || '') : (article.source_url || '');
  var sourceName = article.source_name || 'AfroStream editorial source';
  var sourceHTML = '<aside class="as-article-side">' +
    '<section class="as-article-source">' +
      '<h2>Source Data</h2>' +
      '<p>' + escapeHTML(sourceName) + '</p>' +
      (sourceUrl ? '<a class="as-source-link" href="' + escapeHTML(sourceUrl) + '" target="_blank" rel="noopener">Open source</a>' : '<p>Source notes are attached to this AfroStream item.</p>') +
    '</section>' +
  '</aside>';

  var shareURL = encodeURIComponent(articleUrl);
  var shareTitle = encodeURIComponent(title);

  var html = '<a href="news.html" class="as-article-back">&larr; Back to News</a>' +
    '<header class="as-article-header">' +
      '<span class="as-article-cat">' + escapeHTML(categoryLabel) + '</span>' +
      '<h1 class="as-article-title">' + escapeHTML(title) + '</h1>' +
      (excerpt ? '<p class="as-article-deck">' + escapeHTML(excerpt) + '</p>' : '') +
      '<div class="as-article-meta">' +
        '<span>' + escapeHTML(dateStr) + '</span>' +
        '<span>' + readTime + ' min read</span>' +
        '<span>' + escapeHTML(author) + '</span>' +
      '</div>' +
    '</header>' +
    visualHTML +
    '<div class="as-article-grid">' +
      '<article class="as-article-body">' + bodyHTML + '</article>' +
      sourceHTML +
    '</div>' +
    '<div class="as-article-related" id="relatedArticles"></div>';

  main.innerHTML = html;
  var side = main.querySelector('.as-article-side');
  if (side) {
    var share = document.createElement('div');
    share.className = 'as-article-share';
    share.innerHTML =
      '<a href="https://twitter.com/intent/tweet?text=' + shareTitle + '&url=' + shareURL + '" target="_blank" rel="noopener" class="as-share-btn">Share on X</a>' +
      '<a href="https://wa.me/?text=' + shareTitle + '%20' + shareURL + '" target="_blank" rel="noopener" class="as-share-btn">WhatsApp</a>' +
      '<button class="as-share-btn" id="copyArticleLink" type="button">Copy link</button>';
    side.appendChild(share);
    var copyBtn = document.getElementById('copyArticleLink');
    if (copyBtn) {
      copyBtn.addEventListener('click', function() {
        if (!navigator.clipboard) return;
        navigator.clipboard.writeText(articleUrl).then(function() {
          copyBtn.textContent = 'Copied';
          copyBtn.classList.add('copied');
          setTimeout(function() {
            copyBtn.textContent = 'Copy link';
            copyBtn.classList.remove('copied');
          }, 1800);
        });
      });
    }
  }

  /* Fetch related articles */
  try {
    var relUrl = '/api/afrostream/news?limit=4' + (article.category ? '&category=' + encodeURIComponent(article.category) : '');
    var relRes = await fetch(relUrl);
    var relJson = await relRes.json();
    if (relJson.success && relJson.data && relJson.data.length > 1) {
      var related = relJson.data.filter(function(a){ return a.slug !== article.slug; }).slice(0, 3);
      if (related.length) {
        var rhtml = '<h2>Related Articles</h2><div class="as-related-articles">';
        related.forEach(function(r) {
          var d = new Date(r.published_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
          var href = U.articleHref ? U.articleHref(r.slug) : ('/tools/afrostream/article.html?slug=' + encodeURIComponent(r.slug));
          rhtml += '<a href="' + escapeHTML(href) + '" class="as-related-card">' +
            '<div class="as-related-card-cat">' + escapeHTML(r.category || 'News') + '</div>' +
            '<div class="as-related-card-title">' + escapeHTML(r.title || '') + '</div>' +
            '<div class="as-related-card-date">' + d + '</div>' +
          '</a>';
        });
        rhtml += '</div>';
        document.getElementById('relatedArticles').innerHTML = rhtml;
      }
    }
  } catch(e) {}
})();
</script>
