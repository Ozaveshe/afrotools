/* ===== FETCH REAL DATA WITH DEMO FALLBACK ===== */
function mapApiCreator(r) {
  var n = r.creator_name || r.creatorName || r.name || 'Unknown';
  var cc = (r.country_code || r.countryCode || r.country || '').toUpperCase();
  var meta = COUNTRY_META[cc] || {flag:'',name:cc};
  var plats = r.platforms || [];
  if (typeof plats === 'string') { try { plats = JSON.parse(plats); } catch(e) { plats = [plats]; } }
  return {
    id: r.id,
    name: n,
    avatar: r.avatar || n.replace(/[a-z\s]/g,'').slice(0,2) || n.slice(0,2).toUpperCase(),
    country: cc,
    flag: r.flag || meta.flag,
    countryName: r.country_name || r.countryName || meta.name,
    category: (r.category || 'lifestyle').toLowerCase(),
    platforms: plats,
    followers: r.followers || 0,
    gifts: r.gifts || r.gift_revenue || r.giftRevenue || r.net_worth || r.netWorth || 0,
    peak: r.peak || r.peak_viewers || r.peakViewers || 0,
    growth: r.growth || r.growth_rate || r.growthRate || 0,
    avgDuration: r.avg_duration || r.avgDuration || 0,
    frequency: r.frequency || 0,
    bio: r.bio || '',
    streams: r.streams || [],
    upcoming: r.upcoming || []
  };
}

async function fetchCreators() {
  try {
    var res = await fetch('/api/admin/afrostream/public/creators');
    var json = await res.json();
    if (json.success && json.data && json.data.length) {
      return json.data.map(mapApiCreator);
    }
  } catch(e) { /* API unavailable — use demo data */ }
  return DEMO_CREATORS;
}

/* ===== INIT: load creators then boot the page ===== */
var CREATORS = [];

(async function initCreators() {
  CREATORS = await fetchCreators();

  /* Compute score */
  CREATORS.forEach(function(c){
    c.score = Math.round(
      (c.followers / 50000) * 10 +
      (c.gifts / 1000) * 5 +
      (c.peak / 10000) * 8 +
      c.growth * 2
    );
  });
  CREATORS.sort(function(a,b){ return b.score - a.score; });
  CREATORS.forEach(function(c,i){ c.rank = i + 1; });

  /* Render once data is ready */
  renderAll();
})();

/* ===== UTILS ===== */
function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n.toString();
}
function fmtUSD(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return '$' + n;
}

var PLATFORM_ICONS = {
  youtube: '<span class="as-platform-icon as-pi-yt" title="YouTube">&#9654;</span>',
  twitch: '<span class="as-platform-icon as-pi-tw" title="Twitch">&#9670;</span>',
  tiktok: '<span class="as-platform-icon as-pi-tt" title="TikTok">&#9835;</span>',
  instagram: '<span class="as-platform-icon as-pi-ig" title="Instagram">&#9673;</span>',
  kick: '<span class="as-platform-icon as-pi-kk" title="Kick">K</span>'
};

function platformIcons(arr) {
  return arr.map(function(p){ return PLATFORM_ICONS[p] || ''; }).join('');
}

function growthHTML(g) {
  if (g > 0) return '<span class="as-growth as-growth-up">&#9650; +' + g + '%</span>';
  if (g < 0) return '<span class="as-growth as-growth-down">&#9660; ' + g + '%</span>';
  return '<span class="as-growth">0%</span>';
}

function avatarGradient(name) {
  var h = 0;
  for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  var hue = Math.abs(h) % 360;
  return 'linear-gradient(135deg, hsl(' + hue + ',80%,60%), hsl(' + ((hue + 60) % 360) + ',70%,50%))';
}

/* ===== FILTERING ===== */
var currentPage = 1;
var PAGE_SIZE = 20;
var currentSort = 'score';
var sortDir = -1;

function getFiltered() {
  var period = document.querySelector('#periodPills .as-pill.active').dataset.value;
  var category = document.querySelector('#categoryPills .as-pill.active').dataset.value;
  var country = document.getElementById('countryFilter').value;
  var platform = document.querySelector('#platformPills .as-pill.active').dataset.value;
  var search = document.getElementById('searchFilter').value.toLowerCase().trim();

  var list = CREATORS.filter(function(c) {
    if (category !== 'all' && c.category !== category) return false;
    if (country !== 'all' && c.country !== country) return false;
    if (platform !== 'all' && c.platforms.indexOf(platform) === -1) return false;
    if (search && c.name.toLowerCase().indexOf(search) === -1) return false;
    return true;
  });

  list.sort(function(a, b) {
    var va, vb;
    switch (currentSort) {
      case 'name': va = a.name.toLowerCase(); vb = b.name.toLowerCase(); return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
      case 'country': va = a.countryName; vb = b.countryName; return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
      case 'followers': va = a.followers; vb = b.followers; break;
      case 'gifts': va = a.gifts; vb = b.gifts; break;
      case 'peak': va = a.peak; vb = b.peak; break;
      case 'growth': va = a.growth; vb = b.growth; break;
      case 'rank': va = a.rank; vb = b.rank; return sortDir * (va - vb);
      default: va = a.score; vb = b.score;
    }
    return sortDir * (vb - va);
  });

  return list;
}

/* ===== RENDER PODIUM ===== */
function renderPodium(list) {
  var grid = document.getElementById('podiumGrid');
  if (list.length < 3) { grid.innerHTML = '<p style="color:var(--as-text-muted);text-align:center;width:100%">Not enough creators for podium.</p>'; return; }
  var order = [1, 0, 2]; // silver, gold, bronze
  var medals = ['as-podium-gold', 'as-podium-silver', 'as-podium-bronze'];
  var medalLabels = ['#1', '#2', '#3'];
  var borderColors = ['#FFD700', '#C0C0C0', '#CD7F32'];
  var html = '';
  order.forEach(function(displayIdx) {
    var dataIdx = displayIdx;
    var c = list[dataIdx];
    var cls = medals[dataIdx];
    html += '<a href="creator.html?id=' + c.id + '" class="as-podium-card ' + cls + '">' +
      '<div class="as-podium-rank">' + medalLabels[dataIdx] + '</div>' +
      '<div class="as-podium-avatar" style="background:' + avatarGradient(c.name) + ';border-color:' + borderColors[dataIdx] + '">' + c.avatar + '</div>' +
      '<h3 class="as-podium-name">' + c.name + '</h3>' +
      '<div class="as-podium-country">' + c.flag + ' ' + c.countryName + '</div>' +
      '<div class="as-podium-platforms">' + platformIcons(c.platforms) + '</div>' +
      '<div class="as-podium-stats">' +
        '<div class="as-podium-stat"><span class="as-podium-stat-val">' + fmtNum(c.followers) + '</span><span class="as-podium-stat-lbl">Followers</span></div>' +
        '<div class="as-podium-stat"><span class="as-podium-stat-val">' + fmtUSD(c.gifts) + '</span><span class="as-podium-stat-lbl">Gifts</span></div>' +
        '<div class="as-podium-stat"><span class="as-podium-stat-val">' + fmtNum(c.peak) + '</span><span class="as-podium-stat-lbl">Peak</span></div>' +
      '</div>' +
      '<span class="as-podium-cta">View Profile &rarr;</span>' +
    '</a>';
  });
  grid.innerHTML = html;
}

/* ===== RENDER TABLE ===== */
function renderTable(list) {
  var body = document.getElementById('rankingsBody');
  var show = list.slice(3, 3 + currentPage * PAGE_SIZE);
  var html = '';
  show.forEach(function(c, i) {
    var rankClass = '';
    if (c.rank <= 3) rankClass = ' as-row-top3';
    html += '<tr class="as-table-row' + rankClass + '" onclick="window.location.href=\'creator.html?id=' + c.id + '\'" style="cursor:pointer">' +
      '<td class="as-td-rank"><span class="as-rank-badge">' + c.rank + '</span></td>' +
      '<td class="as-td-creator"><div class="as-creator-cell"><div class="as-creator-avatar-sm" style="background:' + avatarGradient(c.name) + '">' + c.avatar + '</div><span>' + c.name + '</span></div></td>' +
      '<td>' + c.flag + ' ' + c.countryName + '</td>' +
      '<td>' + platformIcons(c.platforms) + '</td>' +
      '<td>' + fmtNum(c.followers) + '</td>' +
      '<td>' + fmtUSD(c.gifts) + '</td>' +
      '<td>' + fmtNum(c.peak) + '</td>' +
      '<td>' + growthHTML(c.growth) + '</td>' +
      '<td><span class="as-score-badge">' + c.score + '</span></td>' +
    '</tr>';
  });
  body.innerHTML = html;

  var btn = document.getElementById('loadMoreBtn');
  if (3 + currentPage * PAGE_SIZE >= list.length) {
    btn.style.display = 'none';
  } else {
    btn.style.display = '';
  }
}

function renderAll() {
  var list = getFiltered();
  renderPodium(list);
  renderTable(list);
}

/* ===== EVENT LISTENERS ===== */
function setupPills(containerId) {
  var container = document.getElementById(containerId);
  container.addEventListener('click', function(e) {
    var pill = e.target.closest('.as-pill');
    if (!pill) return;
    container.querySelectorAll('.as-pill').forEach(function(p){ p.classList.remove('active'); });
    pill.classList.add('active');
    currentPage = 1;
    renderAll();
  });
}
setupPills('periodPills');
setupPills('categoryPills');
setupPills('platformPills');

document.getElementById('countryFilter').addEventListener('change', function(){ currentPage = 1; renderAll(); });
document.getElementById('sortFilter').addEventListener('change', function(){
  currentSort = this.value; currentPage = 1; renderAll();
});
document.getElementById('searchFilter').addEventListener('input', function(){ currentPage = 1; renderAll(); });
document.getElementById('navSearch').addEventListener('input', function(){
  document.getElementById('searchFilter').value = this.value; currentPage = 1; renderAll();
});
document.getElementById('loadMoreBtn').addEventListener('click', function(){ currentPage++; renderAll(); });

/* Sortable headers */
document.querySelectorAll('.as-table th[data-sort]').forEach(function(th) {
  th.style.cursor = 'pointer';
  th.addEventListener('click', function() {
    var s = this.dataset.sort;
    if (currentSort === s) { sortDir *= -1; } else { currentSort = s; sortDir = -1; }
    document.getElementById('sortFilter').value = currentSort === 'name' || currentSort === 'country' || currentSort === 'rank' ? 'score' : currentSort;
    currentPage = 1;
    renderAll();
  });
});

/* Last updated */
document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});

/* Scroll reveal */
(function () {
  var els = document.querySelectorAll('.rv');
  if (!els.length) return;
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.1 });
  els.forEach(function (el) { obs.observe(el); });
})();
