const { useState, useRef, useCallback } = React;

const TEMPLATES = [
  {id:'exec',name:'Executive',desc:'Dark header, sidebar',color:'#1a3a2a'},
  {id:'modern',name:'Modern',desc:'Clean lines, green accents',color:'#008751'},
  {id:'minimal',name:'Minimal',desc:'Elegant simplicity',color:'#888'},
  {id:'creative',name:'Creative',desc:'Dark sidebar split',color:'#0d3520'},
  {id:'corp',name:'Corporate',desc:'Bold uppercase, black',color:'#111'},
  {id:'fresh',name:'Fresh',desc:'Warm gradients, rounded',color:'#2e7d32'},

const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
const fmtMonth = v => { if(!v) return ''; if(!v.includes('-')) return v; const [y,m] = v.split('-'); const ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return ms[+m-1]+' '+y; };
const fmtDOB = v => { if(!v) return ''; const d=new Date(v); const ms=['January','February','March','April','May','June','July','August','September','October','November','December']; return d.getDate()+' '+ms[d.getMonth()]+' '+d.getFullYear(); };
const toArr = s => s ? s.split(/[,;\n]/).map(x=>x.trim()).filter(Boolean) : [];
const descToHTML = t => {
  if(!t) return '';
  const ls = t.split('\n').filter(l=>l.trim());
  if(ls.length<=1) return '<p>'+esc(t)+'</p>';
  const hasBul = ls.some(l=>/^[•\-\*\d+\.]/.test(l.trim()));
  if(hasBul) return '<ul>'+ls.map(l=>'<li>'+esc(l.replace(/^[•\-\*]\s*/,'').replace(/^\d+\.\s*/,''))+'</li>').join('')+'</ul>';
  return '<p>'+ls.map(l=>esc(l)).join('<br/>')+'</p>';
};
const AI_EP = '/.netlify/functions/ai-advisor';
const AI_CHIPS = ['Review my CV','Make it ATS-friendly','Improve my summary','Quantify achievements','Tailor for my country',"What's missing?",'Suggest action verbs','Shorten to 2 pages'];

function CVPreview({ data: d, template }) {
  const name = esc(d.fn+' '+d.ln)||'Your Name';
  const title = esc(d.title)||'Professional Title';
  const contact = [d.email&&('✉ '+esc(d.email)),d.phone&&('📱 '+esc(d.phone)),d.loc&&('📍 '+esc(d.loc)),d.web&&('🔗 '+esc(d.web))].filter(Boolean);
  const personal = d.sp ? [d.dob&&('DOB: '+fmtDOB(d.dob)),d.nat&&esc(d.nat),d.gen&&esc(d.gen),d.mar&&esc(d.mar),d.so&&esc(d.so)].filter(Boolean) : [];
  const allSkills = toArr(d.skills.h).concat(toArr(d.skills.s));
  const tools = toArr(d.skills.t);
  const hasExp = d.exps.some(e=>e.t||e.c);
  const hasEdu = d.edus.some(e=>e.deg||e.sch);
  const hasCerts = d.certs.some(c=>c.n);
  const hasRef = d.showRefs && d.refs.some(r=>r.n);

  const Photo = ({round,style:st}) => {
    if(d.showPhoto&&d.photo) return <img style={{width:64,height:64,borderRadius:round?'50%':'10px',objectFit:'cover',flexShrink:0,...(st||{})}} src={d.photo} alt=""/>;
    if(d.showPhoto) return <div style={{width:64,height:64,borderRadius:round?'50%':'10px',background:'rgba(0,0,0,.04)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,opacity:.25,flexShrink:0,...(st||{})}}>👤</div>;
    return null;
  };
  const Pills = ({items,bg,color}) => items.map((s,i)=><span key={i} style={{display:'inline-block',padding:'2px 6px',borderRadius:3,fontSize:8,fontWeight:600,margin:'1.5px',background:bg||'#f0f0f0',color:color||'#555'}}>{esc(s)}</span>);
  const ExpEntries = () => d.exps.map((e,i)=>{if(!e.t&&!e.c)return null;return(
    <div key={i} style={{marginBottom:9}}>
      <div style={{fontWeight:700,fontSize:10}}>{esc(e.t||'Position')}</div>
      <div style={{fontSize:9.5,fontWeight:600}}>{esc(e.c)}{e.l?' · '+esc(e.l):''}</div>
      {(e.s||e.e)&&<div style={{fontSize:8.5,color:'#999',fontWeight:500}}>{e.s}{e.e?' – '+e.e:''}</div>}
      {e.d&&<div style={{fontSize:9,color:'#555',lineHeight:1.45}} dangerouslySetInnerHTML={{__html:descToHTML(e.d)}}/>}
    </div>)});
  const EduEntries = () => d.edus.map((e,i)=>{if(!e.deg&&!e.sch)return null;return(
    <div key={i} style={{marginBottom:9}}>
      <div style={{fontWeight:700,fontSize:10}}>{esc(e.deg||'Qualification')}</div>
      <div style={{fontSize:9.5,fontWeight:600}}>{esc(e.sch)}{e.loc?' · '+esc(e.loc):''}</div>
      {(e.y1||e.y2)&&<div style={{fontSize:8.5,color:'#999'}}>{e.y1}{e.y2?' – '+e.y2:''}</div>}
      {e.g&&<div style={{fontSize:9,color:'#555'}}><p>{esc(e.g)}</p></div>}
    </div>)});
  const CertEntries = () => d.certs.map((c,i)=>{if(!c.n)return null;return(
    <div key={i} style={{marginBottom:6}}><span style={{fontWeight:700,fontSize:10}}>{esc(c.n)}</span>{(c.i||c.y)&&<span style={{fontSize:8.5,color:'#999',marginLeft:4}}>{esc(c.i)}{c.y?' · '+c.y:''}</span>}</div>)});
  const RefEntries = () => d.refs.map((r,i)=>{if(!r.n)return null;return(
    <div key={i} style={{marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:10}}>{esc(r.n)}</div>
      {r.p&&<div style={{fontSize:9.5,fontWeight:600}}>{esc(r.p)}</div>}
      <div style={{fontSize:8.5,color:'#999'}}>{[r.e,r.f].filter(Boolean).join(' · ')}</div>
    </div>)});
  const Sec = ({label,children,style:s}) => children ? <div style={{marginBottom:14}}><div style={{fontSize:9.5,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:7,...(s||{})}}>{label}</div>{children}</div> : null;

  const t = template;
  const cvStyle = {fontFamily:"'Outfit',sans-serif",fontSize:'9.5px',lineHeight:1.45,color:'#222'};

  if(t==='exec') return (
    <div style={cvStyle}>

        <div>

        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 170px',minHeight:350}}>
        <div style={{padding:'20px 24px'}}>
          {d.summary&&<Sec label="Professional Summary" style={{color:'#005c37',borderBottom:'1.5px solid #005c37',paddingBottom:3}}><div style={{fontSize:9,color:'#555'}}><p>{esc(d.summary)}</p></div></Sec>}
          {hasExp&&<Sec label="Work Experience" style={{color:'#005c37',borderBottom:'1.5px solid #005c37',paddingBottom:3}}><ExpEntries/></Sec>}
          {hasEdu&&<Sec label="Education" style={{color:'#005c37',borderBottom:'1.5px solid #005c37',paddingBottom:3}}><EduEntries/></Sec>}
          {hasCerts&&<Sec label="Certifications" style={{color:'#005c37',borderBottom:'1.5px solid #005c37',paddingBottom:3}}><CertEntries/></Sec>}
          {d.extras.awards&&<Sec label="Awards" style={{color:'#005c37',borderBottom:'1.5px solid #005c37',paddingBottom:3}}><div style={{fontSize:9,color:'#555'}} dangerouslySetInnerHTML={{__html:descToHTML(d.extras.awards)}}/></Sec>}
          {hasRef&&<Sec label="References" style={{color:'#005c37',borderBottom:'1.5px solid #005c37',paddingBottom:3}}><RefEntries/></Sec>}
        </div>
        <div style={{background:'#f8faf9',padding:'20px 16px',borderLeft:'1px solid #e8ece9'}}>
          {personal.length>0&&<Sec label="Personal" style={{color:'#999',borderBottom:'1px solid #e0e0e0',paddingBottom:3,fontSize:8.5}}>{personal.map((p,i)=><div key={i} style={{fontSize:8.5,marginBottom:2}}>{p}</div>)}</Sec>}
          {allSkills.length>0&&<Sec label="Skills" style={{color:'#999',borderBottom:'1px solid #e0e0e0',paddingBottom:3,fontSize:8.5}}><div><Pills items={allSkills} bg="rgba(0,92,55,.07)" color="#005c37"/></div></Sec>}
          {tools.length>0&&<Sec label="Tools" style={{color:'#999',borderBottom:'1px solid #e0e0e0',paddingBottom:3,fontSize:8.5}}>{tools.map((t,i)=><div key={i} style={{fontSize:8.5,marginBottom:2}}>{esc(t)}</div>)}</Sec>}
          {d.langs&&<Sec label="Languages" style={{color:'#999',borderBottom:'1px solid #e0e0e0',paddingBottom:3,fontSize:8.5}}>{d.langs.split(',').map((l,i)=><div key={i} style={{fontSize:8.5,marginBottom:2}}>{l.trim()}</div>)}</Sec>}
          {d.extras.hobbies&&<Sec label="Interests" style={{color:'#999',borderBottom:'1px solid #e0e0e0',paddingBottom:3,fontSize:8.5}}><div style={{fontSize:8.5}}>{esc(d.extras.hobbies)}</div></Sec>}
        </div>
      </div>
    </div>
  );

  if(t==='modern') {
    const bar = <span style={{width:3,height:13,background:'#008751',borderRadius:2,display:'inline-block'}}/>;
    const mSh = {color:'#008751',display:'flex',alignItems:'center',gap:6};
    return (
    <div style={cvStyle}>
      <div style={{padding:'24px 28px',borderBottom:'3px solid #008751',display:'flex',gap:18,alignItems:'center'}}>
        <Photo round/><div>
          <div style={{fontSize:24,fontWeight:900,letterSpacing:'-.5px',lineHeight:1}}>{name}</div>

      <div style={{padding:'20px 28px'}}>
        {d.summary&&<Sec label={<>{bar} Profile</>} style={mSh}><div style={{fontSize:9,color:'#555'}}><p>{esc(d.summary)}</p></div></Sec>}
        {personal.length>0&&<Sec label={<>{bar} Personal</>} style={mSh}><div style={{fontSize:9,color:'#555'}}><p>{personal.join(' · ')}</p></div></Sec>}
        {hasExp&&<Sec label={<>{bar} Experience</>} style={mSh}><ExpEntries/></Sec>}
        {hasEdu&&<Sec label={<>{bar} Education</>} style={mSh}><EduEntries/></Sec>}
        {(allSkills.length>0||tools.length>0)&&<Sec label={<>{bar} Skills</>} style={mSh}><div><Pills items={allSkills.concat(tools)} bg="#ecfdf5" color="#15803d"/></div></Sec>}

        {personal.length>0&&<Sec label="Personal" style={{color:'#00c853',borderBottom:'1px solid rgba(255,255,255,.1)',paddingBottom:2,fontSize:8}}>{personal.map((p,i)=><div key={i} style={{fontSize:8,color:'rgba(255,255,255,.6)',marginBottom:2}}>{p}</div>)}</Sec>}

        {hasExp&&<Sec label="Experience" style={{color:'#0d3520'}}><ExpEntries/></Sec>}

  if(t==='corp') return (
    <div style={cvStyle}>
      <div style={{display:'flex',gap:18,padding:'22px 26px',borderBottom:'4px solid #111',alignItems:'center'}}>
        <Photo round/><div>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:'-.5px',textTransform:'uppercase'}}>{name}</div>
          <div style={{fontSize:10,color:'#666',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginTop:1}}>{title}</div>

      </div>
      <div style={{padding:'20px 26px'}}>

  // Fresh (default)
  const fSh = {color:'#2e7d32',background:'rgba(0,200,83,.06)',padding:'3px 7px',borderRadius:4,display:'inline-block'};
  return (
    <div style={cvStyle}>
      <div style={{background:'linear-gradient(120deg,#e8f5e9,#f1f8e9,#fffde7)',padding:'22px 26px',display:'flex',gap:16,alignItems:'center',borderBottom:'1px solid #dde8dd'}}>

        {hasCerts&&<Sec label="Certifications" style={fSh}><div style={{marginTop:4}}><CertEntries/></div></Sec>}
      </div>
    </div>

}

  const [autoStep, setAutoStep] = useState('');

  const cvRef = useRef(null);
  const aiRef = useRef(null);

  const [p, setP] = useState({fn:'',ln:'',title:'',email:'',phone:'',loc:'',web:'',summary:'',country:'NG',dob:'',nat:'',gen:'',mar:'',so:'',langs:''});
  const [exps, setExps] = useState([{t:'',c:'',l:'',s:'',e:'',cur:false,d:''}]);
  const [edus, setEdus] = useState([{deg:'',sch:'',loc:'',y1:'',y2:'',g:'',a:''}]);
  const [certs, setCerts] = useState([{n:'',i:'',y:''}]);
  const [skills, setSkills] = useState({h:'',s:'',t:''});
  const [extras, setExtras] = useState({awards:'',volun:'',hobbies:''});
  const [refs, setRefs] = useState([{n:'',p:'',e:'',f:''}]);

  const norms = COUNTRY_NORMS[p.country]||COUNTRY_NORMS.OTHER;
  const showPersonal = p.country!=='INTL'&&p.country!=='ZA';
  const up = (k,v) => setP(pr=>({...pr,[k]:v}));

  // AI functions
  const callAI = async (body) => {
    try {
      const res = await fetch(AI_EP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data = await res.json();
      return (data.response||data.completion||'').replace(/^["']|["']$/g,'').trim();
    } catch(e) { return ''; }
  };

  const askAI = async (q) => {
    if(!q||!q.trim()) return;
    setAiMsgs(pr=>[...pr,{type:'u',text:q}]);
    setAiLoading(true);
    const r = await callAI({context:'CV: '+norms.n+'. '+p.fn+' '+p.ln+'. '+p.title+'. Skills: '+skills.h,question:q,tool:'cv-builder',systemPrompt:'AfroTools CV Advisor for African job markets. 3-5 sentences. Specific, actionable.'});
    setAiMsgs(pr=>[...pr,{type:'b',text:r||'AI unavailable. Set ANTHROPIC_API_KEY in Netlify env vars.'}]);
    setAiLoading(false);
    setTimeout(()=>{if(aiRef.current)aiRef.current.scrollTop=aiRef.current.scrollHeight},50);
  };

  const aiEnhance = async (text, type, callback, key) => {
    if(!text||!text.trim()) return;
    setEnhancing(pr=>({...pr,[key]:true}));
    const r = await callAI({context:'CV for '+p.title+' in '+norms.n,question:'Improve this '+type+'. Strong action verbs, quantify. Return ONLY improved text:\n\n'+text,tool:'cv-builder',systemPrompt:'Return ONLY improved text. No explanations.'});
    if(r) callback(r);
    setEnhancing(pr=>({...pr,[key]:false}));
  };

  // Auto build
  const autoBuild = async () => {
    const jt = p.title||document.getElementById('heroTitleInput')?.value||'Software Engineer';
    up('title',jt);
    setAutoBuilding(true); setStep(1); setAutoStep('Building CV for "'+jt+'"...');
    const r = await callAI({context:'Auto-generating CV for '+jt+' in '+norms.n,
      question:'Generate complete CV JSON for '+jt+' in '+norms.n+'. ONLY valid JSON: {"summary":"...","experience":[{"title":"...","company":"...","location":"...","start":"Jan 2022","end":"Present","desc":"• Ach 1\\n• Ach 2"}],"education":[{"degree":"...","school":"...","location":"...","y1":"2016","y2":"2020","grade":"..."}],"certifications":[{"name":"...","issuer":"...","year":"2023"}],"skills":{"hard":"...","soft":"...","tools":"..."},"languages":"..."}',
      tool:'cv-builder',systemPrompt:'Generate realistic CV content. ONLY valid JSON. No markdown. Specific for role/country.'});
    try {
      const cv = JSON.parse(r.replace(/```json|```/g,'').trim());
      if(cv.summary) up('summary',cv.summary);
      if(cv.languages) up('langs',cv.languages);
      if(cv.experience?.length) setExps(cv.experience.map(e=>({t:e.title||'',c:e.company||'',l:e.location||'',s:e.start||'',e:e.end||'',cur:e.end==='Present',d:e.desc||''})));
      if(cv.education?.length) setEdus(cv.education.map(e=>({deg:e.degree||'',sch:e.school||'',loc:e.location||'',y1:e.y1||'',y2:e.y2||'',g:e.grade||'',a:''})));
      if(cv.certifications?.length) setCerts(cv.certifications.map(c=>({n:c.name||'',i:c.issuer||'',y:c.year||''})));
      if(cv.skills) setSkills({h:cv.skills.hard||'',s:cv.skills.soft||'',t:cv.skills.tools||''});
      setAutoStep('Done! Customize your CV below.');
    } catch(e) { setAutoStep('Fill in your details manually.'); }
    setTimeout(()=>setAutoBuilding(false),2000);
  };

        <div className="trust">{[['6','Templates'],['54','Countries'],['100%','Free'],['ATS','Compliant']].map(([n,l],i)=><div key={i} style={{textAlign:'center'}}><div style={{fontSize:28,fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{n}</div><div style={{fontSize:11,color:'#999',textTransform:'uppercase',letterSpacing:1,marginTop:2}}>{l}</div></div>)}</div>
      </section>
      <div className="tpl-row">{TEMPLATES.map(t=><div key={t.id} className="tpl-card" onClick={()=>{setTpl(t.id);setStep(1)}}><div style={{height:80,padding:12,fontSize:7,lineHeight:1.4,background:t.id==='exec'?'linear-gradient(135deg,#1a3a2a,#004d2e)':t.id==='modern'?'#fff':t.id==='minimal'?'#fafafa':t.id==='creative'?'linear-gradient(180deg,#0a2618,#103e28)':t.id==='corp'?'#111':'linear-gradient(120deg,#e8f5e9,#fffde7)',borderBottom:t.id==='modern'?'3px solid #008751':t.id==='corp'?'4px solid #000':'none',color:['exec','creative','corp'].includes(t.id)?'rgba(255,255,255,.7)':'#888'}}><div style={{fontSize:11,fontWeight:700,color:['exec','creative','corp'].includes(t.id)?'#fff':'#333',marginBottom:3}}>John Doe</div><div>Software Engineer</div><div style={{width:'60%',height:2,background:'currentColor',opacity:.2,margin:'4px 0'}}/><div>Experience • Education</div></div><div style={{padding:'10px 12px'}}><h4 style={{fontSize:12,fontWeight:700}}>{t.name}</h4><p style={{fontSize:10,color:'#999',marginTop:1}}>{t.desc}</p></div></div>)}</div>
      <div style={{maxWidth:900,margin:'72px auto 0',padding:'0 32px'}}><h2 style={{textAlign:'center',fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:700,marginBottom:40}}>Everything You Need</h2>
        <div className="feat-grid">{feats.map((f,i)=><div key={i} className="feat-card"><div style={{width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginBottom:12,background:f.b}}>{f.i}</div><h4 style={{fontSize:14,fontWeight:700,marginBottom:4}}>{f.t}</h4><p style={{fontSize:12.5,color:'#888',lineHeight:1.5}}>{f.d}</p></div>)}</div></div>
      <div style={{textAlign:'center',padding:'64px 32px 80px'}}><h2 style={{fontFamily:"'Fraunces',serif",fontSize:28,marginBottom:12}}>Ready to Land Your Next Role?</h2><p style={{color:'#888',marginBottom:24}}>Join thousands of professionals across Africa building better CVs.</p><button className="hb hb-pri" onClick={()=>setStep(1)}>Start Building — It's Free →</button></div>
      <footer className="footer">Built with precision by <a href="https://afrotools.com">AfroTools.com</a> — Africa's #1 Financial Tools Platform · © 2025</footer>
    </div>
  );

  // ═══ EDITOR ═══
  const InputField = ({label,value,onChange,type,placeholder,disabled}) => <div className="fg"><label>{label}</label><input type={type||'text'} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}/></div>;
  const TextArea = ({label,value,onChange,rows,placeholder,hint}) => <div className="fg"><label>{label}</label><textarea value={value||''} onChange={e=>onChange(e.target.value)} rows={rows||3} placeholder={placeholder}/>{hint&&<div className="hint">{hint}</div>}</div>;

  return (
    <div style={{minHeight:'100vh',background:'#f5f4f0',fontFamily:"'Outfit',system-ui,sans-serif"}}>
      <style>{css}</style>
      <nav className="ed-nav">
        <div className="ed-logo" onClick={()=>setStep(0)}><span className="mark">A</span>Afro<em>Tools</em></div>
        <div style={{width:1,height:24,background:'rgba(255,255,255,.12)'}}/>
        <div style={{display:'flex',gap:2,flex:1}}>{STEPS.map((s,i)=><div key={i} className={'ed-step'+(step===i+1?' act':'')+(step>i+1?' done':'')} onClick={()=>setStep(i+1)}>{s}</div>)}</div>
        <button className="ed-dl" onClick={genPDF}>↓ PDF</button>
      </nav>
      <div className="ed-layout">
        <div className="ed-form">
          {autoBuilding&&<div className="auto-banner"><div className="auto-spinner"/><div>{autoStep}</div></div>}

          {step===1&&<div className="fade-in">
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,background:'#f0fdf4'}}>👤</span> Personal Info</h3>
            <div style={{fontSize:12,color:'#999',marginBottom:16}}>Contact details for your target market.</div>
            <div style={{display:'flex',alignItems:'center',gap:14,padding:14,background:'#faf9f7',borderRadius:10,marginBottom:14}}>
              <div style={{width:56,height:56,borderRadius:'50%',border:'2px dashed #d0ccc4',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',flexShrink:0}} onClick={()=>document.getElementById('phIn2').click()}>
                {photo?<img src={photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:20,opacity:.3}}>📷</span>}
              </div>
              <div><div style={{fontSize:12,fontWeight:600}}>Profile Photo</div><div style={{fontSize:10.5,color:'#999'}}>Optional</div></div>
              <input type="file" id="phIn2" accept="image/*" hidden onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f)}}/>
            </div>
            <div className="fg-row"><InputField label="First Name" value={p.fn} onChange={v=>up('fn',v)} placeholder="Chinedu"/><InputField label="Last Name" value={p.ln} onChange={v=>up('ln',v)} placeholder="Okonkwo"/></div>
            <InputField label="Professional Title" value={p.title} onChange={v=>up('title',v)} placeholder="Senior Software Engineer"/>
            <div className="fg-row"><InputField label="Email" value={p.email} onChange={v=>up('email',v)} type="email" placeholder="chinedu@email.com"/><InputField label="Phone" value={p.phone} onChange={v=>up('phone',v)} placeholder="+234 801 234 5678"/></div>
            <div className="fg-row"><InputField label="Location" value={p.loc} onChange={v=>up('loc',v)} placeholder="Lagos, Nigeria"/><InputField label="LinkedIn" value={p.web} onChange={v=>up('web',v)} placeholder="linkedin.com/in/user"/></div>
            <div className="sdiv"><div className="sdiv-l">🌍 Target Market</div></div>
            <div className="fg"><select value={p.country} onChange={e=>up('country',e.target.value)}>{Object.entries(COUNTRY_NORMS).map(([k,v])=><option key={k} value={k}>{v.f} {v.n}</option>)}</select><div className="hint">{norms.h}</div></div>
            {showPersonal&&<>
              <div className="fg-row"><InputField label="Date of Birth" value={p.dob} onChange={v=>up('dob',v)} type="date"/><InputField label="Nationality" value={p.nat} onChange={v=>up('nat',v)} placeholder="Nigerian"/></div>
              <div className="fg-row">
                <div className="fg"><label>Gender</label><select value={p.gen} onChange={e=>up('gen',e.target.value)}><option value="">—</option><option>Male</option><option>Female</option></select></div>
                <div className="fg"><label>Marital Status</label><select value={p.mar} onChange={e=>up('mar',e.target.value)}><option value="">—</option><option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option></select></div>
              </div>
              {norms.so&&<InputField label={norms.soL||'State of Origin'} value={p.so} onChange={v=>up('so',v)} placeholder={norms.soP||''}/>}
              <InputField label="Languages" value={p.langs} onChange={v=>up('langs',v)} placeholder="English (Fluent), Igbo (Native)"/>
            </>}
            <div className="sdiv"><div className="sdiv-l">📝 Summary</div></div>
            <TextArea label="Professional Summary" value={p.summary} onChange={v=>up('summary',v)} rows={4} placeholder="Background, achievements, goals..."/>
            <button className="ai-btn" disabled={enhancing.summary} onClick={()=>aiEnhance(p.summary,'professional summary',v=>up('summary',v),'summary')}>{enhancing.summary?'⏳ Enhancing...':'✨ AI Enhance'}</button>
            <div style={{display:'flex',gap:8,marginTop:16}}><button className="btn btn-p" onClick={()=>setStep(2)}>Next: Experience →</button></div>
          </div>}

          {step===2&&<div className="fade-in">
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,background:'#eff6ff'}}>💼</span> Work Experience</h3>
            <div style={{fontSize:12,color:'#999',marginBottom:16}}>Most recent position first.</div>
            {exps.map((e,i)=><div key={i} className="ri">
              <div className="ri-head"><span style={{fontSize:12,fontWeight:600,color:'#666'}}>Position {i+1}</span>{exps.length>1&&<button className="ri-del" onClick={()=>setExps(pr=>pr.filter((_,j)=>j!==i))}>✕</button>}</div>
              <InputField label="Job Title" value={e.t} onChange={v=>setExps(pr=>pr.map((x,j)=>j===i?{...x,t:v}:x))} placeholder="Senior Accountant"/>
              <InputField label="Company" value={e.c} onChange={v=>setExps(pr=>pr.map((x,j)=>j===i?{...x,c:v}:x))} placeholder="Dangote Group"/>
              <InputField label="Location" value={e.l} onChange={v=>setExps(pr=>pr.map((x,j)=>j===i?{...x,l:v}:x))} placeholder="Lagos, Nigeria"/>
              <div className="fg-row">
                <InputField label="Start" value={e.s} onChange={v=>setExps(pr=>pr.map((x,j)=>j===i?{...x,s:v}:x))} type="month"/>
                <div className="fg"><label>End</label><input type="month" value={e.e||''} onChange={ev=>setExps(pr=>pr.map((x,j)=>j===i?{...x,e:ev.target.value}:x))} disabled={e.cur}/><div className="hint"><label style={{display:'inline',textTransform:'none',letterSpacing:0,fontWeight:400}}><input type="checkbox" checked={e.cur} onChange={ev=>setExps(pr=>pr.map((x,j)=>j===i?{...x,cur:ev.target.checked}:x))}/> Currently here</label></div></div>
              </div>
              <TextArea label="Achievements" value={e.d} onChange={v=>setExps(pr=>pr.map((x,j)=>j===i?{...x,d:v}:x))} placeholder={"• Led team of 5\n• Reduced costs by 34%"}/>
              <button className="ai-btn" disabled={enhancing['exp'+i]} onClick={()=>aiEnhance(e.d,'work experience bullets',v=>setExps(pr=>pr.map((x,j)=>j===i?{...x,d:v}:x)),'exp'+i)}>{enhancing['exp'+i]?'⏳...':'✨ AI Enhance'}</button>
            </div>)}
            <button className="add-btn" onClick={()=>setExps(pr=>[...pr,{t:'',c:'',l:'',s:'',e:'',cur:false,d:''}])}>+ Add Position</button>
            <div style={{display:'flex',gap:8,marginTop:16}}><button className="btn btn-o" onClick={()=>setStep(1)}>← Back</button><button className="btn btn-p" onClick={()=>setStep(3)}>Next: Education →</button></div>
          </div>}

          {step===3&&<div className="fade-in">
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,background:'#fefce8'}}>🎓</span> Education</h3>
            <div style={{fontSize:12,color:'#999',marginBottom:16}}>Qualifications and certifications.</div>
            {edus.map((e,i)=><div key={i} className="ri">
              <div className="ri-head"><span style={{fontSize:12,fontWeight:600,color:'#666'}}>Qualification {i+1}</span>{edus.length>1&&<button className="ri-del" onClick={()=>setEdus(pr=>pr.filter((_,j)=>j!==i))}>✕</button>}</div>
              <InputField label="Degree" value={e.deg} onChange={v=>setEdus(pr=>pr.map((x,j)=>j===i?{...x,deg:v}:x))} placeholder="B.Sc. Accounting"/>
              <InputField label="Institution" value={e.sch} onChange={v=>setEdus(pr=>pr.map((x,j)=>j===i?{...x,sch:v}:x))} placeholder="University of Lagos"/>
              <InputField label="Location" value={e.loc} onChange={v=>setEdus(pr=>pr.map((x,j)=>j===i?{...x,loc:v}:x))} placeholder="Lagos"/>
              <div className="fg-row"><InputField label="Start Year" value={e.y1} onChange={v=>setEdus(pr=>pr.map((x,j)=>j===i?{...x,y1:v}:x))} type="number" placeholder="2016"/><InputField label="End Year" value={e.y2} onChange={v=>setEdus(pr=>pr.map((x,j)=>j===i?{...x,y2:v}:x))} type="number" placeholder="2020"/></div>
              <InputField label="Grade" value={e.g} onChange={v=>setEdus(pr=>pr.map((x,j)=>j===i?{...x,g:v}:x))} placeholder="First Class Honours"/>
            </div>)}
            <button className="add-btn" onClick={()=>setEdus(pr=>[...pr,{deg:'',sch:'',loc:'',y1:'',y2:'',g:'',a:''}])}>+ Add Qualification</button>
            <div className="sdiv"><div className="sdiv-l">📜 Certifications</div></div>
            {certs.map((c,i)=><div key={i} className="ri">
              <div className="ri-head"><span style={{fontSize:12,fontWeight:600,color:'#666'}}>Cert {i+1}</span>{certs.length>1&&<button className="ri-del" onClick={()=>setCerts(pr=>pr.filter((_,j)=>j!==i))}>✕</button>}</div>
              <InputField label="Name" value={c.n} onChange={v=>setCerts(pr=>pr.map((x,j)=>j===i?{...x,n:v}:x))} placeholder="ICAN"/>
              <div className="fg-row"><InputField label="Issuer" value={c.i} onChange={v=>setCerts(pr=>pr.map((x,j)=>j===i?{...x,i:v}:x))} placeholder="ICAN Nigeria"/><InputField label="Year" value={c.y} onChange={v=>setCerts(pr=>pr.map((x,j)=>j===i?{...x,y:v}:x))} type="number" placeholder="2023"/></div>
            </div>)}
            <button className="add-btn" onClick={()=>setCerts(pr=>[...pr,{n:'',i:'',y:''}])}>+ Add Certification</button>
            <div style={{display:'flex',gap:8,marginTop:16}}><button className="btn btn-o" onClick={()=>setStep(2)}>← Back</button><button className="btn btn-p" onClick={()=>setStep(4)}>Next: Skills →</button></div>
          </div>}

          {step===4&&<div className="fade-in">
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,background:'#f5f3ff'}}>⚡</span> Skills</h3>
            <div style={{fontSize:12,color:'#999',marginBottom:16}}>Technical, soft skills, and tools.</div>
            <TextArea label="Technical Skills" value={skills.h} onChange={v=>setSkills(pr=>({...pr,h:v}))} rows={2} placeholder="Financial Analysis, SAP ERP" hint="Separate with commas"/>
            <TextArea label="Soft Skills" value={skills.s} onChange={v=>setSkills(pr=>({...pr,s:v}))} rows={2} placeholder="Team Leadership, Strategic Planning"/>
            <TextArea label="Tools & Software" value={skills.t} onChange={v=>setSkills(pr=>({...pr,t:v}))} rows={2} placeholder="Microsoft Office, QuickBooks"/>
            <button className="ai-btn" onClick={()=>askAI('Suggest 12 in-demand skills for "'+p.title+'" in '+norms.n)}>✨ Suggest Skills</button>
            <div style={{display:'flex',gap:8,marginTop:16}}><button className="btn btn-o" onClick={()=>setStep(3)}>← Back</button><button className="btn btn-p" onClick={()=>setStep(5)}>Next: Finish →</button></div>
          </div>}

          {step===5&&<div className="fade-in">
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,background:'#fdf2f8'}}>🏆</span> Finishing Touches</h3>
            <div style={{fontSize:12,color:'#999',marginBottom:16}}>Awards, volunteer, references.</div>
            <TextArea label="Awards" value={extras.awards} onChange={v=>setExtras(pr=>({...pr,awards:v}))} rows={2} placeholder="Employee of the Year"/>
            <TextArea label="Volunteer" value={extras.volun} onChange={v=>setExtras(pr=>({...pr,volun:v}))} rows={2} placeholder="Rotary Club"/>
            <InputField label="Hobbies" value={extras.hobbies} onChange={v=>setExtras(pr=>({...pr,hobbies:v}))} placeholder="Chess, Running"/>
            <div className="sdiv"><div className="sdiv-l">🤝 References</div></div>
            <div className={'tgl'+(showRefs?' on':'')} onClick={()=>setShowRefs(!showRefs)}><div className="tgl-track"/><span style={{fontSize:12.5,fontWeight:500}}>Include references</span></div>
            {showRefs&&<>{refs.map((r,i)=><div key={i} className="ri">
              <div className="ri-head"><span style={{fontSize:12,fontWeight:600,color:'#666'}}>Ref {i+1}</span>{refs.length>1&&<button className="ri-del" onClick={()=>setRefs(pr=>pr.filter((_,j)=>j!==i))}>✕</button>}</div>
              <InputField label="Name" value={r.n} onChange={v=>setRefs(pr=>pr.map((x,j)=>j===i?{...x,n:v}:x))} placeholder="Dr. Amina Bello"/>
              <InputField label="Position" value={r.p} onChange={v=>setRefs(pr=>pr.map((x,j)=>j===i?{...x,p:v}:x))} placeholder="CFO, Dangote Group"/>
              <div className="fg-row"><InputField label="Email" value={r.e} onChange={v=>setRefs(pr=>pr.map((x,j)=>j===i?{...x,e:v}:x))}/><InputField label="Phone" value={r.f} onChange={v=>setRefs(pr=>pr.map((x,j)=>j===i?{...x,f:v}:x))}/></div>
            </div>)}<button className="add-btn" onClick={()=>setRefs(pr=>[...pr,{n:'',p:'',e:'',f:''}])}>+ Add Reference</button></>}
            <div style={{display:'flex',gap:8,marginTop:16}}><button className="btn btn-o" onClick={()=>setStep(4)}>← Back</button><button className="btn btn-p" onClick={genPDF}>📄 Download PDF</button></div>
          </div>}
        </div>

        <div className="ed-preview">
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>{TEMPLATES.map(t=><button key={t.id} className={'tpl-chip'+(tpl===t.id?' on':'')} onClick={()=>setTpl(t.id)}>{t.name}</button>)}</div>
          <div className="cv-shell" ref={cvRef}><CVPreview data={cvData} template={tpl}/></div>
          <div className="ai-pan">
            <h4 style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:6,marginBottom:2}}>✨ AI CV Advisor</h4>
            <div style={{fontSize:11,color:'#999',marginBottom:12}}>Expert feedback to improve your CV.</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>{AI_CHIPS.map(q=><div key={q} className="ai-chip" onClick={()=>askAI(q)}>{q}</div>)}</div>
            <div className="ai-box">
              <div className="ai-msgs" ref={aiRef}>{aiMsgs.map((m,i)=><div key={i} className={'ai-msg '+m.type}>{m.text}</div>)}{aiLoading&&<div className="ai-msg b" style={{opacity:.6}}>Thinking...</div>}</div>
              <div className="ai-input"><input placeholder="Ask about your CV..." onKeyDown={e=>{if(e.key==='Enter'){askAI(e.target.value);e.target.value=''}}}/><button onClick={e=>{const inp=e.target.previousElementSibling;askAI(inp.value);inp.value=''}}>Send</button></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
