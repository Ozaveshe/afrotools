<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// COUNTRY NORMS — 20+ African countries with format requirements
const COUNTRY_NORMS = {
  NG:{n:'Nigeria',f:'🇳🇬',photo:1,dob:1,mar:1,gen:1,so:1,nat:1,soL:'State of Origin',soP:'Anambra State',h:'Nigerian employers expect personal details, state of origin, and references.'},
  KE:{n:'Kenya',f:'🇰🇪',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'Kenyan CVs include photo, DOB, and ID number. Keep to 2–3 pages.'},
  ZA:{n:'South Africa',f:'🇿🇦',photo:0,dob:0,mar:0,gen:0,so:0,nat:0,h:'No personal details — Employment Equity Act. Focus on achievements.'},
  GH:{n:'Ghana',f:'🇬🇭',photo:1,dob:1,mar:1,gen:1,so:1,nat:1,soL:'Region / Hometown',soP:'Ashanti Region',h:'Include personal details and hometown.'},
  EG:{n:'Egypt',f:'🇪🇬',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'Include personal details. Military status for males.'},

  RW:{n:'Rwanda',f:'🇷🇼',photo:1,dob:1,mar:0,gen:1,so:0,nat:1,h:'Concise 2-page CVs. English, French, Kinyarwanda valued.'},
  UG:{n:'Uganda',f:'🇺🇬',photo:1,dob:1,mar:1,gen:1,so:1,nat:1,soL:'District of Origin',soP:'Wakiso District',h:'Include personal details and district of origin.'},
  SN:{n:'Senegal',f:'🇸🇳',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'French CV format. Photo and personal details required.'},
  CI:{n:"Côte d'Ivoire",f:'🇨🇮',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'French CV format with photo and personal details.'},
  CM:{n:'Cameroon',f:'🇨🇲',photo:1,dob:1,mar:1,gen:1,so:1,nat:1,soL:'Region of Origin',soP:'Centre Region',h:'Bilingual French/English CVs valued.'},
  MA:{n:'Morocco',f:'🇲🇦',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'French format. French and Arabic essential.'},
  TN:{n:'Tunisia',f:'🇹🇳',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'French conventions. Military status for males.'},
  AO:{n:'Angola',f:'🇦🇴',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'Portuguese language. Personal details included.'},
  MZ:{n:'Mozambique',f:'🇲🇿',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'Portuguese CVs with personal details.'},
  BW:{n:'Botswana',f:'🇧🇼',photo:1,dob:1,mar:0,gen:0,so:0,nat:1,h:'Modern format. Photo optional.'},
  ZW:{n:'Zimbabwe',f:'🇿🇼',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'Personal details included. English standard.'},
  OTHER:{n:'Other African',f:'🌍',photo:1,dob:1,mar:1,gen:1,so:0,nat:1,h:'Most African countries expect personal details.'},
  INTL:{n:'International',f:'🌐',photo:0,dob:0,mar:0,gen:0,so:0,nat:0,h:'No personal details. Focus on quantified achievements.'},
};

// TEMPLATE DEFINITIONS — 6 distinct modern designs
const TEMPLATES = [
  {
    id:'slate',name:'Slate',desc:'Corporate modern',
    preview:{bg:'#1e293b',text:'#fff',accentDark:'#0f172a',accentLight:'#dbeafe',line:'#3b82f6'}
  },
  {
    id:'ember',name:'Ember',desc:'Warm editorial',
    preview:{bg:'#fff',text:'#1c1917',accentDark:'#c2410c',accentLight:'#fff7ed',line:'#c2410c'}
  },
  {
    id:'phantom',name:'Phantom',desc:'Black & white editorial',
    preview:{bg:'#fff',text:'#000',accentDark:'#000',accentLight:'#f5f5f5',line:'#000'}
  },
  {
    id:'indigo',name:'Indigo',desc:'Tech startup',
    preview:{bg:'#312e81',text:'#fff',accentDark:'#4338ca',accentLight:'#eef2ff',line:'#4338ca'}
  },
  {
    id:'noir',name:'Noir',desc:'Bold split design',
    preview:{bg:'#0f172a',text:'#fff',accentDark:'#fff',accentLight:'#64748b',line:'#64748b'}
  },
  {
    id:'stone',name:'Stone',desc:'Warm premium',
    preview:{bg:'#fefce8',text:'#292524',accentDark:'#78716c',accentLight:'#fef3c7',line:'#78716c'}
  },
];

// Helpers
const esc = s => {const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;};
const fmtMonth = v => {if (!v) return ''; if (!v.includes('-')) return v; const [y, m] = v.split('-'); const ms = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return ms[+m - 1] + ' ' + y;};
const fmtDOB = v => {if (!v) return ''; const d = new Date(v); const ms = ['January','February','March','April','May','June','July','August','September','October','November','December']; return d.getDate() + ' ' + ms[d.getMonth()] + ' ' + d.getFullYear();};
const toArr = s => s ? s.split(/[,;\n]/).map(x => x.trim()).filter(Boolean) : [];
const descToHTML = t => {
  if (!t) return '';
  const ls = t.split('\n').filter(l => l.trim());
  if (ls.length <= 1) return '<p>' + esc(t) + '</p>';
  const hasBul = ls.some(l => /^[•\-\*\d+\.]/.test(l.trim()));
  if (hasBul) return '<ul>' + ls.map(l => '<li>' + esc(l.replace(/^[•\-\*]\s*/, '').replace(/^\d+\.\s*/, '')) + '</li>').join('') + '</ul>';
  return '<p>' + ls.map(l => esc(l)).join('<br/>') + '</p>';
};

// AI & Netlify Functions
const callAI = async ({context, question, tool, systemPrompt}) => {
  try {
    const r = await fetch('/.netlify/functions/ai-advisor', {
      method: 'POST',
      body: JSON.stringify({context, question, tool, systemPrompt}),
    });
    const j = await r.json();
    return j.answer || '';
  } catch (e) {
    return '';
  }
};

// MAIN APP
function CVBuilder() {
  const [step, setStep] = useState(0);
  const [country, setCountry] = useState('NG');
  const [template, setTemplate] = useState('slate');
  const [data, setData] = useState({
    fn:'', ln:'', title:'', email:'', phone:'', loc:'', web:'', dob:'', nat:'', gen:'', mar:'', so:'', sp:false, showPhoto:false, photo:null,
    summary:'',
    exps:[{t:'',c:'',l:'',s:'',e:'',d:''}],
    edus:[{deg:'',sch:'',loc:'',y1:'',y2:'',g:''}],
    skills:{h:'',s:'',t:''},
    certs:[{n:'',i:'',y:''}],
    langs:'',
    refs:[{n:'',p:'',e:'',f:''}],
    showRefs:false,
    extras:{awards:'',hobbies:''},
  });

  const norms = COUNTRY_NORMS[country] || COUNTRY_NORMS.OTHER;
  const upData = (path, val) => {
    const [k, ...rest] = path.split('.');
    const newData = {...data};
    if (rest.length === 0) newData[k] = val;
    else if (rest.length === 1) newData[k][rest[0]] = val;
    else if (rest.length === 2) {
      const idx = parseInt(rest[0]);
      if (!newData[k][idx]) newData[k][idx] = {};
      newData[k][idx][rest[1]] = val;
    }
    setData(newData);
  };

  // PDF Download
  const downloadPDF = async () => {
    const el = document.getElementById('cvpreview');
    if (!el) return;
    const canvas = await html2canvas(el, {scale: 2, useCORS: true, logging: false});
    const imgData = canvas.toDataURL('image/png');
    const pdf = new window.jspdf.jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
    const w = pdf.internal.pageSize.getWidth();
    const h = (canvas.height * w) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, w, h);
    while (h > pdf.internal.pageSize.getHeight()) {
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, -pdf.internal.pageSize.getHeight(), w, h);
    }
    pdf.save(data.fn + '_' + data.ln + '_CV.pdf');
  };

  // Copy to clipboard
  const copyResults = () => {
    const el = document.getElementById('cvpreview');
    if (!el) return;
    const canvas = document.createElement('canvas');
    canvas.innerHTML = el.innerHTML;
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    alert('CV copied to clipboard!');
  };

  return (
    <div style={{background:'#f8fafc',minHeight:'60vh',display:'flex',flexDirection:'column'}}>
      {/* COUNTRY SELECTOR BAR */}
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'10px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:14,fontWeight:700,color:'#1e293b',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:16}}>📄</span> CV Builder
          <span style={{fontSize:12,fontWeight:400,color:'#64748b',marginLeft:4}}>— tailored for African job markets</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:'#64748b'}}>Format for:</span>
          <select value={country} onChange={e => setCountry(e.target.value)} style={{background:'#f8fafc',border:'1.5px solid #e2e8f0',color:'#1e293b',padding:'6px 12px',borderRadius:6,fontSize:13,cursor:'pointer',fontFamily:'Outfit,sans-serif'}}>
            {Object.entries(COUNTRY_NORMS).map(([k, v]) => <option key={k} value={k}>{v.f} {v.n}</option>)}
          </select>
        </div>
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* FORM PANEL — LEFT */}
        <div style={{flex:'0 0 45%',background:'#fff',overflowY:'auto',borderRight:'1px solid #e2e8f0',padding:'24px',color:'#1e293b'}}>
          <h2 style={{fontSize:18,fontWeight:800,marginBottom:20,color:'#0f172a'}}>Build Your CV</h2>

          {/* SECTION: Personal Info */}
          <div style={{background:'#f8fafc',padding:16,borderRadius:8,marginBottom:16,border:'1px solid #e2e8f0'}}>
            <h3 style={{fontSize:13,fontWeight:600,marginBottom:12,color:'#008751'}}>Personal Information</h3>
            <input type="text" placeholder="First Name" value={data.fn} onChange={e => upData('fn', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
            <input type="text" placeholder="Last Name" value={data.ln} onChange={e => upData('ln', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
            <input type="text" placeholder="Professional Title" value={data.title} onChange={e => upData('title', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
            <input type="email" placeholder="Email" value={data.email} onChange={e => upData('email', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
            <input type="tel" placeholder="Phone" value={data.phone} onChange={e => upData('phone', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
            <input type="text" placeholder="Location" value={data.loc} onChange={e => upData('loc', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
            <input type="url" placeholder="Website / Portfolio" value={data.web} onChange={e => upData('web', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>

            {/* Photo Upload */}
            <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,cursor:'pointer'}}>
              <input type="checkbox" checked={data.showPhoto} onChange={e => upData('showPhoto', e.target.checked)} style={{cursor:'pointer'}}/>
              <span style={{fontSize:12}}>Include photo</span>
            </label>
            {data.showPhoto && (
              <input type="file" accept="image/*" onChange={e => {const f = e.target.files?.[0]; if (f) {const r = new FileReader(); r.onload = (ev) => upData('photo', ev.target.result); r.readAsDataURL(f);}}} style={{width:'100%',marginBottom:10,fontSize:12}}/>
            )}

            {/* Personal Details (country-specific) */}
            {(norms.dob || norms.gen || norms.mar || norms.nat) && (
              <>
                <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,cursor:'pointer'}}>
                  <input type="checkbox" checked={data.sp} onChange={e => upData('sp', e.target.checked)} style={{cursor:'pointer'}}/>
                  <span style={{fontSize:12}}>Include personal details</span>
                </label>
                {data.sp && (
                  <>
                    {norms.dob && <input type="date" value={data.dob} onChange={e => upData('dob', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>}
                    {norms.gen && <input type="text" placeholder="Gender" value={data.gen} onChange={e => upData('gen', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>}
                    {norms.mar && <input type="text" placeholder="Marital Status" value={data.mar} onChange={e => upData('mar', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>}
                    {norms.nat && <input type="text" placeholder="Nationality" value={data.nat} onChange={e => upData('nat', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>}
                    {norms.so && <input type="text" placeholder={norms.soL || 'State of Origin'} defaultValue={norms.soP} value={data.so} onChange={e => upData('so', e.target.value)} style={{width:'100%',padding:8,marginBottom:10,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>}
                  </>
                )}
              </>
            )}
          </div>

          {/* SECTION: Summary */}
          <div style={{background:'#f8fafc',padding:16,borderRadius:8,marginBottom:16,border:'1px solid #e2e8f0'}}>
            <h3 style={{fontSize:13,fontWeight:600,marginBottom:12,color:'#008751'}}>Professional Summary</h3>

          </div>

          {/* SECTION: Experience */}

            <h3 style={{fontSize:13,fontWeight:600,marginBottom:12,color:'#008751'}}>Work Experience</h3>
            {data.exps.map((e, i) => (
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:i < data.exps.length - 1 ? '1px solid #e2e8f0' : 'none'}}>
                <input type="text" placeholder="Job Title" value={e.t} onChange={ev => upData(`exps.${i}.t`, ev.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                <input type="text" placeholder="Company" value={e.c} onChange={ev => upData(`exps.${i}.c`, ev.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                <input type="text" placeholder="Location" value={e.l} onChange={ev => upData(`exps.${i}.l`, ev.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <input type="month" value={e.s} onChange={ev => upData(`exps.${i}.s`, ev.target.value)} style={{padding:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                  <input type="month" value={e.e} onChange={ev => upData(`exps.${i}.e`, ev.target.value)} style={{padding:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                </div>
                <textarea placeholder="Description (bullet points)" value={e.d} onChange={ev => upData(`exps.${i}.d`, ev.target.value)} style={{width:'100%',minHeight:60,padding:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a',fontFamily:'inherit',fontSize:12}}/>
              </div>
            ))}
            <button onClick={() => upData('exps', [...data.exps, {t:'',c:'',l:'',s:'',e:'',d:''}])} style={{width:'100%',padding:8,background:'#008751',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',fontWeight:600,fontSize:12}}>+ Add Experience</button>
          </div>

          {/* SECTION: Education */}
          <div style={{background:'#f8fafc',padding:16,borderRadius:8,marginBottom:16,border:'1px solid #e2e8f0'}}>
            <h3 style={{fontSize:13,fontWeight:600,marginBottom:12,color:'#008751'}}>Education</h3>
            {data.edus.map((e, i) => (
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:i < data.edus.length - 1 ? '1px solid #e2e8f0' : 'none'}}>
                <input type="text" placeholder="Degree / Qualification" value={e.deg} onChange={ev => upData(`edus.${i}.deg`, ev.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                <input type="text" placeholder="School / University" value={e.sch} onChange={ev => upData(`edus.${i}.sch`, ev.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                <input type="text" placeholder="Location" value={e.loc} onChange={ev => upData(`edus.${i}.loc`, ev.target.value)} style={{width:'100%',padding:8,marginBottom:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <input type="text" placeholder="Start Year" value={e.y1} onChange={ev => upData(`edus.${i}.y1`, ev.target.value)} style={{padding:8,background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:6,color:'#0f172a'}}/>

// TEMPLATE COMPONENTS
function SlateTemplate({data: d, norms}) {
  const name = esc(d.fn + ' ' + d.ln) || 'Your Name';
  const title = esc(d.title) || 'Professional Title';
  const contact = [d.email && ('✉ ' + esc(d.email)), d.phone && ('📱 ' + esc(d.phone)), d.loc && ('📍 ' + esc(d.loc)), d.web && ('🔗 ' + esc(d.web))].filter(Boolean);
  const personal = d.sp ? [d.dob && ('DOB: ' + fmtDOB(d.dob)), d.nat && esc(d.nat), d.gen && esc(d.gen), d.mar && esc(d.mar), d.so && esc(d.so)].filter(Boolean) : [];
  const allSkills = toArr(d.skills.h).concat(toArr(d.skills.s));
  const tools = toArr(d.skills.t);
  const hasExp = d.exps.some(e => e.t || e.c);
  const hasEdu = d.edus.some(e => e.deg || e.sch);
  const hasCerts = d.certs.some(c => c.n);
  const hasRef = d.showRefs && d.refs.some(r => r.n);

  const Photo = () => {
    if (d.showPhoto && d.photo) return <img style={{width:60,height:60,borderRadius:4,objectFit:'cover',marginBottom:8}} src={d.photo} alt=""/>;
    if (d.showPhoto) return <div style={{width:60,height:60,borderRadius:4,background:'#e0e0e0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,opacity:.3,marginBottom:8}}>👤</div>;
    return null;
  };
  const Pills = ({items,bg,color}) => items.map((s,i) => <span key={i} style={{display:'inline-block',padding:'2px 6px',borderRadius:3,fontSize:7,fontWeight:600,margin:'1.5px',background:bg,color:color}}>{esc(s)}</span>);
  const ExpEntries = () => d.exps.map((e,i) => {if (!e.t && !e.c) return null; return (
    <div key={i} style={{marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:9.5}}>{esc(e.t || 'Position')}</div>
      <div style={{fontSize:9,fontWeight:600,color:'#666'}}>{esc(e.c)}{e.l ? ' · ' + esc(e.l) : ''}</div>
      {(e.s || e.e) && <div style={{fontSize:8,color:'#999'}}>{e.s}{e.e ? ' – ' + e.e : ''}</div>}
      {e.d && <div style={{fontSize:8.5,color:'#555',lineHeight:1.4}} dangerouslySetInnerHTML={{__html: descToHTML(e.d)}}/>}
    </div>);});
  const EduEntries = () => d.edus.map((e,i) => {if (!e.deg && !e.sch) return null; return (
    <div key={i} style={{marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:9.5}}>{esc(e.deg || 'Qualification')}</div>
      <div style={{fontSize:9,fontWeight:600,color:'#666'}}>{esc(e.sch)}{e.loc ? ' · ' + esc(e.loc) : ''}</div>
      {(e.y1 || e.y2) && <div style={{fontSize:8,color:'#999'}}>{e.y1}{e.y2 ? ' – ' + e.y2 : ''}</div>}
      {e.g && <div style={{fontSize:8.5,color:'#555'}}>{esc(e.g)}</div>}
    </div>);});
  const CertEntries = () => d.certs.map((c,i) => {if (!c.n) return null; return <div key={i} style={{fontSize:8.5,marginBottom:6}}><span style={{fontWeight:700}}>{esc(c.n)}</span>{c.i && <span style={{color:'#999',marginLeft:4}}>· {esc(c.i)}</span>}{c.y && <span style={{color:'#999',marginLeft:4}}>· {c.y}</span>}</div>;});
  const RefEntries = () => d.refs.map((r,i) => {if (!r.n) return null; return <div key={i} style={{marginBottom:6}}><div style={{fontWeight:700,fontSize:8.5}}>{esc(r.n)}</div>{r.p && <div style={{fontSize:8,color:'#666'}}>{esc(r.p)}</div>}<div style={{fontSize:7.5,color:'#999'}}>{[r.e, r.f].filter(Boolean).join(' · ')}</div></div>;});
  const Sec = ({label, children}) => children ? <div style={{marginBottom:12}}><div style={{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:'#1e293b',marginBottom:6,paddingBottom:4,borderBottom:'2px solid #3b82f6'}}>{label}</div>{children}</div> : null;

  return (
    <div style={{fontFamily:"'Outfit',sans-serif",fontSize:8.5,lineHeight:1.45,color:'#222',height:'100%',display:'flex'}}>
      {/* LEFT SIDEBAR — 38% */}
      <div style={{flex:'0 0 38%',background:'#1e293b',color:'#fff',padding:20,display:'flex',flexDirection:'column'}}>
        <Photo/>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:600,marginBottom:1}}>{name}</div>
        <div style={{fontSize:9,color:'#94a3b8',marginBottom:14}}>{title}</div>

        {personal.length > 0 && <Sec label="Personal" style={{color:'#64748b'}}><div>{personal.map((p,i) => <div key={i} style={{fontSize:8,marginBottom:3}}>{p}</div>)}</div></Sec>}
        {allSkills.length > 0 && <Sec label="Skills"><Pills items={allSkills} bg="#dbeafe" color="#1e40af"/></Sec>}
        {tools.length > 0 && <Sec label="Tools"><div>{tools.map((t,i) => <div key={i} style={{fontSize:8,marginBottom:3}}>{esc(t)}</div>)}</div></Sec>}
        {d.langs && <Sec label="Languages"><div>{d.langs.split(',').map((l,i) => <div key={i} style={{fontSize:8,marginBottom:3}}>{l.trim()}</div>)}</div></Sec>}
        {d.extras.hobbies && <Sec label="Interests"><div style={{fontSize:8}}>{esc(d.extras.hobbies)}</div></Sec>}
      </div>

      {/* RIGHT BODY — 62% */}
      <div style={{flex:'0 0 62%',padding:18,overflowY:'auto'}}>
        {d.summary && <Sec label="Professional Summary"><div style={{fontSize:8.5,color:'#555'}}><p>{esc(d.summary)}</p></div></Sec>}
        {hasExp && <Sec label="Work Experience"><ExpEntries/></Sec>}
        {hasEdu && <Sec label="Education"><EduEntries/></Sec>}
        {hasCerts && <Sec label="Certifications"><CertEntries/></Sec>}
        {d.extras.awards && <Sec label="Awards"><div style={{fontSize:8.5,color:'#555'}} dangerouslySetInnerHTML={{__html: descToHTML(d.extras.awards)}}/>< /Sec>}
        {hasRef && <Sec label="References"><RefEntries/></Sec>}
      </div>
    </div>
  );
}
