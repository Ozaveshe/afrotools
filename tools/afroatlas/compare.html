</div>

<div class="aa-cmp-toast" id="aa-cmp-toast">Link copied to clipboard</div>

<afro-footer></afro-footer>

<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
(function() {
  'use strict';

  var page = document.getElementById('aa-compare-page');
  var params = new URLSearchParams(window.location.search);
  var codeA = params.get('a');
  var codeB = params.get('b');

  /* ── Helpers ── */

  function fmtGdp(v) {
    if (v == null || isNaN(v)) return 'N/A';
    if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
    if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
    return '$' + v.toLocaleString();
  }

  function fmtPop(v) {
    if (v == null || isNaN(v)) return 'N/A';
    if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
    return String(v);
  }

  function fmtPct(v) {
    if (v == null || isNaN(v)) return 'N/A';
    return v + '%';
  }

  function fmtNum(v) {
    if (v == null || isNaN(v)) return 'N/A';
    return v.toLocaleString();
  }

  function calcRatio(a, b) {
    if (!a || !b || a === 0 || b === 0) return '';
    var bigger = Math.max(a, b);
    var smaller = Math.min(a, b);
    var r = bigger / smaller;
    if (r < 1.05) return 'roughly equal';
    return r.toFixed(0) + 'x higher';
  }

  function findCode(c) {
    var keys = Object.keys(AfroAtlas.COUNTRIES);
    for (var i = 0; i < keys.length; i++) {
      if (AfroAtlas.COUNTRIES[keys[i]] === c) return keys[i];
    }
    var wkeys = Object.keys(AfroAtlas.WORLD_REF);
    for (var j = 0; j < wkeys.length; j++) {
      if (AfroAtlas.WORLD_REF[wkeys[j]] === c) return wkeys[j];
    }
    return '';
  }

  function slugFor(c) {
    if (!c) return '';
    return c.slug || c.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  }

  function profileLink(c) {
    if (c.isRef) return '/tools/afroatlas/';
    return '/tools/afroatlas/country/' + slugFor(c) + '/';
  }

  function showToast(msg) {
    var t = document.getElementById('aa-cmp-toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(function() { t.classList.remove('visible'); }, 2400);
  }

  /* ── Build select options ── */
  function buildOptions() {
    var html = '<option value="">Select a country...</option>';
    html += '<optgroup label="African Countries">';
    var aKeys = Object.keys(AfroAtlas.COUNTRIES);
    var aSorted = aKeys.slice().sort(function(x, y) {
      return AfroAtlas.COUNTRIES[x].name.localeCompare(AfroAtlas.COUNTRIES[y].name);
    });
    for (var i = 0; i < aSorted.length; i++) {
      var k = aSorted[i];
      html += '<option value="' + k + '">' + AfroAtlas.COUNTRIES[k].flag + ' ' + AfroAtlas.COUNTRIES[k].name + '</option>';
    }
    html += '</optgroup>';
    html += '<optgroup label="World Reference Countries">';
    var wKeys = Object.keys(AfroAtlas.WORLD_REF);
    var wSorted = wKeys.slice().sort(function(x, y) {
      return AfroAtlas.WORLD_REF[x].name.localeCompare(AfroAtlas.WORLD_REF[y].name);
    });
    for (var j = 0; j < wSorted.length; j++) {
      var w = wSorted[j];
      html += '<option value="' + w + '">' + AfroAtlas.WORLD_REF[w].flag + ' ' + AfroAtlas.WORLD_REF[w].name + '</option>';
    }
    html += '</optgroup>';
    return html;
  }

  /* ── Selector UI (no params) ── */
  function renderSelector() {
    var opts = buildOptions();
    var h = '';
    h += '<div class="aa-cmp-selector">';
    h +=   '<h1 class="aa-cmp-selector-title">Compare Any Two Countries</h1>';
    h +=   '<p class="aa-cmp-selector-sub">Pick two countries to see a detailed side-by-side breakdown of GDP, population, resources, and development indicators.</p>';
    h +=   '<div class="aa-cmp-selector-row">';
    h +=     '<select class="aa-compare-select" id="aa-sel-a">' + opts + '</select>';
    h +=     '<div class="aa-vs-badge">VS</div>';
    h +=     '<select class="aa-compare-select" id="aa-sel-b">' + opts + '</select>';
    h +=   '</div>';
    h +=   '<button type="button" class="aa-compare-btn" id="aa-cmp-go">Compare Now</button>';
    h += '</div>';
    page.innerHTML = h;

    document.getElementById('aa-cmp-go').addEventListener('click', function() {
      var a = document.getElementById('aa-sel-a').value;
      var b = document.getElementById('aa-sel-b').value;
      if (!a || !b) { showToast('Please select two countries'); return; }
      if (a === b) { showToast('Please pick two different countries'); return; }
      window.location.href = 'compare.html?a=' + a + '&b=' + b;
    });
  }

  /* ── Validate codes ── */
  function lookupCountry(code) {
    if (!code) return null;
    return AfroAtlas.getCountry(code) || AfroAtlas.getWorldRef(code);
  }

  var c1 = lookupCountry(codeA);
  var c2 = lookupCountry(codeB);

  if (!codeA || !codeB || !c1 || !c2) {
    renderSelector();
    return;
  }

  /* ── Comparison rendering ── */
  var comp = AfroAtlas.compareCountries(codeA, codeB);
  var insights = AfroAtlas.generateInsights(codeA, codeB);

  if (!comp) {
    renderSelector();
    return;
  }

  var codeAUpper = codeA.toUpperCase();
  var codeBUpper = codeB.toUpperCase();

  /* ── Header ── */
  var html = '';
  html += '<div class="aa-cmp-header">';
  html +=   '<div class="aa-cmp-side">';
  html +=     '<div class="aa-cmp-flag">' + c1.flag + '</div>';
  html +=     '<div class="aa-cmp-name">' + c1.name + '</div>';
  html +=   '</div>';
  html +=   '<div class="aa-cmp-vs">VS</div>';
  html +=   '<div class="aa-cmp-side">';
  html +=     '<div class="aa-cmp-flag">' + c2.flag + '</div>';
  html +=     '<div class="aa-cmp-name">' + c2.name + '</div>';
  html +=   '</div>';
  html += '</div>';

  /* Swap button */
  html += '<div class="aa-cmp-swap-row">';
  html +=   '<button type="button" class="aa-cmp-swap" id="aa-swap-btn">';
  html +=     '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M7 16l-4-4 4-4"/><path d="M17 8l4 4-4 4"/><path d="M3 12h18"/></svg>';
  html +=     'Swap Countries';
  html +=   '</button>';
  html += '</div>';

  /* ── Legend ── */
  html += '<div class="aa-cmp-legend">';
  html +=   '<div class="aa-cmp-legend-item"><span class="aa-cmp-legend-dot aa-dot-a"></span>' + c1.name + '</div>';
  html +=   '<div class="aa-cmp-legend-item"><span class="aa-cmp-legend-dot aa-dot-b"></span>' + c2.name + '</div>';
  html += '</div>';

  /* ── Metric Comparison Bars ── */
  var metricDefs = [
    { key: 'gdp', label: 'GDP (Nominal)', fmt: fmtGdp },
    { key: 'gdpPC', label: 'GDP Per Capita', fmt: fmtGdp },
    { key: 'population', label: 'Population', fmt: fmtPop },
    { key: 'hdi', label: 'Human Development Index', fmt: function(v) { return v != null ? v.toFixed(3) : 'N/A'; } },
    { key: 'lifeExp', label: 'Life Expectancy (years)', fmt: function(v) { return v != null ? v.toFixed(1) : 'N/A'; } },
    { key: 'literacy', label: 'Literacy Rate', fmt: fmtPct },
    { key: 'internet', label: 'Internet Access', fmt: fmtPct },
    { key: 'electricity', label: 'Electricity Access', fmt: fmtPct }
  ];

  html += '<div class="aa-cmp-metrics">';
  for (var mi = 0; mi < metricDefs.length; mi++) {
    var md = metricDefs[mi];
    var va = c1[md.key];
    var vb = c2[md.key];
    if (va == null && vb == null) continue;
    var numA = typeof va === 'number' ? va : 0;
    var numB = typeof vb === 'number' ? vb : 0;
    var maxVal = Math.max(numA, numB);
    var pctA = maxVal > 0 ? (numA / maxVal * 100) : 0;
    var pctB = maxVal > 0 ? (numB / maxVal * 100) : 0;
    var ratio = calcRatio(numA, numB);

    html += '<div class="aa-cmp-metric">';
    html +=   '<div class="aa-cmp-metric-label">' + md.label + '</div>';

    /* Bar A */
    html +=   '<div class="aa-cmp-bar-row">';
    html +=     '<div class="aa-cmp-bar-name">' + codeAUpper + '</div>';
    html +=     '<div class="aa-cmp-bar-track"><div class="aa-cmp-bar-fill aa-bar-a" style="width:' + pctA.toFixed(1) + '%"></div></div>';
    html +=     '<div class="aa-cmp-bar-val">' + md.fmt(va) + '</div>';
    html +=   '</div>';

    /* Bar B */
    html +=   '<div class="aa-cmp-bar-row">';
    html +=     '<div class="aa-cmp-bar-name">' + codeBUpper + '</div>';
    html +=     '<div class="aa-cmp-bar-track"><div class="aa-cmp-bar-fill aa-bar-b" style="width:' + pctB.toFixed(1) + '%"></div></div>';
    html +=     '<div class="aa-cmp-bar-val">' + md.fmt(vb) + '</div>';
    html +=   '</div>';

    if (ratio) {
      html += '<div class="aa-cmp-ratio">' + ratio + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  /* ── Charts Row ── */
  html += '<div class="aa-cmp-charts">';

  /* Radar chart card */
  html +=   '<div class="aa-cmp-chart-card">';
  html +=     '<div class="aa-cmp-chart-title">Development Radar</div>';
  html +=     '<canvas id="aa-radar-chart"></canvas>';
  html +=   '</div>';

  /* GDP Timeline card */
  html +=   '<div class="aa-cmp-chart-card">';
  html +=     '<div class="aa-cmp-chart-title">GDP Timeline</div>';
  html +=     '<canvas id="aa-gdp-chart"></canvas>';
  html +=   '</div>';

  html += '</div>';

  /* ── Insights ── */
  if (insights && insights.length > 0) {
    var icons = ['📊', '💰', '🏛️', '👥', '⚡', '❤️', '📈'];
    html += '<div class="aa-cmp-insights">';
    html +=   '<div class="aa-cmp-insights-title">Key Insights</div>';
    html +=   '<ul class="aa-cmp-insight-list">';
    for (var ii = 0; ii < insights.length; ii++) {
      html += '<li class="aa-cmp-insight-item">';
      html +=   '<div class="aa-cmp-insight-icon">' + (icons[ii] || '📌') + '</div>';
      html +=   '<div>' + insights[ii] + '</div>';
      html += '</li>';
    }
    html +=   '</ul>';
    html += '</div>';
  }

  /* ── Shared Resources ── */
  var r1 = c1.resources || [];
  var r2 = c2.resources || [];
  var shared = [];
  for (var si = 0; si < r1.length; si++) {
    for (var sj = 0; sj < r2.length; sj++) {
      if (r1[si].type === r2[sj].type) {
        var rt = AfroAtlas.RESOURCE_TYPES[r1[si].type];
        shared.push({
          type: r1[si].type,
          emoji: rt ? rt.emoji : '⛏️',
          label: rt ? rt.label : r1[si].type,
          rankA: r1[si].rank,
          rankB: r2[sj].rank
        });
        break;
      }
    }
  }

  if (shared.length > 0) {
    html += '<div class="aa-cmp-shared">';
    html +=   '<div class="aa-cmp-shared-title">Shared Resources</div>';
    html +=   '<div class="aa-cmp-shared-grid">';
    for (var shi = 0; shi < shared.length; shi++) {
      var sr = shared[shi];
      var rankText = '';
      var rA = sr.rankA != null ? '#' + sr.rankA + ' in Africa' : 'Global';
      var rB = sr.rankB != null ? '#' + sr.rankB + ' in Africa' : 'Global';
      rankText = c1.name + ': ' + rA + ' | ' + c2.name + ': ' + rB;

      html += '<div class="aa-cmp-shared-card">';
      html +=   '<div class="aa-cmp-shared-emoji">' + sr.emoji + '</div>';
      html +=   '<div class="aa-cmp-shared-info">';
      html +=     '<div class="aa-cmp-shared-label">' + sr.label + '</div>';
      html +=     '<div class="aa-cmp-shared-ranks">' + rankText + '</div>';
      html +=   '</div>';
      html += '</div>';
    }
    html +=   '</div>';
    html += '</div>';
  }

  /* ── CTAs ── */
  html += '<div class="aa-cmp-ctas">';
  html +=   '<button type="button" class="aa-cmp-cta aa-cmp-cta-primary" id="aa-share-btn">Share This Comparison</button>';
  html +=   '<button type="button" class="aa-cmp-cta aa-cmp-cta-outline" id="aa-tryagain-btn">Try Another Comparison</button>';
  if (!c1.isRef) {
    html += '<a class="aa-cmp-cta aa-cmp-cta-link" href="' + profileLink(c1) + '">' + c1.name + ' Profile</a>';
  }
  if (!c2.isRef) {
    html += '<a class="aa-cmp-cta aa-cmp-cta-link" href="' + profileLink(c2) + '">' + c2.name + ' Profile</a>';
  }
  html += '</div>';

  /* ── Inject ── */
  page.innerHTML = html;

  /* ── Event: Swap ── */
  var swapBtn = document.getElementById('aa-swap-btn');
  if (swapBtn) {
    swapBtn.addEventListener('click', function() {
      window.location.href = 'compare.html?a=' + codeBUpper + '&b=' + codeAUpper;
    });
  }

  /* ── Event: Share ── */
  var shareBtn = document.getElementById('aa-share-btn');
  if (shareBtn) {
    shareBtn.addEventListener('click', function() {
      var url = window.location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
          showToast('Link copied to clipboard');
        });
      } else {
        var inp = document.createElement('input');
        inp.value = url;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand('copy');
        document.body.removeChild(inp);
        showToast('Link copied to clipboard');
      }
    });
  }

  /* ── Event: Try Another ── */
  var tryBtn = document.getElementById('aa-tryagain-btn');
  if (tryBtn) {
    tryBtn.addEventListener('click', function() {
      window.location.href = 'compare.html';
    });
  }

  /* ── Charts (wait for Chart.js) ── */
  function initCharts() {
    if (typeof Chart === 'undefined') {
      setTimeout(initCharts, 200);
      return;
    }

    /* Radar Chart */
    var radarEl = document.getElementById('aa-radar-chart');
    if (radarEl) {
      var normalize = function(val, max) {
        if (val == null || isNaN(val) || max <= 0) return 0;
        return Math.min((val / max) * 100, 100);
      };

      var radarLabels = ['GDP/Capita', 'HDI', 'Resource Richness', 'Internet', 'Literacy', 'Life Expectancy'];
      var maxGdpPC = 120000;
      var dataA = [
        normalize(c1.gdpPC, maxGdpPC),
        (c1.hdi || 0) * 100,
        c1.rrs || 0,
        c1.internet || 0,
        c1.literacy || 0,
        normalize(c1.lifeExp, 90)
      ];
      var dataB = [
        normalize(c2.gdpPC, maxGdpPC),
        (c2.hdi || 0) * 100,
        c2.rrs || 0,
        c2.internet || 0,
        c2.literacy || 0,
        normalize(c2.lifeExp, 90)
      ];

      new Chart(radarEl.getContext('2d'), {
        type: 'radar',
        data: {
          labels: radarLabels,
          datasets: [
            {
              label: c1.name,
              data: dataA,
              borderColor: '#007AFF',
              backgroundColor: 'rgba(0, 122, 255, 0.12)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: '#007AFF'
            },
            {
              label: c2.name,
              data: dataB,
              borderColor: '#E76F51',
              backgroundColor: 'rgba(231, 111, 81, 0.12)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: '#E76F51'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: { font: { family: "'DM Sans', sans-serif", size: 12 }, padding: 16, usePointStyle: true }
            }
          },
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: { display: false, stepSize: 20 },
              grid: { color: 'rgba(0,0,0,0.06)' },
              pointLabels: { font: { family: "'DM Sans', sans-serif", size: 11 }, color: '#64748b' }
            }
          }
        }
      });
    }

    /* GDP Timeline */
    var gdpEl = document.getElementById('aa-gdp-chart');
    if (gdpEl) {
      var hist1 = AfroAtlas.getGdpTimeline(codeAUpper) || {};
      var hist2 = AfroAtlas.getGdpTimeline(codeBUpper) || {};
      var yearSet = {};
      var k1 = Object.keys(hist1);
      var k2 = Object.keys(hist2);
      for (var yi = 0; yi < k1.length; yi++) yearSet[k1[yi]] = true;
      for (var yj = 0; yj < k2.length; yj++) yearSet[k2[yj]] = true;
      var years = Object.keys(yearSet).sort();

      var gdpA = [];
      var gdpB = [];
      for (var yk = 0; yk < years.length; yk++) {
        var yr = years[yk];
        gdpA.push(hist1[yr] != null ? hist1[yr] / 1e9 : null);
        gdpB.push(hist2[yr] != null ? hist2[yr] / 1e9 : null);
      }

      new Chart(gdpEl.getContext('2d'), {
        type: 'line',
        data: {
          labels: years,
          datasets: [
            {
              label: c1.name,
              data: gdpA,
              borderColor: '#007AFF',
              backgroundColor: 'rgba(0, 122, 255, 0.08)',
              borderWidth: 2.5,
              fill: false,
              tension: 0.3,
              pointRadius: 4,
              pointBackgroundColor: '#007AFF',
              spanGaps: true
            },
            {
              label: c2.name,
              data: gdpB,
              borderColor: '#E76F51',
              backgroundColor: 'rgba(231, 111, 81, 0.08)',
              borderWidth: 2.5,
              fill: false,
              tension: 0.3,
              pointRadius: 4,
              pointBackgroundColor: '#E76F51',
              spanGaps: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: { font: { family: "'DM Sans', sans-serif", size: 12 }, padding: 16, usePointStyle: true }
            },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var v = ctx.parsed.y;
                  if (v == null) return ctx.dataset.label + ': N/A';
                  if (v >= 1000) return ctx.dataset.label + ': $' + (v / 1000).toFixed(2) + 'T';
                  return ctx.dataset.label + ': $' + v.toFixed(1) + 'B';
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { family: "'DM Sans', sans-serif", size: 11 }, color: '#94a3af' }
            },
            y: {
              beginAtZero: true,
              ticks: {
                font: { family: "'DM Sans', sans-serif", size: 11 },
                color: '#94a3af',
                callback: function(v) {
                  if (v >= 1000) return '$' + (v / 1000).toFixed(1) + 'T';
                  return '$' + v + 'B';
                }
              },
              grid: { color: 'rgba(0,0,0,0.04)' }
            }
          }
        }
      });
    }
  }

  initCharts();

})();
</script>
