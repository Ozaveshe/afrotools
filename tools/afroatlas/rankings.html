<style>
/* ── RANKINGS PAGE STYLES ── */

/* Resource Picker Grid */
.aa-picker-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  text-align: center;
  margin: 0 0 8px;
  color: var(--color-text, #0f172a);
}
.aa-picker-sub {
  text-align: center;
  color: #64748b;
  font-size: 1.05rem;
  margin: 0 0 36px;
}
.aa-picker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.aa-picker-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 24px 12px;
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e2e8f0;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.aa-picker-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  border-color: var(--color-primary, #007AFF);
}
.aa-picker-emoji {
  font-size: 2.4rem;
  line-height: 1;
}
.aa-picker-label {
  font-weight: 600;
  font-size: 0.92rem;
  text-align: center;
}
.aa-picker-count {
  font-size: 0.78rem;
  color: #94a3b8;
}

/* Ranking Header */
.aa-rank-header {
  text-align: center;
  padding: 48px 20px 24px;
}
.aa-rank-header h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 2.6rem;
  margin: 0 0 6px;
}
.aa-rank-header .aa-rank-subtitle {
  color: #64748b;
  font-size: 1.05rem;
  margin: 0 0 16px;
}
.aa-back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--color-primary, #007AFF);
  text-decoration: none;
  font-weight: 500;
  font-size: 0.9rem;
}
.aa-back-link:hover {
  text-decoration: underline;
}

/* Podium */
.aa-podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 16px;
  max-width: 700px;
  margin: 0 auto 40px;
  padding: 0 20px;
}
.aa-podium-card {
  flex: 1;
  max-width: 200px;
  text-align: center;
  border-radius: 16px;
  padding: 24px 12px 20px;
  background: #fff;
  border: 2px solid #e2e8f0;
  position: relative;
}
.aa-podium-card.aa-gold {
  border-color: #F5A623;
  box-shadow: 0 4px 20px rgba(245, 166, 35, 0.18);
  order: 2;
  transform: scale(1.08);
}
.aa-podium-card.aa-silver {
  border-color: #94a3b8;
  box-shadow: 0 4px 16px rgba(148, 163, 184, 0.15);
  order: 1;
}
.aa-podium-card.aa-bronze {
  border-color: #B45309;
  box-shadow: 0 4px 16px rgba(180, 83, 9, 0.12);
  order: 3;
}
.aa-podium-medal {
  font-size: 1.6rem;
  margin-bottom: 4px;
}
.aa-podium-flag {
  font-size: 2.2rem;
  display: block;
  margin-bottom: 6px;
}
.aa-podium-name {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 4px;
}
.aa-podium-prod {
  font-size: 0.8rem;
  color: #64748b;
  margin-bottom: 2px;
}
.aa-podium-share {
  font-size: 0.78rem;
  font-weight: 600;
}

/* Rank Bars */
.aa-rank-bars {
  max-width: 800px;
  margin: 0 auto 48px;
  padding: 0 20px;
}
.aa-rank-bars-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem;
  margin: 0 0 20px;
}
.aa-rank-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.aa-rank-num {
  width: 28px;
  font-weight: 700;
  font-size: 0.88rem;
  color: #64748b;
  text-align: right;
  flex-shrink: 0;
}
.aa-rank-flag {
  font-size: 1.3rem;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}
.aa-rank-name {
  width: 120px;
  font-weight: 600;
  font-size: 0.88rem;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.aa-bar-track {
  flex: 1;
  height: 28px;
  background: #f1f5f9;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.aa-bar-fill {
  height: 100%;
  border-radius: 6px;
  width: 0;
  transition: width 1s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.aa-bar-fill.aa-animated {
  /* width set via JS */
}
.aa-rank-val {
  width: 80px;
  font-size: 0.82rem;
  color: #475569;
  text-align: right;
  flex-shrink: 0;
  font-weight: 500;
}

/* Chart Section */
.aa-chart-section {
  max-width: 800px;
  margin: 0 auto 48px;
  padding: 0 20px;
}
.aa-chart-section h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem;
  margin: 0 0 16px;
}
.aa-chart-wrap {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e2e8f0;
  padding: 20px;
  position: relative;
}
.aa-chart-wrap canvas {
  width: 100% !important;
}

/* Global Context */
.aa-context-section {
  max-width: 800px;
  margin: 0 auto 48px;
  padding: 0 20px;
}
.aa-context-box {
  background: linear-gradient(135deg, #f0f6ff 0%, #fff 100%);
  border: 1px solid #dbeafe;
  border-radius: 14px;
  padding: 28px 24px;
}
.aa-context-box h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  margin: 0 0 16px;
}
.aa-context-stat {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--color-primary, #007AFF);
  margin-bottom: 12px;
}
.aa-context-facts {
  list-style: none;
  padding: 0;
  margin: 0;
}
.aa-context-facts li {
  padding: 6px 0;
  color: #475569;
  font-size: 0.92rem;
  border-bottom: 1px solid #e2e8f0;
}
.aa-context-facts li:last-child {
  border-bottom: none;
}

/* Other Resources */
.aa-other-section {
  max-width: 800px;
  margin: 0 auto 60px;
  padding: 0 20px;
}
.aa-other-section h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  margin: 0 0 14px;
}
.aa-other-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
.aa-other-scroll::-webkit-scrollbar {
  height: 4px;
}
.aa-other-scroll::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 4px;
}
.aa-other-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 24px;
  font-size: 0.85rem;
  font-weight: 500;
  white-space: nowrap;
  text-decoration: none;
  color: var(--color-text, #0f172a);
  transition: border-color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.aa-other-tab:hover {
  border-color: var(--color-primary, #007AFF);
  background: #f0f6ff;
}
.aa-other-tab.active {
  background: var(--color-primary, #007AFF);
  color: #fff;
  border-color: var(--color-primary, #007AFF);
}

/* Empty State */
.aa-empty {
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
}
.aa-empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
}

/* Responsive */
@media (max-width: 640px) {
  .aa-picker-title { font-size: 1.8rem; }
  .aa-picker-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .aa-rank-header h1 { font-size: 1.8rem; }
  .aa-podium { flex-direction: column; align-items: center; }
  .aa-podium-card { max-width: 280px; width: 100%; }
  .aa-podium-card.aa-gold { order: 0; transform: none; }
  .aa-podium-card.aa-silver { order: 1; }
  .aa-podium-card.aa-bronze { order: 2; }
  .aa-rank-name { width: 80px; font-size: 0.8rem; }
  .aa-rank-val { width: 60px; font-size: 0.78rem; }
  .aa-rank-num { width: 22px; }
}

<body>
<afro-navbar></afro-navbar>

<nav class="aa-crumb aa-wrap" aria-label="breadcrumb" style="padding-top:14px;padding-bottom:0">
  <a href="/">Home</a> <span>/</span> <a href="/tools/">Tools</a> <span>/</span> <a href="/tools/afroatlas/">AfroAtlas</a> <span>/</span> <span>Rankings</span>
</nav>

<div class="aa-page" id="aa-rankings-page">
  <!-- Rendered by JS -->
</div>

<afro-footer></afro-footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<script>
(function() {
  'use strict';

  var page = document.getElementById('aa-rankings-page');
  var params = new URLSearchParams(window.location.search);
  var resourceParam = params.get('resource');
  var types = AfroAtlas.getResourceTypes();
  var typeKeys = Object.keys(types);

  // ─── HELPER: build producer count for a resource type ───
  function getProducerCount(type) {
    var list = AfroAtlas.countriesByResource(type);
    return list ? list.length : 0;
  }

  // ─── HELPER: format large numbers ───
  function fmtNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  // ─── NO RESOURCE: show picker grid ───
  if (!resourceParam || !types[resourceParam]) {
    var html = '';
    html += '<div style="padding:48px 0 0">';
    html += '<h1 class="aa-picker-title">Resource Rankings</h1>';
    html += '<p class="aa-picker-sub">Select a resource to see which African countries lead</p>';
    html += '<div class="aa-picker-grid">';

    for (var i = 0; i < typeKeys.length; i++) {
      var k = typeKeys[i];
      var t = types[k];
      var count = getProducerCount(k);
      html += '<a class="aa-picker-card" href="?resource=' + k + '">';
      html += '<span class="aa-picker-emoji">' + t.emoji + '</span>';
      html += '<span class="aa-picker-label">' + t.label + '</span>';
      html += '<span class="aa-picker-count">' + count + ' producer' + (count !== 1 ? 's' : '') + '</span>';
      html += '</a>';
    }

    html += '</div></div>';
    page.innerHTML = html;
    return;
  }

  // ─── VALID RESOURCE: show leaderboard ───
  var rt = types[resourceParam];
  var producers = AfroAtlas.countriesByResource(resourceParam);

  // Empty state
  if (!producers || producers.length === 0) {
    page.innerHTML = '<div class="aa-empty">' +
      '<div class="aa-empty-icon">' + rt.emoji + '</div>' +
      '<h2>No data available</h2>' +
      '<p>No African countries found producing ' + rt.label + '.</p>' +
      '<a class="aa-back-link" href="rankings.html">&larr; Back to all resources</a>' +
      '</div>';
    return;
  }

  // Determine max share for proportional bars
  var maxShare = 0;
  for (var m = 0; m < producers.length; m++) {
    var s = producers[m].resource.share;
    if (typeof s === 'number' && s > maxShare) maxShare = s;
  }
  if (maxShare === 0) maxShare = 1;

  var out = '';

  // ── Header ──
  out += '<div class="aa-rank-header">';
  out += '<a class="aa-back-link" href="rankings.html">&larr; All resources</a>';
  out += '<h1>' + rt.emoji + ' ' + rt.label + '</h1>';
  out += '<p class="aa-rank-subtitle">African Rankings</p>';
  out += '</div>';

  // ── Podium (top 3) ──
  if (producers.length >= 1) {
    var medals = ['aa-gold', 'aa-silver', 'aa-bronze'];
    var medalIcons = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
    var podiumCount = Math.min(3, producers.length);

    out += '<div class="aa-podium">';
    for (var p = 0; p < podiumCount; p++) {
      var pr = producers[p];
      var c = pr.country;
      var r = pr.resource;
      out += '<div class="aa-podium-card ' + medals[p] + '">';
      out += '<div class="aa-podium-medal">' + medalIcons[p] + '</div>';
      out += '<span class="aa-podium-flag">' + c.flag + '</span>';
      out += '<div class="aa-podium-name">' + c.name + '</div>';
      out += '<div class="aa-podium-prod">' + (r.prod || 'N/A') + '</div>';
      out += '<div class="aa-podium-share" style="color:' + rt.color + '">' + (typeof r.share === 'number' ? r.share + '% of Africa' : '') + '</div>';
      out += '</div>';
    }
    out += '</div>';
  }

  // ── Full Ranking Bars ──
  out += '<div class="aa-rank-bars">';
  out += '<h2 class="aa-rank-bars-title">Full Rankings</h2>';

  for (var b = 0; b < producers.length; b++) {
    var bp = producers[b];
    var bc = bp.country;
    var br = bp.resource;
    var shareVal = typeof br.share === 'number' ? br.share : 0;
    var barWidth = maxShare > 0 ? Math.max(2, Math.round((shareVal / maxShare) * 100)) : 2;

    out += '<div class="aa-rank-bar" data-bar-width="' + barWidth + '">';
    out += '<span class="aa-rank-num">' + (b + 1) + '</span>';
    out += '<span class="aa-rank-flag">' + bc.flag + '</span>';
    out += '<span class="aa-rank-name" title="' + bc.name + '">' + bc.name + '</span>';
    out += '<div class="aa-bar-track"><div class="aa-bar-fill" style="background:' + rt.color + '"></div></div>';
    out += '<span class="aa-rank-val">' + (typeof br.share === 'number' ? br.share + '%' : br.prod || '-') + '</span>';
    out += '</div>';
  }

  out += '</div>';

  // ── Chart.js Section ──
  out += '<div class="aa-chart-section">';
  out += '<h2>' + rt.emoji + ' ' + rt.label + ' Production by Country</h2>';
  out += '<div class="aa-chart-wrap"><canvas id="aa-rank-chart"></canvas></div>';
  out += '</div>';

  // ── Global Context ──
  var totalGlobalShare = 0;
  var factsList = [];
  for (var g = 0; g < producers.length; g++) {
    var gr = producers[g].resource;
    if (typeof gr.global === 'number') {
      totalGlobalShare += gr.global;
    }
    if (gr.note && g < 3) {
      factsList.push(producers[g].country.flag + ' ' + producers[g].country.name + ': ' + gr.note);
    }
  }

  out += '<div class="aa-context-section">';
  out += '<div class="aa-context-box">';
  out += '<h2>Global Context</h2>';
  if (totalGlobalShare > 0) {
    out += '<div class="aa-context-stat">Africa produces ~' + totalGlobalShare + '% of the world\'s ' + rt.label + '</div>';
  }
  out += '<ul class="aa-context-facts">';
  out += '<li><strong>' + producers.length + '</strong> African countries produce ' + rt.label + '</li>';
  for (var f = 0; f < factsList.length; f++) {
    out += '<li>' + factsList[f] + '</li>';
  }
  out += '</ul>';
  out += '</div></div>';

  // ── Other Resources Navigation ──
  out += '<div class="aa-other-section">';
  out += '<h2>Explore Other Resources</h2>';
  out += '<div class="aa-other-scroll">';
  for (var o = 0; o < typeKeys.length; o++) {
    var ok = typeKeys[o];
    var ot = types[ok];
    var isActive = ok === resourceParam ? ' active' : '';
    out += '<a class="aa-other-tab' + isActive + '" href="?resource=' + ok + '">' + ot.emoji + ' ' + ot.label + '</a>';
  }
  out += '</div></div>';

  page.innerHTML = out;

  // ── Animate bars with IntersectionObserver ──
  var bars = document.querySelectorAll('.aa-rank-bar');
  if (typeof IntersectionObserver !== 'undefined') {
    var observer = new IntersectionObserver(function(entries) {
      for (var e = 0; e < entries.length; e++) {
        if (entries[e].isIntersecting) {
          var row = entries[e].target;
          var fill = row.querySelector('.aa-bar-fill');
          var w = row.getAttribute('data-bar-width') || '0';
          fill.style.width = w + '%';
          fill.classList.add('aa-animated');
          observer.unobserve(row);
        }
      }
    }, { threshold: 0.1 });

    for (var bi = 0; bi < bars.length; bi++) {
      observer.observe(bars[bi]);
    }
  } else {
    // Fallback: animate all immediately
    for (var bf = 0; bf < bars.length; bf++) {
      var fillEl = bars[bf].querySelector('.aa-bar-fill');
      var w2 = bars[bf].getAttribute('data-bar-width') || '0';
      fillEl.style.width = w2 + '%';
    }
  }

  // ── Chart.js horizontal bar chart ──
  var canvas = document.getElementById('aa-rank-chart');
  if (canvas && typeof Chart !== 'undefined') {
    var labels = [];
    var data = [];
    var colors = [];

    for (var ci = 0; ci < producers.length; ci++) {
      var cp = producers[ci];
      labels.push(cp.country.flag + ' ' + cp.country.name);
      data.push(typeof cp.resource.share === 'number' ? cp.resource.share : 0);
      colors.push(rt.color);
    }

    var chartHeight = Math.max(300, producers.length * 36);
    canvas.parentElement.style.height = chartHeight + 'px';

    new Chart(canvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: rt.label + ' (% of African production)',
          data: data,
          backgroundColor: colors,
          borderRadius: 4,
          barThickness: 22
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                return ctx.parsed.x + '% of African production';
              }
            }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            title: { display: true, text: '% of African Production' },
            grid: { color: '#f1f5f9' }
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 12 } }
          }
        }
      }
    });
  }

})();
</script>
