/* Resource Picker Grid */
.aa-rank-workbench {

}
.aa-rank-search-row {

.aa-rank-field {

  gap: 6px;

.aa-rank-label {

.aa-rank-search {

.aa-rank-search:focus,

.aa-rank-method-pill {

.aa-rank-chip-row {
  display: flex;

.aa-rank-chip {

</div>

<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<script>
(function() {
  'use strict';

  var page = document.getElementById('aa-rankings-page');
  var params = new URLSearchParams(window.location.search);
  var resourceParam = params.get('resource');
  var types = AfroAtlas.getResourceTypes();
  var typeKeys = Object.keys(types);
  var flagTools = window.AfroAtlasFlags || {};

  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function flagHtml(code, country, className) {
    if (flagTools.flagHtml) return flagTools.flagHtml(code, country && country.name ? country.name : code, className || '');
    return '<span class="' + esc(className || 'aa-twemoji-flag') + '">' + esc(code || '') + '</span>';
  }

  // ─── HELPER: build producer count for a resource type ───
  function getProducerCount(type) {
    var list = AfroAtlas.countriesByResource(type);
    return list ? list.length : 0;
  }

  function getTopProducer(type) {
    var list = AfroAtlas.countriesByResource(type);
    return list && list.length ? list[0] : null;
  }

  function compareHref(a, b) {
    return 'compare.html?countryA=' + encodeURIComponent(a) + '&countryB=' + encodeURIComponent(b);
  }

  function wireResourceFilter() {
    var input = document.getElementById('aa-resource-filter');
    if (!input) return;
    var cards = Array.prototype.slice.call(document.querySelectorAll('.aa-picker-card'));
    var empty = document.getElementById('aa-picker-empty');
    input.addEventListener('input', function() {
      var query = input.value.trim().toLowerCase();
      var shown = 0;
      for (var i = 0; i < cards.length; i++) {
        var text = (cards[i].getAttribute('data-resource-search') || '').toLowerCase();
        var match = !query || text.indexOf(query) !== -1;
        cards[i].hidden = !match;
        if (match) shown++;
      }
      if (empty) empty.hidden = shown !== 0;
    });
  }

  // ─── HELPER: format large numbers ───
  function fmtNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  // ─── NO RESOURCE: show picker grid ───
  if (!resourceParam || !types[resourceParam]) {
    var html = '';
    html += '<section class="aa-rank-workbench" aria-label="Rankings filters">';
    html += '<p class="aa-rank-kicker">Decision leaderboard</p>';
    html += '<h1 class="aa-picker-title">Resource rankings</h1>';
    html += '<p class="aa-picker-sub">Search by resource, producing country, or theme to jump into a leaderboard. Rankings are directional until each metric has full source, year, and confidence metadata.</p>';
    html += '<div class="aa-rank-search-row">';
    html += '<label class="aa-rank-field" for="aa-resource-filter"><span class="aa-rank-label">Find a ranking</span><input class="aa-rank-search" id="aa-resource-filter" type="search" placeholder="Oil, cobalt, Ghana, energy transition"></label>';
    html += '<div class="aa-rank-method-pill">Mode: share of African production</div>';
    html += '</div>';
    html += '<div class="aa-rank-chip-row" aria-label="Popular ranking themes">';
    html += '<span class="aa-rank-chip">Energy</span><span class="aa-rank-chip">Critical minerals</span><span class="aa-rank-chip">Agriculture</span><span class="aa-rank-chip">Export exposure</span>';
    html += '</div>';
    html += '</section>';
    html += '<div class="aa-picker-grid">';

    for (var i = 0; i < typeKeys.length; i++) {
      var k = typeKeys[i];
      var t = types[k];
      var count = getProducerCount(k);
      var top = getTopProducer(k);
      var topLabel = top ? top.country.name : 'No leader yet';
      html += '<a class="aa-picker-card" href="?resource=' + k + '" data-resource-search="' + t.label + ' ' + k + ' ' + topLabel + '">';
      html += '<span class="aa-picker-emoji">' + t.emoji + '</span>';
      html += '<span class="aa-picker-label">' + t.label + '</span>';
      html += '<span class="aa-picker-count">' + count + ' producer' + (count !== 1 ? 's' : '') + '</span>';
      html += '<span class="aa-picker-top">Top: ' + topLabel + '</span>';
      html += '</a>';
    }

    html += '</div><div class="aa-picker-empty" id="aa-picker-empty" hidden>No matching ranking yet. Try a broader resource term.</div>';
    page.innerHTML = html;
    wireResourceFilter();
    return;
  }

  // ─── VALID RESOURCE: show leaderboard ───
  var rt = types[resourceParam];
  var producers = AfroAtlas.countriesByResource(resourceParam);

  // Empty state
  if (!producers || producers.length === 0) {
    page.innerHTML = '<div class="aa-empty">' +
      '<div class="aa-empty-icon">' + rt.emoji + '</div>' +
      '<h2>No data available</h2>' +
      '<p>No African countries found producing ' + rt.label + '.</p>' +
      '<a class="aa-back-link" href="rankings.html">&larr; Back to all resources</a>' +
      '</div>';
    return;
  }

  // Determine max share for proportional bars
  var maxShare = 0;
  for (var m = 0; m < producers.length; m++) {
    var s = producers[m].resource.share;
    if (typeof s === 'number' && s > maxShare) maxShare = s;
  }
  if (maxShare === 0) maxShare = 1;

  var out = '';

  // ── Header ──
  out += '<div class="aa-rank-header aa-rank-header-pro">';
  out += '<a class="aa-back-link" href="rankings.html">&larr; All rankings</a>';
  out += '<p class="aa-rank-kicker">Leaderboard</p>';
  out += '<h1>' + rt.emoji + ' ' + rt.label + '</h1>';
  out += '<p class="aa-rank-subtitle">Ranked by share of African production where that field exists. Use this as a screening view, then compare the top countries or open a country profile before citing the numbers.</p>';
  out += '<div class="aa-rank-actionbar">';
  if (producers.length >= 2) {
    out += '<a class="aa-rank-action primary" href="' + compareHref(producers[0].code, producers[1].code) + '">Compare top 2</a>';
  }
  out += '<a class="aa-rank-action" href="/tools/afroatlas/#brief-builder">Generate brief</a>';
  out += '<a class="aa-rank-action" href="rankings.html">Change ranking</a>';
  out += '</div>';
  out += '<div class="aa-rank-provenance" role="note">Source/year/confidence metadata is pending for this legacy leaderboard. Rows are marked accordingly so missing provenance is visible instead of implied.</div>';
  out += '</div>';

  // ── Podium (top 3) ──
  if (producers.length >= 1) {
    var medals = ['aa-gold', 'aa-silver', 'aa-bronze'];
    var medalIcons = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
    var podiumCount = Math.min(3, producers.length);

    out += '<div class="aa-podium">';
    for (var p = 0; p < podiumCount; p++) {
      var pr = producers[p];
      var c = pr.country;
      var r = pr.resource;
      out += '<div class="aa-podium-card ' + medals[p] + '">';
      out += '<div class="aa-podium-medal">' + medalIcons[p] + '</div>';
      out += '<span class="aa-podium-flag">' + flagHtml(pr.code, c, 'aa-podium-flag-img') + '</span>';
      out += '<div class="aa-podium-name">' + c.name + '</div>';
      out += '<div class="aa-podium-prod">' + (r.prod || 'N/A') + '</div>';
      out += '<div class="aa-podium-share" style="color:' + rt.color + '">' + (typeof r.share === 'number' ? r.share + '% of Africa' : '') + '</div>';
      out += '</div>';
    }
    out += '</div>';
  }

  // ── Full Ranking Bars ──
  out += '<div class="aa-rank-bars" role="list">';
  out += '<h2 class="aa-rank-bars-title">Full Rankings</h2>';

  for (var b = 0; b < producers.length; b++) {
    var bp = producers[b];
    var bc = bp.country;
    var br = bp.resource;
    var shareVal = typeof br.share === 'number' ? br.share : 0;
    var barWidth = maxShare > 0 ? Math.max(2, Math.round((shareVal / maxShare) * 100)) : 2;

    out += '<div class="aa-rank-bar" data-bar-width="' + barWidth + '" role="listitem">';
    out += '<span class="aa-rank-num">' + (b + 1) + '</span>';
    out += '<span class="aa-rank-flag">' + flagHtml(bp.code, bc, 'aa-rank-flag-img') + '</span>';
    out += '<span class="aa-rank-name" title="' + bc.name + '">' + bc.name + '</span>';
    out += '<div class="aa-bar-track"><div class="aa-bar-fill" style="background:' + rt.color + '"></div></div>';
    out += '<span class="aa-rank-val">' + (typeof br.share === 'number' ? br.share + '%' : br.prod || '-') + '</span>';
    out += '<span class="aa-rank-row-meta">Source/year pending</span>';
    out += '</div>';
  }

  out += '</div>';

  // ── Chart.js Section ──
  out += '<div class="aa-chart-section">';
  out += '<h2>' + rt.emoji + ' ' + rt.label + ' Production by Country</h2>';
  out += '<div class="aa-chart-wrap"><canvas id="aa-rank-chart" role="img" aria-label="Horizontal bar chart of ' + esc(rt.label) + ' production by African country, measured as a share of African production. The ranked list above shows the same values."></canvas></div>';
  out += '</div>';

  // ── Global Context ──
  var totalGlobalShare = 0;
  var factsList = [];
  for (var g = 0; g < producers.length; g++) {
    var gr = producers[g].resource;
    if (typeof gr.global === 'number') {
      totalGlobalShare += gr.global;
    }
    if (gr.note && g < 3) {
      factsList.push(producers[g].country.name + ': ' + gr.note);
    }
  }

  out += '<div class="aa-context-section">';
  out += '<div class="aa-context-box">';
  out += '<h2>Global Context</h2>';
  if (totalGlobalShare > 0) {
    out += '<div class="aa-context-stat">Africa produces ~' + totalGlobalShare + '% of the world\'s ' + rt.label + '</div>';
  }
  out += '<ul class="aa-context-facts">';
  out += '<li><strong>' + producers.length + '</strong> African countries produce ' + rt.label + '</li>';
  for (var f = 0; f < factsList.length; f++) {
    out += '<li>' + factsList[f] + '</li>';
  }
  out += '</ul>';
  out += '</div></div>';

  // ── Other Resources Navigation ──
  out += '<div class="aa-other-section">';
  out += '<h2>Explore Other Resources</h2>';
  out += '<div class="aa-other-scroll">';
  for (var o = 0; o < typeKeys.length; o++) {
    var ok = typeKeys[o];
    var ot = types[ok];
    var isActive = ok === resourceParam ? ' active' : '';
    out += '<a class="aa-other-tab' + isActive + '" href="?resource=' + ok + '">' + ot.emoji + ' ' + ot.label + '</a>';
  }
  out += '</div></div>';

  page.innerHTML = out;

  // ── Animate bars with IntersectionObserver ──
  var bars = document.querySelectorAll('.aa-rank-bar');
  if (typeof IntersectionObserver !== 'undefined') {
    var observer = new IntersectionObserver(function(entries) {
      for (var e = 0; e < entries.length; e++) {
        if (entries[e].isIntersecting) {
          var row = entries[e].target;
          var fill = row.querySelector('.aa-bar-fill');
          var w = row.getAttribute('data-bar-width') || '0';
          fill.style.width = w + '%';
          fill.classList.add('aa-animated');
          observer.unobserve(row);
        }
      }
    }, { threshold: 0.1 });

    for (var bi = 0; bi < bars.length; bi++) {
      observer.observe(bars[bi]);
    }
  } else {
    // Fallback: animate all immediately
    for (var bf = 0; bf < bars.length; bf++) {
      var fillEl = bars[bf].querySelector('.aa-bar-fill');
      var w2 = bars[bf].getAttribute('data-bar-width') || '0';
      fillEl.style.width = w2 + '%';
    }
  }

  // ── Chart.js horizontal bar chart ──
  function initRankChart() {
    var canvas = document.getElementById('aa-rank-chart');
    if (!canvas) return;
    if (typeof Chart === 'undefined') {
      setTimeout(initRankChart, 200);
      return;
    }

    var labels = [];
    var data = [];
    var colors = [];

    for (var ci = 0; ci < producers.length; ci++) {
      var cp = producers[ci];
      labels.push(cp.country.name);
      data.push(typeof cp.resource.share === 'number' ? cp.resource.share : 0);
      colors.push(rt.color);
    }

    var chartHeight = Math.max(300, producers.length * 36);
    canvas.parentElement.style.height = chartHeight + 'px';

    new Chart(canvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: rt.label + ' (% of African production)',
          data: data,
          backgroundColor: colors,
          borderRadius: 4,
          barThickness: 22
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                return ctx.parsed.x + '% of African production';
              }
            }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            title: { display: true, text: '% of African Production' },
            grid: { color: '#f1f5f9' }
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 12 } }
          }
        }
      }
    });
  }
  initRankChart();

})();
</script>
<script defer src="/assets/js/lazy-analytics.js?v=71239a16"></script>
