<!-- Scripts -->
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/assets/js/components/navbar.min.js?v=9b02f2cc" defer></script>
<script src="/assets/js/components/footer.min.js?v=d0d64671" defer></script>
<script src="/engines/afroatlas-engine.js?v=57ad0022"></script>
<script>
(function() {
  'use strict';

  /* ── Slug extraction ── */
  var slug = window.location.pathname.split('/').filter(Boolean).pop();
  var country = AfroAtlas.getCountry(slug);
  var page = document.getElementById('aa-country-page');

  if (!country) {
    page.innerHTML = '<div class="aa-wrap" style="padding:80px 20px;text-align:center">' +
      '<h1 style="font-family:var(--font-heading,\'Instrument Serif\',Georgia,serif);font-size:2rem;margin-bottom:12px">Country not found</h1>' +
      '<p style="color:var(--color-text-muted,#64748b)">We couldn\'t find data for "<strong>' + slug + '</strong>".</p>' +
      '<a href="/tools/afroatlas/" style="display:inline-block;margin-top:24px;padding:10px 28px;background:var(--color-primary,#007AFF);color:#fff;border-radius:var(--radius-pill,100px);text-decoration:none;font-weight:600;font-size:0.88rem">Browse All Countries</a>' +
      '</div>';
    return;
  }

  /* ── Helpers ── */
  var RT = AfroAtlas.RESOURCE_TYPES;
  var REGIONS = AfroAtlas.REGIONS;
  var allCountries = AfroAtlas.getAllCountries();

  function fmtGdp(v) {
    if (v == null) return 'N/A';
    if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
    if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
    return '$' + v.toLocaleString();
  }

  function fmtPop(v) {
    if (v == null) return 'N/A';
    if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
    return String(v);
  }

  function fmtMoney(v) {
    if (v == null) return 'N/A';
    if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
    if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(0) + 'M';
    return '$' + v.toLocaleString();
  }

  function fmtPct(v) {
    if (v == null) return 'N/A';
    return v.toFixed(1) + '%';
  }

  function fmtNum(v, suffix) {
    if (v == null) return 'N/A';
    return v.toFixed(1) + (suffix || '');
  }

  function regionName(key) {
    return (REGIONS[key] && REGIONS[key].name) ? REGIONS[key].name : key;
  }

  function findCode(c) {
    var keys = Object.keys(AfroAtlas.COUNTRIES);
    for (var i = 0; i < keys.length; i++) {
      if (AfroAtlas.COUNTRIES[keys[i]] === c) return keys[i];
    }
    return '';
  }

  var code = findCode(country);

  /* ── Build HTML ── */
  var html = '';

  /* ── 1. Hero Section (light variant for country pages) ── */
  html += '<section class="aa-country-hero">';
  html += '<div class="aa-wrap">';
  html += '<div class="aa-hero-flag">' + country.flag + '</div>';
  html += '<h1>' + country.name + '</h1>';
  if (country.tagline) html += '<p class="aa-hero-tagline">' + country.tagline + '</p>';
  html += '<p class="aa-hero-meta">';
  html += regionName(country.region) + ' &middot; Capital: ' + (country.capital || 'N/A');
  html += ' &middot; Currency: ' + (country.currency ? country.currency.name + ' (' + country.currency.sym + ')' : 'N/A');
  html += '</p>';
  html += '<div class="aa-stats-row">';
  html += '<span class="aa-stat-pill"><strong>' + fmtGdp(country.gdp) + '</strong> <span>GDP</span></span>';
  html += '<span class="aa-stat-pill"><strong>' + fmtPop(country.population) + '</strong> <span>Population</span></span>';
  html += '<span class="aa-stat-pill"><strong>' + fmtGdp(country.gdpPC) + '</strong> <span>GDP/Capita</span></span>';
  html += '<span class="aa-stat-pill"><strong>' + (country.rrs != null ? country.rrs + '/100' : 'N/A') + '</strong> <span>Resource Score</span></span>';
  html += '</div>';
  html += '</div>';
  html += '</section>';

  /* ── 2. Natural Resources ── */
  html += '<section class="aa-section aa-rv">';
  html += '<div class="aa-wrap">';
  html += '<h2 class="aa-section-title">Natural Resources</h2>';
  if (country.resources && country.resources.length > 0) {
    html += '<div class="aa-res-grid">';
    for (var ri = 0; ri < country.resources.length; ri++) {
      var r = country.resources[ri];
      var rInfo = RT[r.type] || { emoji: '', label: r.type };
      var rankCls = r.rank && r.rank <= 3 ? 'aa-res-rank aa-res-rank-top' : 'aa-res-rank aa-res-rank-other';
      html += '<div class="aa-res-card">';
      html += '<div class="aa-res-header">';
      html += '<span class="aa-res-icon">' + rInfo.emoji + '</span>';
      html += '<span class="aa-res-label">' + rInfo.label + '</span>';
      if (r.rank) html += '<span class="' + rankCls + '">#' + r.rank + ' in Africa</span>';
      html += '</div>';
      if (r.prod) html += '<p class="aa-res-prod">' + r.prod + '</p>';
      if (r.share > 0) {
        html += '<div class="aa-res-bar-wrap"><div class="aa-res-bar-fill" style="width:' + Math.min(r.share, 100) + '%"></div></div>';
        html += '<p class="aa-res-share">' + r.share + '% of Africa\'s output</p>';
      }
      if (r.note) html += '<p class="aa-res-note">' + r.note + '</p>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<p class="aa-empty">Limited resource data available.</p>';
  }
  html += '</div>';
  html += '</section>';

  /* ── 3. Trade Snapshot ── */
  html += '<section class="aa-section aa-rv" style="background:#f8fafc">';
  html += '<div class="aa-wrap">';
  html += '<h2 class="aa-section-title">Trade Snapshot</h2>';
  var balance = (country.totalExports || 0) - (country.totalImports || 0);
  var balColor = balance >= 0 ? 'var(--aa-forest)' : 'var(--aa-terra)';
  html += '<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:28px">';
  html += '<span class="aa-stat-pill" style="background:#fff;border:1.5px solid #e2e8f0;color:#0f172a;backdrop-filter:none"><strong style="color:#2D6A4F">' + fmtMoney(country.totalExports) + '</strong> <span style="color:#64748b">Exports</span></span>';
  html += '<span class="aa-stat-pill" style="background:#fff;border:1.5px solid #e2e8f0;color:#0f172a;backdrop-filter:none"><strong style="color:#E76F51">' + fmtMoney(country.totalImports) + '</strong> <span style="color:#64748b">Imports</span></span>';
  html += '<span class="aa-stat-pill" style="background:#fff;border:1.5px solid #e2e8f0;color:#0f172a;backdrop-filter:none"><strong style="color:' + balColor + '">' + (balance >= 0 ? '+' : '') + fmtMoney(balance) + '</strong> <span style="color:#64748b">Balance</span></span>';
  html += '</div>';
  html += '<div style="max-width:700px;margin:0 auto;position:relative;height:320px"><canvas id="aa-trade-chart"></canvas></div>';
  html += '</div>';
  html += '</section>';

  /* ── 4. GDP Timeline ── */
  html += '<section class="aa-section aa-rv">';
  html += '<div class="aa-wrap">';
  html += '<h2 class="aa-section-title">GDP Over Time</h2>';
  html += '<div style="max-width:700px;margin:0 auto;position:relative;height:280px"><canvas id="aa-gdp-chart"></canvas></div>';
  html += '</div>';
  html += '</section>';

  /* ── 5. Key Indicators ── */
  html += '<section class="aa-section aa-rv" style="background:#f8fafc">';
  html += '<div class="aa-wrap">';
  html += '<h2 class="aa-section-title">Key Indicators</h2>';
  var indicators = [
    { label: 'Human Development Index', value: country.hdi != null ? country.hdi.toFixed(3) : 'N/A', sub: country.hdiRank ? 'Rank #' + country.hdiRank : '', bar: country.hdi != null ? country.hdi * 100 : 0 },
    { label: 'Gini Coefficient', value: country.gini != null ? country.gini.toFixed(1) : 'N/A', sub: '', bar: country.gini || 0 },
    { label: 'Inflation Rate', value: fmtPct(country.inflation), sub: '', bar: country.inflation != null ? Math.min(country.inflation, 100) : 0 },
    { label: 'Unemployment', value: fmtPct(country.unemployment), sub: '', bar: country.unemployment != null ? Math.min(country.unemployment, 100) : 0 },
    { label: 'Debt-to-GDP', value: fmtPct(country.debtGdp), sub: '', bar: country.debtGdp != null ? Math.min(country.debtGdp, 100) : 0 },
    { label: 'Foreign Direct Investment', value: fmtMoney(country.fdi), sub: '', bar: 0 },
    { label: 'Electricity Access', value: fmtPct(country.electricity), sub: '', bar: country.electricity || 0 },
    { label: 'Internet Penetration', value: fmtPct(country.internet), sub: '', bar: country.internet || 0 },
    { label: 'Life Expectancy', value: country.lifeExp != null ? fmtNum(country.lifeExp, ' yrs') : 'N/A', sub: '', bar: country.lifeExp != null ? Math.min((country.lifeExp / 85) * 100, 100) : 0 },
    { label: 'Literacy Rate', value: fmtPct(country.literacy), sub: '', bar: country.literacy || 0 }
  ];
  html += '<div class="aa-ind-grid">';
  for (var ki = 0; ki < indicators.length; ki++) {
    var ind = indicators[ki];
    html += '<div class="aa-ind-card">';
    html += '<div class="aa-ind-top">';
    html += '<span class="aa-ind-label">' + ind.label + '</span>';
    html += '<span class="aa-ind-value">' + ind.value + '</span>';
    html += '</div>';
    if (ind.sub) html += '<span class="aa-ind-sub">' + ind.sub + '</span>';
    if (ind.bar > 0) {
      html += '<div class="aa-ind-bar"><div class="aa-ind-bar-fill" style="width:' + Math.min(ind.bar, 100) + '%"></div></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  html += '</div>';
  html += '</section>';

  /* ── 6. Resource Paradox ── */
  if (country.paradox) {
    html += '<section class="aa-section aa-rv">';
    html += '<div class="aa-wrap">';
    html += '<div class="aa-paradox-callout">';
    html += '<p>' + country.paradox + '</p>';
    html += '</div>';
    html += '</div>';
    html += '</section>';
  }

  /* ── 7. Compare CTA ── */
  html += '<section class="aa-section aa-compare-section aa-rv">';
  html += '<div class="aa-wrap" style="text-align:center">';
  html += '<h2 class="aa-section-title">Compare ' + country.name + ' with&hellip;</h2>';
  html += '<div class="aa-compare-row">';
  html += '<select id="aa-cmp-select" class="aa-select">';
  html += '<option value="">Select a country</option>';
  for (var ci = 0; ci < allCountries.length; ci++) {
    var oc = allCountries[ci];
    if (oc.slug === country.slug) continue;
    var ocCode = findCode(oc);
    html += '<option value="' + ocCode + '">' + oc.flag + ' ' + oc.name + '</option>';
  }
  html += '</select>';
  html += '<button id="aa-cmp-btn" class="aa-btn">Compare &rarr;</button>';
  html += '</div>';
  html += '</div>';
  html += '</section>';

  /* ── 8. AfroTools Links ── */
  if (country.tools && country.tools.length > 0) {
    html += '<section class="aa-section aa-rv">';
    html += '<div class="aa-wrap">';
    html += '<h2 class="aa-section-title">AfroTools for ' + country.name + '</h2>';
    html += '<div class="aa-tools-grid">';
    for (var ti = 0; ti < country.tools.length; ti++) {
      var tool = country.tools[ti];
      html += '<a href="' + tool.p + '" class="aa-tool-link">' + tool.n + ' &rarr;</a>';
    }
    html += '</div>';
    html += '</div>';
    html += '</section>';
  }

  /* ── 9. FAQ Section ── */
  html += '<section class="aa-section aa-rv" style="background:#f8fafc">';
  html += '<div class="aa-wrap">';
  html += '<h2 class="aa-section-title">Frequently Asked Questions</h2>';
  html += '<div class="aa-faq-list">';

  var faqs = [];
  /* FAQ 1 — Resources */
  var faq1 = '';
  if (country.resources && country.resources.length > 0) {
    var resNames = [];
    for (var fi = 0; fi < country.resources.length; fi++) {
      var rr = country.resources[fi];
      var rrInfo = RT[rr.type] || { label: rr.type };
      resNames.push(rrInfo.label + (rr.rank ? ' (#' + rr.rank + ' in Africa)' : ''));
    }
    faq1 = country.name + '\'s main natural resources include ' + resNames.join(', ') + '.';
  } else {
    faq1 = 'Limited natural resource data is currently available for ' + country.name + '.';
  }
  faqs.push({ q: 'What are ' + country.name + '\'s main natural resources?', a: faq1 });

  /* FAQ 2 — GDP */
  var faq2 = country.name + '\'s GDP is ' + fmtGdp(country.gdp);
  faq2 += ', with a GDP per capita of ' + fmtGdp(country.gdpPC);
  faq2 += (country.gdpGrowth != null ? ' and a growth rate of ' + country.gdpGrowth + '%.' : '.');
  faqs.push({ q: 'What is ' + country.name + '\'s GDP?', a: faq2 });

  /* FAQ 3 — Exports */
  var faq3 = '';
  if (country.exports && country.exports.length > 0) {
    var expNames = [];
    for (var ei = 0; ei < Math.min(country.exports.length, 5); ei++) {
      expNames.push(country.exports[ei].p + ' (' + fmtMoney(country.exports[ei].v) + ')');
    }
    faq3 = country.name + '\'s top exports are ' + expNames.join(', ') + '. Total exports: ' + fmtMoney(country.totalExports) + '.';
  } else {
    faq3 = 'Detailed export data is not currently available for ' + country.name + '.';
  }
  faqs.push({ q: 'What does ' + country.name + ' export?', a: faq3 });

  for (var fqi = 0; fqi < faqs.length; fqi++) {
    html += '<div class="aa-faq-item">';
    html += '<button class="aa-faq-q" onclick="this.parentElement.classList.toggle(\'open\')">' + faqs[fqi].q + '</button>';
    html += '<div class="aa-faq-a"><p>' + faqs[fqi].a + '</p></div>';
    html += '</div>';
  }

  html += '</div>';
  html += '</div>';
  html += '</section>';

  /* ── Inject HTML ── */
  page.innerHTML = html;

  /* ── Compare button handler ── */
  var cmpBtn = document.getElementById('aa-cmp-btn');
  var cmpSel = document.getElementById('aa-cmp-select');
  if (cmpBtn && cmpSel) {
    cmpBtn.addEventListener('click', function() {
      var sel = cmpSel.value;
      if (sel) {
        window.location.href='/tools/afroatlas/compare.html/?a=' + code + '&b=' + sel;
      }
    });
  }

  /* ── Charts ── */
  function renderCharts() {
    try {
      /* Trade chart */
      var tradeCanvas = document.getElementById('aa-trade-chart');
      if (tradeCanvas && country.exports && country.imports) {
        var expLabels = [], expValues = [], impLabels = [], impValues = [];
        var expSlice = country.exports.slice(0, 5);
        var impSlice = country.imports.slice(0, 5);
        for (var te = 0; te < expSlice.length; te++) { expLabels.push(expSlice[te].p); expValues.push(expSlice[te].v / 1e9); }
        for (var tm = 0; tm < impSlice.length; tm++) { impLabels.push(impSlice[tm].p); impValues.push(impSlice[tm].v / 1e9); }
        var tradeLabels = expLabels.concat(impLabels);
        var tradeData = expValues.map(function(v) { return v; }).concat(impValues.map(function(v) { return -v; }));
        var tradeColors = [];
        for (var tc = 0; tc < expValues.length; tc++) tradeColors.push('rgba(45,106,79,0.8)');
        for (var tc2 = 0; tc2 < impValues.length; tc2++) tradeColors.push('rgba(231,111,81,0.8)');
        new Chart(tradeCanvas.getContext('2d'), {
          type: 'bar',
          data: { labels: tradeLabels, datasets: [{ data: tradeData, backgroundColor: tradeColors, borderRadius: 4, barThickness: 22 }] },
          options: {
            indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { var v = Math.abs(ctx.raw); return (ctx.raw >= 0 ? 'Export: ' : 'Import: ') + '$' + v.toFixed(1) + 'B'; } } } },
            scales: { x: { ticks: { callback: function(v) { return '$' + Math.abs(v).toFixed(0) + 'B'; }, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.04)' } }, y: { ticks: { font: { size: 11 } }, grid: { display: false } } }
          }
        });
      }

      /* GDP timeline chart */
      var gdpCanvas = document.getElementById('aa-gdp-chart');
      if (gdpCanvas && country.gdpHist) {
        var gdpYears = Object.keys(country.gdpHist).sort();
        var gdpVals = [];
        for (var gy = 0; gy < gdpYears.length; gy++) { gdpVals.push(country.gdpHist[gdpYears[gy]] / 1e9); }
        new Chart(gdpCanvas.getContext('2d'), {
          type: 'line',
          data: { labels: gdpYears, datasets: [{ label: 'GDP ($B)', data: gdpVals, borderColor: '#007AFF', backgroundColor: 'rgba(0,122,255,0.08)', fill: true, tension: 0.35, pointRadius: 4, pointBackgroundColor: '#007AFF', borderWidth: 2.5 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return '$' + ctx.raw.toFixed(1) + 'B'; } } } },
            scales: { x: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.04)' } }, y: { ticks: { callback: function(v) { return '$' + v + 'B'; }, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.04)' } } }
          }
        });
      }
    } catch(e) { console.error('AfroAtlas chart error:', e); }
  }

  /* Run charts — Chart.js loads synchronously (no defer/async) so it should be ready */
  if (typeof Chart !== 'undefined') {
    renderCharts();
  } else {
    /* Fallback: poll in case CDN was slow */
    var _cp = setInterval(function() { if (typeof Chart !== 'undefined') { clearInterval(_cp); renderCharts(); } }, 150);
