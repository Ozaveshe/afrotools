<!DOCTYPE html>
<html data-chat-bundle="/assets/js/bundles/chat.e5a3e11c.min.js" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin">
  <title>CreatorCalendar | AfroTools</title>
  <meta name="description" content="Plan upcoming content in a simple creator calendar with campaign notes, deadlines, and publishing slots.">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tokens.min.css?v=ee859bb4">
  <link rel="stylesheet" href="/assets/css/global.min.css?v=98898086">
  <link rel="stylesheet" href="style.css?v=326a209e">
  <style>
    .cc-loading-status{display:none;align-items:center;gap:8px;padding:10px 14px;margin-top:8px;border-radius:10px;background:rgba(0,122,255,.06);border:1px solid rgba(0,122,255,.13);font-size:.85rem;color:var(--clr-primary,#007AFF)}
    .cc-loading-status.active{display:flex}
    .cc-loading-dots{display:inline-flex;gap:3px;margin-left:2px}
    .cc-loading-dots span{width:4px;height:4px;border-radius:50%;background:currentColor;animation:ccDotPulse .9s ease-in-out infinite}
    .cc-loading-dots span:nth-child(2){animation-delay:.15s}
    .cc-loading-dots span:nth-child(3){animation-delay:.3s}
    @keyframes ccDotPulse{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
  </style>
  <script src="/assets/js/supabase-auth.js?v=3978e101" defer></script>
  <script src="/assets/js/lib/creator-profile.js?v=69df7ec4" defer></script>
<link rel="canonical" href="https://afrotools.com/tools/creator-calendar/app">
<meta name="robots" content="noindex, follow">
<meta property="og:url" content="https://afrotools.com/tools/creator-calendar/app">
<script>(function(){try{var t=localStorage.getItem('aft_theme');var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;var a=(t==='dark'||t==='light')?t:(d?'dark':'light');document.documentElement.setAttribute('data-theme',a);document.documentElement.setAttribute('data-theme-choice',(t==='dark'||t==='light')?t:'auto');document.documentElement.style.colorScheme=a;}catch(_){}})();</script>
<link rel="stylesheet" href="/assets/css/theme-dark.min.css?v=ae01493b">
<script src="/assets/js/lib/dark-mode.js?v=882f512d" defer></script>
<link rel="alternate" hreflang="en" href="https://afrotools.com/tools/creator-calendar/app" />
<link rel="alternate" hreflang="x-default" href="https://afrotools.com/tools/creator-calendar/app" />
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0">
    CreatorCalendar — Content Calendar & Planner
  </h1>

  <div class="cc-app">
    <!-- TOP BAR -->
    <div class="cc-topbar">
      <div class="cc-topbar-inner">
        <a href="index.html" class="cc-topbar-back">← CreatorCalendar</a>
        <div class="cc-topbar-title">Content Calendar</div>
        <div class="cc-topbar-actions">
          <a href="plan.html" class="cc-btn">AI Planner</a>
          <button type="button" class="cc-btn cc-btn-pri" onclick="openEditor()">+ New Post</button>
        </div>
      </div>
    </div>

    <!-- VIEW SWITCHER + PLATFORM FILTER + DATE NAV -->
    <div class="cc-view-bar">
      <div class="cc-view-bar-inner">
        <div class="cc-view-tabs">
          <button type="button" class="cc-view-tab active" data-view="feed">Feed</button>
          <button type="button" class="cc-view-tab" data-view="week">Week</button>
          <button type="button" class="cc-view-tab" data-view="month">Month</button>
          <button type="button" class="cc-view-tab" data-view="pillars">Pillars</button>
        </div>
        <div class="cc-platform-pills">
          <button type="button" class="cc-plat-pill active" data-plat="all">All</button>
          <button type="button" class="cc-plat-pill" data-plat="instagram">IG</button>
          <button type="button" class="cc-plat-pill" data-plat="tiktok">TT</button>
          <button type="button" class="cc-plat-pill" data-plat="youtube">YT</button>
          <button type="button" class="cc-plat-pill" data-plat="twitter">X</button>
          <button type="button" class="cc-plat-pill" data-plat="linkedin">LI</button>
        </div>
        <div class="cc-date-nav">
          <button type="button" class="cc-today-btn" onclick="goToday()">Today</button>
          <button type="button" class="cc-date-nav-btn" onclick="navPrev()">‹</button>
          <div class="cc-date-label" id="dateLabel"></div>
          <button type="button" class="cc-date-nav-btn" onclick="navNext()">›</button>
        </div>
      </div>
    </div>

    <!-- STATS BAR -->
    <div style="max-width:1200px;margin:0 auto;padding:16px 16px 0">
      <div class="cc-stats-bar" id="statsBar">
        <div class="cc-stat-card"><div class="cc-stat-val" id="statTotal">0</div><div class="cc-stat-lbl">Posts</div></div>
        <div class="cc-stat-card"><div class="cc-stat-val" id="statReady">0</div><div class="cc-stat-lbl">Ready</div></div>
        <div class="cc-stat-card"><div class="cc-stat-val" id="statDraft">0</div><div class="cc-stat-lbl">Drafts</div></div>
        <div class="cc-stat-card"><div class="cc-stat-val" id="statGaps">0</div><div class="cc-stat-lbl">Gaps</div></div>
      </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="cc-main">
      <div id="viewFeed" class="cc-view-panel"></div>
      <div id="viewWeek" class="cc-view-panel" style="display:none"></div>
      <div id="viewMonth" class="cc-view-panel" style="display:none"></div>
      <div id="viewPillars" class="cc-view-panel" style="display:none"></div>
    </div>
  </div>

  <!-- POST EDITOR OVERLAY -->
  <div class="cc-overlay" id="editorOverlay" onclick="closeEditor()"></div>
  <div class="cc-editor" id="editorSheet">
    <div class="cc-editor-handle"></div>
    <div class="cc-editor-header">
      <div class="cc-editor-title" id="editorTitle">New Post</div>
      <button type="button" class="cc-editor-close" onclick="closeEditor()">×</button>
    </div>
    <div class="cc-editor-body">
      <input type="hidden" id="edPostId">

      <!-- Platforms -->
      <div class="cc-editor-section">
        <div class="cc-editor-label">Platforms</div>
        <div class="cc-editor-platforms" id="edPlatforms"></div>
      </div>

      <!-- Content -->
      <div class="cc-editor-section">
        <div class="cc-editor-label">Caption / Content</div>
        <textarea class="cc-editor-textarea" id="edCaption" placeholder="Write your caption or content here..." oninput="updateCharCount()" aria-label="Write your caption or content here..."></textarea>
        <div class="cc-editor-char-count" id="edCharCount"></div>
      </div>

      <!-- AI Assist -->
      <div class="cc-editor-section">
        <div class="cc-editor-label">AI Assist</div>
        <div class="cc-ai-assists">
          <button type="button" class="cc-ai-assist-btn" onclick="aiAssist('caption')">Write Caption</button>
          <button type="button" class="cc-ai-assist-btn" onclick="aiAssist('hook')">Write Hook</button>
          <button type="button" class="cc-ai-assist-btn" onclick="aiAssist('hashtags')">Hashtags</button>
          <button type="button" class="cc-ai-assist-btn" onclick="aiAssist('repurpose')">Repurpose</button>
          <button type="button" class="cc-ai-assist-btn" onclick="aiAssist('improve')">Improve</button>
        </div>
        <div class="cc-loading-status" id="ccAiLoading">
          <span id="ccAiVerb">Generating</span><span class="cc-loading-dots"><span></span><span></span><span></span></span>
        </div>
      </div>

      <!-- Title & Hashtags -->
      <div class="cc-editor-section">
        <div class="cc-editor-row">
          <div>
            <div class="cc-editor-label">Title / Hook</div>
            <input aria-label="First line that stops the scroll" class="cc-editor-input" id="edTitle" placeholder="First line that stops the scroll...">
          </div>
          <div>
            <div class="cc-editor-label">Post Type</div>
            <select class="cc-editor-select" id="edType" aria-label="Ed Type">
              <option value="">Select type...</option>
              <option value="post">Post</option>
              <option value="reel">Reel</option>
              <option value="carousel">Carousel</option>
              <option value="story">Story</option>
              <option value="thread">Thread</option>
              <option value="video">Video</option>
              <option value="article">Article</option>
              <option value="newsletter">Newsletter</option>
              <option value="short">Short</option>
            </select>
          </div>
        </div>
      </div>

      <div class="cc-editor-section">
        <div class="cc-editor-label">Hashtags</div>
        <input aria-label="#creator #content #africa" class="cc-editor-input" id="edHashtags" placeholder="#creator #content #africa">
      </div>

      <!-- Schedule -->
      <div class="cc-editor-section">
        <div class="cc-editor-row">
          <div>
            <div class="cc-editor-label">Date</div>
            <input aria-label="EdDate" type="date" class="cc-editor-input" id="edDate">
          </div>
          <div>
            <div class="cc-editor-label">Time</div>
            <input aria-label="EdTime" type="time" class="cc-editor-input" id="edTime">
          </div>
        </div>
      </div>

      <!-- Pillar -->
      <div class="cc-editor-section">
        <div class="cc-editor-label">Content Pillar</div>
        <div class="cc-pillar-pills" id="edPillars"></div>
      </div>

      <!-- Notes -->
      <div class="cc-editor-section">
        <div class="cc-editor-label">Private Notes</div>
        <input aria-label="Notes for yourself (not part of the post)" class="cc-editor-input" id="edNotes" placeholder="Notes for yourself (not part of the post)...">
      </div>

      <!-- Actions -->
      <div class="cc-editor-section">
        <div class="cc-status-btns">
          <button type="button" class="cc-status-btn" onclick="savePostAs('draft')">Save Draft</button>
          <button type="button" class="cc-status-btn" onclick="savePostAs('ready')" style="background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25);color:#059669">Mark Ready</button>
          <button type="button" class="cc-status-btn" onclick="savePostAs('posted')" style="background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.25);color:#8B5CF6">Posted</button>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button type="button" class="cc-status-btn" onclick="duplicateCurrentPost()" style="flex:1">Duplicate</button>
          <button type="button" class="cc-status-btn delete" onclick="deleteCurrentPost()" id="edDeleteBtn" style="flex:1;display:none">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/engines/creator-calendar-engine.js?v=394e8f17"></script>
  <script>
  (function () {
    'use strict';

    var E = window.CreatorCalendarEngine;
    var posts = [];
    var pillars = [];
    var currentView = 'feed';
    var currentWeekStart = E.getWeekStart(new Date());
    var currentMonth = new Date().getMonth();
    var currentYear = new Date().getFullYear();
    var platformFilter = 'all';

    // ─── INIT ───
    function init() {
      pillars = E.getLocalPillars();
      posts = E.getLocalPosts();
      buildEditorPlatforms();
      buildEditorPillars();
      bindViewTabs();
      bindPlatformPills();
      updateDateLabel();
      render();

      // Default to week on desktop, feed on mobile
      if (window.innerWidth >= 768) {
        switchView('week');
      }
    }

    // ─── VIEW SWITCHING ───
    function bindViewTabs() {
      document.querySelectorAll('.cc-view-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          switchView(btn.dataset.view);
        });
      });
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.cc-view-tab').forEach(function (b) { b.classList.remove('active'); });
      var active = document.querySelector('.cc-view-tab[data-view="' + view + '"]');
      if (active) active.classList.add('active');
      document.querySelectorAll('.cc-view-panel').forEach(function (p) { p.style.display = 'none'; });
      var panel = document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1));
      if (panel) panel.style.display = '';
      render();
    }

    // ─── PLATFORM FILTER ───
    function bindPlatformPills() {
      document.querySelectorAll('.cc-plat-pill').forEach(function (pill) {
        pill.addEventListener('click', function () {
          document.querySelectorAll('.cc-plat-pill').forEach(function (p) { p.classList.remove('active'); });
          pill.classList.add('active');
          platformFilter = pill.dataset.plat;
          render();
        });
      });
    }

    function filterPosts(list) {
      if (platformFilter === 'all') return list;
      return list.filter(function (p) {
        var plats = p.platforms || [];
        return plats.indexOf(platformFilter) >= 0;
      });
    }

    // ─── DATE NAVIGATION ───
    window.navPrev = function () {
      if (currentView === 'month') {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      } else {
        currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      }
      updateDateLabel();
      render();
    };

    window.navNext = function () {
      if (currentView === 'month') {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      } else {
        currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      }
      updateDateLabel();
      render();
    };

    window.goToday = function () {
      var now = new Date();
      currentWeekStart = E.getWeekStart(now);
      currentMonth = now.getMonth();
      currentYear = now.getFullYear();
      updateDateLabel();
      render();
    };

    function updateDateLabel() {
      var label = document.getElementById('dateLabel');
      if (currentView === 'month') {
        label.textContent = E.MONTH_NAMES[currentMonth] + ' ' + currentYear;
      } else {
        var end = new Date(currentWeekStart);
        end.setDate(end.getDate() + 6);
        var sameMonth = currentWeekStart.getMonth() === end.getMonth();
        if (sameMonth) {
          label.textContent = currentWeekStart.getDate() + ' – ' + end.getDate() + ' ' + E.MONTH_NAMES[currentWeekStart.getMonth()];
        } else {
          label.textContent = currentWeekStart.getDate() + ' ' + E.MONTH_NAMES[currentWeekStart.getMonth()].slice(0, 3) + ' – ' + end.getDate() + ' ' + E.MONTH_NAMES[end.getMonth()].slice(0, 3);
        }
      }
    }

    // ─── RENDER ───
    function render() {
      var filtered = filterPosts(posts);
      updateStats(filtered);

      if (currentView === 'feed') renderFeed(filtered);
      else if (currentView === 'week') renderWeek(filtered);
      else if (currentView === 'month') renderMonth(filtered);
      else if (currentView === 'pillars') renderPillars(filtered);

      updateDateLabel();
    }

    function updateStats(filtered) {
      var weekDates = E.getWeekDates(currentWeekStart);
      var weekPosts = filtered.filter(function (p) {
        if (!p.scheduled_date) return false;
        var d = p.scheduled_date;
        return d >= E.formatDate(weekDates[0]) && d <= E.formatDate(weekDates[6]);
      });
      document.getElementById('statTotal').textContent = weekPosts.length;
      document.getElementById('statReady').textContent = weekPosts.filter(function (p) { return p.status === 'ready'; }).length;
      document.getElementById('statDraft').textContent = weekPosts.filter(function (p) { return p.status === 'draft'; }).length;
      var gaps = E.getContentGaps(weekPosts, weekDates[0], 7);
      document.getElementById('statGaps').textContent = gaps.length;
    }

    // ─── FEED VIEW ───
    function renderFeed(filtered) {
      var container = document.getElementById('viewFeed');
      var weekDates = E.getWeekDates(currentWeekStart);
      var html = '<div class="cc-feed">';

      weekDates.forEach(function (date) {
        var dateStr = E.formatDate(date);
        var dayPosts = filtered.filter(function (p) { return p.scheduled_date === dateStr; });
        var today = E.isToday(date);
        var dayIdx = (date.getDay() + 6) % 7;

        html += '<div class="cc-feed-day">';
        html += '<div class="cc-feed-date' + (today ? ' today' : '') + '">' +
          E.DAY_NAMES_FULL[dayIdx] + ', ' + date.getDate() + ' ' + E.MONTH_NAMES[date.getMonth()] +
          (today ? ' <span class="cc-feed-today-badge">TODAY</span>' : '') + '</div>';

        if (dayPosts.length === 0) {
          html += '<div class="cc-feed-empty" onclick="openEditor(null,\'' + dateStr + '\')">Nothing planned — add something?</div>';
        } else {
          dayPosts.forEach(function (post) {
            html += renderPostCard(post);
          });
        }
        html += '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
      bindPostCards();
    }

    function renderPostCard(post) {
      var plats = post.platforms || [];
      var firstPlat = plats[0] || '';
      var pillar = pillars.find(function (p) { return p.id === post.pillar_id || p.name === post.pillar_name; });

      var platIcons = plats.map(function (p) {
        var info = E.PLATFORMS[p] || {};
        var cls = p === 'instagram' ? 'ig' : p === 'tiktok' ? 'tt' : p === 'youtube' ? 'yt' : p === 'twitter' ? 'x' : p === 'linkedin' ? 'li' : '';
        return '<div class="cc-post-plat-icon ' + cls + '">' + (info.short || p.slice(0, 2).toUpperCase()) + '</div>';
      }).join('');

      return '<div class="cc-post-card" data-id="' + post.id + '" data-platform="' + firstPlat + '">' +
        '<div class="cc-post-header">' +
          '<div class="cc-post-platforms">' + platIcons + '</div>' +
          (post.post_type ? '<div class="cc-post-type">' + post.post_type + '</div>' : '') +
          '<div class="cc-post-status ' + (post.status || 'draft') + '">' + (post.status || 'draft') + '</div>' +
        '</div>' +
        (post.title ? '<div class="cc-post-title">' + escHtml(post.title) + '</div>' : '') +
        (post.caption ? '<div class="cc-post-caption">' + escHtml(post.caption) + '</div>' : '') +
        '<div class="cc-post-footer">' +
          (post.scheduled_time ? '<div class="cc-post-time">' + post.scheduled_time + '</div>' : '') +
          (pillar ? '<div class="cc-post-pillar"><span class="cc-pillar-dot" style="background:' + pillar.color + '"></span> ' + pillar.name + '</div>' : '') +
        '</div>' +
      '</div>';
    }

    // ─── WEEK VIEW ───
    function renderWeek(filtered) {
      var container = document.getElementById('viewWeek');
      var weekDates = E.getWeekDates(currentWeekStart);
      var html = '<div class="cc-week">';

      weekDates.forEach(function (date) {
        var dateStr = E.formatDate(date);
        var dayPosts = filtered.filter(function (p) { return p.scheduled_date === dateStr; });
        var today = E.isToday(date);
        var dayIdx = (date.getDay() + 6) % 7;

        html += '<div class="cc-week-col' + (today ? ' today' : '') + '">';
        html += '<div class="cc-week-col-head">';
        html += '<div class="cc-week-day-name">' + E.DAY_NAMES[dayIdx] + '</div>';
        html += '<div class="cc-week-day-num">' + date.getDate() + '</div>';
        html += '</div>';
        html += '<div class="cc-week-posts">';

        dayPosts.forEach(function (post) {
          var plats = post.platforms || [];
          var firstPlat = plats[0] || '';
          var pillar = pillars.find(function (p) { return p.id === post.pillar_id || p.name === post.pillar_name; });
          html += '<div class="cc-week-post" data-id="' + post.id + '" data-platform="' + firstPlat + '">';
          html += '<div class="cc-week-post-title">' + escHtml(post.title || post.caption || 'Untitled') + '</div>';
          html += '<div class="cc-week-post-meta">';
          if (post.post_type) html += '<span>' + post.post_type + '</span>';
          if (pillar) html += '<span class="cc-pillar-dot" style="background:' + pillar.color + ';width:6px;height:6px;display:inline-block;border-radius:50%"></span>';
          html += '</div></div>';
        });

        html += '</div>';
        html += '<div class="cc-week-add" onclick="openEditor(null,\'' + dateStr + '\')">+ Add</div>';
        html += '</div>';
      });

      html += '</div>';
      container.innerHTML = html;
      bindPostCards();
    }

    // ─── MONTH VIEW ───
    function renderMonth(filtered) {
      var container = document.getElementById('viewMonth');
      var dates = E.getMonthDates(currentYear, currentMonth);
      var html = '<div class="cc-month">';

      E.DAY_NAMES.forEach(function (d) {
        html += '<div class="cc-month-head">' + d + '</div>';
      });

      dates.forEach(function (item) {
        var dateStr = E.formatDate(item.date);
        var dayPosts = filtered.filter(function (p) { return p.scheduled_date === dateStr; });
        var today = E.isToday(item.date);

        html += '<div class="cc-month-cell' + (today ? ' today' : '') + (!item.inMonth ? ' outside' : '') + '" onclick="monthCellClick(\'' + dateStr + '\')">';
        html += '<div class="cc-month-cell-num">' + item.date.getDate() + '</div>';
        html += '<div class="cc-month-dots">';
        dayPosts.forEach(function (p) {
          var plats = p.platforms || [];
          var color = plats[0] ? (E.PLATFORMS[plats[0]] || {}).color || '#8B5CF6' : '#8B5CF6';
          html += '<div class="cc-month-dot" style="background:' + color + '"></div>';
        });
        html += '</div></div>';
      });

      html += '</div>';

      // Month summary
      var monthPosts = filtered.filter(function (p) {
        if (!p.scheduled_date) return false;
        var d = new Date(p.scheduled_date);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      });
      var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      var daysPlanned = {};
      monthPosts.forEach(function (p) { daysPlanned[p.scheduled_date] = true; });
      var planned = Object.keys(daysPlanned).length;
      html += '<div style="text-align:center;padding:16px;font-size:.82rem;color:var(--cc-muted)">' +
        '<strong>' + planned + '/' + daysInMonth + '</strong> days planned, <strong>' + (daysInMonth - planned) + '</strong> gaps</div>';

      container.innerHTML = html;
    }

    window.monthCellClick = function (dateStr) {
      currentWeekStart = E.getWeekStart(new Date(dateStr + 'T00:00:00'));
      switchView('feed');
    };

    // ─── PILLARS VIEW ───
    function renderPillars(filtered) {
      var container = document.getElementById('viewPillars');
      var balance = E.getPillarBalance(filtered.length ? filtered : posts);
      var html = '';

      // AI insight
      if (balance.length > 0) {
        var top = balance[0];
        if (top.percentage > 40) {
          html += '<div class="cc-pillar-insight">Your content is <strong>' + top.percentage + '% ' + top.name + '</strong>. Engagement drops when any single pillar exceeds 40%. Try adding more variety this week.</div>';
        }
      }

      html += '<div class="cc-pillars">';
      pillars.forEach(function (pillar) {
        var pillarPosts = posts.filter(function (p) {
          return p.pillar_id === pillar.id || p.pillar_name === pillar.name;
        });
        pillarPosts = filterPosts(pillarPosts);

        html += '<div class="cc-pillar-col">';
        html += '<div class="cc-pillar-col-head">';
        html += '<div class="cc-pillar-col-dot" style="background:' + pillar.color + '"></div>';
        html += '<div class="cc-pillar-col-name">' + pillar.name + '</div>';
        html += '<div class="cc-pillar-col-count">' + pillarPosts.length + '</div>';
        html += '</div>';
        html += '<div class="cc-pillar-col-posts">';
        pillarPosts.forEach(function (post) {
          html += renderPostCard(post);
        });
        if (pillarPosts.length === 0) {
          html += '<div class="cc-feed-empty" onclick="openEditor()">Add a ' + pillar.name.toLowerCase() + ' post</div>';
        }
        html += '</div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
      bindPostCards();
    }

    function bindPostCards() {
      document.querySelectorAll('.cc-post-card[data-id], .cc-week-post[data-id]').forEach(function (card) {
        card.addEventListener('click', function () {
          var post = posts.find(function (p) { return p.id === card.dataset.id; });
          if (post) openEditor(post);
        });
      });
    }

    // ─── POST EDITOR ───
    window.openEditor = function (post, prefillDate) {
      var overlay = document.getElementById('editorOverlay');
      var sheet = document.getElementById('editorSheet');
      overlay.classList.add('open');
      sheet.classList.add('open');

      if (post) {
        document.getElementById('editorTitle').textContent = 'Edit Post';
        document.getElementById('edPostId').value = post.id || '';
        document.getElementById('edTitle').value = post.title || '';
        document.getElementById('edCaption').value = post.caption || '';
        document.getElementById('edHashtags').value = post.hashtags || '';
        document.getElementById('edDate').value = post.scheduled_date || '';
        document.getElementById('edTime').value = post.scheduled_time || '';
        document.getElementById('edType').value = post.post_type || '';
        document.getElementById('edNotes').value = post.notes || '';
        document.getElementById('edDeleteBtn').style.display = '';

        // Select platforms
        var plats = post.platforms || [];
        document.querySelectorAll('#edPlatforms .cc-editor-plat-pill').forEach(function (p) {
          p.classList.toggle('selected', plats.indexOf(p.dataset.plat) >= 0);
        });

        // Select pillar
        document.querySelectorAll('#edPillars .cc-pillar-pill').forEach(function (p) {
          p.classList.toggle('selected', p.dataset.id === post.pillar_id || p.dataset.name === post.pillar_name);
        });
      } else {
        document.getElementById('editorTitle').textContent = 'New Post';
        document.getElementById('edPostId').value = '';
        document.getElementById('edTitle').value = '';
        document.getElementById('edCaption').value = '';
        document.getElementById('edHashtags').value = '';
        document.getElementById('edDate').value = prefillDate || E.formatDate(new Date());
        document.getElementById('edTime').value = '';
        document.getElementById('edType').value = '';
        document.getElementById('edNotes').value = '';
        document.getElementById('edDeleteBtn').style.display = 'none';
        document.querySelectorAll('#edPlatforms .cc-editor-plat-pill').forEach(function (p) { p.classList.remove('selected'); });
        document.querySelectorAll('#edPillars .cc-pillar-pill').forEach(function (p) { p.classList.remove('selected'); });
      }
      updateCharCount();
    };

    window.closeEditor = function () {
      document.getElementById('editorOverlay').classList.remove('open');
      document.getElementById('editorSheet').classList.remove('open');
    };

    function buildEditorPlatforms() {
      var container = document.getElementById('edPlatforms');
      var html = '';
      for (var key in E.PLATFORMS) {
        var p = E.PLATFORMS[key];
        html += '<button type="button" class="cc-editor-plat-pill" data-plat="' + key + '">' + p.short + '</button>';
      }
      container.innerHTML = html;
      container.querySelectorAll('.cc-editor-plat-pill').forEach(function (pill) {
        pill.addEventListener('click', function () { pill.classList.toggle('selected'); updateCharCount(); });
      });
    }

    function buildEditorPillars() {
      var container = document.getElementById('edPillars');
      var html = '';
      pillars.forEach(function (p) {
        html += '<button type="button" class="cc-pillar-pill" data-id="' + p.id + '" data-name="' + p.name + '">' +
          '<span class="cc-pillar-dot" style="background:' + p.color + '"></span>' + p.name + '</button>';
      });
      container.innerHTML = html;
      container.querySelectorAll('.cc-pillar-pill').forEach(function (pill) {
        pill.addEventListener('click', function () {
          container.querySelectorAll('.cc-pillar-pill').forEach(function (p) { p.classList.remove('selected'); });
          pill.classList.toggle('selected');
        });
      });
    }

    window.updateCharCount = function () {
      var text = document.getElementById('edCaption').value;
      var selected = document.querySelectorAll('#edPlatforms .cc-editor-plat-pill.selected');
      var counts = [];
      selected.forEach(function (pill) {
        var plat = E.PLATFORMS[pill.dataset.plat];
        if (plat) {
          var over = text.length > plat.charLimit;
          counts.push(plat.short + ': ' + text.length + '/' + plat.charLimit + (over ? ' (over!)' : ''));
        }
      });
      var el = document.getElementById('edCharCount');
      el.textContent = counts.length ? counts.join(' · ') : text.length + ' characters';
      el.classList.toggle('over', counts.some(function (c) { return c.indexOf('over!') >= 0; }));
    };

    function getEditorData() {
      var selectedPlats = [];
      document.querySelectorAll('#edPlatforms .cc-editor-plat-pill.selected').forEach(function (p) {
        selectedPlats.push(p.dataset.plat);
      });
      var selectedPillar = document.querySelector('#edPillars .cc-pillar-pill.selected');
      return {
        id: document.getElementById('edPostId').value || undefined,
        title: document.getElementById('edTitle').value.trim(),
        caption: document.getElementById('edCaption').value.trim(),
        hashtags: document.getElementById('edHashtags').value.trim(),
        platforms: selectedPlats,
        post_type: document.getElementById('edType').value,
        scheduled_date: document.getElementById('edDate').value,
        scheduled_time: document.getElementById('edTime').value,
        pillar_id: selectedPillar ? selectedPillar.dataset.id : null,
        pillar_name: selectedPillar ? selectedPillar.dataset.name : null,
        notes: document.getElementById('edNotes').value.trim()
      };
    }

    window.savePostAs = function (status) {
      var data = getEditorData();
      data.status = status;
      E.addLocalPost(data);
      posts = E.getLocalPosts();
      closeEditor();
      render();
    };

    window.duplicateCurrentPost = function () {
      var data = getEditorData();
      delete data.id;
      data.status = 'draft';
      var nextDay = new Date(data.scheduled_date || new Date());
      nextDay.setDate(nextDay.getDate() + 1);
      data.scheduled_date = E.formatDate(nextDay);
      E.addLocalPost(data);
      posts = E.getLocalPosts();
      closeEditor();
      render();
    };

    window.deleteCurrentPost = function () {
      var id = document.getElementById('edPostId').value;
      if (!id) return;
      if (!confirm('Delete this post?')) return;
      E.deleteLocalPost(id);
      posts = E.getLocalPosts();
      closeEditor();
      render();
    };

    // ─── AI ASSIST ───
    var ACTION_VERBS = [
      "Planning your content calendar",
      "Scheduling optimal post times",
      "Analyzing best posting windows",
      "Mapping your content strategy",
      "Generating posting schedule",
      "Balancing content variety",
      "Optimizing weekly rhythm",
      "Selecting content themes",
      "Structuring your pipeline",
      "Aligning with trending moments",
      "Building consistency patterns",
      "Curating content blocks",
      "Timing for maximum reach",
      "Crafting your editorial plan",
      "Distributing across platforms",
      "Finalizing your calendar"
    ];

    var verbInterval = null;

    function startVerbCycling() {
      var el = document.getElementById('ccAiLoading');
      var verbEl = document.getElementById('ccAiVerb');
      var idx = Math.floor(Math.random() * ACTION_VERBS.length);
      verbEl.textContent = ACTION_VERBS[idx];
      el.classList.add('active');
      verbInterval = setInterval(function () {
        idx = (idx + 1) % ACTION_VERBS.length;
        verbEl.textContent = ACTION_VERBS[idx];
      }, 2000);
    }

    function stopVerbCycling() {
      var el = document.getElementById('ccAiLoading');
      el.classList.remove('active');
      if (verbInterval) { clearInterval(verbInterval); verbInterval = null; }
    }

    window.aiAssist = function (type) {
      var data = getEditorData();
      var q = '';
      if (type === 'caption') q = 'Write a compelling caption for a ' + (data.post_type || 'post') + ' about: ' + (data.title || data.caption || 'my content');
      else if (type === 'hook') q = 'Write 3 scroll-stopping hook options (first line only) for: ' + (data.title || data.caption || 'my content');
      else if (type === 'hashtags') q = 'Generate 15 relevant hashtags for: ' + (data.title || data.caption || 'my content') + '. Platforms: ' + (data.platforms.join(', ') || 'Instagram');
      else if (type === 'repurpose') q = 'Repurpose this content for ' + (data.platforms.length > 1 ? data.platforms.join(', ') : 'all platforms') + ': ' + (data.caption || data.title || '');
      else if (type === 'improve') q = 'Improve this caption to be more engaging with a stronger CTA: ' + (data.caption || '');

      if (!q) return;

      var aiBtns = document.querySelectorAll('.cc-ai-assist-btn');
      aiBtns.forEach(function (b) { b.disabled = true; });
      startVerbCycling();

      fetch('/.netlify/functions/ai-advisor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tool: 'creator-calendar', messages: [{ role: 'user', content: q }], maxTokens: 600 })
      }).then(function (r) { return r.json(); }).then(function (d) {
        stopVerbCycling();
        aiBtns.forEach(function (b) { b.disabled = false; });
        var reply = d.reply || d.content || '';
        if (reply) {
          if (type === 'hashtags') {
            document.getElementById('edHashtags').value = reply.replace(/\n/g, ' ');
          } else {
            document.getElementById('edCaption').value = reply;
          }
          updateCharCount();
        }
      }).catch(function () {
        stopVerbCycling();
        aiBtns.forEach(function (b) { b.disabled = false; });
      });
    };

    // ─── UTILS ───
    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  })();
  </script>
</body>
</html>
