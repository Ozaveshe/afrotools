                <option value="ZWL">ZWL - Zimbabwe</option>
                <option value="MWK">MWK - Malawi</option>
                <option value="MGA">MGA - Madagascar</option>

<script>
  const rates = {
    'USD': 1,
    'EUR': 0.92,
    'GBP': 0.79,
    'ZAR': 16.5,
    'EGP': 48.2,
    'NGN': 1560,
    'KES': 128.5,
    'GHS': 15.2,
    'UGX': 3850,
    'TZS': 2570,
    'MZN': 63.8,
    'AOA': 825,
    'BWP': 13.2,
    'LSL': 17.8,
    'NAD': 18.2,
    'SZL': 18.5,
    'XOF': 600,
    'XAF': 600,
    'RWF': 1300,
    'BIF': 2850,
    'DZD': 133,
    'MAD': 9.8,
    'TND': 3.1,
    'LBP': 88950,
    'SLE': 26500,
    'GMD': 61.5,
    'ETB': 130,
    'SDG': 550,
    'SOS': 573,
    'DJF': 178,
    'ERN': 15,
    'MUR': 43.5,
    'SCR': 13.4,
    'ZMW': 31.2,
    'ZWL': 4200,
    'MWK': 1850,
    'MGA': 4380,
    'KMF': 445,
    'CVE': 101,
    'STP': 22000,
    'MRU': 39
  };

  const fromCur = document.getElementById('fromCurrency');
  const toCur = document.getElementById('toCurrency');
  const swapBtn = document.getElementById('swapBtn');
  const convertBtn = document.getElementById('convertBtn');
  const amount = document.getElementById('amount');
  const resultDiv = document.getElementById('resultDiv');

  swapBtn.addEventListener('click', () => {
    const temp = fromCur.value;
    fromCur.value = toCur.value;
    toCur.value = temp;
  });

  function convert() {
    const from = fromCur.value;
    const to = toCur.value;
    const val = parseFloat(amount.value) || 0;
    const converted = (val * rates[to]) / rates[from];
    document.getElementById('resultAmount').textContent = converted.toFixed(2);
    document.getElementById('resultCurrency').textContent = `${val} ${from} = ${converted.toFixed(2)} ${to}`;
    const rate = rates[to] / rates[from];
    document.getElementById('rateNote').textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;
    resultDiv.style.display = 'block';
  }

  convertBtn.addEventListener('click', convert);
  amount.addEventListener('keypress', e => { if (e.key === 'Enter') convert(); });
  [fromCur, toCur].forEach(sel => sel.addEventListener('change', convert));
  convert();
</script>
