<div class="hero">
  <div class="container">
    <nav class="bc"><a href="/">AfroTools</a> / <a href="/education/">Education</a> / Scholarship Checker</nav>
    <div class="badges">
      <span class="badge badge-sch">Scholarships</span>
      <span class="badge badge-free">Free Tool</span>
    </div>
    <h1>Scholarship <em>Eligibility Checker</em></h1>
    <p class="hero-sub">Check which major international scholarships you qualify for as an African student. Enter your profile and see your match score for 15+ scholarships.</p>
  </div>
</div>

<div class="sec-body">
<div class="container">

<div class="card">
  <h2>Enter Your Academic Profile</h2>
  <div class="row">
    <div>
      <label for="sc-country">Your Country</label>
      <select id="sc-country">
        <option value="sub-saharan">Sub-Saharan Africa (most countries)</option>
        <option value="commonwealth">Commonwealth Africa (Nigeria, Kenya, Ghana, SA, Uganda...)</option>
        <option value="francophone">Francophone Africa</option>
        <option value="north-africa">North Africa (Egypt, Morocco, Tunisia, Algeria)</option>
        <option value="all">Any African country</option>
      </select>
    </div>
    <div>
      <label for="sc-level">Target Degree Level</label>
      <select id="sc-level">
        <option value="bachelors">Bachelor's Degree</option>
        <option value="masters">Master's Degree</option>
        <option value="phd">PhD / Doctorate</option>
        <option value="any">Any Level</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div>
      <label for="sc-gpa">Current GPA / Grade</label>
      <select id="sc-gpa">
        <option value="5">First Class / 4.5–5.0 GPA / 75%+</option>
        <option value="4">Second Class Upper / 3.5–4.4 GPA / 65–74%</option>
        <option value="3">Second Class Lower / 2.5–3.4 GPA / 55–64%</option>
        <option value="2">Third Class / Below 2.5 GPA</option>
      </select>
    </div>
    <div>
      <label for="sc-field">Field of Study</label>
      <select id="sc-field">
        <option value="stem">STEM (Science, Tech, Engineering, Maths)</option>
        <option value="business">Business / Economics / Finance</option>
        <option value="social">Social Sciences / Development</option>
        <option value="health">Health / Medicine / Public Health</option>
        <option value="law">Law / Governance</option>
        <option value="arts">Arts / Humanities</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div>
      <label for="sc-work">Professional Work Experience</label>
      <select id="sc-work">
        <option value="3">3+ years professional experience</option>
        <option value="1">1–2 years professional experience</option>
        <option value="0">Fresh graduate / No work experience</option>
      </select>
    </div>
    <div>
      <label for="sc-leadership">Leadership Activities</label>
      <select id="sc-leadership">
        <option value="strong">Strong (student union, community leader, NGO founder)</option>
        <option value="moderate">Moderate (club member, volunteer, team lead)</option>
        <option value="minimal">Minimal (limited extra-curricular activities)</option>
      </select>
    </div>
  </div>
  <button class="btn" onclick="checkScholarships()">Check Eligibility</button>

  <div class="result-box" id="sc-result">
    <div class="match-count" id="sc-count"></div>
    <div id="sc-list"></div>
  </div>
</div>

</div>
</div>


<div style="padding: 0 20px; max-width: 760px; margin: 0 auto;">
  <wise-cta context="general"></wise-cta>
</div>
<afro-footer></afro-footer>
<script>
var SCHOLARSHIPS=[
  {name:'Mastercard Foundation Scholars Program',dest:'Various (select African universities + international)',coverage:'Full: tuition, living, flights, laptop, mentorship',level:['bachelors','masters','any'],region:['sub-saharan','all'],gpaMin:4,workMin:0,leadership:'moderate',field:['all'],fieldTag:'All fields'},
  {name:'Chevening Scholarship (UK)',dest:'United Kingdom',coverage:'Full: tuition, living allowance, flights, visa',level:['masters','any'],region:['commonwealth','all'],gpaMin:4,workMin:1,leadership:'strong',field:['all'],fieldTag:'All fields'},
  {name:'Commonwealth Scholarship (UK)',dest:'United Kingdom',coverage:'Full: tuition, living, flights, return ticket',level:['masters','phd','any'],region:['commonwealth','all'],gpaMin:4,workMin:0,leadership:'moderate',field:['all'],fieldTag:'All fields'},
  {name:'DAAD Scholarship (Germany)',dest:'Germany',coverage:'€800–1,200/month stipend + tuition waiver',level:['masters','phd','any'],region:['all','sub-saharan','francophone','north-africa'],gpaMin:4,workMin:0,leadership:'minimal',field:['all'],fieldTag:'All fields'},
  {name:'Fulbright Scholarship (USA)',dest:'United States of America',coverage:'Full: tuition, living, insurance, flights',level:['masters','phd','any'],region:['all','sub-saharan','north-africa'],gpaMin:5,workMin:1,leadership:'strong',field:['all'],fieldTag:'All fields'},
  {name:'Australia Awards Africa',dest:'Australia',coverage:'Full: tuition, living, return flights, health cover',level:['masters','phd','any'],region:['sub-saharan','all'],gpaMin:4,workMin:1,leadership:'moderate',field:['stem','social','health','law','business'],fieldTag:'STEM, Social, Health, Law, Business'},
  {name:'African Development Bank (AfDB) Scholarship',dest:'Various African and international universities',coverage:'Full: tuition, living stipend, insurance',level:['masters','any'],region:['sub-saharan','north-africa','all'],gpaMin:4,workMin:1,leadership:'minimal',field:['stem','business','social'],fieldTag:'STEM, Business, Social Sciences'},
  {name:'MTN Foundation Scholarship',dest:'Nigeria (domestic)',coverage:'Tuition fee waiver + stipend',level:['bachelors','any'],region:['sub-saharan','all'],gpaMin:4,workMin:0,leadership:'moderate',field:['stem'],fieldTag:'STEM only'},
  {name:'TotalEnergies Foundation Scholarship',dest:'Various African countries',coverage:'Tuition + living allowance',level:['bachelors','masters','any'],region:['sub-saharan','francophone','all'],gpaMin:4,workMin:0,leadership:'minimal',field:['stem'],fieldTag:'Science & Engineering only'},
  {name:'AFDB Robert McNamara Fellowship',dest:'World Bank partner institutions',coverage:'Research grant + stipend up to $25,000',level:['phd','any'],region:['sub-saharan','north-africa','all'],gpaMin:5,workMin:1,leadership:'moderate',field:['social','business'],fieldTag:'Development research'},
  {name:'Hubert H. Humphrey Fellowship (USA)',dest:'United States of America',coverage:'Full funding for mid-career professionals',level:['masters','any'],region:['all'],gpaMin:3,workMin:3,leadership:'strong',field:['social','health','law','business'],fieldTag:'Mid-career professionals'},
  {name:'MasterCard Scholar (selected universities)',dest:'Africa: various partner universities',coverage:'Full funding at selected African universities',level:['bachelors','masters','any'],region:['sub-saharan','all'],gpaMin:4,workMin:0,leadership:'strong',field:['all'],fieldTag:'All fields'},
  {name:'Erasmus+ (European universities)',dest:'Europe (various countries)',coverage:'Monthly stipend €800–1,200 + tuition',level:['masters','phd','any'],region:['all'],gpaMin:3,workMin:0,leadership:'minimal',field:['all'],fieldTag:'All fields'},
  {name:'AAUW International Fellowships (Women)',dest:'United States of America',coverage:'$18,000–30,000 per year',level:['masters','phd','any'],region:['all'],gpaMin:4,workMin:0,leadership:'moderate',field:['all'],fieldTag:'Women only — all fields'},
  {name:'Inlaks Shivdasani Foundation',dest:'UK, USA, Europe',coverage:'Up to $100,000 over programme duration',level:['masters','any'],region:['sub-saharan','all'],gpaMin:5,workMin:0,leadership:'strong',field:['all'],fieldTag:'Must be under 30'}
];
function scoreScholarship(sch,profile){
  var score=0;var total=0;
  // Region match
  total+=25;
  if(sch.region.indexOf('all')!==-1||sch.region.indexOf(profile.country)!==-1)score+=25;
  else if(profile.country==='all')score+=15;
  // Level match
  total+=20;
  if(sch.level.indexOf('any')!==-1||sch.level.indexOf(profile.level)!==-1)score+=20;
  else if(profile.level==='any')score+=10;
  // GPA
  total+=25;
  if(profile.gpa>=sch.gpaMin)score+=25;
  else if(profile.gpa===sch.gpaMin-1)score+=10;
  // Work experience
  total+=15;
  if(profile.work>=sch.workMin)score+=15;
  else if(profile.work>0&&sch.workMin<=1)score+=8;
  // Leadership
  total+=15;
  var lmap={strong:3,moderate:2,minimal:1};
  var reqL=lmap[sch.leadership]||1;
  var profL=lmap[profile.leadership]||1;
  if(profL>=reqL)score+=15;
  else if(profL===reqL-1)score+=7;
  // Field
  if(sch.field.indexOf('all')===-1&&sch.field.indexOf(profile.field)===-1)score=Math.round(score*0.6);
  return Math.round((score/total)*100);
}
function checkScholarships(){
  var profile={
    country:document.getElementById('sc-country').value,
    level:document.getElementById('sc-level').value,
    gpa:parseInt(document.getElementById('sc-gpa').value),
    field:document.getElementById('sc-field').value,
    work:parseInt(document.getElementById('sc-work').value),
    leadership:document.getElementById('sc-leadership').value
  };
  var results=SCHOLARSHIPS.map(function(s){return {sch:s,score:scoreScholarship(s,profile)};});
  results.sort(function(a,b){return b.score-a.score;});
  var highMatches=results.filter(function(r){return r.score>=70;}).length;
  document.getElementById('sc-count').innerHTML='<div class="num">'+highMatches+'</div><div class="lbl">Strong Matches Found (70%+ eligibility score from '+SCHOLARSHIPS.length+' scholarships checked)</div>';
  var html='';
  results.forEach(function(r){
    var cls=r.score>=70?'high-match':r.score>=45?'mid-match':'low-match';
    var badgeCls=r.score>=70?'match-high':r.score>=45?'match-mid':'match-low';
    var badgeTxt=r.score>=70?'Strong Match':r.score>=45?'Partial Match':'Low Match';
    html+='<div class="sch-card '+cls+'">'+
      '<div class="sch-match '+badgeCls+'">'+r.score+'% — '+badgeTxt+'</div>'+
      '<div class="sch-name">'+r.sch.name+'</div>'+
      '<div class="sch-dest">📍 '+r.sch.dest+'</div>'+
      '<div class="sch-coverage">💰 '+r.sch.coverage+'</div>'+
      '<div class="sch-req">Fields: '+r.sch.fieldTag+' | Min GPA: '+['','Third Class','2nd Lower','2nd Upper','First Class'][r.sch.gpaMin]+' | Work exp: '+(r.sch.workMin>0?r.sch.workMin+'+ years':'None required')+'</div>'+
      '</div>';
  });
  document.getElementById('sc-list').innerHTML=html;
  document.getElementById('sc-result').classList.add('show');
}
</script>
</body>
