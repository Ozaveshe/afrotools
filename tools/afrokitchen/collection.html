      <div class="ak-hero-text" style="max-width:700px">

<script src="/engines/afrokitchen-engine.js?v=2"></script>
<script>
(function () {
  var AK = AfroKitchenEngine;
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('slug');

  async function load() {
    var collections = await AK.fetchCollections();
    var col = (collections || []).find(function (c) { return c.slug === slug; });

    if (!col) {
      document.getElementById('col-title').textContent = 'Collection Not Found';
      document.getElementById('recipes-loading').style.display = 'none';
      document.getElementById('recipes-empty').style.display = '';
      return;
    }

    document.title = col.name + ' \u2014 AfroKitchen | AfroTools';
    document.getElementById('breadcrumb-col').textContent = col.name;
    document.getElementById('col-title').textContent = col.name;
    document.getElementById('col-desc').textContent = col.description || '';

    // Load recipes for this collection
    var recipes = [];
    if (col.recipe_ids && col.recipe_ids.length) {
      recipes = await AK.fetchRecipes({ ids: col.recipe_ids });
    } else {
      // Fallback: show all recipes as placeholder
      recipes = await AK.fetchRecipes({ limit: 12 });
    }

    var loading = document.getElementById('recipes-loading');
    var grid = document.getElementById('recipes-grid');
    var empty = document.getElementById('recipes-empty');
    loading.style.display = 'none';

    if (!recipes || !recipes.length) { empty.style.display = ''; return; }

    recipes.forEach(function (r) {
      var country = AK.COUNTRIES[r.country_code] || {};
      var totalMin = (r.prep_time_minutes || 0) + (r.cook_time_minutes || 0);
      var card = document.createElement('a');
      card.className = 'ak-recipe-card';
      card.href = 'recipe.html?slug=' + r.slug;
      card.innerHTML =
        '<img class="ak-recipe-card-img" src="' + (r.image_url || '/assets/img/og-default.png') + '" alt="' + r.name + '" loading="lazy">' +
        '<div class="ak-recipe-card-body">' +
          '<div class="ak-recipe-card-flag">' + (country.flag || '') + ' ' + r.country_name + '</div>' +
          '<div class="ak-recipe-card-title">' + r.name + '</div>' +
          '<div class="ak-recipe-card-desc">' + (r.description || '').slice(0, 100) + '</div>' +
          '<div class="ak-recipe-card-meta"><span>&#x23F1; ' + totalMin + ' min</span><span>' + (r.difficulty || '') + '</span></div>' +
        '</div>';
      grid.appendChild(card);
    });
  }

  load();
})();
</script>
</body>
