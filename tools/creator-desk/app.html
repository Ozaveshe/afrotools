<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Pipeline — CreatorDesk | AfroTools</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap"></noscript>
  <link rel="stylesheet" href="style.css?v=8c5cf998">
  <style>
    .cd-loading-status{display:none;align-items:center;gap:10px;margin-top:12px;padding:12px 16px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;font-size:13px;font-weight:600;color:#0369a1}
    .cd-loading-status.active{display:flex}
    .cd-loading-dots{display:inline-flex;gap:4px}
    .cd-loading-dots span{width:6px;height:6px;border-radius:50%;background:#0EA5E9;animation:cd-dot-pulse 1.4s infinite ease-in-out both}
    .cd-loading-dots span:nth-child(1){animation-delay:-.32s}
    .cd-loading-dots span:nth-child(2){animation-delay:-.16s}
    @keyframes cd-dot-pulse{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
  </style>
  <script src="/assets/js/supabase-auth.js" defer></script>
  <script src="/assets/js/lib/creator-profile.js?v=69df7ec4" defer></script>
</head>
<body>

<div class="cd-app">
  <!-- TOPBAR -->
  <div class="cd-topbar">
    <a href="index.html" class="cd-topbar-back">&larr; Back</a>
    <a href="index.html" class="cd-topbar-brand"><span>📋</span> CreatorDesk</a>
    <input type="text" class="cd-topbar-search" placeholder="Search projects..." oninput="filterProjects(this.value)">
    <button class="cd-btn cd-btn-primary" onclick="openNewProject()">+ New Project</button>
  </div>

  <!-- QUICK STATS -->
  <div class="cd-stats-bar" id="statsBar">
    <div class="cd-stat-chip"><div><div class="cd-stat-num" id="statActive">0</div><div class="cd-stat-lbl">Active</div></div></div>
    <div class="cd-stat-chip"><div><div class="cd-stat-num" id="statDueWeek">0</div><div class="cd-stat-lbl">Due This Week</div></div></div>
    <div class="cd-stat-chip alert"><div><div class="cd-stat-num" id="statOverdue">0</div><div class="cd-stat-lbl">Overdue</div></div></div>
    <div class="cd-stat-chip"><div><div class="cd-stat-num" id="statValue">₦0</div><div class="cd-stat-lbl">Pipeline Value</div></div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="cd-filter-bar">
    <button class="cd-filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="cd-filter-btn" onclick="setFilter('due-week', this)">Due This Week</button>
    <button class="cd-filter-btn" onclick="setFilter('high', this)">High Priority</button>
    <button class="cd-filter-btn" onclick="setFilter('overdue', this)">Overdue</button>
  </div>

  <!-- PIPELINE -->
  <div class="cd-pipeline" id="pipeline"></div>

  <!-- FAB (mobile) -->
  <button class="cd-fab" onclick="openNewProject()">+</button>

  <!-- BOTTOM NAV (mobile) -->
  <div class="cd-bottom-nav">
    <div class="cd-bottom-nav-inner">
      <a href="app.html" class="cd-bottom-nav-item active">
        <span class="cd-nav-icon">📋</span>Pipeline
        <span class="cd-nav-badge" id="overdueBadge" style="display:none"></span>
      </a>
      <a href="clients.html" class="cd-bottom-nav-item"><span class="cd-nav-icon">👥</span>Clients</a>
      <a href="activity.html" class="cd-bottom-nav-item"><span class="cd-nav-icon">📊</span>Activity</a>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="cd-modal-overlay" id="newProjectModal" onclick="if(event.target===this)closeModal()">
  <div class="cd-modal">
    <h3>New Project</h3>
    <div class="cd-field">
      <label>Project Name *</label>
      <input type="text" id="npName" placeholder="e.g. Wedding Photography — Tola & Mide">
    </div>
    <div class="cd-field">
      <label>Client Name</label>
      <input type="text" id="npClient" placeholder="e.g. Tola Bakare">
    </div>
    <div class="cd-field">
      <label>Status</label>
      <select id="npStatus">
        <option value="lead">Lead</option>
        <option value="quoted">Quoted</option>
        <option value="active" selected>Active</option>
        <option value="review">Review</option>
      </select>
    </div>
    <div class="cd-field">
      <label>Priority</label>
      <select id="npPriority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="cd-field">
      <label>Due Date</label>
      <input type="date" id="npDue">
    </div>
    <div class="cd-field">
      <label>Value (optional)</label>
      <input type="text" id="npValue" placeholder="e.g. 250000" inputmode="numeric">
    </div>
    <div class="cd-field">
      <label>Currency</label>
      <select id="npCurrency">
        <option value="NGN">NGN (₦)</option>
        <option value="KES">KES (KSh)</option>
        <option value="ZAR">ZAR (R)</option>
        <option value="GHS">GHS (GH₵)</option>
        <option value="USD">USD ($)</option>
        <option value="GBP">GBP (£)</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="cd-btn cd-btn-primary" onclick="createProject()" style="flex:1">Create Project</button>
      <button class="cd-btn cd-btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
    <div style="margin-top:12px">
      <button class="cd-ai-btn" onclick="aiBreakdown()">✨ AI: Paste a client message to create a brief</button>
    </div>
    <div class="cd-loading-status" id="cdLoadingStatus">
      <span class="cd-loading-verb">Analyzing your content</span>
      <span class="cd-loading-dots"><span></span><span></span><span></span></span>
    </div>
  </div>
</div>

<!-- MOVE STATUS MODAL (mobile) -->
<div class="cd-modal-overlay" id="moveModal" onclick="if(event.target===this)closeMoveModal()">
  <div class="cd-modal">
    <h3>Move Project</h3>
    <div id="moveOptions" style="display:flex;flex-direction:column;gap:8px"></div>
    <button class="cd-btn cd-btn-ghost" onclick="closeMoveModal()" style="margin-top:12px;width:100%">Cancel</button>
  </div>
</div>

<script>
var STATUSES = [
  { id: 'lead', label: 'Lead', color: '#94a3b8' },
  { id: 'quoted', label: 'Quoted', color: '#f59e0b' },
  { id: 'active', label: 'Active', color: '#0EA5E9' },
  { id: 'review', label: 'Review', color: '#8b5cf6' },
  { id: 'completed', label: 'Completed', color: '#10b981' },
  { id: 'on_hold', label: 'On Hold', color: '#9ca3af' }
];

var AVATAR_COLORS = ['#0EA5E9','#8b5cf6','#f59e0b','#10b981','#ef4444','#ec4899','#f97316','#06b6d4','#6366f1','#84cc16'];
var CURRENCY_SYMBOLS = { NGN:'₦', KES:'KSh ', ZAR:'R', GHS:'GH₵', USD:'$', GBP:'£', EUR:'€' };

var projects = [];
var currentFilter = 'all';
var moveProjectId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function getInitials(name) {
  if (!name) return '?';
  return name.split(/\s+/).map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
}

function getAvatarColor(name) {
  var hash = 0;
  for (var i = 0; i < (name || '').length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function formatValue(val, currency) {
  if (!val) return '';
  var sym = CURRENCY_SYMBOLS[currency] || currency + ' ';
  var n = parseInt(val.toString().replace(/[^0-9]/g, ''), 10);
  if (isNaN(n)) return val;
  return sym + n.toLocaleString();
}

function getDueClass(dateStr) {
  if (!dateStr) return 'safe';
  var now = new Date(); now.setHours(0,0,0,0);
  var due = new Date(dateStr + 'T00:00:00');
  var diff = Math.ceil((due - now) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 3) return 'overdue';
  if (diff <= 7) return 'soon';
  return 'safe';
}

function getDueLabel(dateStr) {
  if (!dateStr) return '';
  var now = new Date(); now.setHours(0,0,0,0);
  var due = new Date(dateStr + 'T00:00:00');
  var diff = Math.ceil((due - now) / 86400000);
  if (diff < 0) return Math.abs(diff) + 'd overdue';
  if (diff === 0) return 'Due today';
  if (diff === 1) return 'Due tomorrow';
  if (diff <= 7) return 'Due in ' + diff + 'd';
  return due.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ── RENDER PIPELINE ──
function renderPipeline() {
  var pipeline = document.getElementById('pipeline');
  pipeline.innerHTML = '';

  var filtered = filterProjectsList(projects);

  STATUSES.forEach(function(status) {
    var col = document.createElement('div');
    col.className = 'cd-column';
    col.setAttribute('data-status', status.id);

    var colProjects = filtered.filter(function(p) { return p.status === status.id; });

    col.innerHTML = '<div class="cd-column-header">' +
      '<div class="cd-column-title"><span class="cd-dot" style="background:' + status.color + '"></span>' + status.label + '</div>' +
      '<span class="cd-column-count">' + colProjects.length + '</span></div>';

    colProjects.forEach(function(p) {
      col.innerHTML += renderProjectCard(p);
    });

    col.innerHTML += '<div class="cd-add-card" onclick="openNewProjectWithStatus(\'' + status.id + '\')">+ Add project</div>';

    // Drop zone events
    col.addEventListener('dragover', function(e) { e.preventDefault(); this.style.background = '#e0f2fe'; });
    col.addEventListener('dragleave', function() { this.style.background = '#f1f5f9'; });
    col.addEventListener('drop', function(e) {
      e.preventDefault();
      this.style.background = '#f1f5f9';
      var id = e.dataTransfer.getData('text/plain');
      moveProject(id, this.getAttribute('data-status'));
    });

    pipeline.appendChild(col);
  });

  updateStats();
}

function renderProjectCard(p) {
  var initials = getInitials(p.client);
  var color = getAvatarColor(p.client);
  var dueClass = getDueClass(p.due);
  var dueLabel = getDueLabel(p.due);
  var tasksTotal = (p.tasks || []).length;
  var tasksDone = (p.tasks || []).filter(function(t) { return t.done; }).length;
  var pct = tasksTotal ? Math.round((tasksDone / tasksTotal) * 100) : 0;

  var html = '<div class="cd-project-card" draggable="true" data-id="' + p.id + '"' +
    ' ondragstart="onDragStart(event,\'' + p.id + '\')"' +
    ' onclick="openProject(\'' + p.id + '\')">';

  html += '<div class="cd-pc-top">';
  html += '<div class="cd-pc-avatar" style="background:' + color + '">' + initials + '</div>';
  html += '<div class="cd-pc-name">' + escHtml(p.name) + '</div>';
  if (p.priority === 'high') html += '<div class="cd-pc-priority high"></div>';
  else if (p.priority === 'medium') html += '<div class="cd-pc-priority medium"></div>';
  html += '</div>';

  if (p.client) html += '<div class="cd-pc-client">' + escHtml(p.client) + '</div>';

  html += '<div class="cd-pc-footer">';
  if (dueLabel) html += '<div class="cd-pc-due ' + dueClass + '">📅 ' + dueLabel + '</div>';
  if (p.value) html += '<div class="cd-pc-value">' + formatValue(p.value, p.currency) + '</div>';
  html += '</div>';

  if (tasksTotal > 0) {
    html += '<div class="cd-pc-tasks">';
    html += '<div class="cd-pc-tasks-bar"><div class="cd-pc-tasks-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="cd-pc-tasks-label">' + tasksDone + '/' + tasksTotal + '</div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ── STATS ──
function updateStats() {
  var active = projects.filter(function(p) { return p.status === 'active'; }).length;
  var now = new Date(); now.setHours(0,0,0,0);
  var weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() + 7);
  var dueWeek = projects.filter(function(p) {
    if (!p.due || p.status === 'completed' || p.status === 'on_hold') return false;
    var d = new Date(p.due + 'T00:00:00');
    return d >= now && d <= weekEnd;
  }).length;
  var overdue = projects.filter(function(p) {
    if (!p.due || p.status === 'completed' || p.status === 'on_hold') return false;
    return new Date(p.due + 'T00:00:00') < now;
  }).length;
  var value = projects.filter(function(p) { return p.status !== 'completed' && p.status !== 'on_hold'; })
    .reduce(function(sum, p) { return sum + (parseInt((p.value || '0').toString().replace(/[^0-9]/g,''), 10) || 0); }, 0);

  document.getElementById('statActive').textContent = active;
  document.getElementById('statDueWeek').textContent = dueWeek;
  document.getElementById('statOverdue').textContent = overdue;
  document.getElementById('statValue').textContent = formatValue(value, 'NGN');

  var badge = document.getElementById('overdueBadge');
  badge.style.display = overdue > 0 ? 'block' : 'none';
}

// ── FILTERS ──
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.cd-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderPipeline();
}

function filterProjectsList(list) {
  if (currentFilter === 'all') return list;
  var now = new Date(); now.setHours(0,0,0,0);
  var weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate() + 7);

  return list.filter(function(p) {
    if (currentFilter === 'high') return p.priority === 'high';
    if (currentFilter === 'overdue') {
      if (!p.due || p.status === 'completed') return false;
      return new Date(p.due + 'T00:00:00') < now;
    }
    if (currentFilter === 'due-week') {
      if (!p.due || p.status === 'completed') return false;
      var d = new Date(p.due + 'T00:00:00');
      return d >= now && d <= weekEnd;
    }
    return true;
  });
}

function filterProjects(query) {
  if (!query) { renderPipeline(); return; }
  var q = query.toLowerCase();
  var filtered = projects.filter(function(p) {
    return (p.name || '').toLowerCase().indexOf(q) !== -1 ||
           (p.client || '').toLowerCase().indexOf(q) !== -1;
  });
  // Re-render with filtered set (temporary override)
  var origProjects = projects;
  projects = filtered;
  renderPipeline();
  projects = origProjects;
}

// ── DRAG & DROP ──
function onDragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  e.target.classList.add('dragging');
  setTimeout(function() { e.target.classList.remove('dragging'); }, 200);
}

function moveProject(id, newStatus) {
  var p = projects.find(function(proj) { return proj.id === id; });
  if (p) {
    p.status = newStatus;
    p.updatedAt = Date.now();
    if (newStatus === 'completed') p.completedDate = new Date().toISOString().split('T')[0];
    saveData();
    renderPipeline();
  }
}

// ── PROJECT CRUD ──
function openNewProject() { document.getElementById('newProjectModal').classList.add('open'); }
function openNewProjectWithStatus(status) {
  document.getElementById('npStatus').value = status;
  openNewProject();
}
function closeModal() {
  document.getElementById('newProjectModal').classList.remove('open');
  // Reset form
  ['npName','npClient','npValue'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('npDue').value = '';
}

function createProject() {
  var name = document.getElementById('npName').value.trim();
  if (!name) { alert('Project name is required'); return; }

  projects.push({
    id: uid(),
    name: name,
    client: document.getElementById('npClient').value.trim(),
    status: document.getElementById('npStatus').value,
    priority: document.getElementById('npPriority').value,
    due: document.getElementById('npDue').value,
    value: document.getElementById('npValue').value,
    currency: document.getElementById('npCurrency').value,
    tasks: [],
    notes: [],
    createdAt: Date.now(),
    updatedAt: Date.now()
  });

  saveData();
  closeModal();
  renderPipeline();
  showToast('Project created!');
}

function openProject(id) {
  window.location.href = 'project.html?id=' + id;
}

// ── MOVE MODAL (mobile) ──
function openMoveModal(id) {
  moveProjectId = id;
  var opts = document.getElementById('moveOptions');
  opts.innerHTML = '';
  STATUSES.forEach(function(s) {
    opts.innerHTML += '<button class="cd-btn cd-btn-ghost" style="width:100%;justify-content:flex-start" onclick="moveProject(\'' + id + '\',\'' + s.id + '\');closeMoveModal()">' +
      '<span style="width:8px;height:8px;border-radius:50%;background:' + s.color + '"></span> ' + s.label + '</button>';
  });
  document.getElementById('moveModal').classList.add('open');
}
function closeMoveModal() { document.getElementById('moveModal').classList.remove('open'); moveProjectId = null; }

// ── VERB SPINNER ──
var ACTION_VERBS = [
  "Analyzing your content",
  "Scanning performance metrics",
  "Evaluating engagement data",
  "Crunching the numbers",
  "Mapping growth trends",
  "Identifying top performers",
  "Benchmarking your stats",
  "Calculating ROI potential",
  "Detecting content patterns",
  "Processing audience signals",
  "Generating insights report",
  "Measuring impact scores",
  "Assessing reach potential",
  "Compiling recommendations",
  "Forecasting performance",
  "Building your dashboard"
];

var verbCycleTimer = null;
var verbIndex = 0;

function startVerbCycling() {
  verbIndex = Math.floor(Math.random() * ACTION_VERBS.length);
  var el = document.getElementById('cdLoadingStatus');
  var verbEl = el.querySelector('.cd-loading-verb');
  verbEl.textContent = ACTION_VERBS[verbIndex];
  el.classList.add('active');
  verbCycleTimer = setInterval(function() {
    verbIndex = (verbIndex + 1) % ACTION_VERBS.length;
    verbEl.textContent = ACTION_VERBS[verbIndex];
  }, 2000);
}

function stopVerbCycling() {
  if (verbCycleTimer) { clearInterval(verbCycleTimer); verbCycleTimer = null; }
  var el = document.getElementById('cdLoadingStatus');
  el.classList.remove('active');
}

// ── AI ──
function aiBreakdown() {
  var msg = prompt('Paste a WhatsApp message or project description:');
  if (!msg) return;

  var btn = event.target;
  btn.classList.add('loading');
  btn.textContent = '⏳ Analyzing...';
  startVerbCycling();

  fetch('/.netlify/functions/ai-advisor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tool: 'creator-desk',
      message: 'Extract a project brief from this client message. Return: project name, deliverables, deadline (if mentioned), budget signals, and any red flags. Message: "' + msg + '"'
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    stopVerbCycling();
    alert('AI Brief:\n\n' + (data.response || data.message || 'No response'));
  })
  .catch(function() { stopVerbCycling(); alert('AI analysis failed.'); })
  .finally(function() {
    btn.classList.remove('loading');
    btn.textContent = '✨ AI: Paste a client message to create a brief';
  });
}

// ── PERSISTENCE ──
function saveData() {
  try { localStorage.setItem('cd-projects', JSON.stringify(projects)); } catch(e) {}
}

function loadData() {
  try {
    var saved = localStorage.getItem('cd-projects');
    if (saved) projects = JSON.parse(saved);
  } catch(e) {}
}

// ── UTILS ──
function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2500);
}

// ── INIT ──
loadData();
renderPipeline();
</script>
</body>
</html>
