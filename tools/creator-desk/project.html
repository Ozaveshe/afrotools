<!DOCTYPE html>
<html data-chat-bundle="/assets/js/bundles/chat.e5a3e11c.min.js" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — CreatorDesk | AfroTools</title>
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap"></noscript>
  <link rel="stylesheet" href="style.css?v=0c2d9a78">
<link rel="canonical" href="https://afrotools.com/tools/creator-desk/project">
<meta name="robots" content="noindex, follow">
<meta property="og:url" content="https://afrotools.com/tools/creator-desk/project">
<script>(function(){try{var t=localStorage.getItem('aft_theme');var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;var a=(t==='dark'||t==='light')?t:(d?'dark':'light');document.documentElement.setAttribute('data-theme',a);document.documentElement.setAttribute('data-theme-choice',(t==='dark'||t==='light')?t:'auto');document.documentElement.style.colorScheme=a;}catch(_){}})();</script>
<link rel="stylesheet" href="/assets/css/theme-dark.min.css?v=c9df5f7b">
<script src="/assets/js/lib/dark-mode.js?v=882f512d" defer></script>
<link rel="alternate" hreflang="en" href="https://afrotools.com/tools/creator-desk/project" />
<link rel="alternate" hreflang="x-default" href="https://afrotools.com/tools/creator-desk/project" />
</head>
<body>

<div class="cd-app">
  <div class="cd-topbar">
    <a href="app.html" class="cd-topbar-back">&larr; Pipeline</a>
    <a href="index.html" class="cd-topbar-brand"><span>📋</span> CreatorDesk</a>
    <span class="cd-topbar-title" id="projectTitle">Project</span>
    <button type="button" class="cd-btn cd-btn-ghost" onclick="deleteProject()">Delete</button>
  </div>

  <div class="cd-detail" id="projectDetail">
    <div style="text-align:center;padding:60px;color:#64748b">Loading project...</div>
  </div>

  <div class="cd-bottom-nav">
    <div class="cd-bottom-nav-inner">
      <a href="app.html" class="cd-bottom-nav-item"><span class="cd-nav-icon">📋</span>Pipeline</a>
      <a href="clients.html" class="cd-bottom-nav-item"><span class="cd-nav-icon">👥</span>Clients</a>
      <a href="activity.html" class="cd-bottom-nav-item"><span class="cd-nav-icon">📊</span>Activity</a>
    </div>
  </div>
</div>

<script>
var STATUSES = [
  { id:'lead', label:'Lead', color:'#94a3b8' },
  { id:'quoted', label:'Quoted', color:'#f59e0b' },
  { id:'active', label:'Active', color:'#0EA5E9' },
  { id:'review', label:'Review', color:'#8b5cf6' },
  { id:'completed', label:'Completed', color:'#10b981' },
  { id:'on_hold', label:'On Hold', color:'#9ca3af' }
];
var CURRENCY_SYMBOLS = { NGN:'₦', KES:'KSh ', ZAR:'R', GHS:'GH₵', USD:'$', GBP:'£' };

var projects = [];
var project = null;

function escHtml(s) { if(!s)return''; var d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function formatValue(v,c) { var sym=CURRENCY_SYMBOLS[c]||c+' '; var n=parseInt((v||'0').toString().replace(/[^0-9]/g,''),10); return isNaN(n)?v:sym+n.toLocaleString(); }
function saveData() { try { localStorage.setItem('cd-projects', JSON.stringify(projects)); } catch(e) {} }
function showToast(msg) { var t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999'; document.body.appendChild(t); setTimeout(function(){t.remove();},2500); }

function render() {
  if (!project) {
    document.getElementById('projectDetail').innerHTML = '<div class="cd-empty"><div class="cd-empty-icon">📋</div><div class="cd-empty-title">Project not found</div><a href="app.html" class="cd-btn cd-btn-primary">Back to Pipeline</a></div>';
    return;
  }

  document.title = project.name + ' — CreatorDesk | AfroTools';
  document.getElementById('projectTitle').textContent = project.name;

  var statusObj = STATUSES.find(function(s) { return s.id === project.status; }) || STATUSES[0];
  var tasks = project.tasks || [];
  var doneTasks = tasks.filter(function(t) { return t.done; }).length;
  var pct = tasks.length ? Math.round((doneTasks / tasks.length) * 100) : 0;

  var html = '';

  // Header
  html += '<div class="cd-detail-header">';
  html += '<h1 contenteditable="true" oninput="updateField(\'name\', this.textContent)">' + escHtml(project.name) + '</h1>';
  if (project.client) html += '<div class="cd-detail-client">👤 ' + escHtml(project.client) + '</div>';
  html += '<div class="cd-detail-meta">';
  html += '<div class="cd-detail-meta-item"><select onchange="updateField(\'status\',this.value)" style="border:none;background:transparent;font-size:.75rem;font-weight:700;color:' + statusObj.color + '">';
  STATUSES.forEach(function(s) { html += '<option value="' + s.id + '"' + (s.id === project.status ? ' selected' : '') + '>' + s.label + '</option>'; });
  html += '</select></div>';
  if (project.due) html += '<div class="cd-detail-meta-item">📅 ' + project.due + '</div>';
  if (project.value) html += '<div class="cd-detail-meta-item">💰 ' + formatValue(project.value, project.currency) + '</div>';
  html += '<div class="cd-detail-meta-item" style="text-transform:capitalize">⚡ ' + (project.priority || 'medium') + '</div>';
  html += '</div></div>';

  // Tasks
  html += '<div class="cd-task-card">';
  html += '<h3>Tasks</h3>';
  html += '<div class="cd-task-progress"><div class="cd-task-progress-bar"><div class="cd-task-progress-fill" style="width:' + pct + '%"></div></div><div class="cd-task-progress-text">' + doneTasks + '/' + tasks.length + '</div></div>';

  tasks.forEach(function(t, i) {
    html += '<div class="cd-task-item">';
    html += '<div class="cd-task-check' + (t.done ? ' done' : '') + '" onclick="toggleTask(' + i + ')">' + (t.done ? '✓' : '') + '</div>';
    html += '<div class="cd-task-text' + (t.done ? ' done' : '') + '">' + escHtml(t.text) + '</div>';
    html += '<button type="button" class="cd-task-remove" onclick="removeTask(' + i + ')">×</button>';
    html += '</div>';
  });

  html += '<div class="cd-task-add"><input aria-label="Add a task" type="text" id="newTaskInput" placeholder="Add a task..." onkeydown="if(event.key===\'Enter\')addTask()"><button type="button" class="cd-btn cd-btn-primary" onclick="addTask()">Add</button></div>';
  html += '<div style="margin-top:12px"><button type="button" class="cd-ai-btn" onclick="aiTasks()">✨ AI: Break this project into tasks</button></div>';
  html += '</div>';

  // Notes / Timeline
  html += '<div class="cd-task-card">';
  html += '<h3>Notes & Timeline</h3>';
  var notes = project.notes || [];
  if (notes.length) {
    html += '<div class="cd-timeline">';
    notes.forEach(function(n) {
      html += '<div class="cd-timeline-item">';
      html += '<div class="cd-timeline-dot" style="background:' + (n.type === 'system' ? '#94a3b8' : '#0EA5E9') + '"></div>';
      html += '<div class="cd-timeline-content"><div class="cd-timeline-text">' + escHtml(n.text) + '</div>';
      html += '<div class="cd-timeline-time">' + new Date(n.time).toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) + '</div></div>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<div class="cd-task-add" style="margin-top:12px"><input aria-label="Add a note" type="text" id="newNoteInput" placeholder="Add a note..." onkeydown="if(event.key===\'Enter\')addNote()"><button type="button" class="cd-btn cd-btn-ghost" onclick="addNote()">Add</button></div>';
  html += '</div>';

  // AI section
  html += '<div class="cd-task-card">';
  html += '<h3>AI Assistant</h3>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  html += '<button type="button" class="cd-ai-btn" onclick="aiAction(\'summarize\')">✨ Summarize project</button>';
  html += '<button type="button" class="cd-ai-btn" onclick="aiAction(\'update\')">✨ Draft progress update</button>';
  html += '<button type="button" class="cd-ai-btn" onclick="aiAction(\'redflags\')">✨ Red flag check</button>';
  html += '</div></div>';

  document.getElementById('projectDetail').innerHTML = html;
}

function updateField(field, val) {
  project[field] = val;
  project.updatedAt = Date.now();
  saveData();
  if (field === 'status') render();
}

function toggleTask(i) {
  project.tasks[i].done = !project.tasks[i].done;
  if (project.tasks[i].done) project.tasks[i].completedAt = Date.now();
  project.updatedAt = Date.now();
  saveData(); render();
}

function addTask() {
  var input = document.getElementById('newTaskInput');
  var text = input.value.trim();
  if (!text) return;
  if (!project.tasks) project.tasks = [];
  project.tasks.push({ text: text, done: false, createdAt: Date.now() });
  input.value = '';
  project.updatedAt = Date.now();
  saveData(); render();
}

function removeTask(i) {
  project.tasks.splice(i, 1);
  project.updatedAt = Date.now();
  saveData(); render();
}

function addNote() {
  var input = document.getElementById('newNoteInput');
  var text = input.value.trim();
  if (!text) return;
  if (!project.notes) project.notes = [];
  project.notes.push({ text: text, type: 'manual', time: Date.now() });
  input.value = '';
  project.updatedAt = Date.now();
  saveData(); render();
}

function deleteProject() {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  projects = projects.filter(function(p) { return p.id !== project.id; });
  saveData();
  window.location.href = 'app.html';
}

function aiTasks() {
  var btn = event.target;
  btn.classList.add('loading'); btn.textContent = '⏳ Generating...';

  fetch('/.netlify/functions/ai-advisor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tool: 'creator-desk',
      message: 'Break this project into a checklist of specific tasks with realistic order. Project: "' + project.name + '"' +
        (project.client ? ' for client ' + project.client : '') + '. Return a numbered list only.'
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var text = data.response || data.message || '';
    var lines = text.split('\n').filter(function(l) { return l.trim() && /\d/.test(l[0]); });
    if (lines.length) {
      if (!project.tasks) project.tasks = [];
      lines.forEach(function(l) {
        var clean = l.replace(/^\d+[\.\)]\s*/, '').trim();
        if (clean) project.tasks.push({ text: clean, done: false, createdAt: Date.now() });
      });
      project.updatedAt = Date.now();
      saveData(); render();
      showToast(lines.length + ' tasks added!');
    } else {
      alert('AI response:\n\n' + text);
    }
  })
  .catch(function() { alert('Failed to generate tasks.'); })
  .finally(function() { btn.classList.remove('loading'); btn.textContent = '✨ AI: Break this project into tasks'; });
}

function aiAction(type) {
  var btn = event.target;
  btn.classList.add('loading'); btn.textContent = '⏳ ...';

  var prompts = {
    summarize: 'Give a one-paragraph status summary of this project: "' + project.name + '". Status: ' + project.status + '. Tasks: ' + (project.tasks||[]).length + ' total, ' + (project.tasks||[]).filter(function(t){return t.done;}).length + ' done. Due: ' + (project.due || 'no deadline') + '.',
    update: 'Draft a WhatsApp-friendly progress update message for the client of project "' + project.name + '". Keep it short, warm, professional.',
    redflags: 'Analyze this project for red flags. Project: "' + project.name + '", status: ' + project.status + ', due: ' + (project.due||'none') + '. Check for scope creep, timeline issues, or communication gaps.'
  };

  fetch('/.netlify/functions/ai-advisor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tool: 'creator-desk', message: prompts[type] })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) { alert((data.response || data.message || 'No response')); })
  .catch(function() { alert('AI failed.'); })
  .finally(function() {
    btn.classList.remove('loading');
    btn.textContent = '✨ ' + (type === 'summarize' ? 'Summarize project' : type === 'update' ? 'Draft progress update' : 'Red flag check');
  });
}

// ── INIT ──
(function() {
  try { var s = localStorage.getItem('cd-projects'); if (s) projects = JSON.parse(s); } catch(e) {}
  var id = new URLSearchParams(window.location.search).get('id');
  project = projects.find(function(p) { return p.id === id; });
  render();
})();
</script>
</body>
</html>
