<style>

<body>
<afro-navbar theme="dark" active="education"></afro-navbar>
<div class="hero">
  <div class="container">
    <nav class="bc"><a href="/">AfroTools</a> / <a href="/education/">Education</a> / Tutoring Rate Calculator</nav>
    <div class="badges">
      <span class="badge badge-multi">Multi-Country</span>
      <span class="badge badge-free">Free Tool</span>
    </div>
    <h1>Tutoring Rate <em>Calculator</em></h1>
    <p class="hero-sub">Find recommended tutoring rates by country, level and subject. See how your rate compares to the market and get pricing advice for packages.</p>
  </div>
</div>

<div class="sec-body">
<div class="container">

<div class="card">
  <h2>Find Your Tutoring Rate</h2>
  <div class="row">
    <div>
      <label for="tr-country">Country</label>
      <select id="tr-country">
        <option value="nigeria">Nigeria</option>
        <option value="kenya">Kenya</option>
        <option value="southafrica">South Africa</option>
        <option value="ghana">Ghana</option>
      </select>
    </div>
    <div>
      <label for="tr-level">Student Level</label>
      <select id="tr-level">
        <option value="primary">Primary (Grade 1–6)</option>
        <option value="secondary">Secondary (Grade 7–11 / JSS)</option>
        <option value="exam">Exam Prep (WAEC/KCSE/Matric)</option>
        <option value="university">University Level</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div>
      <label for="tr-subject">Subject Type</label>
      <select id="tr-subject">
        <option value="sciences">Sciences (Maths, Physics, Chemistry, Biology)</option>
        <option value="arts">Arts & Humanities (English, History, Languages)</option>
        <option value="tech">Technology / Coding</option>
        <option value="music">Music / Arts / Sports</option>
      </select>
    </div>
    <div>
      <label for="tr-mode">Tutoring Mode</label>
      <select id="tr-mode">
        <option value="inperson">In-Person / Home Visit</option>
        <option value="online">Online (Zoom/Meet)</option>
        <option value="group">Group Tutoring (3–5 students)</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div>
      <label for="tr-exp">Your Experience Level</label>
      <select id="tr-exp">
        <option value="student">Student Tutor (in same programme)</option>
        <option value="graduate">Graduate Tutor</option>
        <option value="teacher">Qualified/Experienced Teacher</option>
        <option value="specialist">Subject Specialist (professional)</option>
      </select>
    </div>
    <div>
      <label for="tr-hours">Hours Per Week</label>
      <input type="number" id="tr-hours" value="10" min="1" max="40">
    </div>
  </div>
  <button class="btn" onclick="calcTutoringRate()">Calculate Rates</button>

  <div class="result-box" id="tr-result">
    <div class="result-grid" id="tr-grid"></div>
    <div class="pricing-card" id="tr-pricing"></div>
    <div class="tips" id="tr-tips"></div>
  </div>
</div>

</div>
</div>


<div style="padding: 0 20px; max-width: 760px; margin: 0 auto;">
  <wise-cta context="general"></wise-cta>
</div>
<afro-footer></afro-footer>
<script>
var RATES={
  nigeria:{primary:{sciences:{base:2000},arts:{base:1500},tech:{base:2500},music:{base:1500}},secondary:{sciences:{base:4000},arts:{base:3000},tech:{base:5000},music:{base:2500}},exam:{sciences:{base:6000},arts:{base:5000},tech:{base:7000},music:{base:4000}},university:{sciences:{base:10000},arts:{base:8000},tech:{base:12000},music:{base:6000}},currency:'₦'},
  kenya:{primary:{sciences:{base:800},arts:{base:600},tech:{base:1000},music:{base:700}},secondary:{sciences:{base:1800},arts:{base:1500},tech:{base:2000},music:{base:1200}},exam:{sciences:{base:3000},arts:{base:2500},tech:{base:3500},music:{base:2000}},university:{sciences:{base:4000},arts:{base:3000},tech:{base:5000},music:{base:2500}},currency:'KSh'},
  southafrica:{primary:{sciences:{base:300},arts:{base:250},tech:{base:350},music:{base:280}},secondary:{sciences:{base:450},arts:{base:380},tech:{base:550},music:{base:350}},exam:{sciences:{base:650},arts:{base:550},tech:{base:750},music:{base:450}},university:{sciences:{base:800},arts:{base:650},tech:{base:1000},music:{base:550}},currency:'R'},
  ghana:{primary:{sciences:{base:40},arts:{base:30},tech:{base:50},music:{base:30}},secondary:{sciences:{base:80},arts:{base:60},tech:{base:100},music:{base:50}},exam:{sciences:{base:120},arts:{base:100},tech:{base:150},music:{base:80}},university:{sciences:{base:180},arts:{base:140},tech:{base:220},music:{base:100}},currency:'GH₵'}
};
var EXP_MULT={student:0.8,graduate:1.0,teacher:1.3,specialist:1.6};
var MODE_MULT={inperson:1.0,online:0.85,group:0.5};
function fmt(n,c){return c+Math.round(n).toLocaleString();}
function calcTutoringRate(){
  var country=document.getElementById('tr-country').value;
  var level=document.getElementById('tr-level').value;
  var subject=document.getElementById('tr-subject').value;
  var mode=document.getElementById('tr-mode').value;
  var exp=document.getElementById('tr-exp').value;
  var hours=parseInt(document.getElementById('tr-hours').value)||10;
  var d=RATES[country][level][subject];
  var c=RATES[country].currency;
  var base=d.base;
  var expMult=EXP_MULT[exp];
  var modeMult=MODE_MULT[mode];
  var rate=Math.round(base*expMult*modeMult);
  var rateMin=Math.round(rate*0.8);
  var rateMax=Math.round(rate*1.3);
  var weekly=rate*hours;
  var monthly=weekly*4;
  document.getElementById('tr-grid').innerHTML=
    '<div class="rs"><div class="lbl">Recommended Rate</div><div class="val">'+fmt(rate,c)+'/hr</div><div class="sub">Your market rate</div></div>'+
    '<div class="rs"><div class="lbl">Market Range</div><div class="val">'+fmt(rateMin,c)+'–'+fmt(rateMax,c)+'</div><div class="sub">Per hour</div></div>'+
    '<div class="rs"><div class="lbl">Weekly Income</div><div class="val">'+fmt(weekly,c)+'</div><div class="sub">At '+hours+'hrs/week</div></div>'+
    '<div class="rs"><div class="lbl">Monthly Income</div><div class="val">'+fmt(monthly,c)+'</div><div class="sub">Estimated (×4 weeks)</div></div>';
  var modeLabels={inperson:'In-Person',online:'Online (15% discount)',group:'Group (50% per student, shared session)'};
  var expLabels={student:'Student Tutor',graduate:'Graduate Tutor',teacher:'Qualified Teacher',specialist:'Subject Specialist'};
  document.getElementById('tr-pricing').innerHTML=
    '<h3>Pricing Strategy Breakdown</h3>'+
    '<div class="pr"><span>Base market rate ('+level+')</span><span>'+fmt(base,c)+'/hr</span></div>'+
    '<div class="pr"><span>Experience adjustment ('+expLabels[exp]+')</span><span>×'+expMult+'</span></div>'+
    '<div class="pr"><span>Mode adjustment ('+modeLabels[mode]+')</span><span>×'+modeMult+'</span></div>'+
    '<div class="pr"><span>Your recommended rate</span><span>'+fmt(rate,c)+'/hr</span></div>'+
    '<div class="pr"><span>5-session package rate</span><span>'+fmt(rate*5*0.9,c)+' (10% discount)</span></div>'+
    '<div class="pr"><span>10-session package rate</span><span>'+fmt(rate*10*0.85,c)+' (15% discount)</span></div>';
  var tips='<h3>Pricing & Business Tips</h3>'+
    '<div class="tip">Offer a free trial lesson to new students to reduce their hesitation and build trust.</div>'+
    '<div class="tip">Package pricing (5 or 10 sessions) improves student commitment and your income predictability.</div>'+
    '<div class="tip">Charge premium rates for exam prep (WAEC, KCSE, Matric) — parents pay more for results before exams.</div>'+
    '<div class="tip">Online tutoring allows you to work with students across the country and internationally — consider platforms like Preply or Superprof to find students.</div>'+
    '<div class="tip">Specialize in 1–2 subjects rather than teaching everything. Specialists command higher rates and get more referrals.</div>';
  document.getElementById('tr-tips').innerHTML=tips;
  document.getElementById('tr-result').classList.add('show');
}
</script>
</body>
