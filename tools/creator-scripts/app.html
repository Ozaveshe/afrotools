<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ScriptPad Workspace | AfroTools</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.min.css?v=6977389f">
  <link rel="stylesheet" href="/assets/css/global.min.css?v=b8aa6b54">
  <link rel="stylesheet" href="style.css?v=6e6231be">
  <style>
    .csc-loading-status{text-align:center;padding:18px 0 0;min-height:32px;font-size:1.05rem;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;letter-spacing:.01em;opacity:0;transition:opacity .3s}
    .csc-loading-status.active{opacity:1}
    .csc-loading-dots::after{content:'';display:inline-block;animation:cscDots 1.4s steps(4,end) infinite}
    @keyframes cscDots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  </style>
  <script src="/assets/js/supabase-auth.js" defer></script>
  <script src="/assets/js/lib/creator-profile.js?v=69df7ec4" defer></script>
<link rel="canonical" href="https://afrotools.com/tools/creator-scripts/">
</head>
<body class="csc-app">

  <!-- TOPBAR -->
  <div class="csc-topbar">
    <a href="index.html" class="csc-topbar-back">&larr; Back</a>
    <a href="index.html" class="csc-topbar-brand">&#128396; ScriptPad</a>
    <span class="csc-topbar-title" id="scriptTitle"></span>
    <div class="csc-topbar-actions">
      <button class="csc-topbar-btn" id="btnTeleprompter" style="display:none" onclick="window._cscTeleprompter()">&#128250; Teleprompter</button>
      <button class="csc-topbar-btn" id="btnExport" style="display:none" onclick="window._cscExport()">&#8595; Export</button>
    </div>
  </div>

  <!-- WORKSPACE -->
  <div class="csc-workspace">
    <!-- GENERATION FORM -->
    <div id="genForm" class="csc-gen-form">
      <div class="csc-form-title">&#9998; Write My Script</div>

      <div class="csc-form-group">
        <label class="csc-form-label">What's the video about?</label>
        <textarea class="csc-form-textarea" id="topicInput" placeholder="e.g. &quot;5 mistakes Nigerian startups make that kill their funding chances&quot;" rows="3"></textarea>
      </div>

      <div class="csc-form-group">
        <label class="csc-form-label">Format</label>
        <div class="csc-pills" id="formatPills"></div>
      </div>

      <div class="csc-form-group">
        <label class="csc-form-label">Duration</label>
        <div class="csc-pills" id="durationPills"></div>
      </div>

      <div class="csc-form-group">
        <label class="csc-form-label">Platform</label>
        <div class="csc-pills" id="platformPills"></div>
      </div>

      <div class="csc-form-group">
        <label class="csc-form-label">Key points to cover (optional)</label>
        <textarea class="csc-form-textarea" id="keyPointsInput" placeholder="e.g. Price comparison, local alternatives, ingredient quality..." rows="2"></textarea>
      </div>

      <button class="csc-generate-btn" id="generateBtn" onclick="window._cscGenerate()">
        <span class="csc-spinner"></span>Write My Script &#9998;
      </button>
      <div class="csc-loading-status" id="loadingStatus"><span id="loadingVerb"></span><span class="csc-loading-dots"></span></div>
    </div>

    <!-- SCRIPT OUTPUT AREA -->
    <div id="scriptOutput"></div>
  </div>

  <!-- BOTTOM NAV (mobile) -->
  <nav class="csc-bottom-nav" id="bottomNav">
    <a href="app.html" class="active"><span class="csc-bnav-icon">&#128396;</span>Write</a>
    <a href="#" onclick="window._cscTeleprompter();return false;"><span class="csc-bnav-icon">&#128250;</span>Teleprompter</a>
    <a href="#" onclick="window._cscExport();return false;"><span class="csc-bnav-icon">&#128196;</span>Export</a>
  </nav>

  <!-- TELEPROMPTER (hidden) -->
  <div class="csc-teleprompter" id="teleprompter" style="display:none">
    <div class="csc-tp-toolbar">
      <button onclick="window._cscCloseTeleprompter()">&#10005; Close</button>
      <button id="tpPlayBtn" onclick="window._cscToggleTeleprompter()">&#9654; Start</button>
      <button onclick="window._cscMirror()">&#8596; Mirror</button>
      <div class="csc-tp-speed">
        <span>Speed</span>
        <input type="range" id="tpSpeed" min="80" max="200" value="130" oninput="window._cscUpdateSpeed(this.value)">
        <span id="tpSpeedLabel">130 WPM</span>
      </div>
    </div>
    <div class="csc-tp-body">
      <div class="csc-tp-scroll" id="tpScroll"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="csc-toast" id="toast"></div>

<script src="/engines/creator-scripts-engine.js?v=02c0ff58"></script>
<script>
!function() {
  "use strict";

  var E = window.AfroTools && window.AfroTools.CreatorScriptsEngine;
  if (!E) { console.error('ScriptPad engine not loaded'); return; }

  var API = '/.netlify/functions/creator-scripts';
  var currentScript = null;
  var selectedFormat = 'youtube';
  var selectedDuration = '5-8 min';
  var selectedPlatform = 'YouTube';

  // ── AUTH ──
  function getToken() {
    try {
      var raw = localStorage.getItem('sb-zpclagtgczsygrgztlts-auth-token');
      if (raw) { var d = JSON.parse(raw); return d.access_token || ''; }
    } catch(e) {}
    return '';
  }

  function authHeaders() {
    var t = getToken();
    return { 'Content-Type': 'application/json', 'Authorization': t ? 'Bearer ' + t : '' };
  }

  // ── TOAST ──
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  // ── RENDER PILLS ──
  function renderPills() {
    // Format pills
    var fHtml = '';
    Object.keys(E.SCRIPT_FORMATS).forEach(function(key) {
      var f = E.SCRIPT_FORMATS[key];
      var cls = key === selectedFormat ? ' active' : '';
      fHtml += '<span class="csc-pill' + cls + '" data-val="' + key + '">' + f.icon + ' ' + f.label + '</span>';
    });
    document.getElementById('formatPills').innerHTML = fHtml;

    // Duration pills
    var dHtml = '';
    E.DURATION_OPTIONS.forEach(function(d) {
      var cls = d === selectedDuration ? ' active' : '';
      dHtml += '<span class="csc-pill' + cls + '" data-val="' + d + '">' + d + '</span>';
    });
    document.getElementById('durationPills').innerHTML = dHtml;

    // Platform pills
    var pHtml = '';
    E.PLATFORM_OPTIONS.forEach(function(p) {
      var cls = p === selectedPlatform ? ' active' : '';
      pHtml += '<span class="csc-pill' + cls + '" data-val="' + p + '">' + p + '</span>';
    });
    document.getElementById('platformPills').innerHTML = pHtml;

    // Wire pill clicks
    wirePills('formatPills', function(val) { selectedFormat = val; });
    wirePills('durationPills', function(val) { selectedDuration = val; });
    wirePills('platformPills', function(val) { selectedPlatform = val; });
  }

  function wirePills(containerId, onSelect) {
    var container = document.getElementById(containerId);
    container.querySelectorAll('.csc-pill').forEach(function(pill) {
      pill.onclick = function() {
        container.querySelectorAll('.csc-pill').forEach(function(p) { p.classList.remove('active'); });
        pill.classList.add('active');
        onSelect(pill.getAttribute('data-val'));
      };
    });
  }

  // ── VERB SPINNER ──
  var ACTION_VERBS = [
    "Writing your script",
    "Crafting the opening hook",
    "Structuring the narrative",
    "Building scene transitions",
    "Polishing dialogue",
    "Adding dramatic beats",
    "Refining the pacing",
    "Optimizing for retention",
    "Engineering the climax",
    "Shaping your story arc",
    "Weaving in call-to-actions",
    "Calibrating the tone",
    "Composing compelling lines",
    "Architecting viewer flow",
    "Generating script variations",
    "Perfecting the outro"
  ];
  var _verbTimer = null;
  var _verbIndex = 0;

  function startVerbCycling() {
    var statusEl = document.getElementById('loadingStatus');
    var verbEl = document.getElementById('loadingVerb');
    _verbIndex = 0;
    verbEl.textContent = ACTION_VERBS[_verbIndex];
    statusEl.classList.add('active');
    _verbTimer = setInterval(function() {
      _verbIndex = (_verbIndex + 1) % ACTION_VERBS.length;
      verbEl.textContent = ACTION_VERBS[_verbIndex];
    }, 2400);
  }

  function stopVerbCycling() {
    if (_verbTimer) { clearInterval(_verbTimer); _verbTimer = null; }
    var statusEl = document.getElementById('loadingStatus');
    statusEl.classList.remove('active');
  }

  // ── GENERATE ──
  window._cscGenerate = function() {
    var topic = document.getElementById('topicInput').value.trim();
    if (!topic) { toast('Please describe your video topic'); return; }

    var keyPoints = document.getElementById('keyPointsInput').value.trim();
    var formData = {
      topic: topic,
      format: selectedFormat,
      duration: selectedDuration,
      platform: selectedPlatform,
      keyPoints: keyPoints
    };

    var prompt = E.buildGeneratePrompt(formData);
    var btn = document.getElementById('generateBtn');
    btn.classList.add('loading'); btn.disabled = true;

    var outputArea = document.getElementById('scriptOutput');
    outputArea.innerHTML = '<div class="csc-shimmer-card"><div class="csc-shimmer-line" style="width:90%"></div><div class="csc-shimmer-line" style="width:70%"></div><div class="csc-shimmer-line" style="width:85%"></div><div class="csc-shimmer-line" style="width:50%"></div><div class="csc-shimmer-line" style="width:75%"></div><div class="csc-shimmer-line" style="width:60%"></div></div>';

    startVerbCycling();

    fetch(API + '/generate', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ topic: topic, format: selectedFormat, duration: selectedDuration, platform: selectedPlatform, prompt: prompt })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      btn.classList.remove('loading'); btn.disabled = false;
      stopVerbCycling();
      if (!res.ok) {
        outputArea.innerHTML = '<div class="csc-gen-form" style="border-color:rgba(239,68,68,.3);"><p style="color:#ef4444;margin:0;">' + (res.data.error || 'Generation failed. Please try again.') + '</p></div>';
        return;
      }
      currentScript = res.data.script;
      renderScript(currentScript);
      // Show topbar actions
      document.getElementById('btnTeleprompter').style.display = '';
      document.getElementById('btnExport').style.display = '';
      document.getElementById('scriptTitle').textContent = currentScript.title || topic;
      // Save to local history
      saveLocalHistory(topic, selectedFormat, currentScript);
      if (res.data.remaining !== undefined) {
        toast(res.data.remaining + ' scripts remaining today');
      }
    })
    .catch(function() {
      btn.classList.remove('loading'); btn.disabled = false;
      stopVerbCycling();
      outputArea.innerHTML = '<div class="csc-gen-form" style="border-color:rgba(239,68,68,.3);"><p style="color:#ef4444;margin:0;">Connection error. Please try again.</p></div>';
    });
  };

  // ── RENDER SCRIPT ──
  function renderScript(script) {
    var outputArea = document.getElementById('scriptOutput');
    if (!script || !script.sections || !script.sections.length) {
      // Fallback for raw text
      if (script && script.fullScript) {
        outputArea.innerHTML = '<div class="csc-section"><div class="csc-section-body"><div class="csc-section-text">' + escapeHtml(script.fullScript) + '</div></div></div>';
        return;
      }
      outputArea.innerHTML = '<div class="csc-gen-form"><p style="color:rgba(255,255,255,.5);margin:0;">No script generated. Try again.</p></div>';
      return;
    }

    var html = '';

    // Script header
    var wc = script.wordCount || E.countWords(E.getFullScript(script.sections));
    html += '<div class="csc-script-header">';
    html += '<div class="csc-script-meta">';
    html += '<div class="csc-script-meta-item"><strong>' + (script.estimatedDuration || E.estimateDuration(wc)) + '</strong> est. duration</div>';
    html += '<div class="csc-script-meta-item"><strong>' + wc + '</strong> words</div>';
    html += '<div class="csc-script-meta-item"><strong>' + script.sections.length + '</strong> sections</div>';
    html += '</div>';
    html += '<div class="csc-script-actions">';
    html += '<button class="csc-section-btn" onclick="window._cscCopyAll()">&#128203; Copy All</button>';
    html += '<button class="csc-section-btn" onclick="window._cscTeleprompter()">&#128250; Teleprompter</button>';
    html += '</div>';
    html += '</div>';

    // Sections
    script.sections.forEach(function(s, i) {
      html += '<div class="csc-section" data-idx="' + i + '">';
      html += '<div class="csc-section-header" onclick="window._cscToggleSection(this)">';
      html += '<div class="csc-section-toggle">&#9660;</div>';
      html += '<div class="csc-section-type">' + (s.type || 'section').toUpperCase() + '</div>';
      html += '<div class="csc-section-label">' + escapeHtml(s.label || s.type || 'Section ' + (i + 1)) + '</div>';
      html += '<div class="csc-section-timestamp">' + escapeHtml(s.timestamp || '') + '</div>';
      html += '</div>';
      html += '<div class="csc-section-body">';

      // Content + Notes layout
      html += '<div class="csc-section-content">';
      html += '<div class="csc-section-text" contenteditable="true" data-idx="' + i + '">' + escapeHtml(s.text || '') + '</div>';

      // Visual cues / notes
      if (s.visualCues && s.visualCues.length) {
        html += '<div class="csc-section-notes">';
        s.visualCues.forEach(function(cue) {
          html += '<div class="csc-note"><span class="csc-note-icon">&#127909;</span>' + escapeHtml(cue) + '</div>';
        });
        html += '</div>';
      }
      html += '</div>'; // end content

      // Delivery notes
      if (s.deliveryNotes) {
        html += '<div class="csc-delivery-note">&#127908; ' + escapeHtml(s.deliveryNotes) + '</div>';
      }

      // Section actions
      html += '<div class="csc-section-actions">';
      html += '<button class="csc-section-btn" onclick="window._cscCopySection(' + i + ')">&#128203; Copy</button>';
      html += '<button class="csc-section-btn" onclick="window._cscRegenSection(' + i + ')">&#128260; Regenerate</button>';
      html += '<button class="csc-section-btn" onclick="window._cscDeleteSection(' + i + ')">&#128465; Delete</button>';
      html += '</div>';

      html += '</div>'; // end body
      html += '</div>'; // end section
    });

    // Keywords
    if (script.keywordSuggestions && script.keywordSuggestions.length) {
      html += '<div class="csc-word-bar">&#128270; <strong>SEO Keywords:</strong> ' + script.keywordSuggestions.join(', ') + '</div>';
    }

    // Word count bar
    html += '<div class="csc-word-bar">';
    html += '<span><strong>' + wc + '</strong> words</span>';
    html += '<span>~<strong>' + (script.estimatedDuration || E.estimateDuration(wc)) + '</strong> video</span>';
    html += '<span><strong>' + script.sections.length + '</strong> sections</span>';
    html += '</div>';

    outputArea.innerHTML = html;
  }

  // ── SECTION ACTIONS ──
  window._cscToggleSection = function(header) {
    var section = header.closest('.csc-section');
    section.classList.toggle('collapsed');
  };

  window._cscCopySection = function(idx) {
    if (!currentScript || !currentScript.sections[idx]) return;
    navigator.clipboard.writeText(currentScript.sections[idx].text || '').then(function() { toast('Section copied!'); });
  };

  window._cscCopyAll = function() {
    if (!currentScript) return;
    var text = E.exportPlainText(currentScript);
    navigator.clipboard.writeText(text).then(function() { toast('Full script copied!'); });
  };

  window._cscDeleteSection = function(idx) {
    if (!currentScript || !currentScript.sections[idx]) return;
    currentScript.sections.splice(idx, 1);
    renderScript(currentScript);
  };

  window._cscRegenSection = function(idx) {
    if (!currentScript || !currentScript.sections[idx]) return;
    var section = currentScript.sections[idx];
    var topic = document.getElementById('topicInput').value.trim();

    var prompt = E.buildRegeneratePrompt(section, { topic: topic, format: selectedFormat });

    // Show loading state on that section
    var sectionEl = document.querySelectorAll('.csc-section')[idx];
    if (sectionEl) {
      var body = sectionEl.querySelector('.csc-section-body');
      var origHtml = body.innerHTML;
      body.innerHTML = '<div class="csc-shimmer-card" style="margin:0"><div class="csc-shimmer-line" style="width:80%"></div><div class="csc-shimmer-line" style="width:60%"></div><div class="csc-shimmer-line" style="width:70%"></div></div>';
    }

    fetch(API + '/regenerate-section', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ prompt: prompt })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) {
        toast(res.data.error || 'Regeneration failed');
        if (sectionEl) sectionEl.querySelector('.csc-section-body').innerHTML = origHtml;
        return;
      }
      var newSection = res.data.section;
      currentScript.sections[idx].text = newSection.text || currentScript.sections[idx].text;
      if (newSection.visualCues) currentScript.sections[idx].visualCues = newSection.visualCues;
      if (newSection.deliveryNotes) currentScript.sections[idx].deliveryNotes = newSection.deliveryNotes;
      renderScript(currentScript);
      toast('Section regenerated!');
    })
    .catch(function() {
      toast('Connection error');
      if (sectionEl) sectionEl.querySelector('.csc-section-body').innerHTML = origHtml;
    });
  };

  // ── EXPORT ──
  window._cscExport = function() {
    if (!currentScript) { toast('Generate a script first'); return; }
    var text = E.exportPlainText(currentScript);
    navigator.clipboard.writeText(text).then(function() { toast('Script copied to clipboard!'); });
  };

  // ── TELEPROMPTER ──
  var tpRunning = false;
  var tpInterval = null;
  var tpMirrored = false;
  var tpSpeed = 130; // WPM

  window._cscTeleprompter = function() {
    if (!currentScript) { toast('Generate a script first'); return; }
    var text = E.buildTeleprompterText(currentScript.sections);
    document.getElementById('tpScroll').textContent = text;
    document.getElementById('tpScroll').style.transform = '';
    document.getElementById('teleprompter').style.display = 'flex';
    tpRunning = false; tpMirrored = false;
    document.getElementById('tpPlayBtn').innerHTML = '&#9654; Start';
    // Reset scroll position
    document.getElementById('tpScroll').style.marginTop = '50vh';
  };

  window._cscCloseTeleprompter = function() {
    document.getElementById('teleprompter').style.display = 'none';
    if (tpInterval) { clearInterval(tpInterval); tpInterval = null; }
    tpRunning = false;
  };

  window._cscToggleTeleprompter = function() {
    tpRunning = !tpRunning;
    document.getElementById('tpPlayBtn').innerHTML = tpRunning ? '&#9646;&#9646; Pause' : '&#9654; Start';

    if (tpRunning) {
      var scroll = document.getElementById('tpScroll');
      var currentMargin = parseFloat(scroll.style.marginTop) || window.innerHeight * 0.5;

      tpInterval = setInterval(function() {
        currentMargin -= 1.2;
        scroll.style.marginTop = currentMargin + 'px';
        // Stop at the end
        if (currentMargin < -scroll.scrollHeight) {
          clearInterval(tpInterval); tpInterval = null;
          tpRunning = false;
          document.getElementById('tpPlayBtn').innerHTML = '&#9654; Start';
        }
      }, 60000 / (tpSpeed * 5)); // Approximate scroll speed based on WPM
    } else {
      if (tpInterval) { clearInterval(tpInterval); tpInterval = null; }
    }
  };

  window._cscMirror = function() {
    tpMirrored = !tpMirrored;
    document.getElementById('tpScroll').classList.toggle('mirror', tpMirrored);
  };

  window._cscUpdateSpeed = function(val) {
    tpSpeed = parseInt(val);
    document.getElementById('tpSpeedLabel').textContent = tpSpeed + ' WPM';
    // If running, restart with new speed
    if (tpRunning) {
      window._cscToggleTeleprompter(); // pause
      window._cscToggleTeleprompter(); // resume with new speed
    }
  };

  // ── HELPERS ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
  }

  // ── LOCAL HISTORY ──
  function saveLocalHistory(topic, format, scriptData) {
    var history = JSON.parse(localStorage.getItem('csc-history') || '[]');
    history.unshift(E.createHistoryEntry(topic, format, scriptData));
    if (history.length > 50) history = history.slice(0, 50);
    localStorage.setItem('csc-history', JSON.stringify(history));
  }

  // ── TRACK INLINE EDITS ──
  document.addEventListener('blur', function(e) {
    if (e.target.classList && e.target.classList.contains('csc-section-text') && e.target.hasAttribute('data-idx')) {
      var idx = parseInt(e.target.getAttribute('data-idx'));
      if (currentScript && currentScript.sections[idx]) {
        currentScript.sections[idx].text = e.target.innerText;
      }
    }
  }, true);

  // ── INIT ──
  renderPills();

}();
</script>
</body>
</html>
