<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator — Trigonometry, Powers, Memory | AfroTools</title>
<meta name="description" content="Free scientific calculator. Trigonometry, exponentials, logarithms, memory functions. Full keyboard support.">
<link rel="canonical" href="https://afrotools.com/tools/scientific-calc">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Scientific Calculator | AfroTools">
<meta property="og:description" content="Scientific calculator with trigonometry, powers, roots, logarithms, and memory functions.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/scientific-calc">
<meta property="og:site_name" content="AfroTools">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/global.css">
<script src="/assets/js/components/navbar.js" defer></script>
<script src="/assets/js/components/footer.js" defer></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '🔢'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 600px; margin: 0 auto; padding: 0 24px; }
  .calc-container { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .display { background: linear-gradient(135deg, #1a1f2e 0%, var(--afro-dark) 100%); color: var(--afro-green); font-size: 2rem; font-weight: 800; padding: 20px; text-align: right; word-wrap: break-word; word-break: break-all; font-family: 'Courier New', monospace; min-height: 60px; }
  .history { background: #f7fdf8; padding: 10px 15px; font-size: 0.75rem; color: #7dab87; max-height: 60px; overflow-y: auto; border-bottom: 1px solid #eaf5ec; }
  .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 12px; background: #f7fdf8; }
  .btn { padding: 12px 4px; font-size: 0.8rem; font-weight: 700; border: 1.5px solid #c5deca; background: #fff; border-radius: 6px; cursor: pointer; transition: all 0.15s; color: #0d2813; font-family: 'DM Sans', sans-serif; }
  .btn:hover { border-color: var(--afro-green); background: #edfaf0; }
  .btn-op { background: rgba(0, 135, 81, 0.08); }
  .btn-op:hover { background: rgba(0, 135, 81, 0.15); }
  .btn-eq { background: var(--afro-green); color: #fff; border-color: var(--afro-green); grid-column: span 2; }
  .btn-eq:hover { background: #006d42; }
  .btn-clear { background: rgba(192, 57, 43, 0.1); color: #8b2e1f; border-color: rgba(192, 57, 43, 0.35); }
  .btn-clear:hover { background: rgba(192, 57, 43, 0.2); }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Scientific <em>Calculator</em></h1>
    <p class="hero-sub">Full-featured scientific calculator with trigonometry, powers, roots, logarithms, and memory functions.</p>
    <div class="hero-badges">
      <span class="badge b-green">Scientific</span>
      <span class="badge b-green">Keyboard Support</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="calc-container">
      <div class="display" id="display">0</div>
      <div class="history" id="history"></div>
      <div class="buttons">
        <button class="btn btn-clear" onclick="clearDisplay()">C</button>
        <button class="btn btn-clear" onclick="deleteLast()">DEL</button>
        <button class="btn btn-op" onclick="appendOp('/')">/</button>
        <button class="btn btn-op" onclick="appendOp('*')">×</button>
        <button class="btn btn-op" onclick="appendOp('sqrt')">√</button>
        
        <button class="btn" onclick="appendNum('7')">7</button>
        <button class="btn" onclick="appendNum('8')">8</button>
        <button class="btn" onclick="appendNum('9')">9</button>
        <button class="btn btn-op" onclick="appendOp('-')">−</button>
        <button class="btn btn-op" onclick="appendOp('sin')">sin</button>
        
        <button class="btn" onclick="appendNum('4')">4</button>
        <button class="btn" onclick="appendNum('5')">5</button>
        <button class="btn" onclick="appendNum('6')">6</button>
        <button class="btn btn-op" onclick="appendOp('+')">+</button>
        <button class="btn btn-op" onclick="appendOp('cos')">cos</button>
        
        <button class="btn" onclick="appendNum('1')">1</button>
        <button class="btn" onclick="appendNum('2')">2</button>
        <button class="btn" onclick="appendNum('3')">3</button>
        <button class="btn btn-op" onclick="appendOp('^')">^</button>
        <button class="btn btn-op" onclick="appendOp('tan')">tan</button>
        
        <button class="btn" onclick="appendNum('0')" style="grid-column: span 2;">0</button>
        <button class="btn" onclick="appendNum('.')">.</button>
        <button class="btn btn-op" onclick="appendOp('log')">log</button>
        <button class="btn btn-op" onclick="appendOp('ln')">ln</button>
        
        <button class="btn btn-op" onclick="toggleSign()">+/−</button>
        <button class="btn btn-op" onclick="appendOp('!')" title="factorial">n!</button>
        <button class="btn btn-op" onclick="appendOp('%')">%</button>
        <button class="btn btn-eq" onclick="calculate()">=</button>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  let display = document.getElementById('display');
  let history = document.getElementById('history');
  let currentValue = '0';
  let previousValue = '';
  let operator = null;
  let shouldClear = false;

  function updateDisplay() {
    display.textContent = currentValue.length > 20 ? currentValue.substring(0, 20) + '...' : currentValue;
  }

  function appendNum(num) {
    if (shouldClear) { currentValue = num; shouldClear = false; } else { currentValue = currentValue === '0' && num !== '.' ? num : currentValue + num; }
    updateDisplay();
  }

  function appendOp(op) {
    if (operator && !shouldClear) calculate();
    previousValue = currentValue;
    operator = op;
    shouldClear = true;
    history.textContent = previousValue + ' ' + op;
  }

  function calculate() {
    let result = currentValue;
    if (operator) {
      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      switch(operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/': result = curr !== 0 ? prev / curr : 'Error'; break;
        case '^': result = Math.pow(prev, curr); break;
        case 'sqrt': result = Math.sqrt(curr); break;
        case 'sin': result = Math.sin((curr * Math.PI) / 180); break;
        case 'cos': result = Math.cos((curr * Math.PI) / 180); break;
        case 'tan': result = Math.tan((curr * Math.PI) / 180); break;
        case 'log': result = Math.log10(curr); break;
        case 'ln': result = Math.log(curr); break;
        case '!': result = factorial(curr); break;
        case '%': result = prev % curr; break;
      }
      operator = null;
    }
    currentValue = String(result).substring(0, 15);
    shouldClear = true;
    updateDisplay();
  }

  function factorial(n) {
    if (n < 0) return 'Error';
    if (n === 0 || n === 1) return 1;
    let result = 1;
    for (let i = 2; i <= n; i++) result *= i;
    return result;
  }

  function clearDisplay() {
    currentValue = '0';
    previousValue = '';
    operator = null;
    shouldClear = false;
    history.textContent = '';
    updateDisplay();
  }

  function deleteLast() {
    currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : '0';
    updateDisplay();
  }

  function toggleSign() {
    currentValue = String(parseFloat(currentValue) * -1);
    updateDisplay();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendNum('.');
    else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') appendOp(e.key);
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearDisplay();
    else if (e.key === 'Backspace') deleteLast();
  });

  updateDisplay();
</script>
</body>
</html>
