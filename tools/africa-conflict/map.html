<script>
(function(){
  var map, allConflicts = [], markers = [];

  function conflictUrl(slug) {
    if (window.AfroConflictStaticRoutes && typeof window.AfroConflictStaticRoutes.conflict === 'function') {
      return window.AfroConflictStaticRoutes.conflict(slug);
    }
    return '/tools/africa-conflict/detail.html?id=' + encodeURIComponent(slug || '');
  }

  function initMap(conflicts) {
    allConflicts = conflicts;
    map = L.map('acd-fullmap', { center:[2,20], zoom:3 });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO', subdomains:'abcd', maxZoom:19
    }).addTo(map);
    renderMarkers();
  }

  function renderMarkers() {
    markers.forEach(function(m){ map.removeLayer(m); });
    markers = [];
    var riskFilter = [];
    if (document.getElementById('mf-critical').checked) riskFilter.push('critical');
    if (document.getElementById('mf-high').checked) riskFilter.push('high');
    if (document.getElementById('mf-medium').checked) riskFilter.push('medium');
    if (document.getElementById('mf-low').checked) riskFilter.push('low');
    var africanOnly = document.getElementById('mf-african').checked;
    var globalToo = document.getElementById('mf-global').checked;

    var filtered = allConflicts.filter(function(c) {
      if (!c.lat || !c.lng) return false;
      if (!riskFilter.includes(c.escalation_risk) && !['minimal','frozen'].includes(c.escalation_risk)) return false;
      if (africanOnly && !globalToo && !c.is_african) return false;
      if (!africanOnly && globalToo && c.is_african) return false;
      return true;
    });

    document.getElementById('mf-count').textContent = filtered.length + ' conflicts shown';

    filtered.forEach(function(c) {
      var color = AfroConflict.CONFIG.riskColors[c.escalation_risk] || '#6b7280';
      var size = Math.min(40, Math.max(8, Math.sqrt((c.fatalities_max||500)/500)*12));
      var m = L.circleMarker([c.lat,c.lng], {
        radius:size, fillColor:color, color:color, weight:2, opacity:.9, fillOpacity:.5
      }).addTo(map);
      m.bindPopup(AfroConflict.CONFIG && ('<div class="acd-map-popup"><div class="acd-mp-header"><span class="acd-mp-flag">' + AfroConflict.flagEmoji(c.primary_country) + '</span><strong>' + (c.short_name||c.name) + '</strong></div><div class="acd-mp-badges">' + AfroConflict.statusBadge(c.status) + AfroConflict.riskBadge(c.escalation_risk,'Risk') + '</div><div class="acd-mp-stats"><div>☠️ ' + AfroConflict.formatRange(c.fatalities_min,c.fatalities_max) + '</div><div>🏕️ ' + AfroConflict.formatNumber((c.idps_count||0)+(c.refugees_count||0)) + ' displaced</div></div><a href="' + conflictUrl(c.slug) + '" class="acd-mp-link">View Intelligence →</a></div>'));
      markers.push(m);
    });
  }

  async function load() {
    var res = await fetch('/api/conflicts');
    var json = await res.json();
    initMap(json.data || []);
    ['mf-critical','mf-high','mf-medium','mf-low','mf-african','mf-global'].forEach(function(id){
      document.getElementById(id).addEventListener('change', renderMarkers);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    AfroConflict.init();
    load();
  });
})();
</script>
