<body class="top-level-page-ui-refresh">
<header class="bp-topbar">
  <a class="bp-back" href="index.html">Back</a>
  <a class="bp-brand" href="index.html">Business Plan Builder</a>
  <span class="bp-title" id="planTitle">Untitled plan</span>
  <button class="bp-btn" id="copyBriefBtn" type="button">Copy Brief</button>
  <button class="bp-btn" id="savePlanBtn" type="button">Save</button>
  <button class="bp-btn primary" id="pdfBtn" type="button">PDF</button>
</header>

<main class="bp-app" aria-label="Business plan builder workspace">
  <section class="bp-left">
    <div class="bp-saved" id="savedPanel" hidden>
      <div class="bp-panel-head">
        <div>
          <span class="bp-eyebrow">Saved locally</span>
          <h2>Business plans</h2>
        </div>
      </div>
      <div class="bp-saved-grid" id="savedPlans"></div>
    </div>

    <section class="bp-panel">
      <div class="bp-panel-head">
        <div>
          <span class="bp-eyebrow">Setup</span>
          <h1>Plan workspace</h1>
        </div>
        <span class="bp-sync" id="draftStatus">Draft ready</span>
      </div>
      <div class="bp-grid four">
        <label>Plan format
          <select id="planFormat" data-bind="meta.format">
            <option value="lender">Lender-ready plan</option>
            <option value="investor">Investor plan</option>
            <option value="lean">Lean one-page plan</option>
            <option value="grant">Grant or NGO plan</option>
            <option value="internal">Internal growth plan</option>
          </select>
        </label>
        <label>Country
          <select id="country" data-bind="meta.country">
            <option value="Nigeria">Nigeria</option>
            <option value="Kenya">Kenya</option>
            <option value="Ghana">Ghana</option>
            <option value="South Africa">South Africa</option>
            <option value="Tanzania">Tanzania</option>
            <option value="Uganda">Uganda</option>
            <option value="Rwanda">Rwanda</option>
            <option value="Ethiopia">Ethiopia</option>
            <option value="Egypt">Egypt</option>
            <option value="Morocco">Morocco</option>
            <option value="Senegal">Senegal</option>
            <option value="Cameroon">Cameroon</option>
            <option value="Pan-African">Pan-African</option>
          </select>
        </label>
        <label>Currency
          <select id="currency" data-bind="meta.currency">
            <option value="NGN">NGN</option>
            <option value="KES">KES</option>
            <option value="GHS">GHS</option>
            <option value="ZAR">ZAR</option>
            <option value="TZS">TZS</option>
            <option value="UGX">UGX</option>
            <option value="RWF">RWF</option>
            <option value="ETB">ETB</option>
            <option value="EGP">EGP</option>
            <option value="MAD">MAD</option>
            <option value="XOF">XOF</option>
            <option value="XAF">XAF</option>
            <option value="USD">USD</option>
          </select>
        </label>
        <label>Forecast
          <select id="forecastYears" data-bind="meta.forecastYears">
            <option value="3">3 years</option>
            <option value="5">5 years</option>
          </select>
        </label>
      </div>
      <div class="bp-template-row" id="templateRow" aria-label="Industry templates"></div>
    </section>

    <nav class="bp-section-nav" id="sectionNav" aria-label="Business plan sections"></nav>

    <section class="bp-panel bp-editor">
      <div class="bp-panel-head">
        <div>
          <span class="bp-eyebrow" id="sectionKicker">Section</span>
          <h2 id="sectionTitle">Business plan</h2>
        </div>
        <div class="bp-mini-actions">
          <button class="bp-btn" id="prevSectionBtn" type="button">Previous</button>
          <button class="bp-btn primary" id="nextSectionBtn" type="button">Next</button>
        </div>
      </div>
      <p class="bp-help" id="sectionHelp"></p>
      <div id="sectionBody"></div>
    </section>
  </section>

  <aside class="bp-right" aria-label="Plan preview and export">
    <section class="bp-export">
      <button class="bp-export-btn primary" id="savePlanSideBtn" type="button">Save</button>
      <button class="bp-export-btn" id="docBtn" type="button">DOC</button>
      <button class="bp-export-btn" id="txtBtn" type="button">TXT</button>
      <button class="bp-export-btn" id="csvBtn" type="button">CSV</button>
      <button class="bp-export-btn" id="jsonBtn" type="button">JSON</button>
      <label class="bp-export-btn file-label" for="importJson">Import</label>
      <input id="importJson" class="bp-file-input" type="file" accept="application/json,.json">
    </section>

    <section class="bp-review">
      <div class="bp-score-row">
        <div>
          <span class="bp-eyebrow">Plan readiness</span>
          <h2><span id="scoreValue">0</span>/100</h2>
        </div>
        <span id="scoreLabel" class="bp-score-label">Draft</span>
      </div>
      <div class="bp-meter"><span id="scoreMeter"></span></div>
      <div class="bp-checks" id="checkList"></div>
    </section>

    <section class="bp-metrics">
      <dl>
        <div><dt>Year 1 revenue</dt><dd id="metricRevenue">0</dd></div>
        <div><dt>Year 1 profit</dt><dd id="metricProfit">0</dd></div>
        <div><dt>Gross margin</dt><dd id="metricMargin">0%</dd></div>
        <div><dt>Funding gap</dt><dd id="metricFunding">0</dd></div>
      </dl>
    </section>

    <section class="bp-preview-card">
      <div class="bp-preview-head">
        <span class="bp-eyebrow">Live preview</span>
        <button class="bp-btn" id="onePageBtn" type="button">One-page brief</button>
      </div>
      <article class="bp-preview" id="planPreview" tabindex="0"></article>
    </section>
  </aside>
</main>
</body>
</html>
