<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Margin Calculator — Cost, Margin, Markup | AfroTools</title>
<meta name="description" content="Free profit margin calculator. Calculate profit margin %, markup %, profit. Reverse calculate selling price from desired margin.">
<link rel="canonical" href="https://afrotools.com/tools/profit-margin">
<link rel="icon" type="image/svg+xml" href="/assets/img/logo-mark.svg">
<meta property="og:title" content="Profit Margin Calculator | AfroTools">
<meta property="og:description" content="Calculate profit margin, markup, and profit. Reverse calculate selling price from target margin.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://afrotools.com/tools/profit-margin">
<meta property="og:site_name" content="AfroTools">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.min.css">
<link rel="stylesheet" href="/assets/css/global.min.css">
<script src="/assets/js/components/navbar.min.js" defer></script>
<script src="/assets/js/components/footer.min.js" defer></script>
<style>
  :root { --afro-green: #008751; --afro-dark: #0f1419; }
  .tool-hero { background: linear-gradient(135deg, var(--afro-dark) 0%, #1a1f2e 100%); padding: 44px 0 36px; position: relative; overflow: hidden; }
  .tool-hero::after { content: '💰'; position: absolute; right: 5%; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.06; pointer-events: none; }
  .tool-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }
  .breadcrumb { font-size: 0.72rem; font-weight: 500; color: rgba(255, 255, 255, 0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .breadcrumb a { color: rgba(255, 255, 255, 0.3); text-decoration: none; }
  .breadcrumb span { color: var(--afro-green); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
  h1 em { color: var(--afro-green); font-style: normal; }
  .hero-sub { font-size: 0.88rem; color: rgba(255, 255, 255, 0.45); line-height: 1.6; max-width: 560px; margin-bottom: 14px; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; }
  .b-green { background: rgba(0, 135, 81, 0.18); color: #5ddb9e; border: 1px solid rgba(0, 135, 81, 0.38); }
  .tool-main { padding: 28px 0 72px; }
  .tool-main-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .card { background: #fff; border: 1px solid #dceee0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0, 0, 0, 0.05); }
  .card + .card { margin-top: 18px; }
  .card-head { padding: 15px 22px; border-bottom: 1px solid #eaf5ec; background: #f7fdf8; }
  .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0a4018; }
  .card-body { padding: 22px; }
  .mode-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .mode-tab { padding: 10px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; cursor: pointer; font-size: 0.72rem; font-weight: 700; color: #244d2c; transition: all 0.15s; }
  .mode-tab.on { background: var(--afro-green); color: #fff; border-color: var(--afro-green); }
  .field { margin-bottom: 18px; }
  .f-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .f-label-text { font-size: 0.75rem; font-weight: 700; color: #0d2813; }
  .f-input { width: 100%; padding: 11px 13px; background: #f4fbf5; border: 1.5px solid #c5deca; border-radius: 7px; font-size: 1rem; font-weight: 600; color: #0d2813; outline: none; font-family: 'DM Sans', sans-serif; }
  .f-input:focus { border-color: var(--afro-green); box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1); }
  .calc-btn { width: 100%; padding: 14px; background: var(--afro-green); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .calc-btn:hover { background: #006d42; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 135, 81, 0.3); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  .result-box { background: #f7fdf8; border: 1px solid #c5deca; border-radius: 8px; padding: 14px; text-align: center; }
  .result-label { font-size: 0.65rem; font-weight: 700; color: #0a4018; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .result-value { font-size: 1.6rem; font-weight: 800; color: var(--afro-green); }
</style>
</head>
<body>
<afro-navbar active="tools"></afro-navbar>

<div class="tool-hero">
  <div class="tool-hero-inner">
    <div class="breadcrumb"><a href="/">AfroTools</a> / <span>Tools</span></div>
    <h1>Profit Margin <em>Calculator</em></h1>
    <p class="hero-sub">Calculate profit margin, markup, and profit. Reverse calculate selling price from target margin.</p>
    <div class="hero-badges">
      <span class="badge b-green">2 Modes</span>
      <span class="badge b-green">Instant</span>
    </div>
  </div>
</div>

<div class="tool-main">
  <div class="tool-main-inner">
    <div class="card">
      <div class="card-head"><span class="card-title">Profit Calculator</span></div>
      <div class="card-body">
        <div class="mode-tabs">
          <button class="mode-tab on" data-mode="forward">Forward</button>
          <button class="mode-tab" data-mode="reverse">Reverse</button>
        </div>

        <div id="forward-mode">
          <div class="field">
            <label class="f-label"><span class="f-label-text">Cost Price</span></label>
            <input type="number" id="costPrice" class="f-input" value="100" min="0" step="0.01">
          </div>
          <div class="field">
            <label class="f-label"><span class="f-label-text">Selling Price</span></label>
            <input type="number" id="sellingPrice" class="f-input" value="150" min="0" step="0.01">
          </div>
          <button class="calc-btn" id="calcForward">Calculate</button>

          <div class="result-grid" id="forwardResults" style="display:none;margin-top:18px;">
            <div class="result-box">
              <div class="result-label">Profit</div>
              <div class="result-value" id="profit">0</div>
            </div>
            <div class="result-box">
              <div class="result-label">Margin %</div>
              <div class="result-value" id="margin">0%</div>
            </div>
            <div class="result-box">
              <div class="result-label">Markup %</div>
              <div class="result-value" id="markup">0%</div>
            </div>
            <div class="result-box">
              <div class="result-label">ROI %</div>
              <div class="result-value" id="roi">0%</div>
            </div>
          </div>
        </div>

        <div id="reverse-mode" style="display:none;">
          <div class="field">
            <label class="f-label"><span class="f-label-text">Cost Price</span></label>
            <input type="number" id="costRev" class="f-input" value="100" min="0" step="0.01">
          </div>
          <div class="field">
            <label class="f-label"><span class="f-label-text">Target Margin %</span></label>
            <input type="number" id="targetMargin" class="f-input" value="30" min="0" max="100" step="0.01">
          </div>
          <button class="calc-btn" id="calcReverse">Calculate Selling Price</button>

          <div class="result-grid" id="reverseResults" style="display:none;margin-top:18px;">
            <div class="result-box" style="grid-column:1/-1;">
              <div class="result-label">Selling Price</div>
              <div class="result-value" id="sellPriceResult">0</div>
            </div>
            <div class="result-box">
              <div class="result-label">Profit</div>
              <div class="result-value" id="profitResult">0</div>
            </div>
            <div class="result-box">
              <div class="result-label">Markup %</div>
              <div class="result-value" id="markupResult">0%</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<afro-footer></afro-footer>

<script>
  const modeTabs = document.querySelectorAll('.mode-tab');
  const forwardMode = document.getElementById('forward-mode');
  const reverseMode = document.getElementById('reverse-mode');
  const calcForward = document.getElementById('calcForward');
  const calcReverse = document.getElementById('calcReverse');

  modeTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      modeTabs.forEach(t => t.classList.remove('on'));
      tab.classList.add('on');
      forwardMode.style.display = mode === 'forward' ? 'block' : 'none';
      reverseMode.style.display = mode === 'reverse' ? 'block' : 'none';
    });
  });

  calcForward.addEventListener('click', () => {
    const cp = parseFloat(document.getElementById('costPrice').value) || 0;
    const sp = parseFloat(document.getElementById('sellingPrice').value) || 0;

    const profit = sp - cp;
    const margin = cp > 0 ? ((profit / sp) * 100).toFixed(2) : 0;
    const markup = cp > 0 ? ((profit / cp) * 100).toFixed(2) : 0;
    const roi = cp > 0 ? ((profit / cp) * 100).toFixed(2) : 0;

    document.getElementById('profit').textContent = profit.toFixed(2);
    document.getElementById('margin').textContent = margin + '%';
    document.getElementById('markup').textContent = markup + '%';
    document.getElementById('roi').textContent = roi + '%';
    document.getElementById('forwardResults').style.display = 'grid';
  });

  calcReverse.addEventListener('click', () => {
    const cp = parseFloat(document.getElementById('costRev').value) || 0;
    const tm = parseFloat(document.getElementById('targetMargin').value) || 0;

    const sp = cp / (1 - (tm / 100));
    const profit = sp - cp;
    const markup = cp > 0 ? ((profit / cp) * 100).toFixed(2) : 0;

    document.getElementById('sellPriceResult').textContent = sp.toFixed(2);
    document.getElementById('profitResult').textContent = profit.toFixed(2);
    document.getElementById('markupResult').textContent = markup + '%';
    document.getElementById('reverseResults').style.display = 'grid';
  });

  [document.getElementById('costPrice'), document.getElementById('sellingPrice')].forEach(el => {
    el.addEventListener('keypress', e => { if (e.key === 'Enter') calcForward.click(); });
  });
  [document.getElementById('costRev'), document.getElementById('targetMargin')].forEach(el => {
    el.addEventListener('keypress', e => { if (e.key === 'Enter') calcReverse.click(); });
  });

  calcForward.click();
</script>
</body>
</html>
