services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.1}
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    env_file:
      - ${OPENCLAW_ENV_FILE:-/opt/openclaw/.env}
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-Africa/Lagos}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/opt/openclaw/config}:/home/node/.openclaw
      - ${AFROTOOLS_REPO_DIR:-/opt/afrotools}:/opt/afrotools
    ports:
      # Recommended secure default for VPS access over SSH tunnel or private reverse proxy.
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789"
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.1}
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    working_dir: /opt/afrotools
    env_file:
      - ${OPENCLAW_ENV_FILE:-/opt/openclaw/.env}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
      TZ: ${OPENCLAW_TZ:-Africa/Lagos}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/opt/openclaw/config}:/home/node/.openclaw
      - ${AFROTOOLS_REPO_DIR:-/opt/afrotools}:/opt/afrotools
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy

# Notes for Hostinger:
# - If you front this with Traefik or another HTTPS proxy, keep gateway.bind=lan.
# - If you need direct LAN/public access instead of localhost-only publishing, change the
#   ports section to "${OPENCLAW_GATEWAY_PORT:-18789}:18789" and secure it before exposing it.
