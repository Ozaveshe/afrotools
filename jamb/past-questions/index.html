<style>
.qcard {
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  padding: 20px;
  transition: all .15s;
}
.qcard:hover { border-color: #4DA3FF; box-shadow: 0 4px 16px rgba(0,98,204,.06); }
.qcard-meta {
  display:flex;gap:10px;flex-wrap:wrap;
  font-size:.65rem;font-weight:700;
  color:#64748b;text-transform:uppercase;letter-spacing:.05em;
  margin-bottom:10px;
}
.qcard-meta .meta-chip {
  padding:3px 8px;background:#f1f5f9;border-radius:4px;color:#475569;
}
.qcard-meta .meta-chip.subj { background:#E8F2FF; color:#0063D1; }
.qcard-text {
  font-size:.95rem;line-height:1.55;color:#0f172a;font-weight:500;margin-bottom:14px;
}
.qcard-opts { display:flex;flex-direction:column;gap:6px;margin-bottom:14px; }
.qcard-opt {
  padding:9px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;
  font-size:.84rem;line-height:1.4;color:#334155;display:flex;gap:10px;align-items:start;
  cursor:pointer;transition:all .12s;
}
.qcard-opt:hover { border-color:#4DA3FF; background:#fff; }
.qcard-opt.correct { border-color:#10b981; background:#d1fae5; color:#065f46; }
.qcard-opt-letter { font-weight:800; color:#64748b; flex-shrink:0; }
.qcard-opt.correct .qcard-opt-letter { color:#10b981; }
.qcard-actions { display:flex;gap:8px;flex-wrap:wrap; }
.qcard-actions button {
  padding:8px 14px;font-size:.78rem;font-weight:700;
  border:1.5px solid #e2e8f0;background:#fafbfc;border-radius:8px;
  cursor:pointer;font-family:inherit;color:#475569;
}
.qcard-actions button:hover { border-color:#0062CC;color:#0062CC; }
.qcard-actions button.primary { background:#0062CC;color:#fff;border-color:#0062CC; }
.qcard-actions button.primary:hover { background:#0063D1; }
.qcard-explain {
  margin-top:14px; padding:16px 18px;
  background:#f8fafc; border:1px solid #e2e8f0;
  border-radius:12px; font-size:.88rem; line-height:1.65;
  color:#1e293b; white-space:pre-wrap; position:relative;
}
.qcard-explain::before {
  content:"AI tutor"; display:block;
  font-size:.58rem; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:#64748b; margin-bottom:8px;
}
@media (max-width:820px) {
  .qcard-opt {
    min-height: 44px;
    padding: 12px 14px;
  }
  .qcard-actions button {
    min-height: 44px;
    padding: 12px 14px;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
}
</style>

<script>
var SUBJECTS = [
  ["english","📝 Use of English"],
  ["mathematics","➗ Mathematics"],
  ["physics","⚛️ Physics"],
  ["chemistry","🧪 Chemistry"],
  ["biology","🌱 Biology"],
  ["government","🏛️ Government"],
  ["economics","💹 Economics"],
  ["literature","📖 Literature"],
  ["crk","✝️ CRK"],
  ["commerce","🛒 Commerce"],
  ["accounts","📒 Accounts"],
];
var SUBJ_LABEL = {};
SUBJECTS.forEach(function(s){ SUBJ_LABEL[s[0]] = s[1]; });

var ALL_QUESTIONS = []; // current loaded subject pool
var FILTERED = [];
var PAGE_SIZE = 20;
var SHOWN = 0;
var VISUAL_DEPENDENT_RE = /use the diagram|use the figure|diagram below|diagram above|figure above|graph above|illustration above|circuit above|bar chart above|pie chart above|histogram above/i;

function populateSubjectFilter(){
  var sel = document.getElementById("f-subject");
  SUBJECTS.forEach(function(s){
    var opt = document.createElement("option");
    opt.value = s[0]; opt.textContent = s[1];
    sel.appendChild(opt);
  });
}

function populateYearFilter(){
  var sel = document.getElementById("f-year");
  // Common JAMB years range
  for (var y = 2020; y >= 1978; y--) {
    var opt = document.createElement("option");
    opt.value = y; opt.textContent = y;
    sel.appendChild(opt);
  }
}

async function loadSubject(subject) {
  // Loads either single subject or full pool
  var url = subject ? "/data/jamb/pools/" + subject + ".json" : "/data/jamb/pools/practice-pool.json";
  var res = await fetch(url);
  var data = await res.json();
  return (data.questions || []).filter(isLaunchSafeQuestion);
}

async function loadAllSubjectsFull() {
  var chunks = await Promise.all(SUBJECTS.map(function (s) {
    return loadSubject(s[0]).catch(function () { return []; });
  }));
  return chunks.reduce(function (all, questions) {
    return all.concat(questions);
  }, []);
}

async function buildAiHeaders() {
  var headers = {"Content-Type":"application/json"};
  try {
    if (window.AfroAuth && typeof AfroAuth.isLoggedIn === "function" && AfroAuth.isLoggedIn()) {
      var token = null;
      if (typeof AfroAuth.getSessionTokenAsync === "function") token = await AfroAuth.getSessionTokenAsync();
      else if (typeof AfroAuth.getSessionToken === "function") token = AfroAuth.getSessionToken();
      if (token) headers.Authorization = "Bearer " + token;
    }
  } catch (e) {}
  return headers;
}

async function refresh() {
  var subject = document.getElementById("f-subject").value;
  var year = document.getElementById("f-year").value;
  var search = document.getElementById("f-search").value.trim().toLowerCase();
  var answeredOnly = document.getElementById("f-answered").checked;

  document.getElementById("result-meta").textContent = "Loading…";

  try {
    if (subject) {
      ALL_QUESTIONS = await loadSubject(subject);
    } else if (!answeredOnly) {
      ALL_QUESTIONS = await loadAllSubjectsFull();
    } else {
      // For "all subjects", use the practice pool (only answered) for speed
      ALL_QUESTIONS = await loadSubject(null);
    }
  } catch(e) {
    document.getElementById("result-meta").textContent = "Failed to load questions.";
    return;
  }

  FILTERED = ALL_QUESTIONS.filter(function(q){
    if (year && String(q.year) !== year) return false;
    if (search) {
      var hay = (q.question + " " + Object.values(q.options || {}).join(" ")).toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    if (answeredOnly && !q.answer) return false;
    return true;
  });

  SHOWN = 0;
  document.getElementById("q-list").innerHTML = "";
  showMore();
}

function isLaunchSafeQuestion(q) {
  var text = ((q && q.question) || "") + " " + Object.values((q && q.options) || {}).join(" ");
  return !!q && !q.has_diagram && !VISUAL_DEPENDENT_RE.test(text);
}

function showMore() {
  var list = document.getElementById("q-list");
  var end = Math.min(SHOWN + PAGE_SIZE, FILTERED.length);
  for (var i = SHOWN; i < end; i++) {
    list.appendChild(renderQCard(FILTERED[i]));
  }
  SHOWN = end;
  document.getElementById("result-meta").textContent =
    FILTERED.length.toLocaleString() + " questions · showing " + SHOWN;
  document.getElementById("load-more-wrap").hidden = SHOWN >= FILTERED.length;
}

function renderQCard(q) {
  var card = document.createElement("div");
  card.className = "qcard";
  var subjLbl = SUBJ_LABEL[q.subject] || q.subject;
  var yr = q.year ? "JAMB " + q.year : "JAMB";
  var meta = '<div class="qcard-meta"><span class="meta-chip subj">' + subjLbl + '</span><span class="meta-chip">' + yr + '</span><span class="meta-chip">Q' + q.num + '</span>' + (q.has_diagram ? '<span class="meta-chip">📊 has diagram</span>' : '') + '</div>';
  var optsHtml = '';
  ["A","B","C","D","E"].forEach(function(letter){
    if (!q.options[letter]) return;
    var isAnswer = q.answer === letter;
    var revealed = false;
    optsHtml += '<div class="qcard-opt" data-letter="' + letter + '" data-answer="' + (q.answer || '') + '">'
      + '<div class="qcard-opt-letter">' + letter + '</div>'
      + '<div>' + escapeHtml(q.options[letter]) + '</div></div>';
  });
  card.innerHTML = meta
    + '<div class="qcard-text">' + escapeHtml(q.question) + '</div>'
    + '<div class="qcard-opts">' + optsHtml + '</div>'
    + '<div class="qcard-actions">'
    + (q.answer ? '<button type="button" class="reveal-btn primary">Reveal answer</button>' : '<button type="button" class="reveal-btn" disabled style="opacity:.5;cursor:not-allowed;">No answer key</button>')
    + '<button type="button" class="explain-btn">🤖 Explain with AI</button>'
    + '</div>';

  // Reveal interaction
  var revealBtn = card.querySelector(".reveal-btn");
  if (q.answer) {
    revealBtn.addEventListener("click", function(){
      card.querySelectorAll(".qcard-opt").forEach(function(o){
        if (o.dataset.letter === q.answer) o.classList.add("correct");
      });
      revealBtn.textContent = "✓ Answer: " + q.answer;
      revealBtn.disabled = true;
    });
  }
  // Click an option to reveal
  card.querySelectorAll(".qcard-opt").forEach(function(o){
    o.addEventListener("click", function(){
      if (q.answer) {
        card.querySelectorAll(".qcard-opt").forEach(function(x){
          if (x.dataset.letter === q.answer) x.classList.add("correct");
        });
        revealBtn.textContent = "✓ Answer: " + q.answer;
        revealBtn.disabled = true;
      }
    });
  });
  // Explain
  card.querySelector(".explain-btn").addEventListener("click", async function(){
    var btn = this;
    btn.disabled = true;
    btn.textContent = "Asking AI…";
    try {
      var prompt = "Explain this JAMB " + q.subject + " question step by step. Question: " + q.question + "\nOptions:\n" + Object.entries(q.options).map(function(p){return p[0]+". "+p[1];}).join("\n") + (q.answer ? "\nCorrect answer: " + q.answer : "");
      var res = await fetch("/.netlify/functions/ai-advisor", {
        method: "POST",
        headers: await buildAiHeaders(),
        body: JSON.stringify({tool: "jamb-tutor-" + q.subject, message: prompt})
      });
      var data = await res.json();
      var reply = data.reply || data.message || "Could not generate explanation.";
      var box = document.createElement("div");
      box.className = "qcard-explain";
      box.textContent = reply;
      card.appendChild(box);
      btn.textContent = "✓ Explained";
    } catch(e) {
      btn.textContent = "Try again";
      btn.disabled = false;
    }
  });
  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c){
    return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[c];
  });
}

// Initial setup
populateSubjectFilter();
populateYearFilter();

// URL params
(function(){
  var p = new URLSearchParams(location.search);
  if (p.get("subject")) document.getElementById("f-subject").value = p.get("subject");
  if (p.get("year")) document.getElementById("f-year").value = p.get("year");
  if (p.get("q")) document.getElementById("f-search").value = p.get("q");
})();

document.getElementById("f-subject").addEventListener("change", refresh);
document.getElementById("f-year").addEventListener("change", refresh);
document.getElementById("f-answered").addEventListener("change", refresh);
document.getElementById("f-search").addEventListener("input", function(){
  clearTimeout(window._fs);
  window._fs = setTimeout(refresh, 300);
});
document.getElementById("load-more").addEventListener("click", showMore);

refresh();
</script>
