<script>
  var reportLink = document.getElementById('report-link');
  if (reportLink) {
    reportLink.href = '/contact/?subject=Kiungo+Kilichovunjika&message=' + encodeURIComponent('Nimepata kiungo kilichovunjika katika: ' + window.location.href);
  }
  var searchForm = document.getElementById('search-form');
  if (searchForm) {
    searchForm.addEventListener('submit', function() {
      var q = searchForm.querySelector('.search-input');
      if (q && q.value.trim().length >= 2 && navigator.sendBeacon) {
        try {
          var sid = sessionStorage.getItem('_afro_search_sid');
          if (!sid) { sid = crypto.randomUUID(); sessionStorage.setItem('_afro_search_sid', sid); }
          navigator.sendBeacon('/api/capture-search', JSON.stringify({
            query: q.value.trim().slice(0, 200),
            results_count: 0,
            source: '404-page-sw',
            page_url: location.href,
            session_id: sid
          }));
        } catch {}
      }
    });
  }
</script>
